<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vrai ou Faux ? — Le squelette</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: {
        preflight: false,
      },
      theme: {
        extend: {
          borderWidth: {
            '3': '3px',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Fredoka', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --encre: #0f172a;
      --ardoise: #475569;
      --papier: #f8fafc;
      --papier-2: #ffffff;
      --ligne: #e2e8f0;
      
      --squelette: #6366f1;
      --squelette-fonce: #4338ca;
      --squelette-clair: #e0e7ff;
      
      --vert: #10b981;
      --vert-clair: #ecfdf5;
      --rouge: #ef4444;
      --rouge-clair: #fef2f2;
      
      --border: #0f172a;
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--encre);
      background: var(--papier);
      line-height: 1.5;
      padding: 1rem;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    /* CARD STYLE */
    .card-premium {
      background: #ffffff;
      border: 3px solid var(--encre);
      border-radius: var(--radius);
      padding: 20px;
      margin: 12px 0;
      box-shadow: 4px 4px 0px rgba(15, 23, 42, 0.1);
    }

    /* FLAT 3D BUTTON */
    .btn-3d {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      border: 3px solid var(--encre) !important;
      box-shadow: 3px 3px 0px var(--encre);
      transition: all 0.1s ease;
      cursor: pointer;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-3d:active:not(:disabled) {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px var(--encre);
    }

    /* PROGRESS BAR */
    .progress-bar-bg {
      width: 100%;
      height: 12px;
      background: var(--ligne);
      border: 2px solid var(--encre);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--squelette);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* STATEMENT BOX */
    .statement-box {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      padding: 32px 16px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
      color: var(--encre);
    }

    /* ANSWER CHIPS */
    .ans-chip {
      padding: 16px;
      border-radius: 12px;
      border: 3px solid var(--border);
      text-align: center;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      box-shadow: 3px 3px 0px var(--border);
      transition: all 0.15s;
    }
    .ans-chip-true {
      background: #ffffff;
      border-color: var(--vert);
      color: #047857;
      box-shadow: 3px 3px 0px var(--vert);
    }
    .ans-chip-true:hover:not(:disabled) {
      background: var(--vert-clair);
      transform: translateY(-2px);
    }
    .ans-chip-false {
      background: #ffffff;
      border-color: var(--rouge);
      color: #b91c1c;
      box-shadow: 3px 3px 0px var(--rouge);
    }
    .ans-chip-false:hover:not(:disabled) {
      background: var(--rouge-clair);
      transform: translateY(-2px);
    }

    /* EXPLANATION PANEL */
    .exp-panel {
      border: 3px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      box-shadow: 3px 3px 0px var(--border);
    }
    .exp-panel.correct {
      border-color: var(--vert);
      background: var(--vert-clair);
      color: #065f46;
      box-shadow: 3px 3px 0px var(--vert);
    }
    .exp-panel.incorrect {
      border-color: var(--rouge);
      background: var(--rouge-clair);
      color: #991b1b;
      box-shadow: 3px 3px 0px var(--rouge);
    }

    /* SCORE PANEL */
    .geo-score-panel {
      background: var(--vert-clair);
      border: 3px solid var(--vert);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-top: 16px;
      box-shadow: 4px 4px 0px var(--vert);
    }
    .score-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--vert);
      margin-bottom: 6px;
    }
    .score-msg {
      font-weight: 700;
      font-size: 1.05rem;
      color: #065f46;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Header & Progresse -->
  <div class="card-premium bg-indigo-50 border-indigo-200" style="margin-top: 0;">
    <div class="flex justify-between items-center mb-2">
      <span class="font-display font-bold text-indigo-950 text-sm md:text-base">❓ Vrai ou Faux ?</span>
      <span class="font-mono font-bold text-indigo-700 text-xs bg-indigo-100 px-2 py-0.5 rounded-md" id="progress-num">Question 1/10</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
  </div>

  <!-- Game Area -->
  <div id="game-area"></div>

  <!-- Feedback Area -->
  <div id="feedback-area"></div>
</div>

<script>
  // STATEMENT DATABASE
  const STATEMENTS_POOL = [
    {
      text: "Les os sont vivants : ils contiennent des vaisseaux sanguins et grandissent avec nous.",
      ans: true,
      explanation: "C'est tout à fait vrai ! Nos os ne sont pas de la matière morte. Ils sont vivants, irrigués de sang, se réparent en cas de fracture et fabriquent même nos cellules sanguines !"
    },
    {
      text: "Un ligament sert à attacher un muscle sur un os.",
      ans: false,
      explanation: "C'est faux. Le ligament relie deux os entre eux au niveau d'une articulation (ex: au genou). C'est le tendon qui attache le muscle à l'os !"
    },
    {
      text: "Le fémur est l'os le plus long et le plus solide de notre corps.",
      ans: true,
      explanation: "C'est vrai ! Le fémur se trouve dans la cuisse. Il est extrêmement solide pour supporter une grande partie du poids de notre corps."
    },
    {
      text: "Quand le biceps se contracte pour plier le bras, il s'allonge.",
      ans: false,
      explanation: "C'est faux ! Quand un muscle se contracte, il raccourcit, gonfle et devient dur. En se raccourcissant, il tire sur l'os pour faire plier le bras."
    },
    {
      text: "Le crâne et la cage thoracique servent principalement à protéger des organes fragiles et vitaux.",
      ans: true,
      explanation: "C'est vrai ! Le crâne protège notre cerveau, et la cage thoracique forme un bouclier pour notre cœur et nos poumons."
    },
    {
      text: "Notre corps fabrique naturellement de la vitamine D lorsque notre peau est exposée de façon raisonnable au soleil.",
      ans: true,
      explanation: "C'est vrai ! La lumière du soleil permet à notre corps de synthétiser la vitamine D, ce qui aide le calcium à se fixer sur nos os pour les solidifier."
    },
    {
      text: "Le cartilage est un liquide synovial huileux qui lubrifie l'intérieur de l'articulation.",
      ans: false,
      explanation: "C'est faux ! Le cartilage est un tissu de protection solide, glissant et élastique recouvrant le bout des os. La synovie est le nom du liquide lubrifiant."
    },
    {
      text: "Une entorse est une blessure où l'os est cassé en deux.",
      ans: false,
      explanation: "C'est faux. L'os cassé est une fracture. Une entorse correspond à un étirement ou à une déchirure des ligaments articulations."
    },
    {
      text: "Les muscles biceps et triceps travaillent ensemble de façon opposée : ce sont des muscles antagonistes.",
      ans: true,
      explanation: "C'est tout à fait vrai ! Quand le biceps se contracte (flexion), le triceps se relâche. Et quand le triceps se contracte (extension), le biceps se relâche."
    },
    {
      text: "Les bébés naissent avec moins d'os que les adultes.",
      ans: false,
      explanation: "C'est faux ! Les bébés naissent avec environ 350 os temporaires en grande partie cartilagineux. Plusieurs d'entre eux fusionnent (se soudent) au cours de la croissance pour donner 206 os à l'âge adulte."
    },
    {
      text: "La colonne vertébrale est constituée d'un seul long os rigide de haut en bas.",
      ans: false,
      explanation: "C'est faux. Elle est constituée d'un empilement de 33 petits os appelés les vertèbres, ce qui donne de la souplesse à notre dos et protège la moelle épinière."
    },
    {
      text: "Le calcium contenu dans notre alimentation (laitages, légumes verts) aide à solidifier notre squelette.",
      ans: true,
      explanation: "C'est vrai ! Le calcium est la matière première minérale indispensable pour fabriquer la structure rigide de nos os."
    },
    {
      text: "Une luxation se produit lorsqu'un os sort complètement de sa position normale dans l'articulation.",
      ans: true,
      explanation: "C'est vrai ! On dit communément que l'articulation est déboîtée. Elle nécessite l'aide d'un médecin pour être remise en place en toute sécurité."
    },
    {
      text: "C'est le cœur qui commande directement tous les mouvements volontaires de nos membres.",
      ans: false,
      explanation: "C'est faux. C'est le cerveau qui commande les mouvements volontaires en envoyant des signaux électriques (messages nerveux) via les nerfs moteurs."
    },
    {
      text: "Les articulations comme le coude ou le genou permettent à nos membres de faire des mouvements.",
      ans: true,
      explanation: "C'est vrai ! Sans articulations entre nos os rigides, nous serions incapables de plier nos membres, de marcher, ou même de saisir un objet."
    },
    {
      text: "La colonne vertébrale est le centre de commande de tous nos mouvements volontaires.",
      ans: false,
      explanation: "C'est faux ! Le centre de commande est le cerveau. La colonne vertébrale sert de canal protecteur pour la moelle épinière, qui transporte le message nerveux."
    },
    {
      text: "Les muscles sont fixés aux os par des ligaments.",
      ans: false,
      explanation: "C'est faux. Les muscles sont attachés aux os par les tendons. Les ligaments servent à relier les os entre eux au niveau des articulations."
    },
    {
      text: "L'avant-bras contient deux os longs parallèles : le radius et le cubitus.",
      ans: true,
      explanation: "C'est tout à fait vrai ! Ces deux os nous permettent notamment de faire pivoter notre main pour orienter la paume vers le haut ou le bas."
    },
    {
      text: "Le sport régulier fatigue les os et les rend plus fragiles.",
      ans: false,
      explanation: "C'est faux ! L'activité physique régulière et modérée stimule la croissance de l'os et le rend plus dense, plus fort et plus résistant."
    },
    {
      text: "Notre cage thoracique protège notre cœur, nos poumons et notre estomac.",
      ans: false,
      explanation: "C'est faux. La cage thoracique protège bien le cœur et les poumons, mais l'estomac est situé plus bas, dans l'abdomen, et n'est pas enveloppé par les côtes."
    },
    {
      text: "Il y a plus de 600 muscles dans le corps humain.",
      ans: true,
      explanation: "C'est vrai ! Nous possédons environ 640 muscles squelettiques volontaires qui nous permettent de réaliser une immense variété de mouvements."
    },
    {
      text: "Le liquide synovial est produit par le cartilage pour réparer les fractures.",
      ans: false,
      explanation: "C'est faux ! Le liquide synovial sert à lubrifier l'articulation pour faciliter les mouvements de glissement, pas à souder les os cassés."
    },
    {
      text: "Une fracture de l'os se répare toute seule grâce à la fabrication d'une nouvelle matière osseuse par notre corps.",
      ans: true,
      explanation: "C'est vrai ! En cas de fracture, le corps fabrique un cal osseux (de la nouvelle matière osseuse) pour ressouder les morceaux. Un plâtre sert à maintenir l'os bien droit pendant cette réparation."
    },
    {
      text: "Le calcium s'associe à la vitamine D pour solidifier le squelette.",
      ans: true,
      explanation: "C'est tout à fait vrai ! La vitamine D sert en quelque sorte de clé pour ouvrir la porte des os et y faire entrer le calcium pour le fixer."
    },
    {
      text: "Quand le triceps se contracte pour tendre le bras, le biceps se relâche.",
      ans: true,
      explanation: "C'est vrai ! C'est le principe des muscles antagonistes : ils font des actions opposées pour permettre la flexion et l'extension du bras."
    },
    {
      text: "Les os plats comme l'omoplate ne servent à rien dans le mouvement.",
      ans: false,
      explanation: "C'est faux ! Bien qu'ils protègent le haut du dos, les omoplates offrent de grandes surfaces d'attache solides pour les muscles de l'épaule et du bras."
    },
    {
      text: "Le rachitisme est une maladie causée par un manque grave de fer.",
      ans: false,
      explanation: "C'est faux ! Le rachitisme est une maladie due à une carence sévère en calcium et en vitamine D chez l'enfant, ce qui rend ses os mous et déformables."
    },
    {
      text: "Nous avons des articulations immobiles, par exemple entre les os du crâne.",
      ans: true,
      explanation: "C'est vrai ! Les os du crâne sont soudés entre eux par des articulations fixes appelées sutures, pour former une boîte de protection rigide autour du cerveau."
    },
    {
      text: "L'étrier est le plus petit os du corps humain et il se trouve dans notre oreille.",
      ans: true,
      explanation: "C'est vrai ! Il mesure environ 3 millimètres et joue un rôle essentiel dans la transmission des vibrations sonores pour nous permettre d'entendre."
    },
    {
      text: "Une luxation signifie qu'un ligament est étiré mais que les os sont restés en place.",
      ans: false,
      explanation: "C'est faux. L'étirement d'un ligament est une entorse. La luxation se produit quand l'extrémité de l'os sort complètement de son logement articulaire (déboîtement)."
    }
  ];

  // UTILS
  function shuffle(array) {
    let currentIndex = array.length, randomIndex;
    while (currentIndex != 0) {
      randomIndex = Math.floor(Math.random() * currentIndex);
      currentIndex--;
      [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
    }
    return array;
  }

  // STATE VARIABLES
  let activeQuestions = [];
  let currentIdx = 0;
  let score = 0;
  let answerGiven = false;

  function initGame() {
    activeQuestions = shuffle([...STATEMENTS_POOL]).slice(0, 10);
    currentIdx = 0;
    score = 0;
    loadQuestion();
  }

  function loadQuestion() {
    answerGiven = false;
    document.getElementById('feedback-area').innerHTML = '';
    
    // Update progress panel
    document.getElementById('progress-num').textContent = `Affirmation ${currentIdx + 1}/10`;
    document.getElementById('progress-bar').style.width = `${currentIdx * 10}%`;

    const q = activeQuestions[currentIdx];

    const gameArea = document.getElementById('game-area');
    gameArea.innerHTML = `
      <div class="card-premium statement-box">
        "${q.text}"
      </div>
      <div class="grid grid-cols-2 gap-6 mt-4">
        <button class="btn-3d ans-chip ans-chip-false" id="btn-false" onclick="submitAnswer(false)">❌ FAUX</button>
        <button class="btn-3d ans-chip ans-chip-true" id="btn-true" onclick="submitAnswer(true)">✅ VRAI</button>
      </div>
    `;
  }

  function submitAnswer(userVal) {
    if (answerGiven) return;
    answerGiven = true;

    const q = activeQuestions[currentIdx];
    const isCorrect = (userVal === q.ans);
    
    if (isCorrect) score++;

    // Style button triggers
    const btnTrue = document.getElementById('btn-true');
    const btnFalse = document.getElementById('btn-false');
    btnTrue.disabled = true;
    btnFalse.disabled = true;

    if (q.ans === true) {
      btnTrue.style.background = 'var(--vert-clair)';
      btnTrue.style.color = '#047857';
      if (userVal === false) {
        btnFalse.style.background = 'var(--rouge-clair)';
        btnFalse.style.color = '#b91c1c';
      }
    } else {
      btnFalse.style.background = 'var(--rouge-clair)';
      btnFalse.style.color = '#b91c1c';
      if (userVal === true) {
        btnTrue.style.background = 'var(--vert-clair)';
        btnTrue.style.color = '#047857';
      }
    }

    // Render explanation panel
    const feedbackArea = document.getElementById('feedback-area');
    feedbackArea.innerHTML = `
      <div class="exp-panel ${isCorrect ? 'correct' : 'incorrect'} animate-fadeIn">
        <p class="font-bold text-sm md:text-base m-0 flex items-center gap-2">
          ${isCorrect ? '🎯 Bravo ! Bonne réponse !' : '❌ Dommage, ce n\'est pas tout à fait ça...'}
        </p>
        <p class="text-xs md:text-sm mt-2 mb-0 leading-relaxed font-sans font-medium">
          ${q.explanation}
        </p>
      </div>
      <button class="btn-3d w-full py-3.5 bg-indigo-500 text-white rounded-xl text-sm font-bold mt-4 animate-fadeIn" onclick="nextQuestion()">
        ${currentIdx === 9 ? '🏁 Voir mon score final' : 'Continuer ➡️'}
      </button>
    `;
  }

  function nextQuestion() {
    if (currentIdx < 9) {
      currentIdx++;
      loadQuestion();
    } else {
      showFinalScore();
    }
  }

  function showFinalScore() {
    document.getElementById('progress-num').textContent = `Terminé !`;
    document.getElementById('progress-bar').style.width = `100%`;
    document.getElementById('game-area').innerHTML = '';
    document.getElementById('feedback-area').innerHTML = '';

    const pct = Math.round((score / 10) * 100);
    const scorePanel = document.createElement('div');
    scorePanel.className = 'geo-score-panel animate-fadeIn';
    scorePanel.innerHTML = `
      <div class="score-title">${score} / 10</div>
      <div class="score-msg">
        ${pct === 100 ? 'Incroyable ! 🏆 Tu as débusqué le vrai du faux à la perfection !' : pct >= 70 ? 'Très bon travail ! 👍 Tes connaissances sont très solides.' : 'Entraîne-toi encore en relisant les explications pour progresser ! 💪'}
      </div>
      <button class="btn-3d px-4 py-2 mt-4 bg-white text-slate-800 rounded-xl" onclick="initGame()">🔄 Recommencer</button>
    `;
    document.getElementById('game-area').appendChild(scorePanel);

    // Save score to parent platform dashboard
    if (window.parent && window.parent.saveResult) {
      window.parent.saveResult({
        activity: 'sci_sq_vrai_faux',
        bookTitle: "Le squelette — Vrai ou Faux",
        score: score,
        total: 10,
        pct: pct,
        date: new Date().toLocaleDateString('fr-BE'),
        time: new Date().toLocaleTimeString('fr-BE', {hour: '2-digit', minute: '2-digit'})
      });
    }
  }

  window.onload = initGame;
</script>

</body>
</html>
