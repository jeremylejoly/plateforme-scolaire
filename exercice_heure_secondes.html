<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelle heure est-il ? — avec les secondes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #8b5cf6; /* Violet/durées */
    --primary-hover: #7c3aed;
    --primary-light: #f5f3ff;
    --ink: #1e293b;
    --border: #e2e8f0;
    --bg-slate: #f8fafc;
    --green: #10b981;
    --red: #f43f5e;
    --gold: #f59e0b;
    --train: #a78bfa;
    --train-d: #6d28d9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #f1f5f9;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: min(1000px, 100%);
    background: white;
    border-radius: 24px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* ---------- top bar ---------- */
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-slate);
  }
  .pause {
    flex: none;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: white;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
  }
  .pause span {
    width: 4px;
    height: 14px;
    background: #64748b;
    border-radius: 1px;
  }
  .title {
    flex: 1;
    font-weight: 800;
    color: var(--ink);
    font-size: clamp(15px, 2.2vw, 20px);
  }
  .lives {
    display: flex;
    gap: 6px;
    flex: none;
  }
  .heart {
    font-size: 22px;
    line-height: 1;
    transition: transform .2s, opacity .3s;
  }
  .heart.lost {
    opacity: 0.25;
    filter: grayscale(1);
    transform: scale(.7);
  }
  .progress {
    display: flex;
    gap: 6px;
    align-items: center;
    flex: none;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e2e8f0;
    border: 2px solid transparent;
  }
  .dot.done {
    background: var(--green);
  }
  .arrow {
    font-size: 16px;
    color: #94a3b8;
    font-weight: 900;
  }

  /* ---------- play area ---------- */
  .play {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1.5rem;
    background: white;
  }
  .clock-wrap {
    flex: none;
  }
  svg.clock {
    width: clamp(240px, 32vw, 340px);
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
  }

  .answer {
    flex: 1;
    min-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .readout {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .unit {
    font-weight: 800;
    font-size: clamp(24px, 4vw, 36px);
    color: #64748b;
    align-self: center;
    padding: 0 4px 8px;
  }
  .digit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .btn-pm {
    width: 40px;
    height: 28px;
    border: none;
    background: var(--bg-slate);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #475569;
    transition: all .15s;
  }
  .btn-pm:hover {
    background: var(--primary-light);
    color: var(--primary);
    border-color: #ddd6fe;
  }
  .btn-pm svg {
    width: 16px;
    height: 16px;
  }
  .num {
    font-weight: 900;
    font-size: clamp(40px, 6vw, 64px);
    line-height: 1;
    color: var(--primary);
    width: 50px;
    text-align: center;
    transition: transform .12s;
    user-select: none;
  }
  .num.bump {
    transform: scale(1.18);
  }

  .validate {
    margin-top: 8px;
    font-family: inherit;
    font-weight: 800;
    font-size: 20px;
    color: white;
    background: var(--primary);
    border: none;
    border-radius: 12px;
    padding: 10px 42px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 6px -1px rgba(139, 92, 246, 0.15);
  }
  .validate:hover {
    background: var(--primary-hover);
  }

  .feedback {
    min-height: 24px;
    font-weight: 800;
    font-size: 16px;
    text-align: center;
    padding: 2px 10px;
  }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  /* legend */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    color: #64748b;
  }
  .legend span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .swatch {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    display: inline-block;
  }

  /* ---------- scenery ---------- */
  .scene {
    position: relative;
    height: 160px;
    border-top: 1px solid var(--border);
    background: var(--bg-slate);
    overflow: hidden;
  }
  .mountains {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .train {
    position: absolute;
    bottom: 50px;
    left: -220px;
    width: 200px;
    transition: left 1.6s cubic-bezier(.25, 1, .5, 1);
    z-index: 3;
  }
  .train.run {
    left: calc(50% - 100px);
  }
  .quai-container {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60px;
    z-index: 4;
  }

  @media(max-width:560px){
    .top { flex-direction: column; align-items: stretch; text-align: center; }
    .progress { justify-content: center; }
    .lives { justify-content: center; }
    .play { padding: 12px; }
  }
</style>
</head>
<body>
<div class="frame">

  <!-- top bar -->
  <div class="top">
    <div class="pause" aria-hidden="true"><span></span><span></span></div>
    <div class="title">Quelle heure est-il lorsque le train s'arrête en gare&nbsp;?</div>
    <div class="lives" id="lives" aria-label="Vies restantes">
      <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
    </div>
    <div class="progress" id="progress" aria-label="Progression"></div>
  </div>

  <!-- play area -->
  <div class="play">
    <!-- clock -->
    <div class="clock-wrap">
      <svg class="clock" viewBox="0 0 400 400" id="clock" role="img" aria-label="Horloge">
        <circle cx="200" cy="200" r="190" fill="#1e293b"/>
        <circle cx="200" cy="200" r="182" fill="var(--primary-light)"/>
        <circle cx="200" cy="200" r="160" fill="#1e293b"/>
        <circle cx="200" cy="200" r="150" fill="#fff"/>
        <g id="ticks"></g>
        <g id="numbers"></g>
        <!-- hands -->
        <line id="hHour"  x1="200" y1="200" x2="200" y2="118" stroke="#1e293b" stroke-width="12" stroke-linecap="round"/>
        <line id="hMin"   x1="200" y1="200" x2="200" y2="78"  stroke="var(--primary)" stroke-width="8"  stroke-linecap="round"/>
        <line id="hSec"   x1="200" y1="214" x2="200" y2="64"  stroke="var(--red)"    stroke-width="3"   stroke-linecap="round"/>
        <circle cx="200" cy="200" r="11" fill="#1e293b"/>
        <circle cx="200" cy="200" r="5"  fill="var(--red)"/>
      </svg>
    </div>

    <!-- answer -->
    <div class="answer">
      <div class="readout" id="readout"></div>
      <button class="validate" id="validate">Valider</button>
      <div class="feedback" id="feedback"></div>
      <div class="legend">
        <span><i class="swatch" style="background:#1e293b"></i>heures</span>
        <span><i class="swatch" style="background:var(--primary)"></i>minutes</span>
        <span><i class="swatch" style="background:var(--red)"></i>secondes</span>
      </div>
    </div>
  </div>

  <!-- scenery (Gare de Mr Lejoly) -->
  <div class="scene">
    <svg class="mountains" viewBox="0 0 1100 160" preserveAspectRatio="none">
      <rect width="1100" height="160" fill="#f8fafc"/>
      <!-- Soft landscape hills in background -->
      <path d="M0,160 L180,90 L380,160 Z" fill="#e2e8f0"/>
      <path d="M300,160 L500,75 L700,160 Z" fill="#cbd5e1"/>
      <path d="M620,160 L850,85 L1100,160 Z" fill="#e2e8f0"/>
      
      <!-- Station building Pillars & Roof in background -->
      <rect x="180" y="24" width="12" height="136" fill="#64748b" rx="2"/>
      <rect x="540" y="24" width="12" height="136" fill="#64748b" rx="2"/>
      <rect x="900" y="24" width="12" height="136" fill="#64748b" rx="2"/>
      <rect x="0" y="14" width="1100" height="12" fill="#475569"/>
      
      <!-- Station Name Sign -->
      <rect x="750" y="36" width="170" height="26" rx="6" fill="#1e293b" stroke="#ffffff" stroke-width="2"/>
      <text x="835" y="49" text-anchor="middle" dominant-baseline="central" font-family="'Nunito', sans-serif" font-weight="900" font-size="10" fill="#fff" letter-spacing="1">GARE DE MR LEJOLY</text>
    </svg>
    
    <svg class="train" id="train" viewBox="0 0 200 70">
      <g stroke="var(--train-d)" stroke-width="3">
        <rect x="2"   y="20" width="60" height="34" rx="6" fill="var(--train)"/>
        <rect x="68"  y="20" width="60" height="34" rx="6" fill="var(--train)"/>
        <rect x="134" y="20" width="60" height="34" rx="6" fill="var(--train)"/>
      </g>
      <g fill="#f5f3ff" stroke="var(--train-d)" stroke-width="2">
        <rect x="8" y="27" width="14" height="14" rx="2"/>
        <rect x="26" y="27" width="14" height="14" rx="2"/>
        <rect x="44" y="27" width="12" height="14" rx="2"/>
        <rect x="74" y="27" width="14" height="14" rx="2"/>
        <rect x="92" y="27" width="14" height="14" rx="2"/>
        <rect x="110" y="27" width="12" height="14" rx="2"/>
        <rect x="140" y="27" width="14" height="14" rx="2"/>
        <rect x="158" y="27" width="14" height="14" rx="2"/>
        <rect x="176" y="27" width="12" height="14" rx="2"/>
      </g>
      <g fill="#1e293b">
        <circle cx="22" cy="58" r="6"/><circle cx="48" cy="58" r="6"/>
        <circle cx="88" cy="58" r="6"/><circle cx="114" cy="58" r="6"/>
        <circle cx="154" cy="58" r="6"/><circle cx="180" cy="58" r="6"/>
      </g>
    </svg>
    
    <!-- Station quai / platform in foreground -->
    <svg class="quai-container" viewBox="0 0 1100 60" preserveAspectRatio="none">
      <!-- Rails recess -->
      <rect y="0" width="1100" height="6" fill="#475569"/>
      <rect y="6" width="1100" height="2" fill="#1e293b"/>
      
      <!-- Platform body -->
      <rect y="8" width="1100" height="52" fill="#cbd5e1"/>
      <!-- Security yellow line -->
      <rect y="8" width="1100" height="4" fill="#f59e0b"/>
      <!-- Platform edge line -->
      <line x1="0" y1="20" x2="1100" y2="20" stroke="#94a3b8" stroke-width="1.5"/>
      <line x1="0" y1="36" x2="1100" y2="36" stroke="#94a3b8" stroke-width="1.5"/>
    </svg>
  </div>

</div>

<script>
/* ---------- build clock face ---------- */
const NS="http://www.w3.org/2000/svg";
const cx=200, cy=200;
const ticks=document.getElementById('ticks');
const numbers=document.getElementById('numbers');

for(let i=0;i<60;i++){
  const a=i*6*Math.PI/180;
  const big=i%5===0;
  const r1=big?134:140, r2=150;
  const l=document.createElementNS(NS,'line');
  l.setAttribute('x1',cx+r1*Math.sin(a));
  l.setAttribute('y1',cy-r1*Math.cos(a));
  l.setAttribute('x2',cx+r2*Math.sin(a));
  l.setAttribute('y2',cy-r2*Math.cos(a));
  l.setAttribute('stroke', big?'#1e293b':'#c084fc');
  l.setAttribute('stroke-width', big?4:2);
  ticks.appendChild(l);
}
for(let n=1;n<=12;n++){
  const a=n*30*Math.PI/180, r=112;
  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',cx+r*Math.sin(a));
  t.setAttribute('y',cy-r*Math.cos(a));
  t.setAttribute('text-anchor','middle');
  t.setAttribute('dominant-baseline','central');
  t.setAttribute('fill','var(--red)');
  t.setAttribute('font-size','32');
  t.setAttribute('font-weight','900');
  t.setAttribute('font-family','Nunito, sans-serif');
  t.textContent=n;
  numbers.appendChild(t);
}

/* ---------- digits / readout ---------- */
const MAX=[1,9,5,9,5,9];
let digits=[0,0,0,0,0,0];

const plusSVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
const minusSVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;

const readout=document.getElementById('readout');
const layout=[
  {type:'digit',i:0},{type:'digit',i:1},{type:'unit',txt:'h'},
  {type:'digit',i:2},{type:'digit',i:3},{type:'unit',txt:'min'},
  {type:'digit',i:4},{type:'digit',i:5},{type:'unit',txt:'s'},
];
const numEls=[];
layout.forEach(part=>{
  if(part.type==='unit'){
    const u=document.createElement('div');
    u.className='unit';u.textContent=part.txt;
    readout.appendChild(u);
  }else{
    const col=document.createElement('div');
    col.className='digit';
    const up=document.createElement('button');
    up.className='btn-pm';up.innerHTML=plusSVG;up.setAttribute('aria-label','plus');
    const num=document.createElement('div');
    num.className='num';num.textContent='0';
    const dn=document.createElement('button');
    dn.className='btn-pm';dn.innerHTML=minusSVG;dn.setAttribute('aria-label','moins');
    up.onclick=()=>change(part.i,+1);
    dn.onclick=()=>change(part.i,-1);
    col.append(up,num,dn);
    readout.appendChild(col);
    numEls[part.i]=num;
  }
});

function change(i,d){
  const m=MAX[i]+1;
  digits[i]=(digits[i]+d+m)%m;
  const el=numEls[i];
  el.textContent=digits[i];
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
}

/* ---------- game state ---------- */
let target={h:0,m:0,s:0};
let lives=3, solved=0, locked=false;
const TOTAL=3;
const progress=document.getElementById('progress');
function buildProgress(){
  progress.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<solved?' done':'');
    progress.appendChild(d);
    if(i<TOTAL-1){const a=document.createElement('span');a.className='arrow';a.textContent='›';progress.appendChild(a);}
  }
}

function setHands(h,m,s){
  const sec=s*6;
  const min=m*6+s*0.1;
  const hr=(h%12)*30+m*0.5;
  document.getElementById('hSec').setAttribute('transform',`rotate(${sec} 200 200)`);
  document.getElementById('hMin').setAttribute('transform',`rotate(${min} 200 200)`);
  document.getElementById('hHour').setAttribute('transform',`rotate(${hr} 200 200)`);
}

function newQuestion(){
  locked=false;
  target.h=Math.floor(Math.random()*12)+1;
  target.m=Math.floor(Math.random()*60);
  target.s=Math.floor(Math.random()*60);
  setHands(target.h,target.m,target.s);
  digits=[0,0,0,0,0,0];
  numEls.forEach(el=>el.textContent='0');
  feedback.textContent='';feedback.className='feedback';
  
  // animation du train
  const train=document.getElementById('train');
  train.classList.remove('run');void train.offsetWidth;train.classList.add('run');
}

/* ---------- validation ---------- */
const feedback=document.getElementById('feedback');
const validate=document.getElementById('validate');
const livesEl=document.getElementById('lives').children;

validate.onclick=()=>{
  if(locked) return;
  const h=digits[0]*10+digits[1];
  const m=digits[2]*10+digits[3];
  const s=digits[4]*10+digits[5];
  if(h===target.h && m===target.m && s===target.s){
    locked=true;
    feedback.textContent='Bravo, c\u2019est la bonne heure ! 🎉';
    feedback.className='feedback ok';
    solved++;buildProgress();
    if(solved>=TOTAL){
      setTimeout(()=>{feedback.textContent='Parcours terminé, félicitations ! 🏆';solved=0;setTimeout(()=>{buildProgress();newQuestion();},1600);},1100);
    }else{
      setTimeout(newQuestion,1300);
    }
  }else{
    lives--;
    if(lives>=0 && livesEl[lives]) livesEl[lives].classList.add('lost');
    const pad=n=>String(n).padStart(2,'0');
    feedback.textContent=`Pas encore… la bonne réponse était ${pad(target.h)} h ${pad(target.m)} min ${pad(target.s)} s.`;
    feedback.className='feedback no';
    if(lives<=0){
      locked=true;
      setTimeout(()=>{
        feedback.textContent='Partie terminée. On recommence ! 🔄';
        lives=3;solved=0;
        for(const hh of livesEl) hh.classList.remove('lost');
        buildProgress();
        setTimeout(newQuestion,1400);
      },1500);
    }else{
      locked=true;
      setTimeout(newQuestion,1700);
    }
  }
};

/* ---------- start ---------- */
buildProgress();
newQuestion();
</script>
</body>
</html>
