<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>L'Architecte des Pavés — Formules de Volume</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --primary: #06b6d4;
      --primary-glow: rgba(6,182,212,0.22);
      --accent: #f59e0b;
      --green: #10b981;
      --red: #f43f5e;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header { text-align: center; margin-bottom: 1.25rem; }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.85rem;
      font-weight: 800;
      background: linear-gradient(135deg, #67e8f9, #06b6d4, #0891b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.3rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; }

    /* Score bar */
    .scorebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15,23,42,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.25rem;
    }
    .sb-block { display: flex; align-items: center; gap: 0.5rem; }
    .sb-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .sb-val { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .prog-track { flex:1; height:7px; background:rgba(51,65,85,.5); border-radius:99px; margin:0 1.25rem; overflow:hidden; }
    .prog-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#22d3ee); border-radius:99px; transition:width .5s ease; }

    /* Description */
    .figure-desc {
      background: rgba(30,41,59,0.6);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }
    .figure-icon { font-size: 1.8rem; }
    .figure-name { font-weight: 700; font-size: 1.05rem; }
    .figure-hint { font-size: 0.85rem; color: var(--muted); margin-top: 0.15rem; }

    /* Render viewport */
    .viewport-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    svg#volume-svg {
      border: 2px solid var(--border);
      border-radius: 16px;
      background: #0f172a;
      display: block;
      max-width: 100%;
      height: auto;
    }

    /* Input & validate */
    .answer-row {
      display: flex;
      gap: 0.85rem;
      align-items: center;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
    }
    .answer-label { font-weight: 600; font-size: 0.95rem; white-space: nowrap; }
    .answer-input {
      width: 95px;
      padding: 0.55rem 0.75rem;
      background: rgba(15,23,42,0.8);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color .2s;
    }
    .answer-input:focus { border-color: var(--primary); }
    .answer-input:disabled { opacity: 0.5; }
    .answer-unit { color: var(--muted); font-size: 0.9rem; }

    .btn-validate {
      padding: 0.6rem 1.4rem;
      background: linear-gradient(135deg, var(--primary), #0891b2);
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 14px var(--primary-glow);
    }
    .btn-validate:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(6,182,212,.4); }
    .btn-validate:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    /* Feedback */
    .feedback {
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.1rem;
      display: flex;
      gap: 0.85rem;
      align-items: flex-start;
      animation: slideUp .3s ease forwards;
    }
    .fb-correct { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.35); }
    .fb-wrong   { background:rgba(244,63,94,.1);  border:1px solid rgba(244,63,94,.35); }
    .fb-icon { font-size: 1.5rem; flex-shrink:0; }
    .fb-title { font-weight:700; font-size:1rem; }
    .fb-correct .fb-title { color:#34d399; }
    .fb-wrong   .fb-title { color:#fb7185; }
    .fb-text { font-size:.9rem; color:#cbd5e1; margin-top:.25rem; line-height:1.55; }
    .fb-text strong { color: #f1f5f9; }

    .btn-next {
      width:100%;
      padding:.85rem;
      background:linear-gradient(135deg,var(--primary),#0891b2);
      border:none; border-radius:12px; color:white;
      font-family:'Outfit',sans-serif; font-size:1.05rem; font-weight:700;
      cursor:pointer; transition:all .2s;
      box-shadow:0 4px 14px var(--primary-glow);
      display:flex; align-items:center; justify-content:center; gap:.5rem;
    }
    .btn-next:hover { transform:translateY(-2px); }

    /* Congrats */
    .congrats {
      text-align:center; padding:2.5rem 1rem;
      animation: scaleIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    .trophy { font-size:4rem; display:inline-block; animation:float 3s ease-in-out infinite; margin-bottom:.75rem; }
    .congrats-title { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:.6rem; }
    .congrats-msg { color:var(--muted); font-size:1rem; max-width:440px; margin:0 auto 1.5rem; line-height:1.6; }
    .stars { font-size:2rem; margin-bottom:1.5rem; }
    .btn-replay {
      background:linear-gradient(135deg,var(--green),#059669);
      border:none; color:white; font-family:'Outfit',sans-serif;
      font-size:1.05rem; font-weight:700; padding:.85rem 2rem;
      border-radius:12px; cursor:pointer;
      box-shadow:0 4px 14px rgba(16,185,129,.3);
      display:inline-flex; align-items:center; gap:.5rem;
      transition:all .2s;
    }
    .btn-replay:hover { transform:translateY(-2px); }

    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  </style>
</head>
<body>
<div class="container">

  <div id="game-flow">
    <header>
      <h1>🧱 L'Architecte des Pavés</h1>
      <p class="subtitle">Calcule le volume des cubes et pavés droits à partir de leurs dimensions.</p>
    </header>

    <div class="scorebar">
      <div class="sb-block">
        <span class="sb-label">Solide</span>
        <span class="sb-val" id="q-num">1</span>
        <span style="color:var(--muted);font-family:'Outfit',sans-serif;font-size:1rem;">/10</span>
      </div>
      <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="sb-block">
        <span class="sb-label">Score</span>
        <span class="sb-val" id="score-disp">0</span>
        <span style="color:var(--muted);font-family:'Outfit',sans-serif;font-size:1rem;">/10</span>
      </div>
    </div>

    <div class="figure-desc">
      <div class="figure-icon" id="fig-icon">📦</div>
      <div>
        <div class="figure-name" id="fig-name">Chargement…</div>
        <div class="figure-hint" id="fig-hint">Volume = Longueur × Largeur × Hauteur</div>
      </div>
    </div>

    <div class="viewport-wrapper">
      <svg id="volume-svg" width="500" height="340" viewBox="0 0 500 340"></svg>
    </div>

    <div class="answer-row">
      <span class="answer-label">Volume du solide :</span>
      <input type="number" id="volume-input" class="answer-input" min="1" step="1" placeholder="?">
      <span class="answer-unit">cm³</span>
      <button class="btn-validate" id="btn-val" onclick="validateAnswer()">✓ Valider</button>
    </div>

    <div id="feedback-area"></div>
    <div id="next-area"></div>
  </div>

  <div id="congrats-flow" style="display:none">
    <div class="congrats">
      <div class="trophy">🏆</div>
      <h2 class="congrats-title">Maître Bâtisseur !</h2>
      <p class="congrats-msg" id="congrats-msg">Incroyable !</p>
      <div class="stars" id="stars"></div>
      <button class="btn-replay" onclick="resetGame()">🔄 Recommencer</button>
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════════════════
// CONFIGURATION DE LA PARTIE
// ════════════════════════════════════════════════
const SVG_W = 500;
const SVG_H = 340;
const TOTAL_Q = 10;

let step = 1;
let score = 0;
let answered = false;
let currentSolide = null;

// ════════════════════════════════════════════════
// GÉNÉRATEUR DE SOLIDES
// ════════════════════════════════════════════════
function generateSolide() {
  const isCube = Math.random() < 0.35; // 35% de chance de tomber sur un cube
  if (isCube) {
    const side = Math.floor(Math.random() * 5) + 2; // Côté entre 2 et 6 cm
    return {
      type: "cube",
      name: "Un Cube",
      icon: "🧊",
      L: side,
      W: side,
      H: side,
      hint: "Un cube a toutes ses arêtes de même longueur.",
      desc: `Puisqu'il s'agit d'un cube :<br><strong>Volume = Côté × Côté × Côté</strong><br>Volume = ${side} × ${side} × ${side} = <strong>${side * side * side} cm³</strong>.`
    };
  } else {
    // Pavé droit (parallélépipède rectangle)
    const L = Math.floor(Math.random() * 6) + 3; // Longueur 3 à 8 cm
    const W = Math.floor(Math.random() * 4) + 2; // Largeur 2 à 5 cm
    const H = Math.floor(Math.random() * 5) + 2; // Hauteur 2 à 6 cm
    return {
      type: "pave",
      name: "Un parallélépipède rectangle",
      icon: "🧱",
      L: L,
      W: W,
      H: H,
      hint: "Volume = Longueur × Largeur (profondeur) × Hauteur",
      desc: `<strong>Volume = Longueur × Largeur × Hauteur</strong><br>Volume = ${L} × ${W} × ${H} = <strong>${L * W * H} cm³</strong>.`
    };
  }
}

// ════════════════════════════════════════════════
// RENDU 3D DYNAMIQUE DU SOLIDE (Perspective Axonométrique)
// ════════════════════════════════════════════════
function renderSolide(solide) {
  const svg = document.getElementById('volume-svg');
  svg.innerHTML = '';

  // 1. Calcul des dimensions relatives pour le dessin (s'adaptent aux ratios sans déborder)
  // On mappe les cm réels vers des pixels
  const baseScale = 200 / Math.max(solide.L, solide.W, solide.H);
  const sL = solide.L * baseScale;
  const sW = solide.W * baseScale * 0.8; // Réduction pour l'effet de profondeur
  const sH = solide.H * baseScale;

  // Calcul du décalage (angle de 30° pour la profondeur)
  const angle = Math.PI / 6; // 30 degrés
  const dx = sW * Math.cos(angle);
  const dy = -sW * Math.sin(angle);

  // 2. Définition des 8 points en 3D projetés sur l'écran (non translatés)
  const p0 = { x: 0, y: 0 };        // devant-bas-gauche
  const p1 = { x: sL, y: 0 };       // devant-bas-droit
  const p2 = { x: sL, y: -sH };     // devant-haut-droit
  const p3 = { x: 0, y: -sH };      // devant-haut-gauche
  const p4 = { x: dx, y: dy };      // derrière-bas-gauche
  const p5 = { x: sL + dx, y: dy }; // derrière-bas-droit
  const p6 = { x: sL + dx, y: -sH + dy }; // derrière-haut-droit
  const p7 = { x: dx, y: -sH + dy }; // derrière-haut-gauche

  // 3. Centrage automatique dans le viewport de l'SVG
  const points = [p0, p1, p2, p3, p4, p5, p6, p7];
  const minX = Math.min(...points.map(p => p.x));
  const maxX = Math.max(...points.map(p => p.x));
  const minY = Math.min(...points.map(p => p.y));
  const maxY = Math.max(...points.map(p => p.y));

  const contentW = maxX - minX;
  const contentH = maxY - minY;

  const offsetX = (SVG_W - contentW) / 2 - minX;
  const offsetY = (SVG_H - contentH) / 2 - minY;

  // Application de l'offset à tous les points
  points.forEach(p => {
    p.x += offsetX;
    p.y += offsetY;
  });

  // 4. Dessin des arêtes cachées (en pointillés au fond)
  // P4 connecte à P0, P5, P7
  const drawDashed = (pa, pb) => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', pa.x); line.setAttribute('y1', pa.y);
    line.setAttribute('x2', pb.x); line.setAttribute('y2', pb.y);
    line.setAttribute('stroke', '#475569');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '5,5');
    svg.appendChild(line);
  };
  drawDashed(p0, p4);
  drawDashed(p5, p4);
  drawDashed(p7, p4);

  // 5. Remplissage et contour des faces visibles
  const drawFace = (pts, fill) => {
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', pts.map(p => `${p.x},${p.y}`).join(' '));
    poly.setAttribute('fill', fill);
    poly.setAttribute('stroke', '#0f172a');
    poly.setAttribute('stroke-width', '2');
    poly.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(poly);
  };

  // Face de devant
  drawFace([p0, p1, p2, p3], 'rgba(6, 182, 212, 0.25)'); // Cyan transparent
  // Face de droite
  drawFace([p1, p5, p6, p2], 'rgba(99, 102, 241, 0.22)'); // Bleu/Violet transparent
  // Face du dessus
  drawFace([p3, p2, p6, p7], 'rgba(14, 165, 233, 0.35)'); // Ciel transparent

  // 6. Placement des annotations de cotes (Dimensions)
  const drawLabel = (pa, pb, text, offsetType) => {
    const textEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    let lx = (pa.x + pb.x) / 2;
    let ly = (pa.y + pb.y) / 2;

    if (offsetType === 'bottom') {
      ly += 20;
    } else if (offsetType === 'right') {
      lx += 12;
      ly += 4;
    } else if (offsetType === 'side') {
      lx += 15;
      ly += 15;
    }

    textEl.setAttribute('x', lx);
    textEl.setAttribute('y', ly);
    textEl.setAttribute('fill', '#f1f5f9');
    textEl.setAttribute('font-size', '14');
    textEl.setAttribute('font-weight', '700');
    textEl.setAttribute('font-family', 'Outfit, sans-serif');
    textEl.setAttribute('text-anchor', 'middle');
    textEl.textContent = text;
    svg.appendChild(textEl);
  };

  // Longueur (devant bas)
  drawLabel(p0, p1, `${solide.L} cm`, 'bottom');
  // Hauteur (devant droit)
  drawLabel(p1, p2, `${solide.H} cm`, 'right');
  // Largeur/Profondeur (reculant bas droit)
  drawLabel(p1, p5, `${solide.W} cm`, 'side');
}

// ════════════════════════════════════════════════
// ACTIONS DU JEU
// ════════════════════════════════════════════════
function renderQuestion() {
  answered = false;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('next-area').innerHTML = '';
  document.getElementById('volume-input').value = '';
  document.getElementById('volume-input').disabled = false;
  document.getElementById('btn-val').disabled = false;

  currentSolide = generateSolide();

  document.getElementById('q-num').textContent = step;
  document.getElementById('score-disp').textContent = score;
  document.getElementById('prog-bar').style.width = `${((step - 1) / TOTAL_Q) * 100}%`;

  document.getElementById('fig-icon').textContent = currentSolide.icon;
  document.getElementById('fig-name').textContent = currentSolide.name;
  document.getElementById('fig-hint').textContent = currentSolide.hint;

  renderSolide(currentSolide);
  document.getElementById('volume-input').focus();
}

function validateAnswer() {
  if (answered) return;
  const inputEl = document.getElementById('volume-input');
  const val = parseInt(inputEl.value, 10);

  if (isNaN(val) || val <= 0) {
    alert("Saisis un nombre entier pour le volume !");
    return;
  }

  answered = true;
  document.getElementById('btn-val').disabled = true;
  inputEl.disabled = true;

  const correctAns = currentSolide.L * currentSolide.W * currentSolide.H;
  const correct = (val === correctAns);

  if (correct) score++;
  document.getElementById('score-disp').textContent = score;

  const feedbackArea = document.getElementById('feedback-area');
  feedbackArea.innerHTML = `
    <div class="feedback ${correct ? 'fb-correct' : 'fb-wrong'}">
      <div class="fb-icon">${correct ? '🎯' : '💡'}</div>
      <div>
        <div class="fb-title">${correct ? 'Excellent !' : `Ce n'est pas tout à fait ça.`}</div>
        <div class="fb-text">
          La bonne réponse est <strong>${correctAns} cm³</strong>.<br>
          ${currentSolide.desc}
        </div>
      </div>
    </div>`;

  document.getElementById('next-area').innerHTML = step < TOTAL_Q
    ? `<button class="btn-next" onclick="nextQ()">Solide suivant 👉</button>`
    : `<button class="btn-next" onclick="finishGame()">Voir mon résultat 🏆</button>`;
}

function nextQ() {
  step++;
  renderQuestion();
}

function finishGame() {
  document.getElementById('game-flow').style.display = 'none';
  document.getElementById('congrats-flow').style.display = 'block';

  const pct = Math.round((score / TOTAL_Q) * 100);
  let msg, stars;

  if (score === TOTAL_Q) {
    msg = `Géométrie spatiale parfaite ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). Tu calcules les volumes comme un chef architecte !`;
    stars = '⭐⭐⭐';
  } else if (score >= 8) {
    msg = `Excellent travail ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). La formule est bien maîtrisée !`;
    stars = '⭐⭐';
  } else if (score >= 5) {
    msg = `C'est pas mal ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). Rappelle-toi bien de multiplier les 3 dimensions !`;
    stars = '⭐';
  } else {
    msg = `Score : <strong>${score}/${TOTAL_Q}</strong> (${pct}%). N'hésite pas à poser tes calculs sur papier pour t'aider.`;
    stars = '❌';
  }

  document.getElementById('congrats-msg').innerHTML = msg;
  document.getElementById('stars').textContent = stars;

  if (typeof window.parent !== 'undefined' && window.parent.handleActivityScore) {
    window.parent.handleActivityScore('grandeur_volume_formules', score);
  }
}

function resetGame() {
  step = 1;
  score = 0;
  document.getElementById('game-flow').style.display = 'block';
  document.getElementById('congrats-flow').style.display = 'none';
  renderQuestion();
}

// Raccourci clavier Entrée
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !answered) {
    validateAnswer();
  }
});

// Lancement automatique
window.addEventListener('DOMContentLoaded', () => {
  renderQuestion();
});
</script>
</body>
</html>
