<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'échelle - Exercices à venir</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #5B4FCF;
    --purple-light: #EEF0FF;
    --purple-mid: #C7C2F5;
    --bg: #FDFBF7;
    --panel: #FFFFFF;
    --ink: #1A1A2E;
    --muted: #6B7080;
    --line: #1A1A2E;
    --shadow: 6px 6px 0px #1A1A2E;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    margin: 0;
    padding: 24px;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .placeholder-card {
    text-align: center;
    padding: 3rem;
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }
  .icon {
    font-size: 5rem;
    display: block;
    margin-bottom: 1.5rem;
    animation: rotateCompass 4s infinite ease-in-out;
  }
  h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 2rem;
    margin: 0 0 1rem 0;
    color: var(--purple);
  }
  p {
    color: var(--muted);
    font-size: 1.15rem;
    line-height: 1.6;
    margin: 0;
  }
  @keyframes rotateCompass {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-15deg); }
    75% { transform: rotate(15deg); }
  }
</style>
</head>
<body>
  <div class="placeholder-card">
    <span class="icon">🧭</span>
    <h3>L'échelle</h3>
    <p>Des activités interactives et des exercices sur les échelles (cartes, plans, maquettes) seront bientôt disponibles dans cette section !</p>
  </div>
</body>
</html>
