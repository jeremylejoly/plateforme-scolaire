<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelle heure est-il ? — avec les secondes</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #3b82f6;
    --primary-hover: #2563eb;
    --primary-light: #eff6ff;
    --ink: #1e293b;
    --border: #e2e8f0;
    --bg-slate: #f8fafc;
    --green: #10b981;
    --green-hover: #059669;
    --red: #f43f5e;
    --gold: #f59e0b;
    --gold-d: #d97706;
    --blue: #2563eb;
    --blue-d: #1e3a8a;
    --sand: #fef08a;
    --sand-2: #fde047;
    --bridge: #b45309;
    --bridge-d: #78350f;
    --train: #a855f7;
    --train-d: #6b21a8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #f1f5f9;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    width: 100%;
    max-width: 1000px;
    background: white;
    border-radius: 24px;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg-slate);
  }
  .consigne {
    font-size: clamp(15px, 2.2vw, 19px);
    font-weight: 800;
    color: var(--ink);
    flex: 1;
  }
  .hearts {
    display: flex;
    gap: 6px;
    font-size: 22px;
    line-height: 1;
  }
  .heart.gone {
    opacity: 0.25;
    filter: grayscale(1);
  }
  .progress {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e2e8f0;
    border: 2px solid transparent;
  }
  .dot.done {
    background: var(--green);
  }
  .dot.current {
    background: var(--primary);
    border-color: #bfdbfe;
  }

  .scene-play {
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: center;
    background: white;
  }
  .clock-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  svg.clock {
    width: 100%;
    max-width: 320px;
    height: auto;
    display: block;
  }

  .answer-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .readout {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: center;
  }
  .digit-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .btn-adjust {
    width: 44px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--bg-slate);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: all .15s;
  }
  .btn-adjust:hover {
    background: #e2e8f0;
  }
  .btn-adjust svg {
    width: 16px;
    height: 16px;
  }
  .num-display {
    font-size: 42px;
    font-weight: 900;
    width: 44px;
    text-align: center;
    line-height: 1;
    color: var(--ink);
    transition: transform 0.1s;
  }
  .num-display.bump {
    transform: scale(1.2);
  }
  .unit-lbl {
    font-size: 20px;
    font-weight: 800;
    color: #64748b;
    margin: 0 8px;
    align-self: center;
  }

  .actions {
    display: flex;
    justify-content: center;
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    background: var(--bg-slate);
  }
  .btn {
    font-family: inherit;
    cursor: pointer;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 12px;
    padding: 10px 36px;
    background: var(--primary);
    color: white;
    transition: all .2s;
    box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.1);
  }
  .btn:hover {
    background: var(--primary-hover);
  }
  .btn.valider {
    background: var(--green);
  }
  .btn.valider:hover {
    background: var(--green-hover);
  }

  .feedback {
    min-height: 28px;
    font-size: 16px;
    font-weight: 800;
    text-align: center;
    margin-top: 8px;
  }
  .feedback.ok { color: var(--green); }
  .feedback.no { color: var(--red); }

  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #64748b;
    margin-top: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-color {
    width: 14px;
    height: 14px;
    border-radius: 3px;
  }

  /* Scenery Section */
  .scenery {
    position: relative;
    height: 180px;
    background-image: url('../assets/belgian_hills_scenery.jpg');
    background-size: cover;
    background-position: center bottom;
    border-top: 1px solid var(--border);
    overflow: hidden;
  }
  .train-img {
    position: absolute;
    bottom: 50px;
    left: -200px;
    height: 55px;
    width: auto;
    z-index: 3;
    transition: left 3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .train-img.run {
    left: calc(50% - 41px);
  }
  .bridge {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 60px;
    z-index: 2;
  }

  .answer-panel.locked {
    opacity: 0.5;
    pointer-events: none;
    cursor: not-allowed;
  }

  .endscreen {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.98);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 40;
    padding: 24px;
    text-align: center;
  }
  .endscreen.show {
    display: flex;
  }
  .endscreen h2 {
    font-size: 32px;
    font-weight: 900;
    color: var(--ink);
  }
  .endscreen .score {
    font-size: 18px;
    color: #64748b;
  }

  .shake { animation: shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }

  @media(max-width: 768px) {
    .scene-play { grid-template-columns: 1fr; }
    .topbar { flex-direction: column; align-items: stretch; text-align: center; }
    .progress { justify-content: center; }
    .hearts { justify-content: center; }
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="topbar">
    <div class="consigne">Quelle heure est-il lorsque le train passe sur le pont ?</div>
    <div class="hearts" id="hearts"></div>
    <div class="progress" id="progress"></div>
  </div>

  <div class="scene-play">
    <!-- clock -->
    <div class="clock-wrap">
      <svg class="clock" viewBox="0 0 400 400" id="clock" role="img" aria-label="Horloge">
        <circle cx="200" cy="200" r="190" fill="#1e293b"/>
        <circle cx="200" cy="200" r="182" fill="var(--gold)"/>
        <circle cx="200" cy="200" r="160" fill="#0f172a"/>
        <circle cx="200" cy="200" r="150" fill="#ffffff"/>
        <g id="ticks"></g>
        <g id="numbers"></g>
        <!-- hands -->
        <line id="hHour"  x1="200" y1="200" x2="200" y2="118" stroke="var(--blue-d)" stroke-width="12" stroke-linecap="round"/>
        <line id="hMin"   x1="200" y1="200" x2="200" y2="78"  stroke="var(--blue)"   stroke-width="8"  stroke-linecap="round"/>
        <line id="hSec"   x1="200" y1="214" x2="200" y2="64"  stroke="var(--red)"    stroke-width="3"  stroke-linecap="round"/>
        <circle cx="200" cy="200" r="12" fill="var(--blue-d)"/>
        <circle cx="200" cy="200" r="5"  fill="var(--red)"/>
      </svg>
    </div>

    <!-- answer -->
    <div class="answer-panel">
      <div class="readout" id="readout"></div>
      <div class="feedback" id="feedback"></div>
      <div class="legend">
        <div class="legend-item"><span class="legend-color" style="background:var(--blue-d)"></span><span>heures</span></div>
        <div class="legend-item"><span class="legend-color" style="background:var(--blue)"></span><span>minutes</span></div>
        <div class="legend-item"><span class="legend-color" style="background:var(--red)"></span><span>secondes</span></div>
      </div>
    </div>
  </div>

  <!-- scenery -->
  <div class="scenery">
    <img src="../assets/cartoon_train.png" id="train" class="train-img" alt="Train" />
    
    <svg class="bridge" viewBox="0 0 1000 60" preserveAspectRatio="none">
      <defs>
        <mask id="bridge-mask">
          <rect width="1000" height="60" fill="white" />
          <path d="M80,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
          <path d="M230,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
          <path d="M380,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
          <path d="M530,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
          <path d="M680,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
          <path d="M830,60 v-30 a25,25 0 0 1 50,0 v30 Z" fill="black"/>
        </mask>
      </defs>
      <g mask="url(#bridge-mask)">
        <rect width="1000" height="60" fill="var(--bridge)" />
        <rect width="1000" height="8" fill="var(--bridge-d)" />
      </g>
      <!-- Rails -->
      <line x1="0" y1="2" x2="1000" y2="2" stroke="#94a3b8" stroke-width="1.5" />
      <line x1="0" y1="5" x2="1000" y2="5" stroke="#94a3b8" stroke-width="1.5" />
    </svg>
  </div>

  <div class="actions"><button class="btn valider" id="valider">Valider</button></div>

  <div class="endscreen" id="endscreen">
    <h2 id="endTitle">Bravo !</h2>
    <div class="score" id="endScore"></div>
    <button class="btn valider" id="restart">Recommencer</button>
  </div>
</div>

<script>
/* ---------- build clock face ---------- */
const NS="http://www.w3.org/2000/svg";
const cx=200, cy=200;
const ticks=document.getElementById('ticks');
const numbers=document.getElementById('numbers');

for(let i=0;i<60;i++){
  const a=i*6*Math.PI/180;
  const big=i%5===0;
  const r1=big?134:140, r2=150;
  const l=document.createElementNS(NS,'line');
  l.setAttribute('x1',cx+r1*Math.sin(a));
  l.setAttribute('y1',cy-r1*Math.cos(a));
  l.setAttribute('x2',cx+r2*Math.sin(a));
  l.setAttribute('y2',cy-r2*Math.cos(a));
  l.setAttribute('stroke', big?'#0f172a':'#94a3b8');
  l.setAttribute('stroke-width', big?4:1.5);
  ticks.appendChild(l);
}
for(let n=1;n<=12;n++){
  const a=n*30*Math.PI/180, r=112;
  const t=document.createElementNS(NS,'text');
  t.setAttribute('x',cx+r*Math.sin(a));
  t.setAttribute('y',cy-r*Math.cos(a));
  t.setAttribute('text-anchor','middle');
  t.setAttribute('dominant-baseline','central');
  t.setAttribute('fill','var(--red)');
  t.setAttribute('font-size','32');
  t.setAttribute('font-weight','900');
  t.setAttribute('font-family',"'Nunito',sans-serif");
  t.textContent=n;
  numbers.appendChild(t);
}

/* ---------- digits / readout ---------- */
const MAX=[1,9,5,9,5,9];
let digits=[0,0,0,0,0,0];

const plusSVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
const minusSVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;

const readout=document.getElementById('readout');
const layout=[
  {type:'digit',i:0},{type:'digit',i:1},{type:'unit',txt:'h'},
  {type:'digit',i:2},{type:'digit',i:3},{type:'unit',txt:'min'},
  {type:'digit',i:4},{type:'digit',i:5},{type:'unit',txt:'s'},
];
const numEls=[];
layout.forEach(part=>{
  if(part.type==='unit'){
    const u=document.createElement('div');
    u.className='unit-lbl';u.textContent=part.txt;
    readout.appendChild(u);
  }else{
    const col=document.createElement('div');
    col.className='digit-col';
    const up=document.createElement('button');
    up.className='btn-adjust';up.innerHTML=plusSVG;up.setAttribute('aria-label','plus');
    const num=document.createElement('div');
    num.className='num-display';num.textContent='0';
    const dn=document.createElement('button');
    dn.className='btn-adjust';dn.innerHTML=minusSVG;dn.setAttribute('aria-label','moins');
    up.onclick=()=>change(part.i,+1);
    dn.onclick=()=>change(part.i,-1);
    col.append(up,num,dn);
    readout.appendChild(col);
    numEls[part.i]=num;
  }
});

function change(i,d){
  const m=MAX[i]+1;
  digits[i]=(digits[i]+d+m)%m;
  const el=numEls[i];
  el.textContent=digits[i];
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
}

/* ---------- game state ---------- */
let target={h:0,m:0,s:0};
let lives=3, solved=0, locked=false;
const TOTAL=5; // 5 questions pour un parcours complet

function buildHearts(){
  const box=document.getElementById("hearts");box.innerHTML="";
  for(let i=0;i<3;i++){
    const s=document.createElement("span");
    s.className="heart"+(i<lives?"":" gone");s.textContent="❤️";box.appendChild(s);
  }
}

function buildProgress(){
  const box=document.getElementById("progress");box.innerHTML="";
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement("div");
    d.className="dot"+(i<solved?" done":(i===solved?" current":""));box.appendChild(d);
  }
}

function setHands(h,m,s){
  const sec=s*6;
  const min=m*6+s*0.1;
  const hr=(h%12)*30+m*0.5;
  document.getElementById('hSec').setAttribute('transform',`rotate(${sec} 200 200)`);
  document.getElementById('hMin').setAttribute('transform',`rotate(${min} 200 200)`);
  document.getElementById('hHour').setAttribute('transform',`rotate(${hr} 200 200)`);
}

function newQuestion(){
  locked=false;
  target.h=Math.floor(Math.random()*12)+1;
  target.m=Math.floor(Math.random()*60);
  target.s=Math.floor(Math.random()*60);
  setHands(target.h,target.m,target.s);
  digits=[0,0,0,0,0,0];
  numEls.forEach(el=>el.textContent='0');
  feedback.textContent='';feedback.className='feedback';
  const train=document.getElementById('train');
  train.classList.remove('run');void train.offsetWidth;train.classList.add('run');
}

/* ---------- validation ---------- */
const feedback=document.getElementById('feedback');
const validerBtn=document.getElementById('valider');

validerBtn.onclick=()=>{
  if(locked) return;
  const h=digits[0]*10+digits[1];
  const m=digits[2]*10+digits[3];
  const s=digits[4]*10+digits[5];
  if(h===target.h && m===target.m && s===target.s){
    locked=true;
    feedback.textContent='Bravo, c’est la bonne heure ! 🎉';
    feedback.className='feedback ok';
    solved++;buildProgress();
    if(solved>=TOTAL){
      setTimeout(()=>endGame(true), 1200);
    }else{
      setTimeout(newQuestion,1300);
    }
  }else{
    lives--;buildHearts();
    const pad=n=>String(n).padStart(2,'0');
    feedback.textContent=`Pas encore… la bonne réponse était ${pad(target.h)} h ${pad(target.m)} min ${pad(target.s)} s.`;
    feedback.className='feedback no';
    if(lives<=0){
      locked=true;
      setTimeout(()=>endGame(false), 1800);
    }else{
      locked=true;
      setTimeout(newQuestion,1800);
    }
  }
};

function endGame(won){
  const es=document.getElementById("endscreen");
  document.getElementById("endTitle").textContent=won?"Excellent parcours ! 🏆":"Parcours terminé 🔄";
  document.getElementById("endScore").textContent="Tu as trouvé la bonne heure "+solved+" fois sur "+TOTAL+".";
  es.classList.add("show");
}

function newSession(){
  lives=3;solved=0;
  document.getElementById("endscreen").classList.remove("show");
  buildHearts();buildProgress();newQuestion();
}

document.getElementById("restart").addEventListener("click",newSession);
newSession();
</script>
</body>
</html>
