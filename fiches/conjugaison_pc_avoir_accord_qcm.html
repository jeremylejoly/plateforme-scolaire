<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Accords avec Avoir (QCM)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.6;
    text-align: center;
  }

  .q-phrase em {
    font-style: normal;
    color: var(--secondary);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .choice-btn {
    width: 100%;
    padding: 1rem 1.25rem;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: 2.5px solid var(--border);
    background: white;
    color: var(--neutral-dark);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
    transform: translateY(-2px);
  }

  .choice-btn .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: var(--neutral-gray);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .choice-btn:hover:not(:disabled) .opt-letter {
    background: var(--primary);
    color: white;
  }

  .choice-btn.correct {
    border-color: var(--success);
    background: var(--success-light);
    color: #065f46;
  }

  .choice-btn.correct .opt-letter {
    background: var(--success);
    color: white;
  }

  .choice-btn.incorrect {
    border-color: var(--danger);
    background: var(--danger-light);
    color: #991b1b;
  }

  .choice-btn.incorrect .opt-letter {
    background: var(--danger);
    color: white;
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    display: none;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Accords avec Avoir</h1>
      <p class="subtitle">Repère la position du CDV pour accorder correctement le participe passé.</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
    </div>

    <div class="choices" id="choices-container">
      <!-- Rempli dynamiquement -->
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="nextQuestion()">➡️ Question suivante</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 40 QUESTIONS
const BANK = [
  { before: "Les pommes que j'ai ", after: " étaient délicieuses.", cdv: "les pommes (f. pl.), placé avant (pronom relatif 'que')", opts: ["mangées", "mangé", "mangés"], correct: 0, exp: "Le CDV est le pronom relatif *que* (représentant *les pommes*, f. pl.) placé **avant** le verbe. Le participe passé s'accorde donc en genre et en nombre avec lui : *mangées*." },
  { before: "J'ai ", after: " des pommes ce matin.", cdv: "des pommes (f. pl.), placé après le verbe", opts: ["mangé", "mangées", "mangés"], correct: 0, exp: "Le CDV est *des pommes* (f. pl.), placé **après** le verbe. Avec l'auxiliaire *avoir*, le participe reste donc invariable (masculin singulier) : *mangé*." },
  { before: "La lettre que tu as ", after: " est sur mon bureau.", cdv: "la lettre (f. sing.), placé avant ('que')", opts: ["écrite", "écrit", "écrites"], correct: 0, exp: "Le CDV est *que* (représentant *la lettre*, f. sing.) placé **avant** le verbe. On accorde au féminin singulier : *écrite*." },
  { before: "Tu as ", after: " une longue lettre ce matin.", cdv: "une lettre (f. sing.), placé après le verbe", opts: ["écrit", "écrite", "écrites"], correct: 0, exp: "Le CDV est *une longue lettre* (f. sing.) placé **après** le verbe. Le participe passé reste invariable : *écrit*." },
  { before: "Les belles chansons qu'elles ont ", after: " sont célèbres.", cdv: "les chansons (f. pl.), placé avant ('qu'')", opts: ["chantées", "chanté", "chantés"], correct: 0, exp: "Le CDV est *qu'* (représentant *les chansons*, f. pl.) placé **avant** le verbe. On accorde au féminin pluriel : *chantées*." },
  { before: "Elles ont ", after: " de jolies mélodies.", cdv: "de jolies mélodies (f. pl.), placé après le verbe", opts: ["chanté", "chantées", "chantés"], correct: 0, exp: "Le CDV est *de jolies mélodies* placé **après** le verbe. Pas d'accord : *chanté*." },
  { before: "Les jolies fleurs que nous avons ", after: " ont fané.", cdv: "les fleurs (f. pl.), placé avant ('que')", opts: ["cueillies", "cueilli", "cueillis"], correct: 0, exp: "Le CDV est *que* (représentant *les fleurs*, f. pl.) placé **avant** le verbe. On accorde : *cueillies*." },
  { before: "Nous avons ", after: " de magnifiques fleurs.", cdv: "des fleurs (f. pl.), placé après le verbe", opts: ["cueilli", "cueillies", "cueillis"], correct: 0, exp: "Le CDV est *de magnifiques fleurs* placé **après** le verbe. Pas d'accord : *cueilli*." },
  { before: "La leçon difficile qu'il a ", after: " était pourtant simple.", cdv: "la leçon (f. sing.), placé avant ('qu'')", opts: ["comprise", "compris", "comprit"], correct: 0, exp: "Le CDV est *qu'* (représentant *la leçon*, f. sing.) placé **avant** le verbe. On accorde au féminin singulier : *comprise*." },
  { before: "Il a ", after: " la leçon de grammaire.", cdv: "la leçon (f. sing.), placé après le verbe", opts: ["compris", "comprise", "comprit"], correct: 0, exp: "Le CDV est *la leçon* placé **après** le verbe. Pas d'accord avec le CDV après, le participe reste au masculin singulier : *compris*." },
  { before: "Les superbes photos que vous avez ", after: " sont floues.", cdv: "les photos (f. pl.), placé avant ('que')", opts: ["prises", "pris", "prise"], correct: 0, exp: "Le CDV est *que* (représentant *les photos*, f. pl.) placé **avant** le verbe. On accorde au féminin pluriel : *prises*." },
  { before: "Vous avez ", after: " des photos fantastiques.", cdv: "des photos (f. pl.), placé après le verbe", opts: ["pris", "prises", "prise"], correct: 0, exp: "Le CDV est *des photos* placé **après**. Pas d'accord, le participe reste au masculin singulier : *pris*." },
  { before: "La jolie montre qu'elle a ", after: " était en or.", cdv: "la montre (f. sing.), placé avant ('qu'')", opts: ["perdue", "perdu", "perdues"], correct: 0, exp: "Le CDV est *qu'* (pour *la montre*, f. sing.) placé **avant** le verbe. On accorde : *perdue*." },
  { before: "Elle a ", after: " sa montre en or.", cdv: "sa montre (f. sing.), placé après le verbe", opts: ["perdu", "perdue", "perdues"], correct: 0, exp: "Le CDV est *sa montre* placé **après**. Le participe reste invariable : *perdu*." },
  { before: "Les beaux cadeaux qu'ils ont ", after: " sont géniaux.", cdv: "les cadeaux (m. pl.), placé avant ('qu'')", opts: ["reçus", "reçu", "reçues"], correct: 0, exp: "Le CDV est *qu'* (représentant *les cadeaux*, m. pl.) placé **avant**. On accorde au masculin pluriel : *reçus*." },
  { before: "Ils ont ", after: " beaucoup de paquets.", cdv: "beaucoup de paquets (m. pl.), placé après le verbe", opts: ["reçu", "reçus", "reçues"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord : *reçu*." },
  { before: "La tarte aux pommes que j'ai ", after: " sent très bon.", cdv: "la tarte (f. sing.), placé avant ('que')", opts: ["cuite", "cuit", "cuites"], correct: 0, exp: "Le CDV est *que* (pour *la tarte*, f. sing.) placé **avant**. On accorde : *cuite*." },
  { before: "J'ai ", after: " une tarte au chocolat ce matin.", cdv: "une tarte (f. sing.), placé après le verbe", opts: ["cuit", "cuite", "cuites"], correct: 0, exp: "Le CDV est placé **après** le verbe. Pas d'accord : *cuit*." },
  { before: "Les clés de maison que tu as ", after: " sont sur le meuble.", cdv: "les clés (f. pl.), placé avant ('que')", opts: ["perdues", "perdu", "perdue"], correct: 0, exp: "Le CDV est *que* (représentant *les clés*, f. pl.) placé **avant**. On accorde au féminin pluriel : *perdues*." },
  { before: "Tu as ", after: " tes clés dans la cour.", cdv: "les clés (f. pl.), placé après le verbe", opts: ["perdu", "perdues", "perdue"], correct: 0, exp: "Le CDV est placé **après** le verbe. Le participe reste invariable : *perdu*." },
  { before: "La règle de français que nous avons ", after: " est simple.", cdv: "la règle (f. sing.), placé avant ('que')", opts: ["apprise", "appris", "apprit"], correct: 0, exp: "Le CDV est *que* (représentant *la règle*, f. sing.) placé **avant**. On accorde : *apprise*." },
  { before: "Nous avons ", after: " notre leçon de grammaire.", cdv: "notre leçon (f. sing.), placé après le verbe", opts: ["appris", "apprise", "apprit"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord : *appris*." },
  { before: "Les lourdes valises que vous avez ", after: " sont noires.", cdv: "les valises (f. pl.), placé avant ('que')", opts: ["portées", "porté", "portés"], correct: 0, exp: "Le CDV est *que* (pour *les valises*, f. pl.) placé **avant**. On accorde en mettant **es** : *portées*." },
  { before: "Vous avez ", after: " vos lourds bagages.", cdv: "vos bagages (m. pl.), placé après le verbe", opts: ["porté", "portées", "portés"], correct: 0, exp: "Le CDV est placé **après** le verbe. Pas d'accord : *porté*." },
  { before: "La décision importante qu'elles ont ", after: " est irréversible.", cdv: "la décision (f. sing.), placé avant ('qu'')", opts: ["prise", "pris", "prises"], correct: 0, exp: "Le CDV est *qu'* (pour *la décision*, f. sing.) placé **avant**. On accorde : *prise*." },
  { before: "Elles ont ", after: " une décision difficile.", cdv: "une décision (f. sing.), placé après le verbe", opts: ["pris", "prise", "prises"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord, le participe prend un **s** au masculin singulier : *pris*." },
  { before: "Les histoires drôles qu'il a ", after: " nous ont fait rire.", cdv: "les histoires (f. pl.), placé avant ('qu'')", opts: ["racontées", "raconté", "racontés"], correct: 0, exp: "Le CDV est *qu'* (pour *les histoires*, f. pl.) placé **avant**. On accorde : *racontées*." },
  { before: "Il a ", after: " des histoires très drôles.", cdv: "des histoires (f. pl.), placé après le verbe", opts: ["raconté", "racontées", "racontés"], correct: 0, exp: "Le CDV est placé **après** le verbe. Le participe reste invariable : *raconté*." },
  { before: "La bouteille de lait que j'ai ", after: " était périmée.", cdv: "la bouteille (f. sing.), placé avant ('que')", opts: ["bue", "bu", "bues"], correct: 0, exp: "Le CDV est *que* (représentant *la bouteille*, f. sing.) placé **avant**. On accorde : *bue*." },
  { before: "J'ai ", after: " une bouteille d'eau fraîche.", cdv: "une bouteille (f. sing.), placé après le verbe", opts: ["bu", "bue", "bues"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord : *bu*." },
  { before: "Les cerises mûres que tu as ", after: " étaient sucrées.", cdv: "les cerises (f. pl.), placé avant ('que')", opts: ["mangées", "mangé", "mangés"], correct: 0, exp: "Le CDV est *que* (pour *les cerises*, f. pl.) placé **avant**. On accorde en mettant **es** : *mangées*." },
  { before: "Tu as ", after: " des cerises dans le verger.", cdv: "des cerises (f. pl.), placé après le verbe", opts: ["mangé", "mangées", "mangés"], correct: 0, exp: "Le CDV est placé **après** le verbe. Pas d'accord : *mangé*." },
  { before: "La grande cabane qu'ils ont ", after: " est dans le jardin.", cdv: "la cabane (f. sing.), placé avant ('qu'')", opts: ["construite", "construit", "construites"], correct: 0, exp: "Le CDV est *qu'* (pour *la cabane*, f. sing.) placé **avant**. On accorde au féminin : *construite*." },
  { before: "Ils ont ", after: " une cabane dans les bois.", cdv: "une cabane (f. sing.), placé après le verbe", opts: ["construit", "construite", "construites"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord, le participe prend un **t** muet : *construit*." },
  { before: "Les phrases de dictée que nous avons ", after: " sont justes.", cdv: "les phrases (f. pl.), placé avant ('que')", opts: ["écrites", "écrit", "écrite"], correct: 0, exp: "Le CDV est *que* (pour *les phrases*, f. pl.) placé **avant**. On accorde en mettant **es** : *écrites*." },
  { before: "Nous avons ", after: " plusieurs phrases au tableau.", cdv: "des phrases (f. pl.), placé après le verbe", opts: ["écrit", "écrites", "écrite"], correct: 0, exp: "Le CDV est placé **après** le verbe. Le participe reste au masculin singulier : *écrit*." },
  { before: "La poésie difficile que j'ai ", after: " était magnifique.", cdv: "la poésie (f. sing.), placé avant ('que')", opts: ["apprise", "appris", "apprise"], correct: 0, exp: "Le CDV est *que* (pour *la poésie*, f. sing.) placé **avant**. On accorde : *apprise*." },
  { before: "J'ai ", after: " ma poésie par cœur.", cdv: "ma poésie (f. sing.), placé après le verbe", opts: ["appris", "apprise", "apprit"], correct: 0, exp: "Le CDV est placé **après** le verbe. Pas d'accord, le participe se termine par **s** : *appris*." },
  { before: "Les fiches d'exercices qu'il a ", after: " sont en ligne.", cdv: "les fiches (f. pl.), placé avant ('qu'')", opts: ["réparées", "réparé", "réparés"], correct: 0, exp: "Le CDV est *qu'* (pour *les fiches*, f. pl.) placé **avant**. On accorde au féminin pluriel : *réparées* (ici le verbe *réparer*)." },
  { before: "Il a ", after: " les fiches pour ses élèves.", cdv: "les fiches (f. pl.), placé après le verbe", opts: ["réparé", "réparées", "réparés"], correct: 0, exp: "Le CDV est placé **après**. Pas d'accord : *réparé*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false,
  answers: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false,
    answers: []
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <em>..........</em> ${q.after}<br><small style="font-size:12px;color:var(--neutral-gray);font-weight:700;">CDV : <strong>${q.cdv}</strong></small>`;
  
  const choicesContainer = document.getElementById('choices-container');
  choicesContainer.innerHTML = '';
  
  const letters = ['A', 'B', 'C'];
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = `opt-${idx}`;
    btn.onclick = () => selectOption(idx);
    btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span style="font-weight:900;">${opt}</span>`;
    choicesContainer.appendChild(btn);
  });

  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';
  btnAction.style.display = 'none';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });
}

function selectOption(idx) {
  if (state.submitted) return;
  state.submitted = true;

  const q = state.questions[state.currentIndex];
  const isCorrect = (idx === q.correct);
  
  const btnSelected = document.getElementById(`opt-${idx}`);
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  q.opts.forEach((_, i) => {
    document.getElementById(`opt-${i}`).disabled = true;
  });

  if (isCorrect) {
    btnSelected.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    btnSelected.classList.add('incorrect');
    document.getElementById(`opt-${q.correct}`).classList.add('correct');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  feedback.innerHTML = q.exp.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.style.display = 'block';
  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Magnifique ! Tu as parfaitement maîtrisé la règle d'accord du participe passé avec avoir ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Excellent score ! Tu as bien compris l'importance de la position du CDV. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Bon essai ! Souviens-toi : avec avoir, on accorde UNIQUEMENT si le CDV est placé avant le verbe. 👍";
    emoji = '👏';
  } else {
    msg = "C'est une règle difficile. Relis bien l'explication pour chaque phrase : trouve le CDV et regarde s'il est placé avant ou après ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_avoir_accord_qcm'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

window.onload = startExercise;
</script>
</body>
</html>
