<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>L'Enquêteur Royal — Situations d'Aire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.25);
      --true-color: #10b981;
      --true-glow: rgba(16, 185, 129, 0.25);
      --false-color: #f43f5e;
      --false-glow: rgba(244, 63, 94, 0.25);
      --accent: #f59e0b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem;
    }

    .game-container {
      width: 100%;
      max-width: 820px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 2rem 2.5rem 2.5rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .game-container::before {
      content: '';
      position: absolute;
      top: -120px; right: -120px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    header { text-align: center; margin-bottom: 1.5rem; position: relative; z-index: 1; }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c4b5fd 0%, #8b5cf6 60%, #6d28d9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .subtitle { color: var(--text-muted); font-size: 0.95rem; }

    /* Scoreboard */
    .scoreboard {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 0.9rem 1.25rem;
      margin-bottom: 1.5rem;
      position: relative; z-index: 1;
    }

    .score-block { display: flex; align-items: center; gap: 0.6rem; }
    .score-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .score-value { font-family: 'Outfit', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--accent); }

    .progress-track {
      flex: 1; height: 8px;
      background: rgba(51,65,85,0.5);
      border-radius: 999px; margin: 0 1.5rem; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--primary) 0%, #a78bfa 100%);
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Situation card */
    .situation-card {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 1.75rem;
      position: relative; z-index: 1;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      justify-content: center;
    }

    .situation-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #c4b5fd;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      width: fit-content;
    }

    .situation-emoji {
      font-size: 2.5rem;
      line-height: 1;
    }

    .situation-text {
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.5;
      color: #e2e8f0;
    }

    /* True/False buttons */
    .answer-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      position: relative; z-index: 1;
      margin-bottom: 1.5rem;
    }

    .btn-answer {
      border: none;
      border-radius: 18px;
      padding: 1.25rem;
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      letter-spacing: -0.01em;
    }

    .btn-answer span.btn-icon { font-size: 2rem; }
    .btn-answer span.btn-label { font-size: 1.15rem; }

    .btn-true {
      background: linear-gradient(135deg, #059669 0%, var(--true-color) 100%);
      color: white;
      box-shadow: 0 4px 16px var(--true-glow);
    }
    .btn-true:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(16,185,129,0.4); }

    .btn-false {
      background: linear-gradient(135deg, #be123c 0%, var(--false-color) 100%);
      color: white;
      box-shadow: 0 4px 16px var(--false-glow);
    }
    .btn-false:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(244,63,94,0.4); }

    .btn-answer:active { transform: translateY(0) scale(0.98); }
    .btn-answer:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* Feedback panel */
    .feedback-panel {
      border-radius: 18px;
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      position: relative; z-index: 1;
      margin-bottom: 1.25rem;
    }

    .feedback-correct {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.35);
    }
    .feedback-wrong {
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.35);
    }

    .feedback-icon { font-size: 1.75rem; flex-shrink: 0; }

    .feedback-body {}
    .feedback-title {
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }
    .feedback-correct .feedback-title { color: #34d399; }
    .feedback-wrong .feedback-title { color: #fb7185; }

    .feedback-expl {
      font-size: 0.95rem;
      line-height: 1.55;
      color: #cbd5e1;
    }

    .feedback-definition {
      margin-top: 0.75rem;
      padding: 0.6rem 0.85rem;
      border-radius: 10px;
      background: rgba(139, 92, 246, 0.1);
      border-left: 3px solid var(--primary);
      font-size: 0.88rem;
      color: #c4b5fd;
      font-style: italic;
    }

    /* Next button */
    .btn-next {
      width: 100%;
      border: none;
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 1rem;
      border-radius: 14px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--primary) 0%, #6d28d9 100%);
      box-shadow: 0 4px 16px var(--primary-glow);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      position: relative; z-index: 1;
    }
    .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,92,246,0.4); }

    /* Congrats screen */
    .congrats-screen {
      text-align: center;
      padding: 2.5rem 1.5rem;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .trophy-icon { font-size: 4.5rem; display: inline-block; animation: float 3s ease-in-out infinite; margin-bottom: 1rem; }
    .congrats-title { font-family: 'Outfit', sans-serif; font-size: 2.25rem; font-weight: 800; color: var(--accent); margin-bottom: 0.75rem; }
    .congrats-text { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 480px; margin: 0 auto 1.75rem; }
    .stars { font-size: 2.25rem; margin-bottom: 1.75rem; }

    .btn-replay {
      background: linear-gradient(135deg, var(--true-color) 0%, #059669 100%);
      border: none; color: white;
      font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700;
      padding: 1rem 2.25rem; border-radius: 14px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(16,185,129,0.3);
      transition: all 0.2s ease;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-replay:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,0.4); }

    /* Animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

<div class="game-container">

  <!-- Active game view -->
  <div id="game-flow">
    <header>
      <h1>🔍 L'Enquêteur Royal</h1>
      <p class="subtitle">Est-ce une situation d'aire ? Clique sur la bonne réponse.</p>
    </header>

    <div class="scoreboard">

        <span class="score-label">Question</span>

        <span style="color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:1.1rem;">/10</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="prog-bar"></div>
      </div>
      <div class="score-block">
        <span class="score-label">Score</span>
        <span class="score-value" id="score-display">0</span>
        <span style="color:var(--text-muted);font-family:'Outfit',sans-serif;font-size:1.1rem;">/10</span>
      </div>
    </div>

    <div class="situation-card">
      <span class="situation-tag">🔎 Situation royale n°<span id="sit-num">1</span></span>
      <div class="situation-emoji" id="sit-emoji">…</div>
      <div class="situation-text" id="sit-text">Chargement de la situation…</div>
    </div>

    <div class="answer-buttons">
      <button id="btn-true" class="btn-answer btn-true" onclick="answer(true)">
        <span class="btn-icon">✅</span>
        <span class="btn-label">VRAI — c'est de l'aire</span>
      </button>
      <button id="btn-false" class="btn-answer btn-false" onclick="answer(false)">
        <span class="btn-icon">❌</span>
        <span class="btn-label">FAUX — ce n'est pas de l'aire</span>
      </button>
    </div>

    <div id="feedback-area"></div>
    <div id="next-area"></div>
  </div>

  <!-- Congratulations view -->
  <div id="congrats-flow" style="display:none;">
    <div class="congrats-screen">
      <div class="trophy-icon">🏅</div>
      <h2 class="congrats-title">Enquête bouclée !</h2>
      <p class="congrats-text" id="congrats-msg">Mission accomplie !</p>
      <div class="stars" id="stars-display">⭐⭐⭐</div>
      <button class="btn-replay" onclick="resetGame()">🔄 <span>Recommencer l'enquête</span></button>
    </div>
  </div>

</div>

  // ─── INIT ────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startNewSession() {
    session = shuffle(ALL_SITUATIONS).slice(0, TOTAL);
  }

  function renderQuestion() {
    answered = false;
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('next-area').innerHTML = '';
    document.getElementById('btn-true').disabled = false;
    document.getElementById('btn-false').disabled = false;

    const sit = session[step - 1];
    document.getElementById('q-num').textContent = step;
    document.getElementById('sit-num').textContent = step;
    document.getElementById('sit-emoji').textContent = sit.emoji;
    document.getElementById('sit-text').textContent = sit.text;
    document.getElementById('prog-bar').style.width = `${((step - 1) / TOTAL) * 100}%`;
    document.getElementById('score-display').textContent = score;
  }

  function answer(userSaid) {
    if (answered) return;
    answered = true;

    document.getElementById('btn-true').disabled = true;
    document.getElementById('btn-false').disabled = true;

    const sit = session[step - 1];
    const correct = (userSaid === sit.isAire);
    if (correct) score++;
    document.getElementById('score-display').textContent = score;

    const feedbackArea = document.getElementById('feedback-area');
    feedbackArea.innerHTML = `
      <div class="feedback-panel ${correct ? 'feedback-correct' : 'feedback-wrong'}">
        <div class="feedback-icon">${correct ? '🎯' : '💡'}</div>
        <div class="feedback-body">
          <div class="feedback-title">${correct ? 'Bravo, bonne réponse !' : `Non, c'est ${sit.isAire ? 'VRAI' : 'FAUX'} !`}</div>
          <div class="feedback-expl">${sit.expl}</div>
          <div class="feedback-definition">💜 À retenir : ${sit.why}</div>
        </div>
      </div>
    `;

    const nextArea = document.getElementById('next-area');
    if (step < TOTAL) {
      nextArea.innerHTML = `<button class="btn-next" onclick="nextQuestion()"><span>Situation suivante</span> 👉</button>`;
    } else {
      nextArea.innerHTML = `<button class="btn-next" onclick="finishGame()"><span>Voir mes résultats</span> 🏅</button>`;
    }
  }

  function nextQuestion() {
    step++;
    renderQuestion();
  }

  function finishGame() {
    document.getElementById('game-flow').style.display = 'none';
    document.getElementById('congrats-flow').style.display = 'block';

    const pct = Math.round((score / TOTAL) * 100);
    const msg = document.getElementById('congrats-msg');
    const stars = document.getElementById('stars-display');

    if (score === TOTAL) {
      msg.innerHTML = `Parfait ! Tu as répondu juste à <strong>toutes les ${TOTAL} situations</strong> (${pct}%). Tu es un véritable expert de la notion d'aire !`;
      stars.innerHTML = '⭐⭐⭐';
    } else if (score >= 8) {
      msg.innerHTML = `Excellent travail ! <strong>${score}/${TOTAL}</strong> bonnes réponses (${pct}%). Tu maîtrises très bien la notion d'aire.`;
      stars.innerHTML = '⭐⭐';
    } else if (score >= 5) {
      msg.innerHTML = `Pas mal ! <strong>${score}/${TOTAL}</strong> bonnes réponses (${pct}%). Relis les explications pour mieux distinguer l'aire du périmètre et des autres grandeurs.`;
      stars.innerHTML = '⭐';
    } else {
      msg.innerHTML = `Tu as obtenu <strong>${score}/${TOTAL}</strong> (${pct}%). La notion d'aire est encore difficile pour toi — relis les explications et recommence !`;
      stars.innerHTML = '❌';
    }

    if (typeof window.parent !== 'undefined' && window.parent.handleActivityScore) {
      window.parent.handleActivityScore('grandeur_aire_situations', score);
    }
  }

  function resetGame() {
    step = 1;
    score = 0;
    document.getElementById('game-flow').style.display = 'block';
    document.getElementById('congrats-flow').style.display = 'none';
    startNewSession();
    renderQuestion();
  }

  window.addEventListener('DOMContentLoaded', () => {
    startNewSession();
    renderQuestion();
  });
</script>
