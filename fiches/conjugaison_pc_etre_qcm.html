<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Participe passé avec Être (QCM)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.6;
    text-align: center;
  }

  .q-phrase em {
    font-style: normal;
    color: var(--secondary);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .choice-btn {
    width: 100%;
    padding: 1rem 1.25rem;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: 2.5px solid var(--border);
    background: white;
    color: var(--neutral-dark);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
    transform: translateY(-2px);
  }

  .choice-btn .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: var(--neutral-gray);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .choice-btn:hover:not(:disabled) .opt-letter {
    background: var(--primary);
    color: white;
  }

  .choice-btn.correct {
    border-color: var(--success);
    background: var(--success-light);
    color: #065f46;
  }

  .choice-btn.correct .opt-letter {
    background: var(--success);
    color: white;
  }

  .choice-btn.incorrect {
    border-color: var(--danger);
    background: var(--danger-light);
    color: #991b1b;
  }

  .choice-btn.incorrect .opt-letter {
    background: var(--danger);
    color: white;
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    display: none;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Participe passé avec Être</h1>
      <p class="subtitle">Choisis le participe passé correct en l'accordant avec le sujet.</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
    </div>

    <div class="choices" id="choices-container">
      <!-- Rempli dynamiquement -->
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="nextQuestion()">➡️ Question suivante</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 40 QUESTIONS
const BANK = [
  { before: "Elle est ", after: " chez le médecin ce matin.", subject: "Elle (féminin singulier)", opts: ["allée", "allé", "allées"], correct: 0, exp: "Le sujet est *Elle* (féminin singulier). Avec l'auxiliaire *être*, le participe passé s'accorde en genre et en nombre avec le sujet. On ajoute donc un **e** final : *allée*." },
  { before: "Ils sont ", after: " en vacances en Espagne.", subject: "Ils (masculin pluriel)", opts: ["parti", "partis", "partie"], correct: 1, exp: "Le sujet est *Ils* (masculin pluriel). On accorde le participe avec le sujet en ajoutant un **s** : *partis*." },
  { before: "Nous (filles) sommes ", after: " vous féliciter.", subject: "Nous (féminin pluriel)", opts: ["venus", "venu", "venues"], correct: 2, exp: "Le sujet est *Nous* représentant des filles (féminin pluriel). On accorde au féminin pluriel en ajoutant **es** : *venues*." },
  { before: "Le verre est ", after: " sur le carrelage de la cuisine.", subject: "Le verre (masculin singulier)", opts: ["tombé", "tombée", "tombés"], correct: 0, exp: "Le sujet est *Le verre* (masculin singulier). Le participe passé s'écrit sous sa forme de base : *tombé*." },
  { before: "Les feuilles sont ", after: " de l'arbre en automne.", subject: "Les feuilles (féminin pluriel)", opts: ["tombé", "tombées", "tombés"], correct: 1, exp: "Le sujet est *Les feuilles* (féminin pluriel). On accorde en ajoutant **es** : *tombées*." },
  { before: "Vous (garçons) êtes ", after: " sur le grand rocher.", subject: "Vous (masculin pluriel)", opts: ["montés", "monté", "montée"], correct: 0, exp: "Le sujet est *Vous* représentant des garçons (masculin pluriel). On accorde avec un **s** final : *montés*." },
  { before: "La voiture est ", after: " très vite devant nous.", subject: "La voiture (féminin singulier)", opts: ["passé", "passée", "passés"], correct: 1, exp: "Le sujet est *La voiture* (féminin singulier). On accorde en ajoutant un **e** final : *passée*." },
  { before: "Les voleurs sont ", after: " par la fenêtre du salon.", subject: "Les voleurs (masculin pluriel)", opts: ["entré", "entrés", "entrée"], correct: 1, exp: "Le sujet est *Les voleurs* (masculin pluriel). On accorde avec un **s** final : *entrés*." },
  { before: "Elle est ", after: " une grande artiste de cirque.", subject: "Elle (féminin singulier)", opts: ["devenu", "devenue", "devenus"], correct: 1, exp: "Le sujet est *Elle* (féminin singulier). On ajoute un **e** final au participe passé : *devenue*." },
  { before: "Nous (garçons) sommes ", after: " tard de notre entraînement.", subject: "Nous (masculin pluriel)", opts: ["rentré", "rentrée", "rentrés"], correct: 2, exp: "Le sujet est *Nous* (masculin pluriel). On accorde avec un **s** final : *rentrés*." },
  { before: "La petite fille est ", after: " près de la cheminée.", subject: "La petite fille (féminin singulier)", opts: ["resté", "restée", "restées"], correct: 1, exp: "Le sujet est *La petite fille* (féminin singulier). On accorde en ajoutant un **e** final : *restée*." },
  { before: "Les alpinistes sont ", after: " tout en haut de la montagne.", subject: "Les alpinistes (masculin pluriel)", opts: ["arrivé", "arrivée", "arrivés"], correct: 2, exp: "Le sujet est *Les alpinistes* (masculin pluriel). On accorde en ajoutant un **s** final : *arrivés*." },
  { before: "Elle est ", after: " chercher sa boîte de jeux.", subject: "Elle (féminin singulier)", opts: ["descendue", "descendu", "descendues"], correct: 0, exp: "Le sujet est *Elle* (féminin singulier). On ajoute un **e** final : *descendue*." },
  { before: "Les oiseaux sont ", after: " vers les pays chauds.", subject: "Les oiseaux (masculin pluriel)", opts: ["parti", "partis", "partie"], correct: 1, exp: "Le sujet est *Les oiseaux* (masculin pluriel). On accorde avec un **s** final : *partis*." },
  { before: "La plante verte est ", after: " faute d'arrosage.", subject: "La plante verte (féminin singulier)", opts: ["mort", "morte", "mortes"], correct: 1, exp: "Le sujet est *La plante verte* (féminin singulier). Le participe passé du verbe *mourir* s'accorde au féminin : *morte*." },
  { before: "Ils se sont ", after: " dans la forêt mystérieuse.", subject: "Ils (masculin pluriel)", opts: ["promené", "promenés", "promenée"], correct: 1, exp: "Le sujet est *Ils* (masculin pluriel). Pour ce verbe pronominal, le participe s'accorde avec le sujet : *promenés*." },
  { before: "Elle s'est ", after: " très tôt ce matin.", subject: "Elle (féminin singulier)", opts: ["levé", "levée", "levées"], correct: 1, exp: "Le sujet est *Elle* (féminin singulier). On accorde en ajoutant un **e** final : *levée*." },
  { before: "Nous (filles) nous sommes ", after: " chaudement pour sortir.", subject: "Nous (féminin pluriel)", opts: ["habillées", "habillés", "habillé"], correct: 0, exp: "Le sujet est *Nous* représentant des filles (féminin pluriel). On accorde en ajoutant **es** : *habillées*." },
  { before: "La tarte aux fraises est ", after: " à point.", subject: "La tarte aux fraises (féminin singulier)", opts: ["cuit", "cuite", "cuites"], correct: 1, exp: "Le sujet est *La tarte* (féminin singulier). Le participe passé du verbe *cuire* prend un **e** final : *cuite*." },
  { before: "Les poires sont ", after: " de l'arbre.", subject: "Les poires (féminin pluriel)", opts: ["tombées", "tombé", "tombés"], correct: 0, exp: "Le sujet est *Les poires* (féminin pluriel). On accorde en ajoutant **es** : *tombées*." },
  { before: "Il est ", after: " de son voyage en Afrique.", subject: "Il (masculin singulier)", opts: ["revenu", "revenue", "revenus"], correct: 0, exp: "Le sujet est *Il* (masculin singulier). Le participe reste au masculin singulier : *revenu*." },
  { before: "Elle est ", after: " chez elle en courant.", subject: "Elle (féminin singulier)", opts: ["retournée", "retourné", "retournées"], correct: 0, exp: "Le sujet est *Elle* (féminin singulier). On accorde avec un **e** final : *retournée*." },
  { before: "Les invités sont ", after: " pour le début du spectacle.", subject: "Les invités (masculin pluriel)", opts: ["arrivé", "arrivés", "arrivée"], correct: 1, exp: "Le sujet est *Les invités* (masculin pluriel). On accorde en mettant un **s** : *arrivés*." },
  { before: "La bouteille de verre est ", after: " au sol.", subject: "La bouteille (féminin singulier)", opts: ["cassé", "cassée", "cassées"], correct: 1, exp: "Le sujet est *La bouteille* (féminin singulier). On accorde au féminin : *cassée*." },
  { before: "Les filles sont ", after: " nager au lac.", subject: "Les filles (féminin pluriel)", opts: ["allées", "allés", "allé"], correct: 0, exp: "Le sujet est *Les filles* (féminin pluriel). On accorde en mettant **es** : *allées*." },
  { before: "Il s'est ", after: " sous sa couette bien chaude.", subject: "Il (masculin singulier)", opts: ["couché", "couchée", "couchés"], correct: 0, exp: "Le sujet est *Il* (masculin singulier). Le participe s'écrit : *couché*." },
  { before: "Elles se sont ", after: " très vite hier soir.", subject: "Elles (féminin pluriel)", opts: ["endormies", "endormi", "endormis"], correct: 0, exp: "Le sujet est *Elles* (féminin pluriel). Le participe passé de *s'endormir* prend **es** : *endormies*." },
  { before: "Le train rapide est ", after: " à l'heure.", subject: "Le train (masculin singulier)", opts: ["arrivé", "arrivée", "arrivés"], correct: 0, exp: "Le sujet est *Le train* (masculin singulier). On écrit : *arrivé*." },
  { before: "La chienne est ", after: " dans sa niche.", subject: "La chienne (féminin singulier)", opts: ["restée", "resté", "restées"], correct: 0, exp: "Le sujet est *La chienne* (féminin singulier). On accorde au féminin : *restée*." },
  { before: "Les clés perdues sont ", after: " !", subject: "Les clés (féminin pluriel)", opts: ["retrouvées", "retrouvé", "retrouvée"], correct: 0, exp: "Le sujet est *Les clés* (féminin pluriel). On accorde avec **es** : *retrouvées*." },
  { before: "Elle est ", after: " faire le tour du monde.", subject: "Elle (féminin singulier)", opts: ["partie", "parti", "parties"], correct: 0, exp: "Le sujet est *Elle* (féminin singulier). On accorde au féminin : *partie*." },
  { before: "Les garçons sont ", after: " de la balançoire.", subject: "Les garçons (masculin pluriel)", opts: ["tombés", "tombé", "tombées"], correct: 0, exp: "Le sujet est *Les garçons* (masculin pluriel). On accorde avec un **s** : *tombés*." },
  { before: "La lettre recommandée est ", after: " ce matin.", subject: "La lettre (féminin singulier)", opts: ["arrivée", "arrivé", "arrivées"], correct: 0, exp: "Le sujet est *La lettre* (féminin singulier). On accorde au féminin : *arrivée*." },
  { before: "Ils sont ", after: " très célèbres après ce film.", subject: "Ils (masculin pluriel)", opts: ["devenus", "devenu", "devenues"], correct: 0, exp: "Le sujet est *Ils* (masculin pluriel). On accorde avec un **s** : *devenus*." },
  { before: "Elle est ", after: " par le petit chemin de traverse.", subject: "Elle (féminin singulier)", opts: ["passée", "passé", "passés"], correct: 0, exp: "Le sujet est *Elle* (féminin singulier). On accorde au féminin : *passée*." },
  { before: "Les feuilles sont ", after: " complètement rouges.", subject: "Les feuilles (féminin pluriel)", opts: ["devenues", "devenu", "devenue"], correct: 0, exp: "Le sujet est *Les feuilles* (féminin pluriel). On accorde au féminin pluriel : *devenues*." },
  { before: "La vitre de ma chambre est ", after: " .", subject: "La vitre (féminin singulier)", opts: ["brisée", "brisé", "brisées"], correct: 0, exp: "Le sujet est *La vitre* (féminin singulier). On accorde au féminin : *brisée*." },
  { before: "Ils sont ", after: " nous apporter des chocolats.", subject: "Ils (masculin pluriel)", opts: ["venus", "venu", "venue"], correct: 0, exp: "Le sujet est *Ils* (masculin pluriel). On accorde avec un **s** : *venus*." },
  { before: "La vieille reine est ", after: " dans son sommeil.", subject: "La reine (féminin singulier)", opts: ["morte", "mort", "mortes"], correct: 0, exp: "Le sujet est *La reine* (féminin singulier). Le participe s'accorde au féminin : *morte*." },
  { before: "Les jouets en bois sont ", after: " dans le grand coffre.", subject: "Les jouets (masculin pluriel)", opts: ["rangés", "rangé", "rangée"], correct: 0, exp: "Le sujet est *Les jouets* (masculin pluriel). On accorde avec un **s** : *rangés*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false,
  answers: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false,
    answers: []
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <em>..........</em> ${q.after}<br><small style="font-size:12px;color:var(--neutral-gray);font-weight:700;">Sujet : <strong>${q.subject}</strong></small>`;
  
  const choicesContainer = document.getElementById('choices-container');
  choicesContainer.innerHTML = '';
  
  const letters = ['A', 'B', 'C'];
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = `opt-${idx}`;
    btn.onclick = () => selectOption(idx);
    btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span style="font-weight:900;">${opt}</span>`;
    choicesContainer.appendChild(btn);
  });

  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';
  btnAction.style.display = 'none';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });
}

function selectOption(idx) {
  if (state.submitted) return;
  state.submitted = true;

  const q = state.questions[state.currentIndex];
  const isCorrect = (idx === q.correct);
  
  const btnSelected = document.getElementById(`opt-${idx}`);
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  q.opts.forEach((_, i) => {
    document.getElementById(`opt-${i}`).disabled = true;
  });

  if (isCorrect) {
    btnSelected.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    btnSelected.classList.add('incorrect');
    document.getElementById(`opt-${q.correct}`).classList.add('correct');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  feedback.innerHTML = q.exp.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.style.display = 'block';
  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Formidable ! Tu as parfaitement accordé tous les participes passés avec l'auxiliaire être ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Très bon score ! L'accord en genre et en nombre avec le sujet est bien maîtrisé. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Pas mal ! Repère bien le sujet (masculin/féminin, singulier/pluriel) pour accorder correctement avec être. 👍";
    emoji = '👏';
  } else {
    msg = "Des erreurs d'accords subsistent. Rappelle-toi : avec l'auxiliaire être, le participe s'accorde TOUJOURS avec le sujet ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_etre_qcm'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

window.onload = startExercise;
</script>
