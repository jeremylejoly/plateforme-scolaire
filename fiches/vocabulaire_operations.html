<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vocabulaire des opérations</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --purple: #5B4FCF;
    --purple-light: #EEF0FF;
    --purple-mid: #C7C2F5;
    --green: #1A9E75;
    --green-light: #E2F5EE;
    --red: #D94F3D;
    --red-light: #FDECEA;
    --amber: #C97B1A;
    --amber-light: #FEF3E2;
    --blue: #1A6FA0;
    --blue-light: #E2F0FA;
    --bg: #FDFBF7;
    --surface: #FFFFFF;
    --text: #1A1A2E;
    --muted: #6B7080;
    --border: #1A1A2E;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1.5rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .header-card {
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 4px 4px 0px var(--border);
    text-align: center;
  }

  .header-card h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--purple);
    margin-bottom: 0.5rem;
  }

  .header-card p {
    font-size: 0.95rem;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.4;
  }

  .matching-area {
    display: grid;
    grid-template-cols: minmax(165px, 250px) 1fr;
    gap: 1.5rem;
    margin: 0.5rem 0;
  }

  @media (max-width: 640px) {
    .matching-area {
      grid-template-cols: minmax(135px, 200px) 1fr;
      gap: 1rem;
    }
    .match-item {
      padding: 0.65rem 0.75rem;
      font-size: 0.9rem;
      min-height: 46px;
      gap: 0.5rem;
    }
    .link-badge {
      width: 20px;
      height: 20px;
      font-size: 0.75rem;
    }
  }

  @media (max-width: 480px) {
    .matching-area {
      grid-template-cols: 1fr;
      gap: 1rem;
    }
  }

  .match-col {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .col-title {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.25rem;
    text-align: center;
    border-bottom: 2px dashed var(--purple-mid);
    padding-bottom: 0.5rem;
  }

  .match-item {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: all 0.15s ease;
    font-weight: 700;
    font-size: 0.95rem;
    min-height: 52px;
    position: relative;
    user-select: none;
    box-shadow: 2px 2px 0px var(--border);
  }

  .match-item:hover {
    background: var(--purple-light);
    transform: translateY(-1px);
    box-shadow: 3px 3px 0px var(--border);
  }

  .match-item.selected {
    border-color: var(--purple) !important;
    background: var(--purple-light) !important;
    box-shadow: 3px 3px 0px var(--purple);
    transform: scale(1.02);
  }

  .match-item.linked {
    background: var(--purple-light);
    border-color: var(--purple);
    box-shadow: 2px 2px 0px var(--purple);
  }

  .match-item.correct-match {
    border-color: var(--green) !important;
    background: var(--green-light) !important;
    color: #115e59 !important;
    cursor: default;
    box-shadow: 2px 2px 0px var(--green) !important;
    transform: none !important;
  }

  .match-item.incorrect-match {
    border-color: var(--red) !important;
    background: var(--red-light) !important;
    color: #991b1b !important;
    box-shadow: 2px 2px 0px var(--red) !important;
  }

  .link-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--purple);
    color: #ffffff;
    font-weight: 800;
    font-size: 0.85rem;
    margin-left: auto;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .correct-match .link-badge {
    background: var(--green);
  }

  .incorrect-match .link-badge {
    background: var(--red);
  }

  .actions-panel {
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow: 4px 4px 0px var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.15s ease;
    user-select: none;
    box-shadow: 3px 3px 0px var(--border);
  }

  .btn-primary {
    background: var(--purple);
    color: white;
  }

  .btn-primary:hover:not(:disabled) {
    background: #4a3eb3;
    transform: translateY(-1px);
    box-shadow: 4px 4px 0px var(--border);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
  }

  .btn-secondary:hover:not(:disabled) {
    background: var(--purple-light);
    transform: translateY(-1px);
    box-shadow: 4px 4px 0px var(--border);
  }

  .btn:active {
    transform: translateY(1px);
    box-shadow: 1px 1px 0px var(--border);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  .feedback-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
  }

  .text-success {
    color: var(--green);
  }

  .text-danger {
    color: var(--red);
  }

  .score-card {
    display: none;
    background: var(--surface);
    border: 3px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: 4px 4px 0px var(--border);
    text-align: center;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    animation: popIn 0.3s ease-out;
  }

  @keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .score-emoji {
    font-size: 3.5rem;
  }

  .score-value {
    font-family: 'Fredoka', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
  }

  .score-pct {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <div class="header-card">
    <h1>📖 Vocabulaire des opérations</h1>
    <p>Associe chaque mot de vocabulaire à gauche avec sa définition correcte à droite.<br>Clique d'abord sur le mot, puis sur sa définition.</p>
  </div>

  <div id="exercise-zone" class="matching-area">
    <!-- Left Column: Terms -->
    <div class="match-col">
      <div class="col-title">Mots de vocabulaire</div>
      <div id="terms-container" class="match-col"></div>
    </div>

    <!-- Right Column: Definitions -->
    <div class="match-col">
      <div class="col-title">Définitions</div>
      <div id="defs-container" class="match-col"></div>
    </div>
  </div>

  <div class="score-card" id="score-card">
    <div class="score-emoji" id="score-emoji">🎉</div>
    <div class="score-value" id="score-value">10/10</div>
    <div class="score-pct" id="score-pct">100%</div>
    <p id="score-comment" style="font-weight: 600; margin-bottom: 0.5rem;"></p>
    <button class="btn btn-primary" onclick="resetExercise()" style="width: 200px;">🔄 Recommencer</button>
  </div>

  <div class="actions-panel" id="actions-panel">
    <button class="btn btn-secondary" id="btn-reset" onclick="resetExercise()">🔄 Effacer</button>
    <div class="feedback-text" id="feedback-text"></div>
    <button class="btn btn-primary" id="btn-validate" onclick="validateMatches()">✅ Valider mes réponses</button>
  </div>
</div>

<script>
  const DATA = [
    { id: 'A', term: "L'addition", def: "Opération qui consiste à ajouter, réunir deux nombres ou plus." },
    { id: 'B', term: "La somme", def: "Le résultat d'une addition." },
    { id: 'C', term: "La soustraction", def: "Opération qui consiste à enlever, retirer un nombre à un autre pour calculer leur écart." },
    { id: 'D', term: "La différence", def: "Le résultat d'une soustraction." },
    { id: 'E', term: "La multiplication", def: "Opération qui consiste à prendre plusieurs fois un nombre, à faire des paquets." },
    { id: 'F', term: "Le produit", def: "Le résultat d'une multiplication." },
    { id: 'G', term: "La division", def: "Opération qui consiste à partager équitablement une quantité en plusieurs parts." },
    { id: 'H', term: "Le quotient", def: "Le résultat d'une division." },
    { id: 'I', term: "Les termes", def: "Les nombres que l'on associe dans une addition ou une soustraction." },
    { id: 'J', term: "Les facteurs", def: "Les nombres que l'on multiplie ensemble." }
  ];

  let selectedTermId = null;
  let matches = {}; // Maps termId -> defId
  let isChecked = false;

  function shuffle(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function initExercise() {
    isChecked = false;
    selectedTermId = null;
    matches = {};
    
    document.getElementById('exercise-zone').style.display = 'grid';
    document.getElementById('score-card').style.display = 'none';
    document.getElementById('actions-panel').style.display = 'flex';
    document.getElementById('feedback-text').textContent = '';
    document.getElementById('btn-validate').disabled = false;

    // Render terms (left column)
    const termsContainer = document.getElementById('terms-container');
    termsContainer.innerHTML = '';
    DATA.forEach(item => {
      const el = document.createElement('div');
      el.className = 'match-item';
      el.dataset.id = item.id;
      el.textContent = item.term;
      el.onclick = () => selectTerm(item.id);
      termsContainer.appendChild(el);
    });

    // Render definitions (shuffled right column)
    const defsContainer = document.getElementById('defs-container');
    defsContainer.innerHTML = '';
    const shuffledDefs = shuffle(DATA);
    shuffledDefs.forEach(item => {
      const el = document.createElement('div');
      el.className = 'match-item';
      el.dataset.id = item.id;
      el.textContent = item.def;
      el.onclick = () => selectDef(item.id);
      defsContainer.appendChild(el);
    });
  }

  function selectTerm(termId) {
    if (isChecked) return;
    
    // Clear selection if clicking an already matched term to remove match
    if (matches[termId]) {
      removeMatch(termId);
      return;
    }

    // Toggle selected state
    const termsContainer = document.getElementById('terms-container');
    termsContainer.querySelectorAll('.match-item').forEach(el => {
      el.classList.remove('selected');
    });

    if (selectedTermId === termId) {
      selectedTermId = null;
    } else {
      selectedTermId = termId;
      const selectedEl = termsContainer.querySelector(`[data-id="${termId}"]`);
      if (selectedEl) selectedEl.classList.add('selected');
    }
  }

  function selectDef(defId) {
    if (isChecked || !selectedTermId) return;
    const termId = selectedTermId;

    // Remove any existing match to this definition
    Object.keys(matches).forEach(tId => {
      if (matches[tId] === defId) {
        removeMatch(tId);
      }
    });

    // Save match
    matches[termId] = defId;

    // Update UI for term
    const termEl = document.querySelector(`#terms-container [data-id="${termId}"]`);
    termEl.classList.remove('selected');
    termEl.classList.add('linked');
    let badgeTerm = termEl.querySelector('.link-badge');
    if (badgeTerm) badgeTerm.remove();
    badgeTerm = document.createElement('span');
    badgeTerm.className = 'link-badge';
    badgeTerm.textContent = termId;
    termEl.appendChild(badgeTerm);

    // Update UI for def
    const defEl = document.querySelector(`#defs-container [data-id="${defId}"]`);
    defEl.classList.add('linked');
    let badgeDef = defEl.querySelector('.link-badge');
    if (badgeDef) badgeDef.remove();
    badgeDef = document.createElement('span');
    badgeDef.className = 'link-badge';
    badgeDef.textContent = termId;
    defEl.appendChild(badgeDef);

    selectedTermId = null;
  }

  function removeMatch(termId) {
    const defId = matches[termId];
    if (!defId) return;

    delete matches[termId];

    const termEl = document.querySelector(`#terms-container [data-id="${termId}"]`);
    const defEl = document.querySelector(`#defs-container [data-id="${defId}"]`);

    if (termEl) {
      termEl.classList.remove('linked', 'selected');
      const badge = termEl.querySelector('.link-badge');
      if (badge) badge.remove();
    }
    if (defEl) {
      defEl.classList.remove('linked');
      const badge = defEl.querySelector('.link-badge');
      if (badge) badge.remove();
    }
  }

  function validateMatches() {
    // Check if all items are matched
    const matchedCount = Object.keys(matches).length;
    if (matchedCount < DATA.length) {
      const fb = document.getElementById('feedback-text');
      fb.className = 'feedback-text text-danger';
      fb.textContent = `⚠️ Associe tous les mots avant de valider (${matchedCount}/${DATA.length})`;
      return;
    }

    isChecked = true;
    document.getElementById('btn-validate').disabled = true;

    let score = 0;
    DATA.forEach(item => {
      const matchedDefId = matches[item.id];
      const correct = matchedDefId === item.id;
      if (correct) score++;

      const termEl = document.querySelector(`#terms-container [data-id="${item.id}"]`);
      const defEl = document.querySelector(`#defs-container [data-id="${matchedDefId}"]`);

      if (correct) {
        if (termEl) termEl.className = 'match-item correct-match';
        if (defEl) defEl.className = 'match-item correct-match';
      } else {
        if (termEl) termEl.className = 'match-item incorrect-match';
        if (defEl) defEl.className = 'match-item incorrect-match';
      }
    });

    const pct = Math.round((score / DATA.length) * 100);

    // Save results to classroom tracking
    if (window.parent && window.parent.saveResult && window.parent.state && window.parent.state.student) {
      try {
        var state = window.parent.state;
        var classes = window.parent.CLASSES;
        var className = classes && classes[state.studentCls] ? classes[state.studentCls].name : state.studentCls;
        window.parent.saveResult({
          student: state.student,
          cls: state.studentCls,
          className: className,
          activity: 'op_vocabulaire_def',
          bookTitle: 'Vocabulaire des opérations — Mots et définitions',
          score: score,
          total: DATA.length,
          pct: pct,
          date: new Date().toLocaleDateString('fr-BE'),
          time: new Date().toLocaleTimeString('fr-BE', {hour: '2-digit', minute: '2-digit'})
        });
      } catch (e) {
        console.warn('Error saving score:', e);
      }
    }

    // Display final score card after a delay
    setTimeout(() => {
      document.getElementById('exercise-zone').style.display = 'none';
      document.getElementById('actions-panel').style.display = 'none';
      
      const scoreCard = document.getElementById('score-card');
      scoreCard.style.display = 'flex';
      
      document.getElementById('score-value').textContent = `${score} / ${DATA.length}`;
      document.getElementById('score-pct').textContent = `${pct}%`;
      
      const emojiEl = document.getElementById('score-emoji');
      const commentEl = document.getElementById('score-comment');
      
      if (pct === 100) {
        emojiEl.textContent = '🎉';
        commentEl.textContent = 'Excellent ! Tu as un vocabulaire parfait !';
        commentEl.style.color = 'var(--green)';
      } else if (pct >= 70) {
        emojiEl.textContent = '👍';
        commentEl.textContent = 'Très bien ! Tu maîtrises bien les définitions.';
        commentEl.style.color = 'var(--green)';
      } else if (pct >= 50) {
        emojiEl.textContent = '🟠';
        commentEl.textContent = 'Pas mal ! Essaie de relire ta leçon et réessaie.';
        commentEl.style.color = 'var(--amber)';
      } else {
        emojiEl.textContent = '💪';
        commentEl.textContent = "Courage, réessaie pour t'améliorer !";
        commentEl.style.color = 'var(--red)';
      }
    }, 1500);
  }

  function resetExercise() {
    initExercise();
  }

  // Start on load
  initExercise();
</script>
</body>
</html>
