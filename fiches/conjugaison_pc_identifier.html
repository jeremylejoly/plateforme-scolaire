<style>

    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);

    font-weight: 700;
    color: var(--neutral-gray);

    font-weight: 800;

  }

  }

    height: 12px;
    border-radius: 50%;

    transition: all 0.3s;

  .dot.incorrect { background: var(--danger); }

    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.6;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  .choices {

    gap: 1rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .choice-btn {
    flex: 1;
    padding: 1rem;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: 2.5px solid var(--border);
    background: white;
    color: var(--neutral-dark);
    cursor: pointer;

    align-items: center;
    justify-content: center;

    background: var(--primary-light);
    color: var(--primary-dark);
    transform: translateY(-2px);
  }

    background: var(--primary-light);

  .choice-btn.correct {

  }

  .choice-btn.incorrect {

    font-weight: 700;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

    score: 0,
    submitted: false,
    results: []
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Phrase ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').textContent = q.p;
  
  const btnOui = document.getElementById('btn-oui');
  const btnNon = document.getElementById('btn-non');
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');

  btnOui.disabled = false;
  btnNon.disabled = false;
  btnOui.className = 'choice-btn';
  btnNon.className = 'choice-btn';
  
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';
  
  btnAction.style.display = 'none';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });
}

function submitAnswer(ans) {
  if (state.submitted) return;
  state.submitted = true;

  const q = state.questions[state.currentIndex];
  const isCorrect = (ans === 'oui' && q.pc) || (ans === 'non' && !q.pc);

  const btnOui = document.getElementById('btn-oui');
  const btnNon = document.getElementById('btn-non');
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  btnOui.disabled = true;
  btnNon.disabled = true;

  if (ans === 'oui') {
    btnOui.classList.add(q.pc ? 'correct' : 'incorrect');
  } else {
    btnNon.classList.add(!q.pc ? 'correct' : 'incorrect');
  }

  if (!isCorrect) {
    if (q.pc) btnOui.classList.add('correct');
    else btnNon.classList.add('correct');
    
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
  }

  if (isCorrect) {
    state.score++;
    state.results.push('correct');
    dots[state.currentIndex].className = 'dot correct';
  } else {
    state.results.push('incorrect');
    dots[state.currentIndex].className = 'dot incorrect';
  }

  let explicationText = '';
  if (q.pc) {
    explicationText = `✅ **Oui !** C'est du passé composé. Le verbe conjugué est **« ${q.verb} »** (composé de l'auxiliaire et du participe passé).`;
  } else {
    explicationText = `❌ **Non !** Ce n'est pas du passé composé. Le verbe conjugué était **« ${q.verb} »**, qui est à **${q.tense}**.`;
  }

  feedback.innerHTML = explicationText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.style.display = 'block';
  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer l'exercice" : "➡️ Phrase suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Score parfait ! Tu distingues le passé composé des autres temps comme un vrai chef ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Excellent travail ! Tu as très bien compris le rôle du passé composé. Continue comme ça ! 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Pas mal du tout ! Relis bien les explications pour les phrases où tu as fait des erreurs pour encore t'améliorer. 👍";
    emoji = '👏';
  } else {
    msg = "Il reste encore quelques confusions. N'hésite pas à refaire un entraînement pour bien repérer les verbes composés ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_identifier'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score au parent:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

window.onload = startExercise;
</script>
</body>
</html>
