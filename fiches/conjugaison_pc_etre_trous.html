<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Participe passé avec Être (Écriture)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.8;
    text-align: center;
  }

  .saisie-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1rem;
    width: 100%;
  }

  .q-input {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    text-align: center;
    border: none;
    border-bottom: 3px solid var(--primary);
    background: transparent;
    outline: none;
    width: 180px;
    padding: 4px 8px;
    transition: all 0.2s;
  }

  .q-input:focus {
    border-bottom-color: var(--secondary);
  }

  .q-input.correct {
    border-bottom-color: var(--success);
    color: var(--success);
  }

  .q-input.incorrect {
    border-bottom-color: var(--danger);
    color: var(--danger);
  }

  .q-input:disabled {
    background: transparent;
  }

  .q-verb-badge {
    margin-top: 1rem;
    display: inline-block;
    background: var(--primary-light);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    margin-top: 1rem;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Conjugaison avec Être</h1>
      <p class="subtitle">Conjugue le verbe au passé composé en accordant le participe avec le sujet.</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
      <div class="saisie-row" id="saisie-row">
        <input type="text" class="q-input" id="q-input" placeholder="Tape la réponse..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="q-verb-badge" id="q-verb-badge"></div>
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="handleAction()">✅ Valider</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 30 QUESTIONS
const BANK = [
  { before: "Elle ", after: " chez sa copine ce matin.", subject: "Elle (féminin singulier)", verb: "aller", ans: "est allée", exp: "Le sujet est *Elle* (f. sing.). On conjugue l'auxiliaire *être* (*est*) et on accorde *aller* en ajoutant un **e** : *est allée*." },
  { before: "Ils ", after: " en excursion de classe.", subject: "Ils (masculin pluriel)", verb: "partir", ans: "sont partis", exp: "Le sujet est *Ils* (m. pl.). L'auxiliaire est *sont* et on accorde *partir* avec un **s** final : *sont partis*." },
  { before: "Nous (filles) ", after: " vous saluer.", subject: "Nous (féminin pluriel)", verb: "venir", ans: "sommes venues", exp: "Le sujet est *Nous* au féminin pluriel. L'auxiliaire est *sommes* et on accorde *venir* en ajoutant **es** : *sommes venues*." },
  { before: "Le verre de jus ", after: " sur la table.", subject: "Le verre (masculin singulier)", verb: "tomber", ans: "est tombé", exp: "Le sujet est *Le verre* (m. sing.). L'auxiliaire est *est* et le participe reste *tombé*." },
  { before: "Les feuilles sèches ", after: " de la branche.", subject: "Les feuilles (féminin pluriel)", verb: "tomber", ans: "sont tombées", exp: "Le sujet est *Les feuilles* (f. pl.). L'auxiliaire est *sont* et on accorde le participe avec **es** : *sont tombées*." },
  { before: "Vous (garçons) ", after: " directement au grenier.", subject: "Vous (masculin pluriel)", verb: "monter", ans: "êtes montés", exp: "Le sujet est *Vous* (m. pl.). L'auxiliaire est *êtes* et le participe s'accorde avec un **s** : *êtes montés*." },
  { before: "La voiture rouge ", after: " au feu vert.", subject: "La voiture (féminin singulier)", verb: "passer", ans: "est passée", exp: "Le sujet est *La voiture* (f. sing.). L'auxiliaire est *est* et on accorde au féminin avec un **e** : *est passée*." },
  { before: "Les voleurs masqués ", after: " dans le bâtiment.", subject: "Les voleurs (masculin pluriel)", verb: "entrer", ans: "sont entrés", exp: "Le sujet est *Les voleurs* (m. pl.). L'auxiliaire est *sont* et on accorde avec un **s** : *sont entrés*." },
  { before: "Elle ", after: " une grande pianiste reconnue.", subject: "Elle (féminin singulier)", verb: "devenir", ans: "est devenue", exp: "Le sujet est *Elle* (f. sing.). L'auxiliaire est *est* et on accorde en ajoutant un **e** : *est devenue*." },
  { before: "Nous (garçons) ", after: " tard de l'école hier.", subject: "Nous (masculin pluriel)", verb: "rentrer", ans: "sommes rentrés", exp: "Le sujet est *Nous* (m. pl.). L'auxiliaire est *sommes* et on accorde avec un **s** : *sommes rentrés*." },
  { before: "La petite fille timide ", after: " près de sa maman.", subject: "La petite fille (féminin singulier)", verb: "rester", ans: "est restée", exp: "Le sujet est *La petite fille* (f. sing.). L'auxiliaire est *est* et on accorde en ajoutant un **e** : *est restée*." },
  { before: "Les explorateurs ", after: " au campement de base.", subject: "Les explorateurs (masculin pluriel)", verb: "arriver", ans: "sont arrivés", exp: "Le sujet est *Les explorateurs* (m. pl.). L'auxiliaire est *sont* et on accorde avec un **s** : *sont arrivés*." },
  { before: "Elle ", after: " rapidement au sous-sol.", subject: "Elle (féminin singulier)", verb: "descendre", ans: "est descendue", exp: "Le sujet est *Elle* (f. sing.). L'auxiliaire est *est* et on ajoute un **e** final au participe *descendu* : *est descendue*." },
  { before: "Les oiseaux migrateurs ", after: " à l'aube.", subject: "Les oiseaux (masculin pluriel)", verb: "partir", ans: "sont partis", exp: "Le sujet est *Les oiseaux* (m. pl.). L'auxiliaire est *sont* et on ajoute un **s** final : *sont partis*." },
  { before: "La fleur coupée ", after: " à cause de la sécheresse.", subject: "La fleur (féminin singulier)", verb: "mourir", ans: "est morte", exp: "Le sujet est *La fleur* (f. sing.). L'auxiliaire est *est* et le participe passé de *mourir* s'accorde au féminin : *est morte*." },
  { before: "Ils se ", after: " au bord de la rivière.", subject: "Ils (masculin pluriel)", verb: "promener", ans: "sont promenés", exp: "Le sujet est *Ils* (m. pl.). Pour ce verbe pronominal (*se promener*), l'auxiliaire est *sont* et le participe prend un **s** : *sont promenés*." },
  { before: "Elle se ", after: " de très bonne heure.", subject: "Elle (féminin singulier)", verb: "lever", ans: "est levée", exp: "Le sujet est *Elle* (f. sing.). L'auxiliaire est *est* et on accorde en mettant un **e** final : *est levée*." },
  { before: "Nous (filles) nous ", after: " pour aller sous la neige.", subject: "Nous (féminin pluriel)", verb: "habiller", ans: "sommes habillées", exp: "Le sujet est *Nous* au féminin. L'auxiliaire est *sommes* et le participe passé d'*habiller* s'accorde au féminin pluriel : *sommes habillées*." },
  { before: "La tarte aux pommes ", after: " dans le four.", subject: "La tarte (féminin singulier)", verb: "cuire", ans: "est cuite", exp: "Le sujet est *La tarte* (f. sing.). L'auxiliaire est *est* et le participe de *cuire* prend un **e** final : *est cuite*." },
  { before: "Les cerises mûres ", after: " dans l'herbe.", subject: "Les cerises (féminin pluriel)", verb: "tomber", ans: "sont tombées", exp: "Le sujet est *Les cerises* (f. pl.). L'auxiliaire est *sont* et on accorde avec **es** : *sont tombées*." },
  { before: "Il ", after: " à la maison après le coucher du soleil.", subject: "Il (masculin singulier)", verb: "revenir", ans: "est revenu", exp: "Le sujet est *Il* (m. sing.). L'auxiliaire est *est* et le participe est *revenu*." },
  { before: "Elle ", after: " chez le coiffeur hier midi.", subject: "Elle (féminin singulier)", verb: "retourner", ans: "est retournée", exp: "Le sujet est *Elle* (f. sing.). L'auxiliaire est *est* et on ajoute un **e** final : *est retournée*." },
  { before: "Les invités ravis ", after: " pour la fête.", subject: "Les invités (masculin pluriel)", verb: "arriver", ans: "sont arrivés", exp: "Le sujet est *Les invités* (m. pl.). L'auxiliaire est *sont* et le participe prend un **s** : *sont arrivés*." },
  { before: "La bouteille en verre ", after: " en mille morceaux.", subject: "La bouteille (féminin singulier)", verb: "casser", ans: "est cassée", exp: "Le sujet est *La bouteille* (f. sing.). L'auxiliaire est *est* et on ajoute un **e** : *est cassée*." },
  { before: "Les filles courageuses ", after: " au sommet de la falaise.", subject: "Les filles (féminin pluriel)", verb: "monter", ans: "sont montées", exp: "Le sujet est *Les filles* (f. pl.). L'auxiliaire est *sont* et on accorde avec **es** : *sont montées*." },
  { before: "Il se ", after: " de bonne heure.", subject: "Il (masculin singulier)", verb: "coucher", ans: "est couché", exp: "Le sujet est *Il* (m. sing.). L'auxiliaire est *est* et le participe reste *couché*." },
  { before: "Elles se ", after: " blotties l'une contre l'autre.", subject: "Elles (féminin pluriel)", verb: "endormir", ans: "sont endormies", exp: "Le sujet est *Elles* (f. pl.). L'auxiliaire est *sont* et le participe passé d'*endormir* prend **es** : *sont endormies*." },
  { before: "Le train de passagers ", after: " sur la bonne voie.", subject: "Le train (masculin singulier)", verb: "arriver", ans: "est arrivé", exp: "Le sujet est *Le train* (m. sing.). L'auxiliaire est *est* et le participe est *arrivé*." },
  { before: "La chienne fatiguée ", after: " dans son panier doux.", subject: "La chienne (féminin singulier)", verb: "rester", ans: "est restée", exp: "Le sujet est *La chienne* (f. sing.). L'auxiliaire est *est* et on accorde au féminin : *est restée*." },
  { before: "Les clés perdues ", after: " rapidement.", subject: "Les clés (féminin pluriel)", verb: "retrouver", ans: "sont retrouvées", exp: "Le sujet est *Les clés* (f. pl.). L'auxiliaire est *sont* (tournure passive) et le participe s'accorde au féminin pluriel : *sont retrouvées*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--primary);font-weight:900;">[?]</span> ${q.after}`;
  document.getElementById('q-verb-badge').innerHTML = `Sujet : <strong>${q.subject}</strong> · Verbe : <strong>${q.verb}</strong>`;
  
  const input = document.getElementById('q-input');
  input.value = '';
  input.disabled = false;
  input.className = 'q-input';
  input.placeholder = 'Tape la réponse...';
  
  const feedback = document.getElementById('feedback-box');
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';

  const btnAction = document.getElementById('btn-action');
  btnAction.textContent = '✅ Valider';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });

  setTimeout(() => input.focus(), 100);
}

function handleAction() {
  if (!state.submitted) {
    validateAnswer();
  } else {
    nextQuestion();
  }
}

function validateAnswer() {
  state.submitted = true;
  
  const q = state.questions[state.currentIndex];
  const input = document.getElementById('q-input');
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  const given = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
  const expected = q.ans.trim().toLowerCase();
  const isCorrect = (given === expected);

  input.disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    input.classList.add('incorrect');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  // Remplacer le blanc par la bonne réponse
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--success);font-weight:900;border-bottom:2px solid var(--success);">${q.ans}</span> ${q.after}`;

  // Afficher le feedback
  let feedbackText = '';
  if (isCorrect) {
    feedbackText = `🎉 **Bien joué !** Ta réponse est correcte.<br>${q.exp}`;
  } else {
    feedbackText = `❌ **Oups !** La bonne réponse était **${q.ans}**.<br>${q.exp}`;
  }

  feedback.innerHTML = feedbackText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Score maximal ! Tu es un expert de la conjugaison et de l'accord du participe passé avec être ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Excellent travail d'écriture ! L'accord avec l'auxiliaire être n'a plus de secret pour toi. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Bon score ! Sois attentif au genre (m/f) et au nombre (s/p) du sujet pour ne rater aucun accord. 👍";
    emoji = '👏';
  } else {
    msg = "Tu peux encore t'améliorer. Rappelle-toi que l'auxiliaire être impose d'accorder le participe passé directement avec le sujet. 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  // Envoyer le résultat
  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_etre_trous'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

document.getElementById('q-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    handleAction();
  }
});

window.onload = startExercise;
</script>
