<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Accords avec Avoir (Écriture)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.8;
    text-align: center;
  }

  .saisie-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1rem;
    width: 100%;
  }

  .q-input {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    text-align: center;
    border: none;
    border-bottom: 3px solid var(--primary);
    background: transparent;
    outline: none;
    width: 180px;
    padding: 4px 8px;
    transition: all 0.2s;
  }

  .q-input:focus {
    border-bottom-color: var(--secondary);
  }

  .q-input.correct {
    border-bottom-color: var(--success);
    color: var(--success);
  }

  .q-input.incorrect {
    border-bottom-color: var(--danger);
    color: var(--danger);
  }

  .q-input:disabled {
    background: transparent;
  }

  .q-verb-badge {
    margin-top: 1rem;
    display: inline-block;
    background: var(--primary-light);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    margin-top: 1rem;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Accords avec Avoir (Écriture)</h1>
      <p class="subtitle">Conjugue le verbe au passé composé en prêtant attention à l'accord avec le CDV.</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
      <div class="saisie-row" id="saisie-row">
        <input type="text" class="q-input" id="q-input" placeholder="Tape la réponse..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="q-verb-badge" id="q-verb-badge"></div>
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="handleAction()">✅ Valider</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 30 QUESTIONS
const BANK = [
  { before: "Les cerises mûres que j' ", after: " étaient délicieuses.", cdv: "les cerises (f. pl.), placé avant ('que')", verb: "manger", ans: "ai mangées", exp: "Le CDV est le pronom relatif *que* (représentant *les cerises*, f. pl.) placé **avant** le verbe. Le participe s'accorde au féminin pluriel : *ai mangées*." },
  { before: "J' ", after: " des cerises bien mûres hier midi.", cdv: "des cerises (f. pl.), placé après", verb: "manger", ans: "ai mangé", exp: "Le CDV *des cerises* est placé **après** le verbe. Pas d'accord, le participe reste au masculin singulier : *ai mangé*." },
  { before: "La lettre recommandée que tu ", after: " est postée.", cdv: "la lettre (f. sing.), placé avant ('que')", verb: "écrire", ans: "as écrite", exp: "Le CDV est *que* (représentant *la lettre*, f. sing.) placé **avant**. On accorde au féminin : *as écrite*." },
  { before: "Tu ", after: " une longue lettre ce matin.", cdv: "une lettre (f. sing.), placé après", verb: "écrire", ans: "as écrit", exp: "Le CDV *une longue lettre* est placé **après**. Pas d'accord : *as écrit*." },
  { before: "Les jolies chansons qu'elles ", after: " sont entraînantes.", cdv: "les chansons (f. pl.), placé avant ('qu'')", verb: "chanter", ans: "ont chantées", exp: "Le CDV est *qu'* (représentant *les chansons*, f. pl.) placé **avant**. On accorde au féminin pluriel : *ont chantées*." },
  { before: "Elles ", after: " de jolies mélodies.", cdv: "de jolies mélodies (f. pl.), placé après", verb: "chanter", ans: "ont chanté", exp: "Le CDV est placé **après**. Pas d'accord : *ont chanté*." },
  { before: "Les fleurs du jardin que nous ", after: " sont superbes.", cdv: "les fleurs (f. pl.), placé avant ('que')", verb: "cueillir", ans: "avons cueillies", exp: "Le CDV est *que* (pour *les fleurs*, f. pl.) placé **avant**. On accorde : *avons cueillies*." },
  { before: "Nous ", after: " de très belles fleurs rouges.", cdv: "des fleurs (f. pl.), placé après", verb: "cueillir", ans: "avons cueilli", exp: "Le CDV est placé **après**. Pas d'accord : *avons cueilli*." },
  { before: "La règle difficile qu'il ", after: " était en fait aisée.", cdv: "la règle (f. sing.), placé avant ('qu'')", verb: "comprendre", ans: "a comprise", exp: "Le CDV est *qu'* (pour *la règle*, f. sing.) placé **avant**. On accorde au féminin singulier : *a comprise*." },
  { before: "Il ", after: " sa leçon difficile.", cdv: "sa leçon (f. sing.), placé après", verb: "comprendre", ans: "a compris", exp: "Le CDV est placé **après**. Pas d'accord, le participe prend un **s** muet : *a compris*." },
  { before: "Les photos souvenirs que vous ", after: " sont floues.", cdv: "les photos (f. pl.), placé avant ('que')", verb: "prendre", ans: "avez prises", exp: "Le CDV est *que* (pour *les photos*, f. pl.) placé **avant**. On accorde au féminin pluriel : *avez prises*." },
  { before: "Vous ", after: " des clichés de vacances magnifiques.", cdv: "des clichés (m. pl.), placé après", verb: "prendre", ans: "avez pris", exp: "Le CDV est placé **après**. Le participe reste au masculin singulier avec un **s** : *avez pris*." },
  { before: "La montre en or qu'elle ", after: " appartenait à sa grand-mère.", cdv: "la montre (f. sing.), placé avant ('qu'')", verb: "perdre", ans: "a perdue", exp: "Le CDV est *qu'* (pour *la montre*, f. sing.) placé **avant**. On accorde au féminin : *a perdue*." },
  { before: "Elle ", after: " sa précieuse montre en or.", cdv: "sa montre (f. sing.), placé après", verb: "perdre", ans: "a perdu", exp: "Le CDV est placé **après**. Pas d'accord : *a perdu*." },
  { before: "Les beaux cadeaux qu'ils ", after: " sont superbes.", cdv: "les cadeaux (m. pl.), placé avant ('qu'')", verb: "recevoir", ans: "ont reçus", exp: "Le CDV est *qu'* (pour *les cadeaux*, m. pl.) placé **avant**. On accorde au masculin pluriel : *ont reçus*." },
  { before: "Ils ", after: " de magnifiques paquets.", cdv: "des paquets (m. pl.), placé après", verb: "recevoir", ans: "ont reçu", exp: "Le CDV est placé **après**. Pas d'accord : *ont reçu*." },
  { before: "La tarte aux cerises que j' ", after: " est dans l'assiette.", cdv: "la tarte (f. sing.), placé avant ('que')", verb: "cuire", ans: "ai cuite", exp: "Le CDV est *que* (pour *la tarte*, f. sing.) placé **avant**. On accorde au féminin : *ai cuite*." },
  { before: "J' ", after: " une tarte aux cerises.", cdv: "une tarte (f. sing.), placé après", verb: "cuire", ans: "ai cuit", exp: "Le CDV est placé **après**. Pas d'accord : *ai cuit*." },
  { before: "Les clés perdues que tu ", after: " sont sur ton lit.", cdv: "les clés (f. pl.), placé avant ('que')", verb: "perdre", ans: "as perdues", exp: "Le CDV est *que* (pour *les clés*, f. pl.) placé **avant**. On accorde : *as perdues*." },
  { before: "Tu ", after: " ton trousseau de clés ce matin.", cdv: "ton trousseau (m. sing.), placé après", verb: "perdre", ans: "as perdu", exp: "Le CDV est placé **après**. Pas d'accord : *as perdu*." },
  { before: "La longue poésie que nous ", after: " est compliquée.", cdv: "la poésie (f. sing.), placé avant ('que')", verb: "apprendre", ans: "avons apprise", exp: "Le CDV est *que* (pour *la poésie*, f. sing.) placé **avant**. On accorde au féminin : *avons apprise*." },
  { before: "Nous ", after: " notre poésie par cœur.", cdv: "notre poésie (f. sing.), placé après", verb: "apprendre", ans: "avons appris", exp: "Le CDV est placé **après**. Pas d'accord, le participe prend un **s** au masculin singulier : *avons appris*." },
  { before: "Les valises lourdes que vous ", after: " sont lourdes.", cdv: "les valises (f. pl.), placé avant ('que')", verb: "porter", ans: "avez portées", exp: "Le CDV est *que* (pour *les valises*, f. pl.) placé **avant**. On accorde : *avez portées*." },
  { before: "Vous ", after: " des valises très lourdes.", cdv: "des valises (f. pl.), placé après", verb: "porter", ans: "avez porté", exp: "Le CDV est placé **après**. Pas d'accord : *avez porté*." },
  { before: "La sage décision qu'elles ", after: " changera tout.", cdv: "la décision (f. sing.), placé avant ('qu'')", verb: "prendre", ans: "ont prise", exp: "Le CDV est *qu'* (pour *la décision*, f. sing.) placé **avant**. On accorde : *ont prise*." },
  { before: "Elles ", after: " une sage décision.", cdv: "une décision (f. sing.), placé après", verb: "prendre", ans: "ont pris", exp: "Le CDV est placé **après**. Pas d'accord : *ont pris*." },
  { before: "Les histoires drôles qu'il ", after: " nous ont réjouis.", cdv: "les histoires (f. pl.), placé avant ('qu'')", verb: "raconter", ans: "a racontées", exp: "Le CDV est *qu'* (pour *les histoires*, f. pl.) placé **avant**. On accorde au féminin pluriel : *a racontées*." },
  { before: "Il ", after: " une histoire très drôle.", cdv: "une histoire (f. sing.), placé après", verb: "raconter", ans: "a raconté", exp: "Le CDV est placé **après**. Pas d'accord : *a raconté*." },
  { before: "La bouteille d'eau fraîche que j' ", after: " était vide.", cdv: "la bouteille (f. sing.), placé avant ('que')", verb: "boire", ans: "ai bue", exp: "Le CDV est *que* (pour *la bouteille*, f. sing.) placé **avant**. On accorde au féminin : *ai bue*." },
  { before: "J' ", after: " une bonne bouteille de lait.", cdv: "une bouteille (f. sing.), placé après", verb: "boire", ans: "ai bu", exp: "Le CDV est placé **après**. Pas d'accord : *ai bu*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--primary);font-weight:900;">[?]</span> ${q.after}`;
  document.getElementById('q-verb-badge').innerHTML = `CDV : <strong>${q.cdv}</strong> · Verbe : <strong>${q.verb}</strong>`;
  
  const input = document.getElementById('q-input');
  input.value = '';
  input.disabled = false;
  input.className = 'q-input';
  input.placeholder = 'Tape la réponse...';
  
  const feedback = document.getElementById('feedback-box');
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';

  const btnAction = document.getElementById('btn-action');
  btnAction.textContent = '✅ Valider';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });

  setTimeout(() => input.focus(), 100);
}

function handleAction() {
  if (!state.submitted) {
    validateAnswer();
  } else {
    nextQuestion();
  }
}

function validateAnswer() {
  state.submitted = true;
  
  const q = state.questions[state.currentIndex];
  const input = document.getElementById('q-input');
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  const given = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
  const expected = q.ans.trim().toLowerCase();
  const isCorrect = (given === expected);

  input.disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    input.classList.add('incorrect');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  // Remplacer le blanc par la bonne réponse
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--success);font-weight:900;border-bottom:2px solid var(--success);">${q.ans}</span> ${q.after}`;

  // Afficher le feedback
  let feedbackText = '';
  if (isCorrect) {
    feedbackText = `🎉 **Superbe !** Ta réponse est tout à fait correcte.<br>${q.exp}`;
  } else {
    feedbackText = `❌ **Mince !** La bonne réponse était **${q.ans}**.<br>${q.exp}`;
  }

  feedback.innerHTML = feedbackText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Fantastique score ! Tu accordes le participe passé avec avoir comme un vrai champion d'orthographe ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Excellent travail ! La règle d'accord du CDV placé avant est très bien comprise. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Bon score ! Prends bien le temps de vérifier la place du CDV par rapport au verbe. 👍";
    emoji = '👏';
  } else {
    msg = "Pas de découragement ! Recommence pour t'exercer à chercher le CDV : s'il est placé après avoir, pas d'accord. S'il est avant, on accorde ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_avoir_accord_trous'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

document.getElementById('q-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    handleAction();
  }
});

window.onload = startExercise;
</script>
