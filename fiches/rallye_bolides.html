<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le rallye des bolides</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #5B4FCF;
    --purple-light: #EEF0FF;
    --purple-mid: #C7C2F5;
    --green: #1A9E75;
    --green-light: #E2F5EE;
    --red: #D94F3D;
    --red-light: #FDECEA;
    --amber: #C97B1A;
    --amber-light: #FEF3E2;
    --teal: #1A6FA0;
    --teal-dark: #104e73;
    --bg: #FDFBF7;
    --panel: #FFFFFF;
    --ink: #1A1A2E;
    --muted: #6B7080;
    --line: #1A1A2E;
    --shadow: 6px 6px 0px #1A1A2E;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    padding: 16px;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }
  .panel { max-width: 1000px; width: 100%; position: relative; }

  /* ---------- Barre du haut ---------- */
  .topbar {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .round-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: var(--panel);
    border: 3px solid var(--line);
    box-shadow: 4px 4px 0 var(--line);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .round-btn:hover {
    transform: translateY(-2px);
    box-shadow: 6px 6px 0 var(--line);
  }
  .round-btn:active {
    transform: translateY(2px) scale(0.96);
    box-shadow: 2px 2px 0 var(--line);
  }
  .round-btn svg { width: 28px; height: 28px; }
  h1 {
    font-size: 22px; color: var(--ink); margin: 0;
    text-align: center; font-weight: 800; line-height: 1.25;
    font-family: 'Fredoka', sans-serif;
  }
  .lives {
    display: flex; align-items: center; gap: 8px;
  }
  .lives .heart svg { width: 34px; height: 34px; }
  .pip {
    width: 30px; height: 30px; border-radius: 50%;
    border: 3px solid var(--line); background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
  }
  .pip.done { background: var(--green); }
  .pip.current { background: var(--purple-mid); }
  .pip.fail { background: var(--red); }
  .pip svg { width: 16px; height: 16px; }

  /* ---------- Circuit de course (Piste) ---------- */
  .track-container {
    background: #EAEAEA;
    border: 3px solid var(--line);
    border-radius: 16px;
    height: 110px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .track-decorations {
    position: absolute;
    top: 5px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    pointer-events: none;
    font-size: 20px;
    opacity: 0.65;
  }
  .finish-line {
    position: absolute;
    right: 50px;
    top: 0;
    bottom: 0;
    width: 14px;
    background: repeating-conic-gradient(#fff 0% 25%, #1A1A2E 0% 50%) 50% / 8px 8px;
    border-left: 2px solid var(--line);
    border-right: 2px solid var(--line);
    z-index: 1;
  }
  .racetrack {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 20px;
    height: 24px;
    background: #3A3A3A;
    border-top: 3px solid var(--line);
    border-bottom: 3px solid var(--line);
    display: flex;
    align-items: center;
  }
  .racetrack::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    border-top: 3px dashed #FFF;
    opacity: 0.8;
  }
  .vehicle {
    position: absolute;
    bottom: 12px; /* Sort de la piste légèrement pour le relief */
    left: 5%;
    width: 68px;
    height: 48px;
    z-index: 10;
    transition: left 1.2s cubic-bezier(0.25, 1, 0.5, 1);
  }
  .vehicle svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.25));
  }
  
  /* Bulles de dialogue du véhicule */
  .vehicle-bubble {
    position: absolute;
    background: #FFF;
    border: 2px solid var(--line);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: bold;
    font-family: 'Fredoka', sans-serif;
    bottom: 60px;
    left: 5%;
    white-space: nowrap;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.15);
    z-index: 12;
    transition: left 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
    opacity: 0;
  }
  .vehicle-bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 20px;
    border-width: 6px 6px 0;
    border-style: solid;
    border-color: #FFF transparent;
    display: block;
    width: 0;
  }
  .vehicle-bubble::before {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 19px;
    border-width: 7px 7px 0;
    border-style: solid;
    border-color: var(--line) transparent;
    display: block;
    width: 0;
    z-index: -1;
  }
  .vehicle-bubble.show {
    opacity: 1;
  }

  /* Smoke / Exhaust effect */
  .smoke-cloud {
    position: absolute;
    background: #BBB;
    border: 2px solid var(--line);
    border-radius: 50%;
    width: 16px;
    height: 16px;
    bottom: 12px;
    left: 4%;
    opacity: 0;
    z-index: 5;
    transform: scale(0.2);
    transition: left 1.2s cubic-bezier(0.25, 1, 0.5, 1);
  }
  @keyframes puff {
    0% { transform: scale(0.2) translate(0, 0); opacity: 1; }
    50% { transform: scale(1.1) translate(-10px, -5px); background: #999; }
    100% { transform: scale(1.4) translate(-20px, -10px); opacity: 0; }
  }
  .smoke-puff {
    animation: puff 0.8s ease-out forwards;
  }

  /* ---------- Zone de jeu ---------- */
  .game-area {
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 24px;
    padding: 30px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .context-desc {
    font-size: 19px;
    font-weight: 700;
    font-family: 'Fredoka', sans-serif;
    color: var(--teal-dark);
    text-align: center;
    background: var(--purple-light);
    border: 2px dashed var(--purple-mid);
    border-radius: 14px;
    padding: 12px 20px;
    margin: 0;
  }

  /* ---------- Tableau de proportionnalité ---------- */
  .table-scroll {
    overflow-x: auto;
    width: 100%;
    margin: 10px 0;
  }
  .prop-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    border: 3.5px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
  }
  .prop-table th, .prop-table td {
    border: 3px solid var(--line);
    padding: 14px 20px;
    text-align: center;
    vertical-align: middle;
  }
  .prop-table th {
    background: var(--purple-light);
    color: var(--purple);
    font-weight: 800;
    width: 25%;
    text-align: left;
  }
  .prop-table td.ref-cell {
    background: var(--amber-light);
    color: var(--amber);
    font-weight: 800;
    font-size: 20px;
  }
  .prop-table td.input-cell {
    position: relative;
    background: #FFF;
  }

  /* Formulaire et entrées */
  .cell-input-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
  }
  .prop-input {
    width: 90px;
    height: 48px;
    border: 3px solid var(--line);
    border-radius: 10px;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    background: #FFF;
    transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
  }
  .prop-input:focus {
    outline: none;
    border-color: var(--purple);
    box-shadow: 2px 2px 0 var(--purple);
  }
  .prop-input::-webkit-outer-spin-button,
  .prop-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .prop-input { -moz-appearance: textfield; appearance: textfield; }

  /* États de validation */
  .prop-input.ok {
    border-color: var(--green);
    background-color: var(--green-light);
    color: var(--green);
  }
  .prop-input.bad {
    border-color: var(--red);
    background-color: var(--red-light);
    color: var(--red);
  }
  .correct-correction {
    font-size: 13px;
    font-weight: 800;
    color: var(--green);
    margin-top: 2px;
  }

  /* ---------- Bouton Valider / Suivant ---------- */
  .action-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .btn-valider {
    background: var(--purple);
    border: 3px solid var(--line);
    border-radius: 14px;
    padding: 14px 34px;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-family: 'Fredoka', sans-serif;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-valider:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 8px 8px 0 var(--line);
  }
  .btn-valider:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 4px 4px 0 var(--line);
  }
  .btn-valider:disabled {
    opacity: 0.45;
    cursor: default;
  }

  .btn-next {
    background: var(--teal);
    border: 3px solid var(--line);
    border-radius: 14px;
    padding: 14px 34px;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    cursor: pointer;
    box-shadow: var(--shadow);
    font-family: 'Fredoka', sans-serif;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 8px 8px 0 var(--line);
  }
  .btn-next:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 4px 4px 0 var(--line);
  }
  .btn-next:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .feedback {
    font-size: 20px;
    font-weight: 800;
    font-family: 'Fredoka', sans-serif;
    min-height: 28px;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }

  /* Écran de Fin */
  .end-screen {
    text-align: center; padding: 50px 20px;
    background: var(--panel); border: 3px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow);
  }
  .end-screen h2 { color: var(--ink); font-size: 30px; margin: 0 0 10px; font-family: 'Fredoka', sans-serif; }
  .end-screen .score-num {
    font-size: 74px; font-weight: 900; color: var(--purple);
    font-family: 'Nunito', sans-serif;
    -webkit-text-stroke: 2px var(--line); paint-order: stroke fill; margin: 10px 0;
  }
  .end-screen p { color: var(--teal); font-size: 19px; font-weight: bold; font-family: 'Fredoka', sans-serif; }
  .btn-restart {
    background: var(--red); border: 3px solid var(--line); border-radius: 30px;
    padding: 15px 32px; font-size: 18px; font-weight: 800; color: #fff;
    cursor: pointer; box-shadow: var(--shadow); font-family: 'Fredoka', sans-serif; margin-top: 12px;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .credit { text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); opacity: 0.75; }
  .credit a { color: var(--muted); }

  @media (max-width: 600px) {
    .prop-table th, .prop-table td { padding: 8px 10px; font-size: 15px; }
    .prop-input { width: 68px; height: 38px; font-size: 17px; }
    .btn-valider, .btn-next { padding: 10px 20px; font-size: 17px; }
    .action-row { flex-direction: column; align-items: stretch; }
    .feedback { text-align: center; }
  }
</style>
</head>
<body>
<div class="panel">

  <div id="gameScreen">
    <div class="topbar">
      <button class="round-btn" onclick="restartGame()" title="Recommencer">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--line)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 8 8 8"/>
        </svg>
      </button>
      <h1 id="instructionText">Remplis le tableau pour aider le bolide à avancer !</h1>
      <div class="lives" id="lives"></div>
    </div>

    <!-- Piste de course -->
    <div class="track-container">
      <div class="track-decorations">
        <span>🌲</span><span>⛰️</span><span>🌳</span><span>⛺</span><span>🌲</span>
      </div>
      <div class="finish-line"></div>
      <div class="racetrack">
        <div class="vehicle" id="animatedVehicle">
          <!-- Injecté dynamiquement -->
        </div>
        <div class="vehicle-bubble" id="vehicleBubble">En voiture !</div>
        <div class="smoke-cloud" id="smokeCloud"></div>
      </div>
    </div>

    <!-- Zone de jeu principale -->
    <div class="game-area">
      <p class="context-desc" id="contextText"></p>

      <div class="table-scroll">
        <table class="prop-table">
          <thead>
            <tr id="rowTimeHeader">
              <th id="lblTime">Temps (min)</th>
              <td class="ref-cell" id="refTime"></td>
              <td id="cellT1"></td>
              <td id="cellT2"></td>
              <td id="cellT3"></td>
            </tr>
          </thead>
          <tbody>
            <tr id="rowDistHeader">
              <th id="lblDist">Distance (km)</th>
              <td class="ref-cell" id="refDist"></td>
              <td id="cellD1"></td>
              <td id="cellD2"></td>
              <td id="cellD3"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="action-row">
        <div class="feedback" id="feedback"></div>
        <div>
          <button class="btn-valider" id="btnValidate" onclick="validate()">Valider</button>
          <button class="btn-next" id="btnNext" onclick="nextExercise()" disabled>Suivant</button>
        </div>
      </div>
    </div>
  </div>

  <div id="endScreen" class="end-screen" style="display:none;">
    <h2>Rallye terminé !</h2>
    <div class="score-num" id="finalScore"></div>
    <p id="endMessage"></p>
    <button class="btn-restart" onclick="restartGame()">Recommencer avec de nouveaux circuits</button>
  </div>

  <div class="credit">Illustrations : Conception originale – Licence Plateforme Scolaire</div>

</div>

<script>

const EXERCISES_PER_SESSION = 5;
let sessionExercises = [];
let currentIndex = 0;
let score = 0;
let results = [];
let answered = false;

// Helpers pour Git / Pips
const checkSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="#1A1A2E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 12 10 18 20 6"/></svg>`;
const heartSVG = `<svg viewBox="0 0 24 24" fill="#f06c8e" stroke="#1A1A2E" stroke-width="1.8" stroke-linejoin="round"><path d="M12 21s-7.5-4.7-10-9.3C0.5 8.5 2 4.5 6 4.5c2.3 0 3.7 1.4 6 4 2.3-2.6 3.7-4 6-4 4 0 5.5 4 4 7.2C19.5 16.3 12 21 12 21z"/></svg>`;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function pickSession() {
  const shuffled = shuffle([...exerciseBank]);
  return shuffled.slice(0, EXERCISES_PER_SESSION);
}

function renderLives() {
  const box = document.getElementById('lives');
  box.innerHTML = '<span class="heart">' + heartSVG + '</span>';
  for (let i = 0; i < EXERCISES_PER_SESSION; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (i < currentIndex) {
      if (results[i]) {
        pip.classList.add('done');
        pip.innerHTML = checkSVG;
      } else {
        pip.classList.add('fail');
      }
    } else if (i === currentIndex) {
      pip.classList.add('current');
    }
    box.appendChild(pip);
  }
}

// Calculer la position horizontale de la voiture de course
function updateVehiclePosition(customPercent = null) {
  const vehicle = document.getElementById('animatedVehicle');
  const bubble = document.getElementById('vehicleBubble');
  const smoke = document.getElementById('smokeCloud');
  
  let targetPercent = 5; // Départ
  if (customPercent !== null) {
    targetPercent = customPercent;
  } else {
    // Progression par question
    // 5 questions réparties de 5% à 85%
    targetPercent = 5 + (currentIndex * 16);
  }

  vehicle.style.left = `${targetPercent}%`;
  bubble.style.left = `${targetPercent}%`;
  smoke.style.left = `${targetPercent - 2}%`;
}

function showBubble(text, duration = 3000) {
  const bubble = document.getElementById('vehicleBubble');
  bubble.textContent = text;
  bubble.classList.add('show');
  setTimeout(() => {
    bubble.classList.remove('show');
  }, duration);
}

function emitSmoke() {
  const smoke = document.getElementById('smokeCloud');
  smoke.classList.add('smoke-puff');
  setTimeout(() => {
    smoke.classList.remove('smoke-puff');
  }, 800);
}

function loadExercise() {
  answered = false;
  document.getElementById('btnValidate').disabled = false;
  document.getElementById('btnNext').disabled = true;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';

  const ex = sessionExercises[currentIndex];
  renderLives();
  updateVehiclePosition();

  // Injecter le bon véhicule
  document.getElementById('animatedVehicle').innerHTML = vehicleSVGs[ex.vehicle];
  
  // Bulle de bienvenue de la question
  setTimeout(() => {
    showBubble(`Prêt ? C'est parti !`);
  }, 400);

  // Mettre à jour le contexte
  document.getElementById('contextText').textContent = ex.context;

  // Labels du tableau
  document.getElementById('lblTime').textContent = `Temps (${ex.unitT})`;
  document.getElementById('lblDist').textContent = `Distance (${ex.unitD})`;

  // Colonne de référence
  document.getElementById('refTime').textContent = ex.refT;
  document.getElementById('refDist').textContent = ex.refD;

  // Colonnes à trous
  ex.slots.forEach((s, idx) => {
    const cellT = document.getElementById(`cellT${idx+1}`);
    const cellD = document.getElementById(`cellD${idx+1}`);

    if (s.type === 'D') {
      // Distance est manquante
      cellT.innerHTML = `<span style="font-weight:bold; font-size:19px;">${s.t}</span>`;
      cellD.innerHTML = `
        <div class="cell-input-wrapper">
          <input class="prop-input" type="number" id="input_slot_${idx}" placeholder="?">
          <div class="correct-correction" id="correct_val_${idx}"></div>
        </div>
      `;
    } else {
      // Temps est manquant
      cellT.innerHTML = `
        <div class="cell-input-wrapper">
          <input class="prop-input" type="number" id="input_slot_${idx}" placeholder="?">
          <div class="correct-correction" id="correct_val_${idx}"></div>
        </div>
      `;
      cellD.innerHTML = `<span style="font-weight:bold; font-size:19px;">${s.d}</span>`;
    }
  });

  // Focus sur la première case d'entrée
  setTimeout(() => {
    const firstInp = document.getElementById('input_slot_0');
    if (firstInp) firstInp.focus();
  }, 100);
}

function validate() {
  if (answered) return;
  const ex = sessionExercises[currentIndex];
  const feedback = document.getElementById('feedback');

  // Récupérer les valeurs saisies par l'élève
  let inputsFilled = true;
  let values = [];

  for (let i = 0; i < 3; i++) {
    const inputEl = document.getElementById(`input_slot_${i}`);
    const val = parseInt(inputEl.value, 10);
    if (isNaN(val) || val <= 0) {
      inputsFilled = false;
    }
    values.push(val);
  }

  if (!inputsFilled) {
    feedback.textContent = 'Remplis toutes les cases du tableau avant de valider.';
    feedback.className = 'feedback wrong';
    return;
  }

  // Vérifier les réponses
  answered = true;
  document.getElementById('btnValidate').disabled = true;
  document.getElementById('btnNext').disabled = false;

  let allCorrect = true;

  ex.slots.forEach((s, idx) => {
    const inputEl = document.getElementById(`input_slot_${idx}`);
    const correctVal = (s.type === 'D') ? s.d : s.t;
    const userVal = values[idx];

    inputEl.disabled = true;

    if (userVal === correctVal) {
      inputEl.classList.add('ok');
    } else {
      inputEl.classList.add('bad');
      allCorrect = false;
      // Afficher le correctif en dessous
      const corrEl = document.getElementById(`correct_val_${idx}`);
      corrEl.textContent = `Rép: ${correctVal}`;
    }
  });

  if (allCorrect) {
    feedback.textContent = "Bravo, tout est parfaitement proportionnel !";
    feedback.className = 'feedback correct';
    score++;
    results[currentIndex] = true;

    // Bulle de joie du conducteur
    const randomCheer = ex.cheers[Math.floor(Math.random() * ex.cheers.length)];
    showBubble(randomCheer);

    // Faire avancer la voiture au point suivant
    const nextPercent = 5 + ((currentIndex + 1) * 16);
    updateVehiclePosition(nextPercent);
  } else {
    feedback.textContent = "Oups ! Certaines cases comportent des erreurs.";
    feedback.className = 'feedback wrong';
    results[currentIndex] = false;

    // Effet de panne / fumée
    emitSmoke();
    showBubble("Aïe, j'ai calé ! 💨");
  }

  renderLives();

  if (currentIndex === EXERCISES_PER_SESSION - 1) {
    document.getElementById('btnNext').textContent = 'Voir mon score';
  }
}

function nextExercise() {
  currentIndex++;
  if (currentIndex >= EXERCISES_PER_SESSION) {
    showEndScreen();
  } else {
    loadExercise();
  }
}

function showEndScreen() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('endScreen').style.display = 'block';
  document.getElementById('finalScore').textContent = `${score} / ${EXERCISES_PER_SESSION}`;
  
  // Placer le véhicule sur la ligne d'arrivée
  updateVehiclePosition(85);

  let message = '';
  if (score === EXERCISES_PER_SESSION) message = 'Félicitations ! Tu maîtrises les tableaux de proportionnalité à la perfection !';
  else if (score >= EXERCISES_PER_SESSION - 1) message = 'Excellent parcours ! Tu as un très bon sens des rapports.';
  else if (score >= EXERCISES_PER_SESSION / 2) message = "Bon travail, continue pour améliorer ton score.";
  else message = "Entraîne-toi encore pour aider le bolide à franchir tous les obstacles !";
  document.getElementById('endMessage').textContent = message;

  if (window.parent && window.parent.saveResult) {
    const pct = Math.round(score / EXERCISES_PER_SESSION * 100);
    window.parent.saveResult({
      activity: 'grandeur_proportionnalite_rallye_bolides',
      bookTitle: 'Grandeurs — Le rallye des bolides',
      score: score,
      total: EXERCISES_PER_SESSION,
      pct: pct,
      date: new Date().toLocaleDateString('fr-BE'),
      time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
    });
  }
}

function restartGame() {
  sessionExercises = pickSession();
  currentIndex = 0;
  score = 0;
  results = [];
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('btnNext').textContent = 'Suivant';
  loadExercise();
}

restartGame();
