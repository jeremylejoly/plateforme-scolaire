<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quelle est la bonne question ? 🤔</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --bleu:      #5B4FCF;
    --bleu-clair:#EEF0FF;
    --vert:      #1A9E75;
    --vert-clair:#E2F5EE;
    --rouge:     #D94F3D;
    --rouge-clair:#FDECEA;
    --orange:    #C97B1A;
    --jaune:     #FEF3E2;
    --fond:      #FDFBF7;
    --carte:     #FFFFFF;
    --texte:     #1A1A2E;
    --gris:      #6B7080;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--fond);
    color: var(--texte);
    min-height: 100vh;
    padding: 20px;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    text-align: center;
    padding: 28px 16px 20px;
    background: #E2F0FA; /* blue-light */
    border: 3px solid #1A1A2E;
    border-radius: 20px;
    margin-bottom: 24px;
    color: var(--texte);
    box-shadow: 6px 6px 0px #1A1A2E;
  }
  header h1 {
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    font-weight: 700;
    line-height: 1.2;
  }
  header p {
    margin-top: 6px;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    opacity: .9;
  }

  /* ── BARRE DE PROGRESSION ───────────────── */
  #progress-bar-wrap {
    background: #CBD5E1;
    border: 2px solid #1A1A2E;
    border-radius: 99px;
    height: 14px;
    margin: 0 0 20px;
    overflow: hidden;
  }
  #progress-bar {
    height: 100%;
    background: #1A9E75;
    transition: width .4s ease;
    width: 0%;
  }
  #progress-label {
    text-align: center;
    font-size: .85rem;
    color: var(--gris);
    margin-bottom: 18px;
    font-weight: 600;
  }

  /* ── CARTE PROBLÈME ─────────────────────── */
  #problem-card {
    background: var(--carte);
    border-radius: 18px;
    padding: 24px 28px;
    margin-bottom: 22px;
    border: 3px solid #1A1A2E;
    box-shadow: 4px 4px 0px #1A1A2E;
  }
  #problem-card .label {
    font-size: .75rem;
    font-weight: 800;
    color: #5B4FCF;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 8px;
  }
  #problem-text {
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    line-height: 1.65;
    font-weight: 700;
  }

  /* ── QUESTION D'INTRO ───────────────────── */
  #question-intro {
    text-align: center;
    font-family: 'Fredoka', sans-serif;
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 700;
    color: var(--texte);
    margin-bottom: 16px;
  }

  /* ── CHOIX ──────────────────────────────── */
  #choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice-btn {
    background: var(--carte);
    border: 3px solid #1A1A2E;
    border-radius: 14px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: clamp(0.9rem, 2.3vw, 1rem);
    font-weight: 700;
    color: var(--texte);
    cursor: pointer;
    text-align: left;
    transition: all .2s;
    line-height: 1.45;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 3px 3px 0px #1A1A2E;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: #5B4FCF;
    background: #EEF0FF;
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0px #1A1A2E;
  }
  .choice-btn:active:not(:disabled) {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #1A1A2E;
  }
  .choice-btn .badge {
    flex-shrink: 0;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #FFFFFF;
    border: 2px solid #1A1A2E;
    color: var(--texte);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800;
    font-size: .9rem;
    transition: all .18s;
  }
  .choice-btn:hover:not(:disabled) .badge {
    background: #5B4FCF;
    color: #fff;
  }
  .choice-btn.correct {
    border-color: #1A9E75;
    background: #E2F5EE;
    box-shadow: 3px 3px 0px #1A1A2E;
  }
  .choice-btn.correct .badge { background: #1A9E75; color: #fff; border-color: #1A1A2E; }
  .choice-btn.wrong {
    border-color: #D94F3D;
    background: #FDECEA;
    box-shadow: 3px 3px 0px #1A1A2E;
  }
  .choice-btn.wrong .badge { background: #D94F3D; color: #fff; border-color: #1A1A2E; }
  .choice-btn:disabled { cursor: default; transform: none; }

  /* ── FEEDBACK ───────────────────────────── */
  #feedback {
    display: none;
    padding: 14px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 16px;
    line-height: 1.5;
    border: 3px solid #1A1A2E;
    box-shadow: 3px 3px 0px #1A1A2E;
  }
  #feedback.ok  { background: #E2F5EE;  color: #1A9E75; border-color: #1A9E75; }
  #feedback.nok { background: #FDECEA; color: #D94F3D; border-color: #D94F3D; }

  /* ── BOUTON SUIVANT ─────────────────────── */
  #next-btn {
    display: none;
    width: 100%;
    padding: 12px;
    background: #5B4FCF;
    color: #fff;
    border: 3px solid #1A1A2E;
    border-radius: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 4px 4px 0px #1A1A2E;
    margin-bottom: 10px;
  }
  #next-btn:hover {
    background: #4a3ebf;
    transform: translate(-1px, -1px);
    box-shadow: 5px 5px 0px #1A1A2E;
  }
  #next-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #1A1A2E;
  }

  /* ── SCORE / RÉSULTAT FINAL ─────────────── */
  #result-screen {
    display: none;
    background: var(--carte);
    border: 3px solid #1A1A2E;
    border-radius: 20px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 6px 6px 0px #1A1A2E;
  }
  #result-screen .big-emoji { font-size: 4rem; margin-bottom: 12px; }
  #result-screen h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  #result-screen .score-display {
    font-size: 3rem;
    font-weight: 900;
    color: #1A9E75;
    margin: 12px 0;
  }
  #result-screen p { color: var(--gris); font-size: 1rem; margin-bottom: 20px; }
  #restart-btn {
    padding: 12px 32px;
    background: #5B4FCF;
    color: #fff;
    border: 3px solid #1A1A2E;
    border-radius: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0px #1A1A2E;
    transition: all .2s;
  }
  #restart-btn:hover {
    background: #4a3ebf;
    transform: translate(-1px, -1px);
    box-shadow: 5px 5px 0px #1A1A2E;
  }
  #restart-btn:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0px #1A1A2E;
  }

  #quiz-area { max-width: 720px; margin: 0 auto; }
</style>
</head>
<body>

<div id="quiz-area">
  <header>
    <h1>🤔 Quelle est la bonne question ?</h1>
    <p>Lis le problème et choisis la question qui convient !</p>
  </header>

  <!-- QUIZ -->
  <div id="quiz-section">

    <div id="problem-card">
      <div class="label">📖 Le problème</div>
      <p id="problem-text"></p>
    </div>

    <p id="question-intro">❓ Quelle question se pose à la fin de ce problème ?</p>

    <div id="choices"></div>
    <div id="feedback"></div>
    <button id="next-btn">Question suivante →</button>
  </div>

  <!-- RÉSULTAT FINAL -->
  <div id="result-screen">
    <div class="big-emoji" id="result-emoji">🎉</div>
    <h2 id="result-title">Bravo !</h2>
    <div class="score-display" id="score-display">0 / 10</div>
    <p id="result-msg"></p>
    <button id="restart-btn" onclick="startQuiz()">🔄 Recommencer avec de nouvelles questions</button>
  </div>
</div>

// ═══════════════════════════════════════════════════
//  ÉTAT DU JEU
// ═══════════════════════════════════════════════════
let questions = [];
let current   = 0;
let score     = 0;
let answered  = false;

// ── Sélection aléatoire de 10 questions parmi 50 ──
function pickQuestions() {
  const shuffled = [...BANK].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 10).map(q => {
    // Mélanger les choix (tout en gardant la bonne réponse liée)
    const indexed = q.choices.map((c, i) => ({ text: c, correct: i === q.answer }));
    const shuffledChoices = indexed.sort(() => Math.random() - 0.5);
    return {
      problem: q.problem,
      choices: shuffledChoices.map(c => c.text),
      answer:  shuffledChoices.findIndex(c => c.correct)
    };
  });
}

// ── Lancer / relancer le quiz ──
function startQuiz() {
  questions = pickQuestions();
  current   = 0;
  score     = 0;
  answered  = false;

  document.getElementById('result-screen').style.display  = 'none';
  document.getElementById('quiz-section').style.display   = 'block';

  showQuestion();
}

// ── Afficher la question courante ──
function showQuestion() {
  answered = false;
  const q = questions[current];

  // Progression
  const pct = (current / 10) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `Question ${current + 1} / 10`;

  // Texte problème
  document.getElementById('problem-text').textContent = q.problem;

  // Choix
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  const letters = ['A', 'B', 'C'];
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="badge">${letters[i]}</span><span>${choice}</span>`;
    btn.addEventListener('click', () => handleAnswer(i));
    choicesDiv.appendChild(btn);
  });

  // Reset feedback / bouton
  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
}

// ── Gérer la réponse ──
function handleAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q    = questions[current];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');

  if (chosen === q.answer) {
    score++;
    btns[chosen].classList.add('correct');
    fb.className = 'ok';
    fb.textContent = '✅ Bravo ! C\'est la bonne question !';
  } else {
    btns[chosen].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    fb.className = 'nok';
    fb.textContent = `❌ Pas tout à fait… La bonne question était : "${q.choices[q.answer]}"`;
  }
  fb.style.display = 'block';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'block';
  nextBtn.textContent = current < 9 ? 'Question suivante →' : 'Voir mes résultats 🏆';
}

// ── Passer à la question suivante ──
document.getElementById('next-btn').addEventListener('click', () => {
  current++;
  if (current < 10) {
    showQuestion();
  } else {
    showResult();
  }
});

// ── Afficher l'écran de résultat ──
function showResult() {
  document.getElementById('quiz-section').style.display  = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width    = '100%';

  document.getElementById('score-display').textContent = `${score} / 10`;

  let emoji, title, msg;
  if (score === 10) {
    emoji = '🏆'; title = 'Parfait !';
    msg   = 'Tu as trouvé toutes les bonnes questions ! Tu es un(e) as de la lecture de problèmes !';
  } else if (score >= 8) {
    emoji = '🌟'; title = 'Excellent !';
    msg   = 'Très belle performance ! Tu comprends très bien les problèmes mathématiques.';
  } else if (score >= 6) {
    emoji = '😊'; title = 'Bien joué !';
    msg   = 'Tu t\'en sors bien ! Encore quelques entraînements et tu seras imbattable.';
  } else if (score >= 4) {
    emoji = '💪'; title = 'Continue !';
    msg   = 'Tu progresses ! Relis bien les problèmes avant de choisir ta question.';
  } else {
    emoji = '📚'; title = 'À retenter !';
    msg   = 'N\'abandonne pas ! Relis chaque problème attentivement. Tu y arriveras !';
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent   = msg;

  if (window.parent && window.parent.saveResult) {
    const parentPct = Math.round(score / 10 * 100);
    window.parent.saveResult({
      activity: 'td_quelle_question',
      bookTitle: 'Choisir la bonne question',
      score: score,
      total: 10,
      pct: parentPct,
      date: new Date().toLocaleDateString('fr-BE'),
      time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
    });
  }
}

// ── Démarrage ──
startQuiz();
