<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Participe passé avec Avoir (QCM)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.6;
    text-align: center;
  }

  .q-phrase em {
    font-style: normal;
    color: var(--secondary);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .choice-btn {
    width: 100%;
    padding: 1rem 1.25rem;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: 2.5px solid var(--border);
    background: white;
    color: var(--neutral-dark);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
    transform: translateY(-2px);
  }

  .choice-btn .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: var(--neutral-gray);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .choice-btn:hover:not(:disabled) .opt-letter {
    background: var(--primary);
    color: white;
  }

  .choice-btn.correct {
    border-color: var(--success);
    background: var(--success-light);
    color: #065f46;
  }

  .choice-btn.correct .opt-letter {
    background: var(--success);
    color: white;
  }

  .choice-btn.incorrect {
    border-color: var(--danger);
    background: var(--danger-light);
    color: #991b1b;
  }

  .choice-btn.incorrect .opt-letter {
    background: var(--danger);
    color: white;
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    display: none;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Participe passé avec Avoir</h1>
      <p class="subtitle">Choisis la bonne orthographe du participe passé (sans accords).</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
    </div>

    <div class="choices" id="choices-container">
      <!-- Rempli dynamiquement -->
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="nextQuestion()">➡️ Question suivante</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 40 QUESTIONS
const BANK = [
  { before: "J'ai ", after: " une pomme bien rouge.", verb: "manger", opts: ["mangé", "manger", "mangez"], correct: 0, exp: "Le participe passé du verbe *manger* est *mangé*. Les formes *manger* (infinitif) et *mangez* (présent, 2e pers. pl.) sont incorrectes ici." },
  { before: "Tu as ", after: " tes devoirs à l'heure.", verb: "finir", opts: ["finis", "finit", "fini"], correct: 2, exp: "Avec l'auxiliaire *avoir*, le participe passé du verbe *finir* est *fini* (sans s ni t au singulier masculin sans accord)." },
  { before: "Il a ", after: " son cartable dans l'entrée.", verb: "prendre", opts: ["pri", "pris", "prit"], correct: 1, exp: "Le participe passé de *prendre* prend toujours un **s** final (*pris*) car on dit « prise » au féminin." },
  { before: "Nous avons ", after: " ce joli jeu de cartes.", verb: "choisir", opts: ["choisi", "choisis", "choisit"], correct: 0, exp: "Le participe passé de *choisir* est *choisi* (sans lettre muette finale au masculin)." },
  { before: "Vous avez ", after: " la vérité à votre professeur.", verb: "dire", opts: ["di", "dis", "dit"], correct: 2, exp: "Le participe passé de *dire* se termine par un **t** (*dit*) car on dit « dite » au féminin." },
  { before: "Elles ont ", after: " un magnifique dessin.", verb: "faire", opts: ["fais", "fait", "faites"], correct: 1, exp: "Le participe passé du verbe *faire* est *fait* (se termine par **t** car féminin « faite »)." },
  { before: "J'ai ", after: " ce livre en entier.", verb: "lire", opts: ["lu", "lus", "lut"], correct: 0, exp: "Le participe passé de *lire* est *lu* (au masculin singulier, pas de lettre muette)." },
  { before: "Tu as ", after: " partir plus tôt de la fête.", verb: "vouloir", opts: ["voulu", "voulus", "voulut"], correct: 0, exp: "Le participe passé de *vouloir* est *voulu* (sans lettre muette finale)." },
  { before: "Il a ", after: " un courrier très important.", verb: "écrire", opts: ["écri", "écris", "écrit"], correct: 2, exp: "Le participe passé de *écrire* est *écrit* (se termine par **t** car féminin « écrite »)." },
  { before: "Nous avons ", after: " la poésie en classe.", verb: "apprendre", opts: ["appris", "appri", "apprit"], correct: 0, exp: "Le participe passé de *apprendre* se termine par un **s** (*appris*) car on dit « apprise » au féminin." },
  { before: "Vous avez ", after: " la table pour le dîner.", verb: "mettre", opts: ["mi", "mis", "mit"], correct: 1, exp: "Le participe passé de *mettre* se termine par un **s** (*mis*) car on dit « mise » au féminin." },
  { before: "Elles ont ", after: " le cadeau avec joie.", verb: "ouvrir", opts: ["ouver", "ouverts", "ouvert"], correct: 2, exp: "Le participe passé de *ouvrir* est *ouvert* (se termine par un **t** car féminin « ouverte »)." },
  { before: "J'ai ", after: " une réponse positive par courrier.", verb: "recevoir", opts: ["reçu", "reçut", "reçus"], correct: 0, exp: "Le participe passé de *recevoir* est *reçu* (sans lettre muette finale au masculin)." },
  { before: "Tu as ", after: " dix ans à l'étranger.", verb: "vivre", opts: ["vécu", "vécus", "vécut"], correct: 0, exp: "Le participe passé du verbe *vivre* est *vécu* (sans s ni t finaux au masculin)." },
  { before: "Il a ", after: " à toute vitesse vers la ligne.", verb: "courir", opts: ["couru", "courus", "courut"], correct: 0, exp: "Le participe passé de *courir* est *couru* (sans lettre muette finale au masculin)." },
  { before: "Nous avons ", after: " la clé du garage.", verb: "perdre", opts: ["perdu", "perdus", "perdut"], correct: 0, exp: "Le participe passé du verbe *perdre* est *perdu* (sans accord ici, donc singulier masculin standard)." },
  { before: "Vous avez ", after: " la consigne de l'exercice.", verb: "comprendre", opts: ["compri", "compris", "comprit"], correct: 1, exp: "Le participe passé de *comprendre* prend un **s** (*compris*) car on dit « comprise » au féminin." },
  { before: "Elles ont ", after: " le mur en bleu clair.", verb: "peindre", opts: ["peind", "peins", "peint"], correct: 2, exp: "Le participe passé de *peindre* est *peint* (se termine par un **t** car féminin « peinte »)." },
  { before: "J'ai ", after: " le ballon de football au vol.", verb: "attraper", opts: ["attrapé", "attraper", "attrapez"], correct: 0, exp: "Après l'auxiliaire *avoir*, on utilise le participe passé en **-é** (*attrapé*) et non l'infinitif en *-er*." },
  { before: "Tu as ", after: " toutes tes bougies d'un coup.", verb: "souffler", opts: ["soufflé", "souffler", "soufflez"], correct: 0, exp: "Il faut choisir le participe passé en **-é** (*soufflé*). Astuce : on peut remplacer par *vendu* (« tu as vendu » et non « tu as vendre »)." },
  { before: "Il a ", after: " de cinq centimètres cette année.", verb: "grandi", opts: ["grandi", "grandis", "grandit"], correct: 0, exp: "Le participe passé de *grandi* ne prend aucune lettre muette au singulier masculin." },
  { before: "Nous avons ", after: " dans une tente hier soir.", verb: "dormir", opts: ["dormi", "dormis", "dormit"], correct: 0, exp: "Le participe passé de *dormir* est *dormi* (pas de lettre muette au masculin)." },
  { before: "Vous avez ", after: " de beaux dessins au public.", verb: "offrir", opts: ["offert", "offerts", "offer"], correct: 0, exp: "Le participe passé de *offrir* est *offert* (se termine par **t**, féminin « offerte »)." },
  { before: "Elles ont ", after: " à un mensonge farfelu.", verb: "croire", opts: ["cru", "crus", "crut"], correct: 0, exp: "Le participe passé de *croire* est *cru* (sans lettre muette finale)." },
  { before: "J'ai ", after: " le tracteur de mon oncle.", verb: "conduire", opts: ["conduis", "condui", "conduit"], correct: 2, exp: "Le participe passé de *conduire* est *conduit* (se termine par **t**, féminin « conduite »)." },
  { before: "Tu as ", after: " cette énigme en un clin d'œil.", verb: "résoudre", opts: ["résolu", "résolus", "résolut"], correct: 0, exp: "Le participe passé de *résoudre* est *résolu* (sans lettre muette finale)." },
  { before: "Il a ", after: " sa vieille bicyclette hier.", verb: "vendre", opts: ["vendu", "vendus", "vendut"], correct: 0, exp: "Le participe passé de *vendre* est *vendu* (pas de lettre muette au singulier masculin)." },
  { before: "Nous avons ", after: " le train pendant une heure.", verb: "attendre", opts: ["attendu", "attendus", "attendut"], correct: 0, exp: "Le participe passé de *attendre* est *attendu* (pas de lettre muette au masculin)." },
  { before: "Vous avez ", after: " poliment à la question.", verb: "répondre", opts: ["répondu", "répondus", "répondut"], correct: 0, exp: "Le participe passé de *répondre* est *répondu*." },
  { before: "Elles ont ", after: " patience devant cette attente.", verb: "perdre", opts: ["perdu", "perdus", "perdut"], correct: 0, exp: "Le participe passé de *perdre* est *perdu*." },
  { before: "J'ai ", after: " une tasse de chocolat chaud.", verb: "boire", opts: ["bu", "bus", "but"], correct: 0, exp: "Le participe passé de *boire* est *bu* (sans lettre muette finale au masculin)." },
  { before: "Tu as ", after: " venir grâce au plan.", verb: "pouvoir", opts: ["pu", "pus", "put"], correct: 0, exp: "Le participe passé de *pouvoir* est *pu* (sans lettre muette finale au masculin)." },
  { before: "Il a ", after: " refaire tout son travail.", verb: "devoir", opts: ["dû", "du", "dut"], correct: 0, exp: "Le participe passé de *devoir* prend un accent circonflexe au singulier masculin pour le distinguer du mot « du » : il s'écrit **dû**." },
  { before: "Nous avons ", after: " la bonne odeur du gâteau.", verb: "sentir", opts: ["senti", "sentis", "sentit"], correct: 0, exp: "Le participe passé du verbe *sentir* est *senti* (sans lettre muette au masculin)." },
  { before: "Vous avez ", after: " la sirène des pompiers.", verb: "entendre", opts: ["entendu", "entendus", "entendut"], correct: 0, exp: "Le participe passé de *entendre* est *entendu*." },
  { before: "Elles ont ", after: " une magnifique forteresse.", verb: "bâtir", opts: ["bâti", "bâtis", "bâtit"], correct: 0, exp: "Le participe passé de *bâtir* est *bâti*." },
  { before: "J'ai ", after: " la clé à double tour.", verb: "tourner", opts: ["tourné", "tourner", "tournez"], correct: 0, exp: "Il faut utiliser le participe passé en **-é** (*tourné*) après l'auxiliaire." },
  { before: "Tu as ", after: " tes billes sur le sol.", verb: "jeter", opts: ["jeté", "jeter", "jetez"], correct: 0, exp: "Le participe passé est en **-é** (*jeté*). Astuce : « tu as vendu »." },
  { before: "Il a ", after: " un gros caillou dans l'eau.", verb: "lancer", opts: ["lancé", "lancer", "lancez"], correct: 0, exp: "Il s'agit du participe passé en **-é** (*lancé*)." },
  { before: "Nous avons ", after: " le docteur pour notre chien.", verb: "appeler", opts: ["appelé", "appeler", "appelez"], correct: 0, exp: "On écrit le participe passé en **-é** (*appelé*)." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false,
  answers: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false,
    answers: []
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  
  // Construire la phrase avec un blanc
  document.getElementById('q-phrase').innerHTML = `${q.before} <em>..........</em> ${q.after}<br><small style="font-size:12px;color:var(--neutral-gray);font-weight:700;">Verbe : <strong>${q.verb}</strong></small>`;
  
  const choicesContainer = document.getElementById('choices-container');
  choicesContainer.innerHTML = '';
  
  const letters = ['A', 'B', 'C'];
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = `opt-${idx}`;
    btn.onclick = () => selectOption(idx);
    btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span style="font-weight:900;">${opt}</span>`;
    choicesContainer.appendChild(btn);
  });

  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';
  btnAction.style.display = 'none';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });
}

function selectOption(idx) {
  if (state.submitted) return;
  state.submitted = true;

  const q = state.questions[state.currentIndex];
  const isCorrect = (idx === q.correct);
  
  const btnSelected = document.getElementById(`opt-${idx}`);
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  // Désactiver tous les boutons
  q.opts.forEach((_, i) => {
    document.getElementById(`opt-${i}`).disabled = true;
  });

  // Colorer les boutons
  if (isCorrect) {
    btnSelected.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    btnSelected.classList.add('incorrect');
    document.getElementById(`opt-${q.correct}`).classList.add('correct');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  // Afficher l'explication
  feedback.innerHTML = q.exp.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.style.display = 'block';
  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Parfait ! Tu maîtrises les terminaisons des participes passés avec l'auxiliaire avoir ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Super score ! Tu repères très bien les lettres muettes et les terminaisons. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Bon essai ! Révise les finales des verbes du 3e groupe en pensant à leur féminin (ex: pris -> prise, écrit -> écrite). 👍";
    emoji = '👏';
  } else {
    msg = "Entraîne-toi encore. Pense à remplacer par le verbe 'vendre' pour savoir si la finale est en -é, et vérifie les formes irrégulières ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  // Envoyer le résultat
  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_avoir_qcm'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

window.onload = startExercise;
