<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colorie les fractions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#E6F7F2;
    --bg-2:#D8F1EA;
    --card:#FFFFFF;
    --ink:#173E3A;
    --ink-soft:#4B6F6A;
    --teal:#15B5A4;
    --teal-dark:#0E8C7E;
    --teal-soft:#CFEFEA;
    --fill:#FF7E67;
    --fill-dark:#E85B43;
    --good:#2BB673;
    --good-soft:#DBF5E8;
    --warn:#F2A33C;
    --warn-soft:#FCEFD9;
    --line:#1F4F46;
    --cell-border:#2A4F4B;
    --shadow:0 10px 28px rgba(20,80,72,.14);
    --shadow-sm:0 4px 12px rgba(20,80,72,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Nunito',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #F3FBF9 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #DDF3ED 0%, transparent 60%),
      var(--bg);
    min-height:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:clamp(14px,3vw,40px);
  }
  .app{
    width:min(960px,100%);
    background:var(--card);
    border-radius:30px;
    box-shadow:var(--shadow);
    padding:clamp(18px,3.5vw,40px);
    position:relative;
    overflow:hidden;
  }
  .app::before{
    content:"";position:absolute;inset:0;border-radius:30px;
    border:3px solid #EAF7F4;pointer-events:none;
  }
  h1,h2,h3,.frac,.lvl-name,.dot,.btn{font-family:'Fredoka',sans-serif;}

  /* ---------- HOME ---------- */
  .home{text-align:center;padding:clamp(8px,2vw,24px) 0;}
  .badge{
    display:inline-block;background:var(--teal-soft);color:var(--teal-dark);
    font-weight:700;font-family:'Fredoka';letter-spacing:.5px;
    padding:7px 16px;border-radius:999px;font-size:.85rem;margin-bottom:18px;
  }
  .home h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:700;line-height:1.05;}
  .home h1 .em{color:var(--teal);}
  .home p.sub{color:var(--ink-soft);font-weight:600;max-width:480px;margin:14px auto 30px;font-size:1.05rem;}
  .levels{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:640px;margin:0 auto;}
  @media(max-width:560px){.levels{grid-template-columns:1fr;}}
  .level-card{
    border:none;cursor:pointer;text-align:left;
    background:var(--bg-2);border-radius:24px;padding:24px 22px;
    transition:transform .15s ease, box-shadow .15s ease, background .15s;
    position:relative;overflow:hidden;
  }
  .level-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-sm);background:#CFEFE8;}
  .level-card:focus-visible{outline:3px solid var(--teal);outline-offset:3px;}
  .level-card .lvl-tag{font-family:'Fredoka';font-weight:700;color:var(--teal-dark);font-size:.9rem;}
  .level-card .lvl-name{font-size:1.5rem;font-weight:700;margin:6px 0 8px;}
  .level-card .lvl-desc{color:var(--ink-soft);font-weight:600;font-size:.95rem;line-height:1.4;}
  .level-card .mini{
    margin-top:16px;display:flex;gap:6px;align-items:center;
  }
  .mini .m-cell{width:20px;height:20px;border-radius:5px;border:2px solid var(--cell-border);background:#fff;}
  .mini .m-cell.on{background:var(--fill);border-color:var(--fill-dark);}
  .level-card.l2{background:#E9EFFB;}
  .level-card.l2:hover{background:#DDE7F9;}
  .level-card.l2 .lvl-tag{color:#3B62C9;}
  .level-card.l2 .mini .m-cell.on{background:#6E8BE8;border-color:#3B62C9;}

  /* ---------- PLAY ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
  .home-btn{
    background:var(--teal-soft);color:var(--teal-dark);border:none;cursor:pointer;
    font-family:'Fredoka';font-weight:600;font-size:.95rem;border-radius:999px;padding:9px 16px;
    transition:background .15s;
  }
  .home-btn:hover{background:#BBE7E0;}
  .home-btn:focus-visible{outline:3px solid var(--teal);outline-offset:2px;}
  .progress{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;flex:1;}
  .dot{width:24px;height:24px;border-radius:50%;background:#E4F1EE;border:2px solid #CDE7E2;
    display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#9DBDB7;}
  .dot.done{background:var(--good);border-color:var(--good);color:#fff;}
  .dot.miss{background:var(--warn);border-color:var(--warn);color:#fff;}
  .dot.current{background:#fff;border-color:var(--teal);color:var(--teal-dark);box-shadow:0 0 0 3px var(--teal-soft);}
  .score-pill{background:#FFF3DC;color:#B5791D;font-family:'Fredoka';font-weight:700;border-radius:999px;
    padding:8px 14px;font-size:.95rem;white-space:nowrap;}

  .stage{text-align:center;padding:8px 0 4px;}
  .frac-card{
    display:inline-flex;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;border:3px solid #EAF7F4;border-radius:22px;
    box-shadow:var(--shadow-sm);padding:14px 30px;margin:4px auto 6px;min-width:120px;
  }
  .frac{font-size:clamp(2.6rem,9vw,3.6rem);font-weight:600;line-height:1;color:var(--ink);}
  .frac .num{display:block;}
  .frac .bar{display:block;width:100%;height:5px;background:var(--ink);border-radius:3px;margin:6px 0;}
  .frac .den{display:block;}
  .instruction{font-family:'Fredoka';font-weight:600;font-size:1.25rem;margin:14px 0 4px;}
  .sub-hint{color:var(--ink-soft);font-weight:600;font-size:.95rem;min-height:1.2em;margin-bottom:8px;}

  .shape-wrap{display:flex;justify-content:center;align-items:center;min-height:130px;margin:10px 0 4px;padding:6px;}

  /* bar + grid cells */
  .bar-shape{display:flex;width:min(100%,720px);border:3px solid var(--cell-border);border-radius:10px;overflow:hidden;}
  .bar-shape .cell{flex:1;aspect-ratio:1/1.05;border-right:2px solid var(--cell-border);}
  .bar-shape .cell:last-child{border-right:none;}
  @media(max-width:560px){.bar-shape .cell{aspect-ratio:1/1.6;}}

  .grid-shape{display:grid;gap:0;border:3px solid var(--cell-border);border-radius:12px;overflow:hidden;
    width:min(100%,440px);}
  .grid-shape .cell{aspect-ratio:1/1;border-right:2px solid var(--cell-border);border-bottom:2px solid var(--cell-border);}

  .cell{background:#fff;cursor:pointer;transition:background .12s ease, transform .08s ease;-webkit-tap-highlight-color:transparent;}
  .cell.fill{background:var(--fill);}
  .cell:active{transform:scale(.94);}
  .cell:focus-visible{outline:3px solid var(--teal);outline-offset:-3px;}

  /* circle */
  .circle-shape{width:min(78vw,260px);height:min(78vw,260px);}
  .circle-shape path{stroke:var(--cell-border);stroke-width:3;fill:#fff;cursor:pointer;
    transition:fill .12s ease;-webkit-tap-highlight-color:transparent;}
  .circle-shape path.fill{fill:var(--fill);}
  .circle-shape path:focus-visible{outline:none;stroke:var(--teal);stroke-width:5;}

  .controls{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
  .btn{font-family:'Fredoka';font-weight:600;border:none;cursor:pointer;border-radius:16px;
    padding:13px 26px;font-size:1.1rem;transition:transform .12s, box-shadow .12s, background .15s;}
  .btn:active{transform:translateY(1px);}
  .btn:focus-visible{outline:3px solid var(--teal-dark);outline-offset:2px;}
  .btn-primary{background:var(--teal);color:#fff;box-shadow:0 5px 0 var(--teal-dark);}
  .btn-primary:hover{background:#13A99A;}
  .btn-primary:active{box-shadow:0 2px 0 var(--teal-dark);}
  .btn-ghost{background:#EFF6F4;color:var(--ink-soft);}
  .btn-ghost:hover{background:#E3F0ED;}
  .btn-next{background:var(--good);color:#fff;box-shadow:0 5px 0 #1E9760;}
  .btn-next:hover{background:#27A968;}
  .btn-next:active{box-shadow:0 2px 0 #1E9760;}

  .feedback{min-height:30px;margin-top:14px;font-family:'Fredoka';font-weight:600;font-size:1.15rem;
    opacity:0;transform:translateY(6px);transition:opacity .2s, transform .2s;}
  .feedback.show{opacity:1;transform:none;}
  .feedback.ok{color:var(--good);}
  .feedback.no{color:var(--warn);}

  .pop{animation:pop .35s ease;}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}

  /* ---------- RESULTS ---------- */
  .results{text-align:center;padding:20px 0;}
  .results h2{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:700;}
  .stars{font-size:2.4rem;letter-spacing:6px;margin:10px 0 6px;}
  .score-big{font-family:'Fredoka';font-weight:700;font-size:1.4rem;color:var(--teal-dark);margin-bottom:6px;}
  .results p.msg{color:var(--ink-soft);font-weight:600;max-width:420px;margin:6px auto 24px;font-size:1.05rem;}
  .results .controls{margin-top:8px;}

  .hidden{display:none!important;}
</style>
</head>
<body>
<div class="app">

  <!-- ================= HOME ================= -->
  <section id="home" class="home">
    <span class="badge">MATHS · FRACTIONS</span>
    <h1>Colorie <span class="em">les fractions</span></h1>
    <p class="sub">Lis la fraction, puis clique sur les cases pour la colorier. Choisis ton niveau !</p>
    <div class="levels">
      <button class="level-card" data-level="1">
        <span class="lvl-tag">NIVEAU 1</span>
        <span class="lvl-name">Fractions simples</span>
        <span class="lvl-desc">Le nombre de cases est le même que le dénominateur. Pour <b>2/5</b>, tu colories 2 cases sur 5.</span>
        <span class="mini">
          <span class="m-cell on"></span><span class="m-cell on"></span>
          <span class="m-cell"></span><span class="m-cell"></span><span class="m-cell"></span>
        </span>
      </button>
      <button class="level-card l2" data-level="2">
        <span class="lvl-tag">NIVEAU 2</span>
        <span class="lvl-name">Fractions équivalentes</span>
        <span class="lvl-desc">Il y a plus de cases que le dénominateur. Pour <b>2/5</b>, tu colories 4 cases sur 10.</span>
        <span class="mini">
          <span class="m-cell on"></span><span class="m-cell on"></span><span class="m-cell on"></span><span class="m-cell on"></span>
          <span class="m-cell"></span><span class="m-cell"></span><span class="m-cell"></span><span class="m-cell"></span><span class="m-cell"></span><span class="m-cell"></span>
        </span>
      </button>
    </div>
  </section>

  <!-- ================= PLAY ================= -->
  <section id="play" class="hidden">
    <div class="topbar">
      <button class="home-btn" id="quitBtn">← Accueil</button>
      <div class="progress" id="progress"></div>
      <div class="score-pill" id="scorePill">⭐ 0</div>
    </div>
    <div class="stage">
      <div class="frac-card pop" id="fracCard">
        <span class="frac"><span class="num" id="numEl">2</span><span class="bar"></span><span class="den" id="denEl">5</span></span>
      </div>
      <div class="instruction">Colorie la fraction.</div>
      <div class="sub-hint" id="subHint"></div>
      <div class="shape-wrap" id="shapeWrap"></div>
      <div class="feedback" id="feedback"></div>
      <div class="controls" id="controls">
        <button class="btn btn-ghost" id="clearBtn">Effacer</button>
        <button class="btn btn-primary" id="checkBtn">Valider</button>
        <button class="btn btn-next hidden" id="nextBtn">Suivant →</button>
      </div>
    </div>
  </section>

  <!-- ================= RESULTS ================= -->
  <section id="results" class="results hidden">
    <h2 id="resTitle">Bravo !</h2>
    <div class="stars" id="resStars">⭐⭐⭐</div>
    <div class="score-big" id="resScore">10 / 10</div>
    <p class="msg" id="resMsg"></p>
    <div class="controls">
      <button class="btn btn-ghost" id="resHome">← Accueil</button>
      <button class="btn btn-primary" id="resReplay">Rejouer ce niveau</button>
    </div>
  </section>

</div>

<script>
/* =========================================================
   BANQUES DE FRACTIONS
   chaque item : {num, den, cells, shape, rows, cols}
   - cells = nombre de cases affichées
   - à colorier = num * cells / den
   ========================================================= */

function gridDims(n){
  switch(n){
    case 4: return [2,2];
    case 6: return [2,3];
    case 8: return [2,4];
    case 9: return [3,3];
    case 10:return [2,5];
    case 12:return [3,4];
    default:return [1,n];
  }
}

// ---------- NIVEAU 1 : cases = dénominateur ----------
const RAW_L1 = [
  // barres
  [1,5,'bar'],[2,5,'bar'],[3,5,'bar'],[4,5,'bar'],
  [2,10,'bar'],[3,10,'bar'],[5,10,'bar'],[7,10,'bar'],[9,10,'bar'],[6,10,'bar'],[4,10,'bar'],[8,10,'bar'],
  // grilles
  [1,4,'grid'],[3,4,'grid'],
  [1,6,'grid'],[2,6,'grid'],[4,6,'grid'],[5,6,'grid'],
  [3,8,'grid'],[5,8,'grid'],[7,8,'grid'],
  [4,9,'grid'],[7,9,'grid'],
  [1,12,'grid'],[5,12,'grid'],[7,12,'grid'],[11,12,'grid'],[9,12,'grid'],
  // cercles
  [1,2,'circle'],[1,3,'circle'],[2,3,'circle'],[1,4,'circle'],[3,4,'circle'],
  [1,6,'circle'],[5,6,'circle'],[3,8,'circle'],[5,8,'circle'],[2,5,'circle'],[4,5,'circle']
];

// ---------- NIVEAU 2 : cases = multiple du dénominateur ----------
// [num, den, cells, shape]
const RAW_L2 = [
  // barres
  [1,2,10,'bar'],[1,2,8,'bar'],[1,2,6,'bar'],[1,2,12,'bar'],
  [1,3,6,'bar'],[1,3,9,'bar'],[1,3,12,'bar'],
  [2,3,6,'bar'],[2,3,9,'bar'],[2,3,12,'bar'],
  [1,4,8,'bar'],[1,4,12,'bar'],[3,4,8,'bar'],[3,4,12,'bar'],
  [1,5,10,'bar'],[2,5,10,'bar'],[3,5,10,'bar'],[4,5,10,'bar'],
  [1,6,12,'bar'],[5,6,12,'bar'],
  // grilles
  [1,2,12,'grid'],[1,3,12,'grid'],[2,3,12,'grid'],[3,4,12,'grid'],[1,4,12,'grid'],[5,6,12,'grid'],[1,6,12,'grid'],
  [1,2,6,'grid'],[1,3,6,'grid'],[2,3,6,'grid'],
  [1,2,8,'grid'],[1,4,8,'grid'],[3,4,8,'grid'],
  // cercles
  [1,2,6,'circle'],[1,3,6,'circle'],[2,3,6,'circle'],[1,4,8,'circle'],[3,4,8,'circle'],
  [1,2,10,'circle'],[1,5,10,'circle'],[2,5,10,'circle'],[1,2,4,'circle']
];

function buildBank(raw, isLevel1){
  return raw.map(item=>{
    let num,den,cells,shape;
    if(isLevel1){ [num,den,shape]=item; cells=den; }
    else        { [num,den,cells,shape]=item; }
    const toColor = Math.round(num*cells/den);
    const [rows,cols] = shape==='grid' ? gridDims(cells) : [1,cells];
    return {num,den,cells,toColor,shape,rows,cols};
  });
}

const BANK = {
  1: buildBank(RAW_L1, true),
  2: buildBank(RAW_L2, false)
};

/* =========================================================
   ÉTAT DU JEU
   ========================================================= */
const QUESTIONS_PER_SESSION = 10;
const state = { level:1, queue:[], index:0, score:0, colored:new Set(), checked:false, results:[] };

const $ = id => document.getElementById(id);

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================================================
   NAVIGATION ÉCRANS
   ========================================================= */
function show(screen){
  ['home','play','results'].forEach(s=>$(s).classList.toggle('hidden', s!==screen));
}

function startLevel(level){
  state.level = level;
  state.queue = shuffle(BANK[level]).slice(0, QUESTIONS_PER_SESSION);
  state.index = 0;
  state.score = 0;
  state.results = [];
  show('play');
  renderQuestion();
}

/* =========================================================
   RENDU D'UNE QUESTION
   ========================================================= */
function renderQuestion(){
  const q = state.queue[state.index];
  state.colored = new Set();
  state.checked = false;

  // fraction
  $('numEl').textContent = q.num;
  $('denEl').textContent = q.den;
  const card = $('fracCard');
  card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');

  // pas d'indice : à l'élève de compter les cases et de réfléchir
  $('subHint').textContent = '';

  // boutons
  $('checkBtn').classList.remove('hidden');
  $('clearBtn').classList.remove('hidden');
  $('nextBtn').classList.add('hidden');
  $('feedback').className = 'feedback';
  $('feedback').textContent = '';

  // progression + score
  renderProgress();
  $('scorePill').textContent = '⭐ ' + state.score;

  buildShape(q);
}

function renderProgress(){
  const wrap = $('progress');
  wrap.innerHTML='';
  for(let i=0;i<state.queue.length;i++){
    const d=document.createElement('div');
    d.className='dot';
    if(i<state.results.length){ d.classList.add(state.results[i]?'done':'miss'); d.textContent=state.results[i]?'✓':'•'; }
    else if(i===state.index){ d.classList.add('current'); d.textContent=i+1; }
    else { d.textContent=i+1; }
    wrap.appendChild(d);
  }
}

/* =========================================================
   CONSTRUCTION DES FORMES
   ========================================================= */
function buildShape(q){
  const wrap = $('shapeWrap');
  wrap.innerHTML='';
  if(q.shape==='circle') wrap.appendChild(buildCircle(q));
  else if(q.shape==='grid') wrap.appendChild(buildGrid(q));
  else wrap.appendChild(buildBar(q));
}

function makeCellEl(i){
  const c=document.createElement('button');
  c.className='cell';
  c.type='button';
  c.dataset.i=i;
  c.setAttribute('aria-label','case '+(i+1));
  c.addEventListener('click',()=>toggleCell(i,c));
  return c;
}

function buildBar(q){
  const bar=document.createElement('div');
  bar.className='bar-shape';
  for(let i=0;i<q.cells;i++) bar.appendChild(makeCellEl(i));
  return bar;
}

function buildGrid(q){
  const g=document.createElement('div');
  g.className='grid-shape';
  g.style.gridTemplateColumns=`repeat(${q.cols},1fr)`;
  // retire la bordure droite/bas en trop via CSS sur dernière colonne/ligne
  for(let i=0;i<q.cells;i++){
    const c=makeCellEl(i);
    if((i+1)%q.cols===0) c.style.borderRight='none';
    if(i>=q.cells-q.cols) c.style.borderBottom='none';
    g.appendChild(c);
  }
  return g;
}

function buildCircle(q){
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox','0 0 280 280');
  svg.setAttribute('class','circle-shape');
  const cx=140, cy=140, r=130, n=q.cells;
  if(n===1){
    const circ=document.createElementNS(NS,'circle');
    circ.setAttribute('cx',cx);circ.setAttribute('cy',cy);circ.setAttribute('r',r);
    svg.appendChild(circ);
    return svg;
  }
  for(let i=0;i<n;i++){
    const a0=-Math.PI/2 + i*2*Math.PI/n;
    const a1=-Math.PI/2 + (i+1)*2*Math.PI/n;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const large=(a1-a0)>Math.PI?1:0;
    const path=document.createElementNS(NS,'path');
    path.setAttribute('d',`M ${cx} ${cy} L ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z`);
    path.setAttribute('tabindex','0');
    path.dataset.i=i;
    path.addEventListener('click',()=>toggleCell(i,path));
    path.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleCell(i,path);}});
    svg.appendChild(path);
  }
  return svg;
}

/* =========================================================
   COLORIAGE
   ========================================================= */
function toggleCell(i,el){
  if(state.checked) return; // verrouillé après une bonne réponse
  if(state.colored.has(i)){ state.colored.delete(i); el.classList.remove('fill'); }
  else { state.colored.add(i); el.classList.add('fill'); }
}

function clearCells(){
  if(state.checked) return;
  state.colored.clear();
  $('shapeWrap').querySelectorAll('.fill').forEach(e=>e.classList.remove('fill'));
  $('feedback').className='feedback';
}

/* =========================================================
   VALIDATION
   ========================================================= */
function checkAnswer(){
  if(state.checked) return;
  const q=state.queue[state.index];
  const fb=$('feedback');
  const n=state.colored.size;

  if(n===q.toColor){
    state.checked=true;
    state.score++;
    state.results[state.index]=true;
    fb.textContent='Bravo ! 🎉 C’est exactement ça.';
    fb.className='feedback ok show';
    $('scorePill').textContent='⭐ '+state.score;
    $('checkBtn').classList.add('hidden');
    $('clearBtn').classList.add('hidden');
    $('nextBtn').classList.remove('hidden');
    renderProgress();
  } else {
    // mauvaise réponse : on indique seulement trop / pas assez (sans donner le nombre exact au niveau 2)
    if(n===0){
      fb.textContent='Tu n’as colorié aucune case. Clique sur les cases !';
    } else if(n>q.toColor){
      fb.textContent='Tu as colorié un peu trop de cases. Réessaie ✏️';
    } else {
      fb.textContent='Il n’y a pas encore assez de cases coloriées. Réessaie ✏️';
    }
    fb.className='feedback no show';
    if(state.results[state.index]!==true) state.results[state.index]=state.results[state.index]??null;
  }
}

function nextQuestion(){
  if(state.results[state.index]===undefined || state.results[state.index]===null)
    state.results[state.index]=true; // sécurité
  state.index++;
  if(state.index>=state.queue.length){ showResults(); }
  else { renderQuestion(); }
}

/* =========================================================
   RÉSULTATS
   ========================================================= */
function showResults(){
  show('results');
  const s=state.score, total=state.queue.length;
  $('resScore').textContent=`${s} / ${total}`;
  let stars, title, msg;
  if(s>=9){ stars='⭐⭐⭐'; title='Champion·ne des fractions !'; msg='Tu maîtrises super bien. Tu peux essayer l’autre niveau pour aller plus loin.'; }
  else if(s>=6){ stars='⭐⭐'; title='Très bien joué !'; msg='Tu progresses bien. Rejoue pour viser les trois étoiles !'; }
  else { stars='⭐'; title='Bon entraînement !'; msg='Les fractions, ça s’apprend en s’entraînant. Recommence quand tu veux.'; }
  $('resStars').textContent=stars;
  $('resTitle').textContent=title;
  $('resMsg').textContent=msg;
}

/* =========================================================
   ÉVÉNEMENTS
   ========================================================= */
document.querySelectorAll('.level-card').forEach(b=>
  b.addEventListener('click',()=>startLevel(parseInt(b.dataset.level,10))));
$('checkBtn').addEventListener('click',checkAnswer);
$('clearBtn').addEventListener('click',clearCells);
$('nextBtn').addEventListener('click',nextQuestion);
$('quitBtn').addEventListener('click',()=>show('home'));
$('resHome').addEventListener('click',()=>show('home'));
$('resReplay').addEventListener('click',()=>startLevel(state.level));

show('home');
</script>
</body>
</html>
