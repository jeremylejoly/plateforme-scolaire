<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Participe passé avec Avoir (Écriture)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.8;
    text-align: center;
  }

  .saisie-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 1rem;
    width: 100%;
  }

  .q-input {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    text-align: center;
    border: none;
    border-bottom: 3px solid var(--primary);
    background: transparent;
    outline: none;
    width: 180px;
    padding: 4px 8px;
    transition: all 0.2s;
  }

  .q-input:focus {
    border-bottom-color: var(--secondary);
  }

  .q-input.correct {
    border-bottom-color: var(--success);
    color: var(--success);
  }

  .q-input.incorrect {
    border-bottom-color: var(--danger);
    color: var(--danger);
  }

  .q-input:disabled {
    background: transparent;
  }

  .q-verb-badge {
    margin-top: 1rem;
    display: inline-block;
    background: var(--primary-light);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 8px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    margin-top: 1rem;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Conjugaison avec Avoir</h1>
      <p class="subtitle">Conjugue le verbe au passé composé (auxiliaire + participe passé sans accords).</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
      <div class="saisie-row" id="saisie-row">
        <input type="text" class="q-input" id="q-input" placeholder="Écris la réponse ici..." autocomplete="off" autocorrect="off" spellcheck="false"/>
      </div>
      <div class="q-verb-badge" id="q-verb-badge"></div>
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="handleAction()">✅ Valider</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 30 QUESTIONS
const BANK = [
  { before: "J' ", after: " une bonne tarte aux pommes.", verb: "manger", ans: "ai mangé", exp: "Le verbe *manger* au passé composé donne : *ai mangé*." },
  { before: "Tu ", after: " ton repas très vite.", verb: "finir", ans: "as fini", exp: "Le verbe *finir* donne : *as fini* (pas de lettre muette finale au masculin)." },
  { before: "Il ", after: " un raccourci pour aller à l'école.", verb: "prendre", ans: "a pris", exp: "Le verbe *prendre* donne : *a pris* (se termine par **s** car féminin « prise »)." },
  { before: "Nous ", after: " le bon chemin.", verb: "choisir", ans: "avons choisi", exp: "Le verbe *choisir* donne : *avons choisi* (pas de lettre muette)." },
  { before: "Vous ", after: " une petite bêtise.", verb: "dire", ans: "avez dit", exp: "Le verbe *dire* donne : *avez dit* (se termine par **t** car féminin « dite »)." },
  { before: "Elles ", after: " du ski cet hiver.", verb: "faire", ans: "ont fait", exp: "Le verbe *faire* donne : *ont fait* (se termine par **t** car féminin « faite »)." },
  { before: "J' ", after: " une longue lettre.", verb: "écrire", ans: "ai écrit", exp: "Le verbe *écrire* donne : *ai écrit* (se termine par **t** car féminin « écrite »)." },
  { before: "Tu ", after: " la notice d'utilisation du jeu.", verb: "lire", ans: "as lu", exp: "Le verbe *lire* donne : *as lu*." },
  { before: "Il ", after: " m'aider avec mes cartons.", verb: "vouloir", ans: "a voulu", exp: "Le verbe *vouloir* donne : *a voulu*." },
  { before: "Nous ", after: " cette poésie hier.", verb: "apprendre", ans: "avons appris", exp: "Le verbe *apprendre* donne : *avons appris* (se termine par **s** car féminin « apprise »)." },
  { before: "Vous ", after: " vos jolies chaussures de fête.", verb: "mettre", ans: "avez mis", exp: "Le verbe *mettre* donne : *avez mis* (se termine par **s** car féminin « mise »)." },
  { before: "Elles ", after: " le paquet mystérieux.", verb: "ouvrir", ans: "ont ouvert", exp: "Le verbe *ouvrir* donne : *ont ouvert* (se termine par **t** car féminin « ouverte »)." },
  { before: "J' ", after: " un colis ce matin.", verb: "recevoir", ans: "ai reçu", exp: "Le verbe *recevoir* donne : *ai reçu*." },
  { before: "Tu ", after: " tes clés de maison.", verb: "perdre", ans: "as perdu", exp: "Le verbe *perdre* donne : *as perdu*." },
  { before: "Il ", after: " après le ballon de football.", verb: "courir", ans: "a couru", exp: "Le verbe *courir* donne : *a couru*." },
  { before: "Nous ", after: " la leçon de grammaire.", verb: "comprendre", ans: "avons compris", exp: "Le verbe *comprendre* donne : *avons compris* (se termine par **s** car féminin « comprise »)." },
  { before: "Vous ", after: " le mur du salon.", verb: "peindre", ans: "avez peint", exp: "Le verbe *peindre* donne : *avez peint* (se termine par **t** car féminin « peinte »)." },
  { before: "Elles ", after: " très tard ce matin.", verb: "dormir", ans: "ont dormi", exp: "Le verbe *dormir* donne : *ont dormi*." },
  { before: "J' ", after: " un méchant rhume.", verb: "attraper", ans: "ai attrapé", exp: "Le verbe *attraper* donne : *ai attrapé* (participe passé en **-é**)." },
  { before: "Tu ", after: " les bougies de ton gâteau.", verb: "souffler", ans: "as soufflé", exp: "Le verbe *souffler* donne : *as soufflé*." },
  { before: "Il ", after: " beaucoup ces derniers mois.", verb: "grandir", ans: "a grandi", exp: "Le verbe *grandir* donne : *a grandi*." },
  { before: "Nous ", after: " un jus de fruits bien frais.", verb: "boire", ans: "avons bu", exp: "Le verbe *boire* donne : *avons bu*." },
  { before: "Vous ", after: " un joli cadeau à votre ami.", verb: "offrir", ans: "avez offert", exp: "Le verbe *offrir* donne : *avez offert* (se termine par **t** car féminin « offerte »)." },
  { before: "Elles ", after: " leur promesse.", verb: "tenir", ans: "ont tenu", exp: "Le verbe *tenir* donne : *ont tenu*." },
  { before: "J' ", after: " la bonne réponse tout de suite.", verb: "savoir", ans: "ai su", exp: "Le verbe *savoir* donne : *ai su*." },
  { before: "Tu ", after: " recopier ton texte en entier.", verb: "devoir", ans: "as dû", exp: "Le verbe *devoir* donne : *as dû* (le participe *dû* prend un accent circonflexe au singulier masculin)." },
  { before: "Il ", after: " un magnifique oiseau s'envoler.", verb: "voir", ans: "a vu", exp: "Le verbe *voir* donne : *a vu*." },
  { before: "Nous ", after: " un bruit étrange dehors.", verb: "entendre", ans: "avons entendu", exp: "Le verbe *entendre* donne : *avons entendu*." },
  { before: "Vous ", after: " très poliment.", verb: "répondre", ans: "avez répondu", exp: "Le verbe *répondre* donne : *avez répondu*." },
  { before: "Elles ", after: " le match de justesse.", verb: "perdre", ans: "ont perdu", exp: "Le verbe *perdre* donne : *ont perdu*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--primary);font-weight:900;">[?]</span> ${q.after}`;
  document.getElementById('q-verb-badge').innerHTML = `Verbe à conjuguer : <strong>${q.verb}</strong>`;
  
  const input = document.getElementById('q-input');
  input.value = '';
  input.disabled = false;
  input.className = 'q-input';
  input.placeholder = 'Tape la réponse...';
  
  const feedback = document.getElementById('feedback-box');
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';

  const btnAction = document.getElementById('btn-action');
  btnAction.textContent = '✅ Valider';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });

  setTimeout(() => input.focus(), 100);
}

function handleAction() {
  if (!state.submitted) {
    validateAnswer();
  } else {
    nextQuestion();
  }
}

function validateAnswer() {
  state.submitted = true;
  
  const q = state.questions[state.currentIndex];
  const input = document.getElementById('q-input');
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  const given = input.value.trim().toLowerCase().replace(/\s+/g, ' ');
  const expected = q.ans.trim().toLowerCase();
  const isCorrect = (given === expected);

  input.disabled = true;

  if (isCorrect) {
    input.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    input.classList.add('incorrect');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  // Remplacement des blancs par la bonne réponse
  document.getElementById('q-phrase').innerHTML = `${q.before} <span style="color:var(--success);font-weight:900;border-bottom:2px solid var(--success);">${q.ans}</span> ${q.after}`;

  // Afficher le feedback
  let feedbackText = '';
  if (isCorrect) {
    feedbackText = `🎉 **Bravo !** C'est tout à fait correct.<br>${q.exp}`;
  } else {
    feedbackText = `❌ **Oups !** La bonne réponse était **${q.ans}**.<br>${q.exp}`;
  }

  feedback.innerHTML = feedbackText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Fantastique ! Tu sais écrire parfaitement les formes du passé composé avec avoir ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Super travail d'écriture ! Ta conjugaison est très solide. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Pas mal ! Fais bien attention à l'écriture de l'auxiliaire (ai, as, a, avons, avez, ont) et aux lettres muettes des participes passés. 👍";
    emoji = '👏';
  } else {
    msg = "Continue de t'entraîner. Écris bien l'auxiliaire au présent suivi du participe passé correct. Tu vas y arriver ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  // Envoyer le résultat
  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_avoir_trous'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

// Gérer la touche Entrée pour valider/continuer
document.getElementById('q-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    handleAction();
  }
});

window.onload = startExercise;
</script>
</body>
</html>
