<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Bilan passé composé (QCM)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  :root {
    --primary: #6366f1;
    --primary-light: #e0e7ff;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --secondary-light: #fce7f3;
    --success: #10b981;
    --success-light: #d1fae5;
    --danger: #ef4444;
    --danger-light: #fee2e2;
    --neutral-dark: #1e1b4b;
    --neutral-light: #f8fafc;
    --neutral-gray: #64748b;
    --border: #e2e8f0;
    --shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1), 0 8px 10px -6px rgba(99, 102, 241, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #f1f5f9 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    background: white;
    border-radius: 24px;
    padding: 2rem;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255, 255, 255, 0.8);
    position: relative;
    overflow: hidden;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .title {
    font-family: 'Outfit', sans-serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 700;
    color: var(--neutral-gray);
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--neutral-light);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
  }

  .info-num {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary-dark);
  }

  .dots {
    display: flex;
    gap: 6px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.correct { background: var(--success); }
  .dot.incorrect { background: var(--danger); }
  .dot.current { background: var(--primary); transform: scale(1.2); }

  .question-card {
    background: var(--neutral-light);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 2rem 1.5rem;
    margin-bottom: 1.5rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.3s ease;
  }

  .q-phrase {
    font-size: 18px;
    font-weight: 800;
    color: var(--neutral-dark);
    line-height: 1.6;
    text-align: center;
  }

  .q-phrase em {
    font-style: normal;
    color: var(--secondary);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    margin-bottom: 1rem;
  }

  .choice-btn {
    width: 100%;
    padding: 1rem 1.25rem;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    border-radius: 16px;
    border: 2.5px solid var(--border);
    background: white;
    color: var(--neutral-dark);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
  }

  .choice-btn:hover:not(:disabled) {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
    transform: translateY(-2px);
  }

  .choice-btn .opt-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #f1f5f9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 900;
    color: var(--neutral-gray);
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .choice-btn:hover:not(:disabled) .opt-letter {
    background: var(--primary);
    color: white;
  }

  .choice-btn.correct {
    border-color: var(--success);
    background: var(--success-light);
    color: #065f46;
  }

  .choice-btn.correct .opt-letter {
    background: var(--success);
    color: white;
  }

  .choice-btn.incorrect {
    border-color: var(--danger);
    background: var(--danger-light);
    color: #991b1b;
  }

  .choice-btn.incorrect .opt-letter {
    background: var(--danger);
    color: white;
  }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 1rem 1.25rem;
    margin-top: 1rem;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .feedback-box.correct {
    background: var(--success-light);
    color: #065f46;
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  .feedback-box.incorrect {
    background: var(--danger-light);
    color: #991b1b;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .action-btn {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    transition: all 0.2s;
    display: none;
  }

  .action-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
  }

  .score-screen {
    display: none;
    text-align: center;
    padding: 2rem 1rem;
    animation: zoomIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-emoji {
    font-size: 80px;
    margin-bottom: 1rem;
    animation: bounce 2s infinite;
  }

  .big-score {
    font-family: 'Outfit', sans-serif;
    font-size: 40px;
    font-weight: 900;
    color: var(--neutral-dark);
    margin-bottom: 0.75rem;
  }

  .final-msg {
    font-size: 16px;
    font-weight: 700;
    color: var(--neutral-gray);
    margin-bottom: 2rem;
    line-height: 1.6;
  }

  .restart-btn {
    padding: 1rem 2rem;
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes zoomIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake {
    animation: shake 0.4s ease-in-out;
  }
</style>
</head>
<body>
<div class="container">
  <div id="exercise-zone">
    <div class="header">
      <h1 class="title">Bilan QCM passé composé</h1>
      <p class="subtitle">Mélange Avoir et Être avec tous les cas d'accords.</p>
    </div>

    <div class="info-bar">
      <span class="info-num" id="info-numero">Question 1/10</span>
      <div class="dots" id="dots-progress"></div>
    </div>

    <div class="question-card" id="question-card">
      <p class="q-phrase" id="q-phrase">Chargement de la phrase...</p>
    </div>

    <div class="choices" id="choices-container">
      <!-- Rempli dynamiquement -->
    </div>

    <div class="feedback-box" id="feedback-box"></div>
    <button class="action-btn" id="btn-action" onclick="nextQuestion()">➡️ Question suivante</button>
  </div>

  <div class="score-screen" id="score-screen">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score">10 / 10</div>
    <p class="final-msg" id="final-msg">Félicitations ! Tu as un score parfait.</p>
    <button class="restart-btn" onclick="startExercise()">🔄 Recommencer</button>
  </div>
</div>

<script>
// BANQUE DE 50 QUESTIONS
const BANK = [
  { before: "Elles sont ", after: " à la plage ce midi.", aux: "être", rule: "accord sujet (Elles, f. pl.)", opts: ["allées", "allés", "allé"], correct: 0, exp: "Avec l'auxiliaire *être*, le participe passé s'accorde en genre et nombre avec le sujet (*Elles*, f. pl.) : *allées*." },
  { before: "Nous avons ", after: " de très bons gâteaux.", aux: "avoir", rule: "CDV après (des gâteaux)", opts: ["mangé", "mangée", "mangés"], correct: 0, exp: "Avec *avoir*, pas d'accord quand le CDV (*des gâteaux*) est placé **après** le verbe : *mangé*." },
  { before: "Les jolies fraises que tu as ", after: " étaient délicieuses.", aux: "avoir", rule: "CDV avant (les fraises, f. pl.)", opts: ["mangées", "mangé", "mangés"], correct: 0, exp: "Avec *avoir*, on accorde avec le CDV si celui-ci est placé **avant** (*les fraises*, f. pl.) : *mangées*." },
  { before: "Elle s'est ", after: " de bonne heure ce matin.", aux: "être", rule: "accord sujet (Elle, f. sing.)", opts: ["levée", "levé", "levées"], correct: 0, exp: "Le verbe pronominal s'accorde ici avec le sujet (*Elle*, f. sing.) : *levée*." },
  { before: "Ils ont ", after: " un magnifique ballon de foot.", aux: "avoir", rule: "CDV après (un ballon)", opts: ["acheté", "achetés", "achetée"], correct: 0, exp: "Le CDV *un ballon* est placé après le verbe. Pas d'accord : *acheté*." },
  { before: "La jolie robe qu'elle a ", after: " lui va très bien.", aux: "avoir", rule: "CDV avant (la robe, f. sing.)", opts: ["achetée", "acheté", "achetées"], correct: 0, exp: "Le CDV est *la robe* (f. sing.), placé **avant** le verbe. On accorde : *achetée*." },
  { before: "Les feuilles rousses sont ", after: " dans l'herbe.", aux: "être", rule: "accord sujet (Les feuilles, f. pl.)", opts: ["tombées", "tombé", "tombées"], correct: 0, exp: "Avec *être*, le participe s'accorde avec le sujet (*Les feuilles*, f. pl.) : *tombées*." },
  { before: "Le vent violent a ", after: " les arbres du parc.", aux: "avoir", rule: "CDV après (les arbres)", opts: ["secoué", "secouée", "secoués"], correct: 0, exp: "Le CDV *les arbres* est placé après. Pas d'accord : *secoué*." },
  { before: "Les branches que le vent a ", after: " jonchent le sol.", aux: "avoir", rule: "CDV avant (les branches, f. pl.)", opts: ["secouées", "secoué", "secoués"], correct: 0, exp: "Le CDV *les branches* (f. pl.) est placé **avant** le verbe. On accorde : *secouées*." },
  { before: "Nous (filles) sommes ", after: " très tard hier soir.", aux: "être", rule: "accord sujet (Nous, f. pl.)", opts: ["parties", "partis", "parti"], correct: 0, exp: "Avec l'auxiliaire *être*, le participe s'accorde avec le sujet (*Nous*, f. pl.) : *parties*." },
  { before: "Vous avez ", after: " la bonne réponse.", aux: "avoir", rule: "CDV après (la réponse)", opts: ["dit", "dis", "di"], correct: 0, exp: "Le CDV *la bonne réponse* est placé après. Pas d'accord : *dit*." },
  { before: "Les mots gentils qu'il a ", after: " nous ont fait plaisir.", aux: "avoir", rule: "CDV avant (les mots, m. pl.)", opts: ["dits", "dit", "dise"], correct: 0, exp: "Le CDV est *les mots* (m. pl.) placé **avant**. On accorde au masculin pluriel : *dits*." },
  { before: "Elle est ", after: " une grande pianiste.", aux: "être", rule: "accord sujet (Elle, f. sing.)", opts: ["devenue", "devenu", "devenus"], correct: 0, exp: "Avec *être*, le participe s'accorde avec le sujet (*Elle*, f. sing.) : *devenue*." },
  { before: "Ils ont ", after: " leur match de tennis.", aux: "avoir", rule: "CDV après (leur match)", opts: ["fini", "finis", "finit"], correct: 0, exp: "Le CDV est après. Pas d'accord : *fini*." },
  { before: "La course que tu as ", after: " était épuisante.", aux: "avoir", rule: "CDV avant (la course, f. sing.)", opts: ["finie", "fini", "finis"], correct: 0, exp: "Le CDV est *la course* (f. sing.) placé **avant**. On accorde : *finie*." },
  { before: "Les garçons sont ", after: " fatigués de leur journée.", aux: "être", rule: "accord sujet (Les garçons, m. pl.)", opts: ["arrivés", "arrivé", "arrivée"], correct: 0, exp: "Avec *être*, on accorde au masculin pluriel : *arrivés*." },
  { before: "Vous avez ", after: " toutes les consignes de sécurité.", aux: "avoir", rule: "CDV après (les consignes)", opts: ["lu", "lus", "lut"], correct: 0, exp: "Le CDV est après. Pas d'accord : *lu*." },
  { before: "Les histoires drôles que nous avons ", after: " nous ont fait rire.", aux: "avoir", rule: "CDV avant (les histoires, f. pl.)", opts: ["lues", "lu", "lus"], correct: 0, exp: "Le CDV est *les histoires* (f. pl.) placé **avant**. On accorde : *lues*." },
  { before: "La chienne est ", after: " dans la cour de récréation.", aux: "être", rule: "accord sujet (La chienne, f. sing.)", opts: ["descendue", "descendu", "descendues"], correct: 0, exp: "Avec *être*, le participe s'accorde au féminin singulier : *descendue*." },
  { before: "Ils ont ", after: " la partie d'échecs de justesse.", aux: "avoir", rule: "CDV après (la partie)", opts: ["perdu", "perdus", "perdut"], correct: 0, exp: "Le CDV est après. Pas d'accord : *perdu*." },
  { before: "Les clés de voiture qu'elle a ", after: " sont sur la commode.", aux: "avoir", rule: "CDV avant (les clés, f. pl.)", opts: ["perdues", "perdu", "perdue"], correct: 0, exp: "Le CDV est *les clés* (f. pl.) placé **avant** le verbe. On accorde : *perdues*." },
  { before: "Elle s'est ", after: " sur le canapé chaud.", aux: "être", rule: "accord sujet (Elle, f. sing.)", opts: ["endormie", "endormi", "endormis"], correct: 0, exp: "Avec l'auxiliaire *être*, le participe s'accorde au féminin singulier : *endormie*." },
  { before: "Nous avons ", after: " la barrière du jardin en blanc.", aux: "avoir", rule: "CDV après (la barrière)", opts: ["peint", "peins", "peind"], correct: 0, exp: "Le CDV est après le verbe. Pas d'accord : *peint*." },
  { before: "La clôture blanche que vous avez ", after: " est superbe.", aux: "avoir", rule: "CDV avant (la clôture, f. sing.)", opts: ["peinte", "peint", "peintes"], correct: 0, exp: "Le CDV est *la clôture* (f. sing.) placé **avant**. On accorde : *peinte*." },
  { before: "Les oiseaux migrateurs sont ", after: " ce matin.", aux: "être", rule: "accord sujet (Les oiseaux, m. pl.)", opts: ["partis", "parti", "partie"], correct: 0, exp: "Avec *être*, accord avec le sujet (*Les oiseaux*, m. pl.) : *partis*." },
  { before: "Elles ont ", after: " une longue carte postale.", aux: "avoir", rule: "CDV après (une carte)", opts: ["écrit", "écrite", "écriras"], correct: 0, exp: "Le CDV est placé après. Pas d'accord : *écrit*." },
  { before: "Les lettres qu'elles ont ", after: " sont déjà arrivées.", aux: "avoir", rule: "CDV avant (les lettres, f. pl.)", opts: ["écrites", "écrit", "écrite"], correct: 0, exp: "Le CDV est *les lettres* (f. pl.) placé **avant** le verbe. On accorde : *écrites*." },
  { before: "La vieille reine est ", after: " dans son château.", aux: "être", rule: "accord sujet (La reine, f. sing.)", opts: ["morte", "mort", "mortes"], correct: 0, exp: "Avec *être*, accord au féminin singulier : *morte*." },
  { before: "Ils ont ", after: " jouer dehors malgré la pluie.", aux: "avoir", rule: "pas de CDV direct", opts: ["voulu", "voulus", "voulut"], correct: 0, exp: "Le verbe *vouloir* n'a pas de CDV ici. Le participe passé reste invariable : *voulu*." },
  { before: "La décision sage que j'ai ", after: " a porté ses fruits.", aux: "avoir", rule: "CDV avant (la décision, f. sing.)", opts: ["prise", "pris", "prises"], correct: 0, exp: "Le CDV est *la décision* (f. sing.) placé **avant**. On accorde : *prise*." },
  { before: "Elle a ", after: " son grand manteau noir.", aux: "avoir", rule: "CDV après (son manteau)", opts: ["pris", "prise", "prises"], correct: 0, exp: "Le CDV est placé après le verbe. Pas d'accord : *pris*." },
  { before: "Les petites filles sont ", after: " à l'école à pied.", aux: "être", rule: "accord sujet (Les filles, f. pl.)", opts: ["venues", "venus", "venu"], correct: 0, exp: "Avec *être*, accord au féminin pluriel : *venues*." },
  { before: "Vous avez ", after: " mon dernier message ?", aux: "avoir", rule: "CDV après (mon message)", opts: ["reçu", "reçus", "reçut"], correct: 0, exp: "Le CDV est après. Pas d'accord : *reçu*." },
  { before: "La lettre recommandée que vous avez ", after: " était urgente.", aux: "avoir", rule: "CDV avant (la lettre, f. sing.)", opts: ["reçue", "reçu", "reçues"], correct: 0, exp: "Le CDV est *la lettre* (f. sing.) placé **avant**. On accorde : *reçue*." },
  { before: "Il est ", after: " de son vélo ce matin.", aux: "être", rule: "accord sujet (Il, m. sing.)", opts: ["tombé", "tombée", "tombés"], correct: 0, exp: "Avec *être*, accord avec le sujet (*Il*, m. sing.) : *tombé*." },
  { before: "Les fruits sur l'arbre ont ", after: " rapidement avec la chaleur.", aux: "avoir", rule: "pas de CDV", opts: ["mûri", "mûris", "mûrit"], correct: 0, exp: "Le verbe *mûrir* n'a pas de CDV. Pas d'accord : *mûri*." },
  { before: "Les cerises rouges qu'il a ", after: " sont délicieuses.", aux: "avoir", rule: "CDV avant (les cerises, f. pl.)", opts: ["cueillies", "cueilli", "cueillis"], correct: 0, exp: "Le CDV est *les cerises* (f. pl.) placé **avant**. On accorde : *cueillies*." },
  { before: "Elle s'est ", after: " dans les allées fleuries.", aux: "être", rule: "accord sujet (Elle, f. sing.)", opts: ["promenée", "promené", "promenées"], correct: 0, exp: "Avec l'auxiliaire *être*, on accorde au féminin singulier : *promenée*." },
  { before: "Nous avons ", after: " un cri venant de la rue.", aux: "avoir", rule: "CDV après (un cri)", opts: ["entendu", "entendus", "entendut"], correct: 0, exp: "Le CDV est placé après le verbe. Pas d'accord : *entendu*." },
  { before: "La jolie chanson que j'ai ", after: " m'a rappelé des souvenirs.", aux: "avoir", rule: "CDV avant (la chanson, f. sing.)", opts: ["entendue", "entendu", "entendues"], correct: 0, exp: "Le CDV est *la chanson* (f. sing.) placé **avant**. On accorde : *entendue*." },
  { before: "Les petits garçons se sont ", after: " bien chaudement.", aux: "être", rule: "accord sujet (Les garçons, m. pl.)", opts: ["habillés", "habillé", "habillée"], correct: 0, exp: "Avec *être*, on accorde au masculin pluriel : *habillés*." },
  { before: "Elle a ", after: " patience devant cette attente.", aux: "avoir", rule: "CDV après (patience)", opts: ["perdu", "perdue", "perdues"], correct: 0, exp: "Le CDV est placé après. Pas d'accord : *perdu*." },
  { before: "La montre en or égarée a été ", after: " sous le lit.", aux: "être", rule: "accord sujet (La montre, f. sing.)", opts: ["retrouvée", "retrouvé", "retrouvée"], correct: 0, exp: "La tournure passive avec *être* impose l'accord avec le sujet (*La montre*, f. sing.) : *retrouvée*." },
  { before: "Ils ont ", after: " un très beau château de sable.", aux: "avoir", rule: "CDV après (un château)", opts: ["construit", "construite", "construites"], correct: 0, exp: "Le CDV est placé après le verbe. Pas d'accord : *construit*." },
  { before: "Les cabanes dans les arbres que vous avez ", after: " sont solides.", aux: "avoir", rule: "CDV avant (les cabanes, f. pl.)", opts: ["construites", "construit", "construite"], correct: 0, exp: "Le CDV est *les cabanes* (f. pl.) placé **avant** le verbe. On accorde : *construites*." },
  { before: "La petite fillette est ", after: " près de sa maman.", aux: "être", rule: "accord sujet (La fillette, f. sing.)", opts: ["restée", "resté", "restées"], correct: 0, exp: "Avec *être*, on accorde au féminin singulier : *restée*." },
  { before: "J'ai ", after: " une bonne boisson fraîche.", aux: "avoir", rule: "CDV après (une boisson)", opts: ["bu", "bue", "bues"], correct: 0, exp: "Le CDV est placé après le verbe. Pas d'accord : *bu*." },
  { before: "Les bouteilles vides que nous avons ", after: " sont recyclables.", aux: "avoir", rule: "CDV avant (les bouteilles, f. pl.)", opts: ["bues", "bu", "bue"], correct: 0, exp: "Le CDV est *les bouteilles* (f. pl.) placé **avant**. On accorde : *bues*." },
  { before: "Ils sont ", after: " de leur voyage scolaire.", aux: "être", rule: "accord sujet (Ils, m. pl.)", opts: ["revenus", "revenu", "revenue"], correct: 0, exp: "Avec *être*, accord avec le sujet (*Ils*, m. pl.) : *revenus*." },
  { before: "Elle a ", after: " une tarte succulente.", aux: "avoir", rule: "CDV après (une tarte)", opts: ["fait", "fais", "faites"], correct: 0, exp: "Le CDV est placé après. Pas d'accord : *fait*." }
];

let state = {
  questions: [],
  currentIndex: 0,
  score: 0,
  submitted: false,
  answers: []
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExercise() {
  const selected = shuffle(BANK).slice(0, 10);
  
  state = {
    questions: selected,
    currentIndex: 0,
    score: 0,
    submitted: false,
    answers: []
  };

  document.getElementById('exercise-zone').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  
  const progress = document.getElementById('dots-progress');
  progress.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    progress.appendChild(dot);
  }

  showQuestion();
}

function showQuestion() {
  state.submitted = false;
  const q = state.questions[state.currentIndex];
  
  document.getElementById('info-numero').textContent = `Question ${state.currentIndex + 1} / 10`;
  document.getElementById('q-phrase').innerHTML = `${q.before} <em>..........</em> ${q.after}<br><small style="font-size:12px;color:var(--neutral-gray);font-weight:700;">Auxiliaire : <strong>${q.aux}</strong> · Règle : <strong>${q.rule}</strong></small>`;
  
  const choicesContainer = document.getElementById('choices-container');
  choicesContainer.innerHTML = '';
  
  const letters = ['A', 'B', 'C'];
  q.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.id = `opt-${idx}`;
    btn.onclick = () => selectOption(idx);
    btn.innerHTML = `<span class="opt-letter">${letters[idx]}</span> <span style="font-weight:900;">${opt}</span>`;
    choicesContainer.appendChild(btn);
  });

  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  
  feedback.style.display = 'none';
  feedback.className = 'feedback-box';
  feedback.innerHTML = '';
  btnAction.style.display = 'none';

  const dots = document.querySelectorAll('.dot');
  dots.forEach((dot, idx) => {
    dot.classList.remove('current');
    if (idx === state.currentIndex) dot.classList.add('current');
  });
}

function selectOption(idx) {
  if (state.submitted) return;
  state.submitted = true;

  const q = state.questions[state.currentIndex];
  const isCorrect = (idx === q.correct);
  
  const btnSelected = document.getElementById(`opt-${idx}`);
  const feedback = document.getElementById('feedback-box');
  const btnAction = document.getElementById('btn-action');
  const card = document.getElementById('question-card');
  const dots = document.querySelectorAll('.dot');

  q.opts.forEach((_, i) => {
    document.getElementById(`opt-${i}`).disabled = true;
  });

  if (isCorrect) {
    btnSelected.classList.add('correct');
    state.score++;
    dots[state.currentIndex].className = 'dot correct';
  } else {
    btnSelected.classList.add('incorrect');
    document.getElementById(`opt-${q.correct}`).classList.add('correct');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 400);
    dots[state.currentIndex].className = 'dot incorrect';
  }

  feedback.innerHTML = q.exp.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  feedback.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.style.display = 'block';

  btnAction.style.display = 'block';
  btnAction.textContent = state.currentIndex === 9 ? "🏁 Terminer" : "➡️ Question suivante";
}

function nextQuestion() {
  if (state.currentIndex < 9) {
    state.currentIndex++;
    showQuestion();
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('exercise-zone').style.display = 'none';
  
  const scoreScreen = document.getElementById('score-screen');
  const finalScore = document.getElementById('final-score');
  const finalMsg = document.getElementById('final-msg');
  const finalEmoji = document.getElementById('final-emoji');
  
  scoreScreen.style.display = 'block';
  finalScore.textContent = `${state.score} / 10`;

  let msg = '';
  let emoji = '🎉';
  
  if (state.score === 10) {
    msg = "Magnifique ! Score parfait, tu es un véritable maître du passé composé ! 🏆";
    emoji = '👑';
    triggerConfetti();
  } else if (state.score >= 8) {
    msg = "Super travail ! Tu as très bien assimilé les différences d'accords avec avoir et être. 🌟";
    emoji = '🎉';
  } else if (state.score >= 5) {
    msg = "Bon score ! Fais bien attention : avec 'être' on accorde avec le sujet, avec 'avoir' on accorde avec le CDV s'il est placé avant. 👍";
    emoji = '👏';
  } else {
    msg = "Il y a encore des confusions sur ce bilan. Prends le temps de relire les fiches d'explication et réessaie ! 💪";
    emoji = '✍️';
  }

  finalMsg.textContent = msg;
  finalEmoji.textContent = emoji;

  try {
    const pct = Math.round((state.score / 10) * 100);
    const dateStr = new Date().toLocaleDateString('fr-BE');
    window.parent.postMessage({
      type: 'fiche_result',
      score: state.score,
      total: 10,
      pct: pct,
      date: dateStr,
      activity: 'fiche_conj_pc_mix_qcm'
    }, '*');
  } catch (e) {
    console.warn("Impossible d'envoyer le score:", e);
  }
}

function triggerConfetti() {
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 }
    });
  }
}

window.onload = startExercise;
</script>
