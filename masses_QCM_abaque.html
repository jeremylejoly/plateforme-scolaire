<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Masses — Conversions QCM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f5f6fa; padding: 1.5rem; }
.container { max-width: 680px; margin: 0 auto; }

.info-card {
  background: #dbeafe; border: 1px solid #3b82f6;
  border-radius: 12px; padding: .8rem 1rem; margin-bottom: 1.5rem;
  display: flex; justify-content: space-between; align-items: center;
}
.info-card p { font-size: 13px; color: #1d4ed8; font-weight: 700; margin: 0; }
.dots { display: flex; gap: 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }

.question-card {
  background: white; border-radius: 16px; padding: 1.75rem 1.5rem;
  margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.08);
  border: 2px solid #e5e7eb; transition: all .2s;
}

.q-label {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .05em; color: #9ca3af; margin-bottom: .6rem;
  text-align: center;
}
.q-nombre {
  font-size: 32px; font-weight: 900; color: #1e1b4b;
  text-align: center; margin-bottom: .5rem;
}
.q-texte {
  font-size: 15px; color: #6b7280; text-align: center;
  margin-bottom: 1.5rem; font-weight: 600;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  padding: 12px 18px; border-radius: 12px;
  border: 2px solid #e5e7eb; background: white;
  font-size: 16px; font-weight: 800; color: #374151;
  cursor: pointer; text-align: left;
  font-family: 'Nunito', sans-serif;
  transition: all .15s; display: flex; align-items: center; gap: 12px;
}
.opt-btn:hover:not(:disabled) { border-color: #3b82f6; background: #dbeafe; color: #1d4ed8; }
.opt-btn .opt-letter {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f3f4f6; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 900;
  color: #6b7280; flex-shrink: 0; transition: all .15s;
}
.opt-btn:hover:not(:disabled) .opt-letter { background: #3b82f6; color: white; }
.opt-btn.correct { border-color: #16a34a; background: #f0fdf4; color: #166534; }
.opt-btn.correct .opt-letter { background: #16a34a; color: white; }
.opt-btn.incorrect { border-color: #dc2626; background: #fff5f5; color: #991b1b; }
.opt-btn.incorrect .opt-letter { background: #dc2626; color: white; }
.opt-btn.disabled-neutral { border-color: #e5e7eb; color: #9ca3af; background: white; }

.btn {
  width: 100%; padding: 12px; background: #3b82f6; color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: background .2s; margin-bottom: .75rem;
}
.btn:hover { background: #2563eb; }

.score-final {
  display: none; text-align: center; padding: 2rem;
  background: white; border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.1);
}
.big-emoji { font-size: 64px; margin-bottom: .5rem; }
.big-score { font-size: 36px; font-weight: 900; margin-bottom: 1rem; }
.score-detail { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; line-height: 2; }
</style>
</head>
<body>
<div class="container">
  <div id="exercice-zone">
    <div class="info-card">
      <p id="info-numero">Question 1/10</p>
      <div class="dots" id="dots-progress"></div>
    </div>
    <div id="question-zone"></div>
    <button class="btn" id="btn-suivant" style="display:none" onclick="suivant()">➡️ Question suivante</button>
  </div>

  <div class="score-final" id="score-final">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score"></div>
    <div class="score-detail" id="final-detail"></div>
    <button class="btn" onclick="demarrer()">🔄 Recommencer</button>
  </div>
</div>

<script>
const QUESTIONS = [
  { nombre:"3 kg",      texte:"c'est la même chose que",  opts:["300 g","3000 g","3 dag"],         correct:1 },
  { nombre:"500 g",     texte:"c'est la même chose que",  opts:["5 kg","50 dag","0,5 kg"],          correct:2 },
  { nombre:"2,5 kg",    texte:"c'est la même chose que",  opts:["250 g","2500 g","25 dag"],         correct:1 },
  { nombre:"¼ kg",      texte:"c'est la même chose que",  opts:["25 g","250 g","2500 g"],           correct:1 },
  { nombre:"½ kg",      texte:"c'est la même chose que",  opts:["50 g","5000 g","500 g"],           correct:2 },
  { nombre:"4000 g",    texte:"c'est la même chose que",  opts:["40 kg","400 kg","4 kg"],           correct:2 },
  { nombre:"750 g",     texte:"c'est la même chose que",  opts:["¾ kg","½ kg","¼ kg"],              correct:0 },
  { nombre:"3,5 kg",    texte:"c'est la même chose que",  opts:["35 g","350 g","3500 g"],           correct:2 },
  { nombre:"1 t",       texte:"c'est la même chose que",  opts:["100 kg","1000 kg","10000 kg"],     correct:1 },
  { nombre:"2500 kg",   texte:"c'est la même chose que",  opts:["25 t","2,5 t","250 t"],            correct:1 },
  { nombre:"½ t",       texte:"c'est la même chose que",  opts:["50 kg","5000 kg","500 kg"],        correct:2 },
  { nombre:"1 dag",     texte:"c'est la même chose que",  opts:["1 g","100 g","10 g"],              correct:2 },
  { nombre:"50 hg",     texte:"c'est la même chose que",  opts:["500 g","5 kg","50 kg"],            correct:1 },
  { nombre:"¼ t",       texte:"c'est la même chose que",  opts:["25 kg","2500 kg","250 kg"],        correct:2 },
  { nombre:"0,1 kg",    texte:"c'est la même chose que",  opts:["1 g","10 g","100 g"],              correct:2 },
  { nombre:"1 g",       texte:"c'est la même chose que",  opts:["10 mg","1000 mg","100 mg"],        correct:1 },
  { nombre:"500 mg",    texte:"c'est la même chose que",  opts:["5 g","0,5 g","50 g"],              correct:1 },
  { nombre:"1 cg",      texte:"c'est la même chose que",  opts:["1 mg","10 mg","100 mg"],           correct:1 },
  { nombre:"250 mg",    texte:"c'est la même chose que",  opts:["0,25 g","2,5 g","25 g"],           correct:0 },
  { nombre:"0,1 g",     texte:"c'est la même chose que",  opts:["1 mg","100 mg","10 mg"],           correct:1 },
  { nombre:"1 q",       texte:"c'est la même chose que",  opts:["10 kg","100 kg","1000 kg"],        correct:1 },
  { nombre:"5 q",       texte:"c'est la même chose que",  opts:["50 kg","500 kg","5000 kg"],        correct:1 },
  { nombre:"734 kg",    texte:"c'est la même chose que",  opts:["0,734 t","7,34 t","73,4 q"],       correct:0 },
  { nombre:"½ q",       texte:"c'est la même chose que",  opts:["5 kg","500 kg","50 kg"],           correct:2 },
  { nombre:"¼ q",       texte:"c'est la même chose que",  opts:["250 kg","2,5 kg","25 kg"],         correct:2 },
  { nombre:"10 q",      texte:"c'est la même chose que",  opts:["100 kg","10000 kg","1 t"],         correct:2 },
  { nombre:"2,5 q",     texte:"c'est la même chose que",  opts:["25 kg","2500 kg","250 kg"],        correct:2 },
  { nombre:"3500 g",    texte:"c'est la même chose que",  opts:["35 kg","3,5 kg","350 dag"],        correct:1 },
  { nombre:"0,25 kg",   texte:"c'est la même chose que",  opts:["250 g","25 g","2500 g"],           correct:0 },
  { nombre:"1,5 t",     texte:"c'est la même chose que",  opts:["150 kg","15000 kg","1500 kg"],     correct:2 },
  { nombre:"6 kg",      texte:"c'est la même chose que",  opts:["600 g","6000 g","60 dag"],         correct:1 },
  { nombre:"200 dag",   texte:"c'est la même chose que",  opts:["20 g","20000 g","2 kg"],           correct:2 },
  { nombre:"¾ kg",      texte:"c'est la même chose que",  opts:["75 g","7500 g","750 g"],           correct:2 },
  { nombre:"4,5 t",     texte:"c'est la même chose que",  opts:["450 kg","45000 kg","4500 kg"],     correct:2 },
  { nombre:"125 g",     texte:"c'est la même chose que",  opts:["⅛ kg","¼ kg","½ kg"],              correct:0 },
  { nombre:"1 hg",      texte:"c'est la même chose que",  opts:["10 g","1000 g","100 g"],           correct:2 },
  { nombre:"5 hg",      texte:"c'est la même chose que",  opts:["50 g","5000 g","500 g"],           correct:2 },
  { nombre:"0,5 t",     texte:"c'est la même chose que",  opts:["50 kg","5000 kg","500 kg"],        correct:2 },
  { nombre:"300 hg",    texte:"c'est la même chose que",  opts:["3 kg","300 kg","30 kg"],           correct:2 },
  { nombre:"2 dag",     texte:"c'est la même chose que",  opts:["2 g","200 g","20 g"],              correct:2 },
  { nombre:"¼ g",       texte:"c'est la même chose que",  opts:["25 mg","2500 mg","250 mg"],        correct:2 },
  { nombre:"0,001 t",   texte:"c'est la même chose que",  opts:["10 kg","100 kg","1 kg"],           correct:2 },
  { nombre:"7500 g",    texte:"c'est la même chose que",  opts:["75 kg","7,5 kg","750 dag"],        correct:1 },
  { nombre:"0,75 kg",   texte:"c'est la même chose que",  opts:["75 g","7500 g","750 g"],           correct:2 },
  { nombre:"1250 g",    texte:"c'est la même chose que",  opts:["1,25 kg","12,5 kg","125 dag"],     correct:0 },
  { nombre:"3 t",       texte:"c'est la même chose que",  opts:["300 kg","3000 q","30 q"],          correct:2 },
  { nombre:"0,5 dag",   texte:"c'est la même chose que",  opts:["50 mg","500 mg","5 g"],            correct:2 },
  { nombre:"600 kg",    texte:"c'est la même chose que",  opts:["60 q","6 q","0,6 q"],              correct:1 },
  { nombre:"2 cg",      texte:"c'est la même chose que",  opts:["2 mg","200 mg","20 mg"],           correct:2 },
  { nombre:"0,3 g",     texte:"c'est la même chose que",  opts:["3 mg","3000 mg","300 mg"],         correct:2 },
];

const LETTRES = ['A','B','C'];
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

let selection=[], curIdx=0, scores=[];

function demarrer(){
  selection = shuffle(QUESTIONS).slice(0,10);
  curIdx=0; scores=[];
  document.getElementById('score-final').style.display='none';
  document.getElementById('exercice-zone').style.display='block';
  afficherQuestion();
}

function afficherQuestion(){
  const q = selection[curIdx];

  document.getElementById('info-numero').textContent = `Question ${curIdx+1}/10`;
  document.getElementById('dots-progress').innerHTML =
    selection.map((_,i) => `<div class="dot" style="background:${i<curIdx?'#16a34a':i===curIdx?'#3b82f6':'#d1d5db'}"></div>`).join('');

  const optsHtml = q.opts.map((o,i) => `
    <button class="opt-btn" id="opt-${i}" onclick="choisir(${i})">
      <span class="opt-letter">${LETTRES[i]}</span>
      <span>${o}</span>
    </button>`).join('');

  document.getElementById('question-zone').innerHTML = `
    <div class="question-card" id="qcard">
      <div class="q-label">⚖️ Conversion de masses</div>
      <div class="q-nombre">${q.nombre}</div>
      <div class="q-texte">${q.texte}</div>
      <div class="options">${optsHtml}</div>
    </div>`;

  document.getElementById('btn-suivant').style.display='none';
}

function choisir(idx){
  const q = selection[curIdx];
  const ok = (idx === q.correct);
  scores.push(ok);

  // Désactiver tous les boutons
  q.opts.forEach((_,i) => {
    const btn = document.getElementById('opt-'+i);
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === idx && !ok) btn.classList.add('incorrect');
    else btn.classList.add('disabled-neutral');
  });

  const isLast = (curIdx >= 9);
  const btn = document.getElementById('btn-suivant');
  btn.style.display = 'block';
  btn.textContent = isLast ? '🏁 Voir mon score final' : '➡️ Question suivante';
  btn.onclick = isLast ? afficherScoreFinal : suivant;
}

function suivant(){ curIdx++; afficherQuestion(); }

function afficherScoreFinal(){
  document.getElementById('exercice-zone').style.display='none';
  const sf = document.getElementById('score-final'); sf.style.display='block';
  const ok = scores.filter(Boolean).length, total = scores.length;
  const pct = Math.round(ok/total*100);
  document.getElementById('final-emoji').textContent = pct===100?'🎉':pct>=60?'👍':'💪';
  document.getElementById('final-score').textContent = `${ok}/${total} — ${pct}%`;
  document.getElementById('final-score').style.color = pct===100?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
  document.getElementById('final-detail').innerHTML =
    scores.map((s,i) => `Q${i+1} : ${s?'✅':'❌'}`).join('  ');
}

demarrer();
</script>
</body>
</html>
