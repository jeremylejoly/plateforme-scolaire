<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polygones — Caractéristiques</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f5f6fa; padding: 1.5rem; }
.container { max-width: 680px; margin: 0 auto; }
.info-card { background:#ede9fe;border:1px solid #8b5cf6;border-radius:12px;padding:.8rem 1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center; }
.info-card p { font-size:13px;color:#6d28d9;font-weight:700;margin:0; }
.dots { display:flex;gap:6px; }
.dot { width:12px;height:12px;border-radius:50%; }
.question-card { background:white;border-radius:16px;padding:1.75rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e5e7eb; }
.q-label { font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:.75rem;text-align:center; }
.q-texte { font-size:16px;font-weight:800;color:#1e1b4b;margin-bottom:1.5rem;text-align:center;line-height:1.5; }
.options { display:flex;flex-direction:column;gap:8px; }
.opt-btn { padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;background:white;font-size:14px;font-weight:700;color:#374151;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:10px; }
.opt-btn:hover:not(:disabled) { border-color:#8b5cf6;background:#ede9fe;color:#6d28d9; }
.opt-btn .opt-letter { width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#6b7280;flex-shrink:0;transition:all .15s; }
.opt-btn:hover:not(:disabled) .opt-letter { background:#8b5cf6;color:white; }
.opt-btn.correct { border-color:#16a34a;background:#f0fdf4;color:#166534; }
.opt-btn.correct .opt-letter { background:#16a34a;color:white; }
.opt-btn.incorrect { border-color:#dc2626;background:#fff5f5;color:#991b1b; }
.opt-btn.incorrect .opt-letter { background:#dc2626;color:white; }
.opt-btn.disabled-neutral { border-color:#e5e7eb;color:#9ca3af; }
.btn { width:100%;padding:12px;background:#8b5cf6;color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .2s;margin-bottom:.75rem; }
.btn:hover { background:#7c3aed; }
.score-final { display:none;text-align:center;padding:2rem;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.1); }
.big-emoji { font-size:64px;margin-bottom:.5rem; }
.big-score { font-size:36px;font-weight:900;margin-bottom:1rem; }
.score-detail { font-size:13px;color:#6b7280;margin-bottom:1.5rem;line-height:2; }
</style>
</head>
<body>
<div class="container">
  <div id="exercice-zone">
    <div class="info-card">
      <p id="info-numero">Question 1/10</p>
      <div class="dots" id="dots-progress"></div>
    </div>
    <div id="question-zone"></div>
    <button class="btn" id="btn-suivant" style="display:none" onclick="suivant()">➡️ Question suivante</button>
  </div>
  <div class="score-final" id="score-final">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score"></div>
    <div class="score-detail" id="final-detail"></div>
    <button class="btn" onclick="demarrer()">🔄 Recommencer</button>
  </div>
</div>
<script>
const QUESTIONS = [
  // Style 1 — nombre de côtés → nom
  { q:"Un polygone à 6 côtés est...",
    opts:["un pentagone","un hexagone","un octogone"], correct:1 },
  { q:"Un polygone à 8 côtés est...",
    opts:["un hexagone","un heptagone","un octogone"], correct:2 },
  { q:"Un polygone à 5 côtés est...",
    opts:["un quadrilatère","un pentagone","un hexagone"], correct:1 },
  { q:"Un polygone à 7 côtés est...",
    opts:["un hexagone","un heptagone","un octogone"], correct:1 },
  { q:"Un polygone à 10 côtés est...",
    opts:["un octogone","un heptagone","un décagone"], correct:2 },
  { q:"Un polygone à 12 côtés est...",
    opts:["un décagone","un heptagone","un dodécagone"], correct:2 },
  { q:"Un polygone à 4 côtés est...",
    opts:["un triangle","un quadrilatère","un pentagone"], correct:1 },
  // Style 2 — nom → nombre de côtés
  { q:"Un hexagone a...",
    opts:["5 côtés","7 côtés","6 côtés"], correct:2 },
  { q:"Un pentagone a...",
    opts:["4 côtés","6 côtés","5 côtés"], correct:2 },
  { q:"Un octogone a...",
    opts:["6 côtés","10 côtés","8 côtés"], correct:2 },
  { q:"Un heptagone a...",
    opts:["6 côtés","8 côtés","7 côtés"], correct:2 },
  { q:"Un décagone a...",
    opts:["8 côtés","12 côtés","10 côtés"], correct:2 },
  { q:"Un dodécagone a...",
    opts:["10 côtés","14 côtés","12 côtés"], correct:2 },
  { q:"Un quadrilatère a...",
    opts:["3 côtés","5 côtés","4 côtés"], correct:2 },
  // Style 3 — polygone régulier
  { q:"Un polygone régulier a...",
    opts:["tous ses angles différents","tous ses côtés différents","tous ses côtés égaux et tous ses angles égaux"], correct:2 },
  { q:"Un carré est un quadrilatère...",
    opts:["irrégulier","quelconque","régulier"], correct:2 },
  { q:"Un hexagone régulier a tous ses angles qui mesurent...",
    opts:["90°","108°","120°"], correct:2 },
  { q:"Un pentagone régulier a tous ses angles qui mesurent...",
    opts:["90°","120°","108°"], correct:2 },
  { q:"Un carré a tous ses angles qui mesurent...",
    opts:["45°","120°","90°"], correct:2 },
  { q:"Un triangle équilatéral est un triangle régulier car...",
    opts:["il a 1 angle droit","il a 3 angles différents","il a 3 côtés égaux et 3 angles de 60°"], correct:2 },
  // Style 4 — caractéristiques
  { q:"Laquelle de ces affirmations est vraie ?",
    opts:["Tous les quadrilatères sont des carrés","Tous les hexagones sont réguliers","Tous les carrés sont des quadrilatères"], correct:2 },
  { q:"Un polygone est une figure géométrique...",
    opts:["avec des côtés courbes","ouverte","fermée avec des côtés droits"], correct:2 },
  { q:"Un rectangle est un quadrilatère...",
    opts:["avec 3 côtés égaux","avec tous ses côtés égaux","avec 4 angles droits"], correct:2 },
  { q:"Parmi ces figures, laquelle n'est PAS un polygone ?",
    opts:["un hexagone","un pentagone","un cercle"], correct:2 },
  { q:"Combien d'angles a un décagone ?",
    opts:["8","12","10"], correct:2 },
  { q:"Un dodécagone a le même nombre de côtés que...",
    opts:["2 pentagones","2 hexagones","2 heptagones"], correct:1 },
  { q:"Laquelle de ces affirmations est vraie ?",
    opts:["Un pentagone a plus de côtés qu'un hexagone","Un octogone a moins de côtés qu'un heptagone","Un décagone a plus de côtés qu'un octogone"], correct:2 },
  { q:"Un heptagone a plus de côtés que...",
    opts:["un octogone","un décagone","un hexagone"], correct:2 },
  { q:"Lequel de ces polygones a le plus grand nombre de côtés ?",
    opts:["un heptagone","un octogone","un dodécagone"], correct:2 },
  { q:"Lequel de ces polygones a le moins grand nombre de côtés ?",
    opts:["un hexagone","un pentagone","un quadrilatère"], correct:2 },
];

const LETTRES = ['A','B','C'];
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

function shuffleQ(q){
  const pairs = q.opts.map((o,i)=>({o, isCorrect: i===q.correct}));
  const shuffled = shuffle(pairs);
  return { q: q.q, opts: shuffled.map(p=>p.o), correct: shuffled.findIndex(p=>p.isCorrect) };
}

let selection=[], curIdx=0, scores=[];

function demarrer(){
  selection = shuffle([...QUESTIONS]).slice(0,10).map(shuffleQ);
  curIdx=0; scores=[];
  document.getElementById('score-final').style.display='none';
  document.getElementById('exercice-zone').style.display='block';
  afficherQuestion();
}

function afficherQuestion(){
  const q = selection[curIdx];
  document.getElementById('info-numero').textContent = `Question ${curIdx+1}/10`;
  document.getElementById('dots-progress').innerHTML =
    selection.map((_,i)=>`<div class="dot" style="background:${i<curIdx?'#16a34a':i===curIdx?'#8b5cf6':'#d1d5db'}"></div>`).join('');

  const optsHtml = q.opts.map((o,i)=>`
    <button class="opt-btn" id="opt-${i}" onclick="choisir(${i},${q.correct})">
      <span class="opt-letter">${LETTRES[i]}</span><span>${o}</span>
    </button>`).join('');

  document.getElementById('question-zone').innerHTML = `
    <div class="question-card">
      <div class="q-label">🔷 Caractéristiques des polygones</div>
      <div class="q-texte">${q.q}</div>
      <div class="options">${optsHtml}</div>
    </div>`;
  document.getElementById('btn-suivant').style.display='none';
}

function choisir(idx, correct){
  const ok=(idx===correct);
  scores.push(ok);
  for(let i=0;i<3;i++){
    const b=document.getElementById('opt-'+i);
    if(!b) continue; b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===idx&&!ok) b.classList.add('incorrect');
    else b.classList.add('disabled-neutral');
  }
  const isLast=curIdx>=9;
  const btn=document.getElementById('btn-suivant');
  btn.style.display='block';
  btn.textContent=isLast?'🏁 Voir mon score final':'➡️ Question suivante';
  btn.onclick=isLast?afficherScoreFinal:suivant;
}

function suivant(){ curIdx++; afficherQuestion(); }

function afficherScoreFinal(){
  document.getElementById('exercice-zone').style.display='none';
  const sf=document.getElementById('score-final'); sf.style.display='block';
  const ok=scores.filter(Boolean).length, total=scores.length;
  const pct=Math.round(ok/total*100);
  document.getElementById('final-emoji').textContent=pct===100?'🎉':pct>=60?'👍':'💪';
  document.getElementById('final-score').textContent=`${ok}/${total} — ${pct}%`;
  document.getElementById('final-score').style.color=pct===100?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
  document.getElementById('final-detail').innerHTML=scores.map((s,i)=>`Q${i+1} : ${s?'✅':'❌'}`).join('  ');
}

demarrer();
</script>
</body>
</html>
