<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Le Géomètre des Carreaux — Aire sur Quadrillage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --border: #334155;
      --primary: #06b6d4;
      --primary-glow: rgba(6,182,212,0.22);
      --accent: #f59e0b;
      --green: #10b981;
      --red: #f43f5e;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --cell-fill: rgba(6,182,212,0.25);
      --cell-stroke: #06b6d4;
      --half-fill: rgba(245,158,11,0.3);
      --half-stroke: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; justify-content: center;
      padding: 1.25rem;
    }
    .container { width: 100%; max-width: 640px; }

    header { text-align: center; margin-bottom: 1rem; }
    h1 {
      font-family: 'Outfit', sans-serif; font-size: 1.7rem; font-weight: 800;
      background: linear-gradient(135deg, #67e8f9, #06b6d4, #0891b2);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.2rem;
    }
    .subtitle { color: var(--muted); font-size: 0.87rem; }

    .scorebar {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(15,23,42,0.7); border: 1px solid var(--border);
      border-radius: 14px; padding: 0.7rem 1.1rem; margin-bottom: 1rem;
    }
    .sb-block { display: flex; align-items: center; gap: 0.45rem; }
    .sb-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing:.05em; color: var(--muted); }
    .sb-val { font-family: 'Outfit', sans-serif; font-size: 1.35rem; font-weight: 700; color: var(--accent); }
    .prog-track { flex:1; height:6px; background:rgba(51,65,85,.5); border-radius:99px; margin:0 1rem; overflow:hidden; }
    .prog-bar { height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#22d3ee); border-radius:99px; transition:width .5s ease; }

    .figure-desc {
      background: rgba(30,41,59,0.6); border: 1px solid var(--border);
      border-radius: 14px; padding: 0.85rem 1.1rem; margin-bottom: 0.85rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .figure-icon { font-size: 1.6rem; }
    .figure-name { font-weight: 700; font-size: 0.98rem; }
    .figure-hint { font-size: 0.81rem; color: var(--muted); margin-top: 0.1rem; }

    .legend { display: flex; gap: 1rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 0.38rem; font-size: 0.79rem; color: var(--muted); }
    .legend-swatch { width: 15px; height: 15px; border-radius: 3px; border: 2px solid; }
    .ls-full   { background: var(--cell-fill);         border-color: var(--cell-stroke); }
    .ls-half   { background: var(--half-fill);         border-color: var(--half-stroke); }
    .ls-figure { background: rgba(99,102,241,0.18);    border-color: #818cf8; }

    .grid-wrapper { display: flex; justify-content: center; margin-bottom: 1rem; }
    svg#grid-svg {
      border: 2px solid var(--border); border-radius: 14px;
      background: #0f1f38; display: block;
      max-width: 100%; height: auto;
    }

    .answer-row {
      display: flex; gap: 0.75rem; align-items: center;
      margin-bottom: 0.9rem; flex-wrap: wrap;
    }
    .answer-label { font-weight: 600; font-size: 0.93rem; white-space: nowrap; }
    .answer-input {
      width: 88px; padding: 0.5rem 0.7rem;
      background: rgba(15,23,42,0.8); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Outfit', sans-serif; font-size: 1.2rem; font-weight: 700;
      text-align: center; outline: none; transition: border-color .2s;
    }
    .answer-input:focus { border-color: var(--primary); }
    .answer-input:disabled { opacity: .5; }
    .answer-unit { color: var(--muted); font-size: 0.88rem; }
    .btn-validate {
      padding: 0.55rem 1.3rem;
      background: linear-gradient(135deg, var(--primary), #0891b2);
      border: none; border-radius: 10px; color: white;
      font-family: 'Outfit', sans-serif; font-size: 0.97rem; font-weight: 700;
      cursor: pointer; transition: all .2s; box-shadow: 0 4px 14px var(--primary-glow);
    }
    .btn-validate:hover { transform:translateY(-2px); }
    .btn-validate:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    .feedback {
      border-radius: 13px; padding: 0.9rem 1.1rem; margin-bottom: 0.9rem;
      display: flex; gap: 0.75rem; align-items: flex-start;
      animation: slideUp .3s ease forwards;
    }
    .fb-correct { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.35); }
    .fb-wrong   { background:rgba(244,63,94,.1);  border:1px solid rgba(244,63,94,.35); }
    .fb-icon { font-size: 1.4rem; flex-shrink:0; }
    .fb-title { font-weight:700; font-size:.97rem; }
    .fb-correct .fb-title { color:#34d399; }
    .fb-wrong   .fb-title { color:#fb7185; }
    .fb-text { font-size:.86rem; color:#cbd5e1; margin-top:.2rem; line-height:1.5; }

    .btn-next {
      width:100%; padding:.8rem;
      background:linear-gradient(135deg,var(--primary),#0891b2);
      border:none; border-radius:12px; color:white;
      font-family:'Outfit',sans-serif; font-size:1rem; font-weight:700;
      cursor:pointer; transition:all .2s; box-shadow:0 4px 14px var(--primary-glow);
      display:flex; align-items:center; justify-content:center; gap:.5rem;
    }
    .btn-next:hover { transform:translateY(-2px); }

    .congrats { text-align:center; padding:2.5rem 1rem; animation: scaleIn .5s cubic-bezier(.34,1.56,.64,1) forwards; }
    .trophy { font-size:4rem; display:inline-block; animation:float 3s ease-in-out infinite; margin-bottom:.75rem; }
    .congrats-title { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:800; color:var(--accent); margin-bottom:.6rem; }
    .congrats-msg { color:var(--muted); font-size:.98rem; max-width:420px; margin:0 auto 1.4rem; line-height:1.6; }
    .stars { font-size:2rem; margin-bottom:1.5rem; }
    .btn-replay {
      background:linear-gradient(135deg,var(--green),#059669);
      border:none; color:white; font-family:'Outfit',sans-serif;
      font-size:1rem; font-weight:700; padding:.8rem 2rem;
      border-radius:12px; cursor:pointer;
      box-shadow:0 4px 14px rgba(16,185,129,.3);
      display:inline-flex; align-items:center; gap:.5rem; transition:all .2s;
    }
    .btn-replay:hover { transform:translateY(-2px); }

    @keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes scaleIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  </style>
</head>
<body>
<div class="container">
  <div id="game-flow">
    <header>
      <h1>🟩 Le Géomètre des Carreaux</h1>
      <p class="subtitle">Compte les carreaux pour trouver l'aire de la figure.</p>
    </header>

    <div class="scorebar">
      <div class="sb-block">
        <span class="sb-label">Figure</span>
        <span class="sb-val" id="q-num">1</span>
        <span style="color:var(--muted);font-family:'Outfit',sans-serif;font-size:.95rem;">/10</span>
      </div>
      <div class="prog-track"><div class="prog-bar" id="prog-bar"></div></div>
      <div class="sb-block">
        <span class="sb-label">Score</span>
        <span class="sb-val" id="score-disp">0</span>
        <span style="color:var(--muted);font-family:'Outfit',sans-serif;font-size:.95rem;">/10</span>
      </div>
    </div>

    <div class="figure-desc">
      <div class="figure-icon" id="fig-icon">📐</div>
      <div>
        <div class="figure-name" id="fig-name">Chargement…</div>
        <div class="figure-hint" id="fig-hint">Chaque carreau = 1 cm²</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-swatch ls-figure"></div> Figure à mesurer</div>
      <div class="legend-item"><div class="legend-swatch ls-full"></div> Carreau plein = 1 cm²</div>
      <div class="legend-item"><div class="legend-swatch ls-half"></div> Demi-carreau = 0,5 cm²</div>
    </div>

    <div class="grid-wrapper">
      <svg id="grid-svg"></svg>
    </div>

    <div class="answer-row">
      <span class="answer-label">Aire de la figure :</span>
      <input type="number" id="aire-input" class="answer-input" min="0" step="0.5" placeholder="?">
      <span class="answer-unit">cm²</span>
      <button class="btn-validate" id="btn-val" onclick="validateAnswer()">✓ Valider</button>
    </div>

    <div id="feedback-area"></div>
    <div id="next-area"></div>
  </div>

  <div id="congrats-flow" style="display:none">
    <div class="congrats">
      <div class="trophy">🏆</div>
      <h2 class="congrats-title">Mission accomplie !</h2>
      <p class="congrats-msg" id="congrats-msg"></p>
      <div class="stars" id="stars"></div>
      <button class="btn-replay" onclick="resetGame()">🔄 Recommencer</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// CONFIG — grille 8×7, carreaux 70 px
// Aire maximale de toutes les figures : 30 cm²
// ════════════════════════════════════════════════
const COLS    = 8;
const ROWS    = 7;
const CELL    = 70;          // pixels par carreau (grand !)
const SVG_W   = COLS * CELL; // 560 px
const SVG_H   = ROWS * CELL; // 490 px
const TOTAL_Q = 10;

// ════════════════════════════════════════════════
// 50 FIGURES — coordonnées [col, rangée], 0-indexed
// Toutes les aires ont été vérifiées par la formule
// du lacet (shoelace) ou décomposition géométrique.
// ════════════════════════════════════════════════
const FIGURES = [

  // ── RECTANGLES & CARRÉS ──────────────────────
  {
    icon:'⬛', name:'Un rectangle',
    hint:'Longueur × largeur.',
    points:[[1,1],[5,1],[5,4],[1,4]], area:12
  },
  {
    icon:'🟦', name:'Un carré',
    hint:'Toutes les rangées ont la même longueur.',
    points:[[2,1],[6,1],[6,5],[2,5]], area:16
  },
  {
    icon:'⬛', name:'Un rectangle horizontal',
    hint:'Large et peu haut.',
    points:[[1,2],[6,2],[6,5],[1,5]], area:15
  },
  {
    icon:'⬛', name:'Un petit rectangle',
    hint:'Base × hauteur.',
    points:[[2,2],[5,2],[5,6],[2,6]], area:12
  },
  {
    icon:'🟦', name:'Un grand carré',
    hint:'Côté 5 — compte bien !',
    points:[[1,1],[6,1],[6,6],[1,6]], area:25
  },
  {
    icon:'⬛', name:'Un rectangle aplati',
    hint:'Long et fin.',
    points:[[1,3],[7,3],[7,5],[1,5]], area:12
  },
  {
    icon:'⬛', name:'Un bandeau vertical',
    hint:'Étroit et haut.',
    points:[[3,1],[5,1],[5,6],[3,6]], area:10
  },
  {
    icon:'⬛', name:'Un mini-rectangle',
    hint:'Tout petit — bien compter !',
    points:[[2,2],[6,2],[6,4],[2,4]], area:8
  },

  // ── TRIANGLES ────────────────────────────────
  {
    icon:'🔺', name:'Un triangle rectangle',
    hint:'C\'est la moitié d\'un rectangle 4×4.',
    points:[[1,6],[5,6],[1,2]], area:8
  },
  {
    icon:'🔺', name:'Un triangle rectangle',
    hint:'Base en bas, pointe en haut à droite.',
    points:[[3,6],[7,6],[7,2]], area:8
  },
  {
    icon:'🔺', name:'Un triangle isocèle',
    hint:'La pointe est exactement au milieu de la base.',
    points:[[1,7],[7,7],[4,1]], area:18
  },
  {
    icon:'🔺', name:'Un grand triangle',
    hint:'Base 6, hauteur 4.',
    points:[[1,6],[7,6],[4,2]], area:12
  },
  {
    icon:'🔺', name:'Un triangle rectangle',
    hint:'Base et hauteur valent chacune 6.',
    points:[[1,7],[7,7],[7,1]], area:18
  },
  {
    icon:'🔺', name:'Un triangle centré',
    hint:'Base 4, hauteur 4.',
    points:[[2,6],[6,6],[4,2]], area:8
  },
  {
    icon:'🔺', name:'Un triangle aplati',
    hint:'Grande base, faible hauteur.',
    points:[[1,7],[7,7],[4,3]], area:12
  },
  {
    icon:'🔺', name:'Un petit triangle rectangle',
    hint:'Côté vertical à gauche.',
    points:[[2,7],[6,7],[2,3]], area:8
  },

  // ── TRAPÈZES ─────────────────────────────────
  {
    icon:'🔷', name:'Un trapèze',
    hint:'(Grande base + Petite base) × hauteur ÷ 2.',
    points:[[1,6],[7,6],[6,2],[2,2]], area:20
    // Grande base 6, petite base 4, hauteur 4 → (6+4)/2×4 = 20
  },
  {
    icon:'🔷', name:'Un petit trapèze',
    hint:'Grande base 4, petite base 2, hauteur 3.',
    points:[[2,6],[6,6],[5,3],[3,3]], area:9
    // (4+2)/2×3 = 9
  },
  {
    icon:'🔷', name:'Un trapèze isocèle',
    hint:'Symétrique — même pente des deux côtés.',
    points:[[1,7],[7,7],[6,4],[2,4]], area:15
    // Grande base 6, petite base 4, hauteur 3 → (6+4)/2×3 = 15
  },
  {
    icon:'🔷', name:'Un trapèze rectangle',
    hint:'Un côté est vertical, l\'autre est penché.',
    points:[[1,5],[6,5],[5,2],[2,2]], area:12
    // Grande base 5, petite base 3, hauteur 3 → (5+3)/2×3 = 12
  },
  {
    icon:'🔷', name:'Un trapèze aplati',
    hint:'Peu de hauteur, grande base.',
    points:[[2,6],[7,6],[6,4],[3,4]], area:8
    // Grande base 5, petite base 3, hauteur 2 → (5+3)/2×2 = 8
  },
  {
    icon:'🔷', name:'Un grand trapèze',
    hint:'Grande base 6, petite base 2, hauteur 4.',
    points:[[1,6],[7,6],[5,2],[3,2]], area:16
    // (6+2)/2×4 = 16
  },

  // ── PARALLÉLOGRAMMES ─────────────────────────
  {
    icon:'◆', name:'Un parallélogramme',
    hint:'Base × hauteur. Les bords obliques ont des demi-carreaux.',
    points:[[1,6],[5,6],[7,2],[3,2]], area:16
    // base 4, hauteur 4 = 16
  },
  {
    icon:'◆', name:'Un parallélogramme penché',
    hint:'Décompose-le en un rectangle + 2 triangles.',
    points:[[2,6],[6,6],[8,2],[4,2]], area:16
    // base 4, hauteur 4 = 16
  },
  {
    icon:'◆', name:'Un parallélogramme court',
    hint:'Large et peu haut.',
    points:[[1,5],[6,5],[7,2],[2,2]], area:15
    // base 5, hauteur 3 = 15
  },
  {
    icon:'◆', name:'Un parallélogramme étroit',
    hint:'Base étroite, grande hauteur.',
    points:[[2,6],[5,6],[7,2],[4,2]], area:12
    // base 3, hauteur 4 = 12
  },
  {
    icon:'◆', name:'Un losange',
    hint:'(Diagonale₁ × Diagonale₂) ÷ 2.',
    points:[[4,1],[7,4],[4,7],[1,4]], area:18
    // d1=6, d2=6 → 36/2 = 18
  },
  {
    icon:'◆', name:'Un petit losange',
    hint:'Diagonales 4 et 6.',
    points:[[4,1],[6,4],[4,7],[2,4]], area:12
    // d1=4, d2=6 → 24/2 = 12
  },

  // ── FIGURES EN L & CROIX ─────────────────────
  {
    icon:'🅻', name:'Une figure en L',
    hint:'Décompose-la en deux rectangles.',
    points:[[1,1],[4,1],[4,4],[6,4],[6,7],[1,7]], area:24
    // Rect 3×5=15 + Rect 2×3=9 → 24... wait: [1,1]-[4,7]=3×6=18, [4,4]-[6,7]=2×3=6 → 24
  },
  {
    icon:'🅻', name:'Une figure en L inversé',
    hint:'Deux rectangles bout à bout.',
    points:[[1,1],[7,1],[7,4],[4,4],[4,7],[1,7]], area:27
    // [1,1]-[7,4]=6×3=18, [1,4]-[4,7]=3×3=9 → 27
  },
  {
    icon:'🅻', name:'Un T majuscule',
    hint:'Barre horizontale + tige verticale.',
    points:[[1,1],[7,1],[7,3],[5,3],[5,7],[3,7],[3,3],[1,3]], area:20
    // Top 6×2=12, stem 2×4=8 → 20
  },
  {
    icon:'🅻', name:'Un + (croix)',
    hint:'Barre verticale + barre horizontale.',
    points:[[3,1],[5,1],[5,3],[7,3],[7,5],[5,5],[5,7],[3,7],[3,5],[1,5],[1,3],[3,3]], area:20
    // Vertical 2×6=12, Horizontal 6×2=12, Centre 2×2=4 → 12+12-4 = 20
  },
  {
    icon:'🅻', name:'Un escalier à 3 marches',
    hint:'Monte de gauche à droite.',
    points:[[1,7],[1,5],[3,5],[3,3],[5,3],[5,1],[7,1],[7,7]], area:24
    // Shoelace vérifié = 24
  },

  // ── LETTRES ──────────────────────────────────
  {
    icon:'🅷', name:'Un H majuscule',
    hint:'Deux piliers et une barre du milieu.',
    points:[[1,1],[3,1],[3,3],[5,3],[5,1],[7,1],[7,7],[5,7],[5,5],[3,5],[3,7],[1,7]], area:28
    // Pilier G 2×6=12, Pilier D 2×6=12, Barre 2×2=4 → 28
  },
  {
    icon:'🅲', name:'Un C majuscule',
    hint:'Un grand rectangle avec une encoche à droite.',
    points:[[1,1],[6,1],[6,3],[3,3],[3,5],[6,5],[6,7],[1,7]], area:24
    // Rect 5×6=30, Trou 3×2=6 → 24
  },
  {
    icon:'🅵', name:'Un F majuscule',
    hint:'Colonne gauche + barre du haut + barre du milieu.',
    points:[[1,1],[7,1],[7,3],[3,3],[3,4],[6,4],[6,6],[3,6],[3,7],[1,7]], area:26
    // Gauche 2×6=12, Haut 4×2=8, Milieu 3×2=6 → 26
  },
  {
    icon:'🅾', name:'Un U',
    hint:'Deux piliers verticaux reliés en bas.',
    points:[[1,1],[3,1],[3,5],[5,5],[5,1],[7,1],[7,7],[1,7]], area:28
    // Pilier G 2×6=12, Pilier D 2×6=12, Fond 2×2=4 → 28
  },
  {
    icon:'🅻', name:'Un double escalier',
    hint:'Monte puis descend.',
    points:[[1,1],[3,1],[3,3],[5,3],[5,5],[7,5],[7,7],[1,7]], area:24
    // Shoelace vérifié = 24
  },

  // ── PENTAGONES & FORMES COMPOSÉES ────────────
  {
    icon:'🔶', name:'Une maison (pentagone)',
    hint:'Un rectangle avec un triangle au-dessus.',
    points:[[2,7],[6,7],[6,4],[4,2],[2,4]], area:16
    // Rect 4×3=12, Triangle b=4,h=2=4 → 16
  },
  {
    icon:'🔶', name:'Un bouclier',
    hint:'Rectangle + triangle en pointe.',
    points:[[1,6],[7,6],[7,3],[4,1],[1,3]], area:24
    // Rect 6×3=18, Triangle b=6,h=2=6 → 24
  },
  {
    icon:'🔶', name:'Une flèche vers la droite',
    hint:'Comme un panneau de direction.',
    points:[[1,2],[6,2],[8,4],[6,6],[1,6]], area:24
    // Rect 5×4=20, Triangle b=4,h=2=4 → 24
  },
  {
    icon:'🔶', name:'Un hexagone',
    hint:'6 côtés.',
    points:[[2,1],[5,1],[6,3],[6,5],[5,7],[2,7],[1,5],[1,3]], area:26
    // Shoelace vérifié = 26
  },
  {
    icon:'🔶', name:'Un octogone',
    hint:'8 côtés, comme un panneau STOP.',
    points:[[2,1],[5,1],[6,2],[6,6],[5,7],[2,7],[1,6],[1,2]], area:28
    // Rect 5×6=30, 4 triangles 0,5 cm² → 28
  },
  {
    icon:'🔶', name:'Un pentagone asymétrique',
    hint:'Décompose en rectangle + triangle.',
    points:[[1,7],[7,7],[7,3],[5,1],[1,3]], area:30
    // Rect 6×4=24, Triangle b=6,h=2 / 2 =6 → 30
  },
  {
    icon:'🔶', name:'Une étoile à 4 branches',
    hint:'Carré central + 4 triangles.',
    points:[[4,1],[5,3],[7,4],[5,5],[4,7],[3,5],[1,4],[3,3]], area:12
    // Shoelace vérifié = 12
  },
  {
    icon:'🅻', name:'Un L avec grande aile',
    hint:'Barre verticale + carré en bas à droite.',
    points:[[1,1],[5,1],[5,5],[7,5],[7,7],[1,7]], area:28
    // Rect 4×6=24, Rect 2×2=4 → 28
  },

  // ── PETITES FORMES VARIÉES ───────────────────
  {
    icon:'⬛', name:'Un tout petit rectangle',
    hint:'Seulement 2 colonnes × 3 rangées.',
    points:[[3,2],[5,2],[5,5],[3,5]], area:6
  },
  {
    icon:'◆', name:'Un losange fin vertical',
    hint:'Diagonale verticale 6, horizontale 4.',
    points:[[4,1],[6,4],[4,7],[2,4]], area:12
  },
  {
    icon:'🔶', name:'Un pentagone en flèche haute',
    hint:'Décompose en trapèze + triangle.',
    points:[[4,1],[7,3],[6,7],[2,7],[1,3]], area:26
    // Shoelace vérifié = 26
  },
  {
    icon:'🔶', name:'Un mini-hexagone',
    hint:'6 côtés réguliers.',
    points:[[1,4],[3,2],[5,2],[7,4],[5,6],[3,6]], area:16
    // Shoelace : 32/2 = 16
  },
  {
    icon:'🔶', name:'Un grand pentagone',
    hint:'Rectangle surmonté d\'un triangle large.',
    points:[[1,7],[7,7],[7,3],[5,1],[1,3]], area:30
    // Duplicat évité — variante : [[1,6],[7,6],[7,3],[4,1],[1,3]] area=24
  }
];

// Dédoublonnage de la dernière figure
FIGURES[49] = {
  icon:'🔶', name:'Un grand pentagone maison',
  hint:'Large rectangle et pointe vers le haut.',
  points:[[1,7],[7,7],[7,4],[4,1],[1,4]], area:24
  // Rect [1,4]-[7,7]=6×3=18, Triangle [1,4]-[7,4]-[4,1] b=6,h=3=9 → 27... 
  // Vérification shoelace: (1×7-7×7)+(7×4-7×7)+(7×1-4×4)+(4×4-1×1)+(1×7-1×4)... 
};

// ─── On recalcule la figure 49 proprement ────────────────────────────────────
// [[1,7],[7,7],[7,4],[4,1],[1,4]] shoelace:
// (1×7-7×7)+(7×4-7×7)+(7×1-4×4)+(4×4-1×1)+(1×7-1×4)
// = (7-49)+(28-49)+(7-16)+(16-1)+(7-4)
// = -42 + (-21) + (-9) + 15 + 3 = -54 → area=27
FIGURES[49] = {
  icon:'🔶', name:'Un grand pentagone maison',
  hint:'Large rectangle et pointe vers le haut.',
  points:[[1,7],[7,7],[7,4],[4,1],[1,4]], area:27
};

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let step = 1, score = 0, session = [], currentFig = null, answered = false;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function ptStr(pts){ return pts.map(([c,r])=>`${c*CELL},${r*CELL}`).join(' '); }

// ════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════
function drawGrid(fig){
  const svg = document.getElementById('grid-svg');
  svg.setAttribute('width',  SVG_W);
  svg.setAttribute('height', SVG_H);
  svg.setAttribute('viewBox', `0 0 ${SVG_W} ${SVG_H}`);
  svg.innerHTML = '';

  // Lignes verticales
  for(let c=0;c<=COLS;c++){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',c*CELL); l.setAttribute('y1',0);
    l.setAttribute('x2',c*CELL); l.setAttribute('y2',SVG_H);
    l.setAttribute('stroke','#1e3a5f'); l.setAttribute('stroke-width','1');
    svg.appendChild(l);
  }
  // Lignes horizontales
  for(let r=0;r<=ROWS;r++){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',0); l.setAttribute('y1',r*CELL);
    l.setAttribute('x2',SVG_W); l.setAttribute('y2',r*CELL);
    l.setAttribute('stroke','#1e3a5f'); l.setAttribute('stroke-width','1');
    svg.appendChild(l);
  }

  // Numéros de colonnes (haut)
  for(let c=0;c<COLS;c++){
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', c*CELL+CELL/2); t.setAttribute('y', 14);
    t.setAttribute('font-size','13'); t.setAttribute('fill','#334155');
    t.setAttribute('text-anchor','middle'); t.setAttribute('font-family','Outfit,sans-serif');
    t.textContent=c+1; svg.appendChild(t);
  }
  // Numéros de rangées (gauche)
  for(let r=0;r<ROWS;r++){
    const t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x', 7); t.setAttribute('y', r*CELL+CELL/2+5);
    t.setAttribute('font-size','13'); t.setAttribute('fill','#334155');
    t.setAttribute('font-family','Outfit,sans-serif');
    t.textContent=r+1; svg.appendChild(t);
  }

  // Polygone de la figure
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', ptStr(fig.points));
  poly.setAttribute('fill','rgba(99,102,241,0.22)');
  poly.setAttribute('stroke','#818cf8');
  poly.setAttribute('stroke-width','3');
  poly.setAttribute('stroke-linejoin','round');
  svg.appendChild(poly);

  // Points sur les sommets
  fig.points.forEach(([c,r]) => {
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', c*CELL); dot.setAttribute('cy', r*CELL);
    dot.setAttribute('r','5'); dot.setAttribute('fill','#818cf8');
    dot.setAttribute('stroke','#0f172a'); dot.setAttribute('stroke-width','2');
    svg.appendChild(dot);
  });
}

// ════════════════════════════════════════════════
// QUESTION
// ════════════════════════════════════════════════
function renderQuestion(){
  answered = false;
  document.getElementById('feedback-area').innerHTML = '';
  document.getElementById('next-area').innerHTML = '';
  document.getElementById('aire-input').value = '';
  document.getElementById('aire-input').disabled = false;
  document.getElementById('btn-val').disabled = false;

  currentFig = FIGURES[session[step-1]];
  document.getElementById('q-num').textContent = step;
  document.getElementById('score-disp').textContent = score;
  document.getElementById('prog-bar').style.width = `${((step-1)/TOTAL_Q)*100}%`;
  document.getElementById('fig-icon').textContent = currentFig.icon;
  document.getElementById('fig-name').textContent = currentFig.name;
  document.getElementById('fig-hint').textContent = currentFig.hint;

  drawGrid(currentFig);
  document.getElementById('aire-input').focus();
}

// ════════════════════════════════════════════════
// VALIDATE
// ════════════════════════════════════════════════
function validateAnswer(){
  if(answered) return;
  const raw = document.getElementById('aire-input').value.replace(',','.');
  const val = parseFloat(raw);
  if(isNaN(val)){ alert('Saisis un nombre !'); return; }

  answered = true;
  document.getElementById('btn-val').disabled = true;
  document.getElementById('aire-input').disabled = true;

  const correct = Math.abs(val - currentFig.area) < 0.01;
  if(correct) score++;
  document.getElementById('score-disp').textContent = score;

  const svg = document.getElementById('grid-svg');
  const poly = svg.querySelector('polygon');
  if(poly){
    poly.setAttribute('fill', correct ? 'rgba(16,185,129,0.28)' : 'rgba(244,63,94,0.22)');
    poly.setAttribute('stroke', correct ? '#34d399' : '#fb7185');
  }

  document.getElementById('feedback-area').innerHTML = `
    <div class="feedback ${correct?'fb-correct':'fb-wrong'}">
      <div class="fb-icon">${correct?'🎯':'💡'}</div>
      <div>
        <div class="fb-title">${correct ? 'Parfait !' : `Non — la bonne réponse est ${currentFig.area} cm²`}</div>
        <div class="fb-text">${getExplanation(currentFig)}</div>
      </div>
    </div>`;

  document.getElementById('next-area').innerHTML = step < TOTAL_Q
    ? `<button class="btn-next" onclick="nextQ()">Figure suivante 👉</button>`
    : `<button class="btn-next" onclick="finishGame()">Voir mon résultat 🏆</button>`;
}

function getExplanation(fig){
  const area = fig.area;
  const pts = fig.points;
  const minC=Math.min(...pts.map(p=>p[0])), maxC=Math.max(...pts.map(p=>p[0]));
  const minR=Math.min(...pts.map(p=>p[1])), maxR=Math.max(...pts.map(p=>p[1]));
  const w=maxC-minC, h=maxR-minR;
  const n=fig.name.toLowerCase();

  if(n.includes('rectangle')||n.includes('carré')||n.includes('bandeau')||n.includes('mini'))
    return `${fig.name} : Longueur × Largeur = ${w} × ${h} = <strong>${area} cm²</strong>.`;
  if(n.includes('triangle'))
    return `${fig.name} : (Base × Hauteur) ÷ 2 = (${w} × ${h}) ÷ 2 = <strong>${area} cm²</strong>.`;
  if(n.includes('parallélogramme'))
    return `${fig.name} : Base × Hauteur = <strong>${area} cm²</strong>. Les demi-carreaux sur les bords obliques s'associent par paires.`;
  if(n.includes('losange'))
    return `${fig.name} : (Diagonale₁ × Diagonale₂) ÷ 2 = <strong>${area} cm²</strong>.`;
  if(n.includes('trapèze'))
    return `${fig.name} : (Grande base + Petite base) × Hauteur ÷ 2 = <strong>${area} cm²</strong>.`;
  return `Aire correcte : <strong>${area} cm²</strong>. Décompose la figure en formes simples et additionne leurs aires.`;
}

// ════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════
function nextQ(){ step++; renderQuestion(); }

function finishGame(){
  document.getElementById('game-flow').style.display='none';
  document.getElementById('congrats-flow').style.display='block';
  const pct=Math.round(score/TOTAL_Q*100);
  let msg,stars;
  if(score===TOTAL_Q){ msg=`Incroyable ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). Tu es un as du quadrillage !`; stars='⭐⭐⭐'; }
  else if(score>=8)  { msg=`Excellent ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). Tu maîtrises très bien la lecture du quadrillage.`; stars='⭐⭐'; }
  else if(score>=5)  { msg=`Pas mal ! <strong>${score}/${TOTAL_Q}</strong> (${pct}%). Continue à t'entraîner !`; stars='⭐'; }
  else               { msg=`<strong>${score}/${TOTAL_Q}</strong> (${pct}%). Recommence : chaque essai t'aide à progresser !`; stars='❌'; }
  document.getElementById('congrats-msg').innerHTML=msg;
  document.getElementById('stars').textContent=stars;
  if(typeof window.parent!=='undefined'&&window.parent.handleActivityScore){
    window.parent.handleActivityScore('grandeur_aire_quadrillage', score);
  }
}

function resetGame(){
  step=1; score=0;
  document.getElementById('game-flow').style.display='block';
  document.getElementById('congrats-flow').style.display='none';
  startSession(); renderQuestion();
}

function startSession(){
  session=shuffle(FIGURES.map((_,i)=>i)).slice(0,TOTAL_Q);
}

document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!answered) validateAnswer(); });
window.addEventListener('DOMContentLoaded',()=>{ startSession(); renderQuestion(); });
</script>
