<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les 4 opérations - Calculs lacunaires</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
  <style>
  :root {
    --add: #2ec27e;
    --sub: #ff885c;
    --mul: #3aa0e8;
    --div: #9a86f0;
    --bg: #FDFBF7;
    --card: #ffffff;
    --ink: #1A1A2E;
    --muted: #6B7080;
    --good: #1A9E75;
    --bad: #D94F3D;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding: 24px 12px 60px;
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.8rem;
    margin: 0 0 6px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
  }
  h1 .icon {
    font-size: 1.6rem;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 0.95rem;
  }
  #exercise {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 700px) {
    #exercise {
      grid-template-columns: 1fr;
    }
  }
  .calc {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--ink);
    border-left: 6px solid var(--ink);
    box-shadow: 0 4px 10px rgba(0,0,0,0.04);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 1.35rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 850;
    flex-wrap: wrap;
    transition: all 0.2s ease;
  }
  .calc.op-add { border-left-color: var(--add); }
  .calc.op-sub { border-left-color: var(--sub); }
  .calc.op-mul { border-left-color: var(--mul); }
  .calc.op-div { border-left-color: var(--div); }

  .num { color: var(--ink); font-family: 'Nunito', sans-serif; font-weight: 850; }
  .sign {
    font-weight: 900;
    font-family: 'Nunito', sans-serif;
  }
  .op-add .sign.operator { color: var(--add); }
  .op-sub .sign.operator { color: var(--sub); }
  .op-mul .sign.operator { color: var(--mul); }
  .op-div .sign.operator { color: var(--div); }

  .num-label {
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
    font-weight: 600;
    min-width: 24px;
    text-align: right;
    margin-right: -6px;
  }

  input.answer {
    font-family: 'Nunito', sans-serif !important;
    font-weight: 900 !important;
    font-size: 1.3rem !important;
    color: var(--ink) !important;
    width: 76px !important;
    max-width: 76px !important;
    text-align: center !important;
    background: #f0f7f4 !important;
    border: 2px solid #cdeede !important;
    border-radius: 12px !important;
    padding: 6px 4px !important;
    margin-bottom: 0 !important;
    outline: none !important;
    transition: border-color 0.15s, background-color 0.15s !important;
    flex: none !important;
  }
  input.answer:focus {
    border-color: #5B4FCF !important;
    background: #fff !important;
  }
  input.answer.correct {
    border-color: var(--good) !important;
    background: #e7faf0 !important;
    color: #16895a !important;
  }
  input.answer.incorrect {
    border-color: var(--bad) !important;
    background: #fdeaec !important;
    color: #c43a4c !important;
  }
  .correction {
    font-family: 'Nunito', sans-serif;
    font-size: 1.35rem;
    font-weight: 900;
    color: var(--good);
    margin-left: 6px;
  }

  .actions {
    margin-top: 24px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  button {
    padding: 10px 20px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    background: var(--card);
    font-family: 'Fredoka', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: var(--ink);
    transition: all .2s;
    box-shadow: 2px 2px 0px var(--ink);
  }
  .btn-validate {
    background: #5B4FCF;
    color: #fff;
    border-color: #5B4FCF;
    box-shadow: 2px 2px 0px var(--ink);
    flex: 1;
    min-width: 220px;
  }
  .btn-validate:hover {
    background: #4a3fb8;
    box-shadow: 3px 3px 0px var(--ink);
    transform: translate(-1px, -1px);
  }
  .btn-validate:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px var(--ink);
  }
  .btn-restart {
    background: var(--card);
    color: var(--ink);
    border-color: var(--ink);
  }
  .btn-restart:hover {
    background: var(--bg);
    box-shadow: 3px 3px 0px var(--ink);
    transform: translate(-1px, -1px);
  }
  .btn-restart:active {
    transform: translate(1px, 1px);
    box-shadow: 1px 1px 0px var(--ink);
  }

  .score-banner {
    display: none;
    text-align: center;
    border-radius: 16px;
    border: 3px solid var(--ink);
    padding: 22px;
    margin-top: 24px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--ink);
    background: #fff;
    box-shadow: 6px 6px 0px var(--ink);
  }
  .score-banner.show { display: block; }
  .score-banner.great { background: #E2F5EE; border-color: var(--good); }
  .score-banner.mid { background: #FEF3E2; border-color: var(--amber); }
  .score-banner.low { background: #FDECEA; border-color: var(--bad); }
  .score-sub {
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    margin-top: 6px;
    opacity: 0.95;
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.4rem; }
    .calc { font-size: 1.1rem; padding: 14px 14px; gap: 8px; }
    input.answer { width: 70px; font-size: 1.05rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="icon">🔢</span> Les 4 opérations</h1>
  <p class="subtitle">Complète les 10 calculs ci-dessous, puis clique sur « Valider mes réponses ».</p>

  <div id="exercise"></div>

  <div class="actions">
    <button class="btn-validate" id="validateBtn">✓ Valider mes réponses</button>
    <button class="btn-restart" id="restartBtn">↻ Nouvel exercice</button>
  </div>

  <div class="score-banner" id="scoreBanner"></div>
</div>

<script>
/*
  Banque de 100 calculs lacunaires.
  Chaque calcul est défini par : { a, op, b, result, blank }
  - a, op, b, result : les 4 éléments de l'équation a [op] b = result
  - blank : indique quel élément est remplacé par "?" -> "a", "b" ou "result"
  Toutes les valeurs sont >= 10 et <= 100 (la plupart < 100, certaines égales à 100 pour les additions).
*/
const BANK = [

  { a: 44, op: "+", b: 36, result: 80, blank: "a" },
  { a: 17, op: "+", b: 64, result: 81, blank: "result" },
  { a: 29, op: "+", b: 13, result: 42, blank: "result" },
  { a: 55, op: "+", b: 27, result: 82, blank: "b" },
  { a: 38, op: "+", b: 45, result: 83, blank: "a" },
  { a: 24, op: "+", b: 19, result: 43, blank: "result" },
  { a: 46, op: "+", b: 37, result: 83, blank: "result" },
  { a: 28, op: "+", b: 56, result: 84, blank: "b" },

  // ---- SOUSTRACTIONS (op: "-") ----
  { a: 920, op: "-", b: 280, result: 640, blank: "result" }, // calque exemple capture (hors borne 100, on le retire plus bas)
  { a: 30, op: "-", b: 24, result: 6, blank: "result" },
  { a: 67, op: "-", b: 46, result: 21, blank: "result" },
  { a: 67, op: "-", b: 46, result: 21, blank: "b" },
  { a: 84, op: "-", b: 15, result: 69, blank: "result" },
  { a: 30, op: "-", b: 18, result: 12, blank: "a" },
  { a: 53, op: "-", b: 27, result: 26, blank: "result" },
  { a: 75, op: "-", b: 38, result: 37, blank: "b" },
  { a: 92, op: "-", b: 56, result: 36, blank: "result" },
  { a: 64, op: "-", b: 25, result: 39, blank: "a" },
  { a: 41, op: "-", b: 23, result: 18, blank: "result" },
  { a: 80, op: "-", b: 34, result: 46, blank: "b" },
  { a: 56, op: "-", b: 19, result: 37, blank: "a" },
  { a: 73, op: "-", b: 28, result: 45, blank: "result" },
  { a: 90, op: "-", b: 47, result: 43, blank: "result" },
  { a: 62, op: "-", b: 35, result: 27, blank: "b" },
  { a: 48, op: "-", b: 22, result: 26, blank: "a" },
  { a: 95, op: "-", b: 38, result: 57, blank: "result" },
  { a: 31, op: "-", b: 14, result: 17, blank: "result" },
  { a: 77, op: "-", b: 29, result: 48, blank: "b" },
  { a: 60, op: "-", b: 33, result: 27, blank: "a" },
  { a: 50, op: "-", b: 16, result: 34, blank: "result" },
  { a: 88, op: "-", b: 45, result: 43, blank: "result" },
  { a: 39, op: "-", b: 17, result: 22, blank: "b" },
  { a: 71, op: "-", b: 24, result: 47, blank: "a" },
  { a: 100, op: "-", b: 37, result: 63, blank: "result" },
  { a: 26, op: "-", b: 13, result: 13, blank: "result" },
  { a: 84, op: "-", b: 49, result: 35, blank: "b" },
  { a: 65, op: "-", b: 28, result: 37, blank: "a" },

  // ---- MULTIPLICATIONS (op: "×") ----
  { a: 4, op: "×", b: 4, result: 16, blank: "result" },
  { a: 9, op: "×", b: 5, result: 45, blank: "result" },
  { a: 6, op: "×", b: 5, result: 30, blank: "result" },

  { a: 12, op: "×", b: 7, result: 84, blank: "result" },
  { a: 11, op: "×", b: 8, result: 88, blank: "result" },
  { a: 13, op: "×", b: 6, result: 78, blank: "result" },

  { a: 6, op: "×", b: 9, result: 54, blank: "a" },
  { a: 8, op: "×", b: 9, result: 72, blank: "b" },
  { a: 12, op: "×", b: 8, result: 96, blank: "result" },
  { a: 13, op: "×", b: 7, result: 91, blank: "result" },
  { a: 7, op: "×", b: 13, result: 91, blank: "b" },
  { a: 6, op: "×", b: 14, result: 84, blank: "a" },
  { a: 9, op: "×", b: 6, result: 54, blank: "result" },

  // ---- DIVISIONS (op: "÷") ----
  { a: 28, op: "÷", b: 7, result: 4, blank: "result" },
  { a: 81, op: "÷", b: 9, result: 9, blank: "result" },
  { a: 56, op: "÷", b: 8, result: 7, blank: "result" },
  { a: 63, op: "÷", b: 9, result: 7, blank: "result" },

  { a: 91, op: "÷", b: 7, result: 13, blank: "result" },
  { a: 88, op: "÷", b: 11, result: 8, blank: "result" },
  { a: 99, op: "÷", b: 9, result: 11, blank: "result" },
  { a: 78, op: "÷", b: 6, result: 13, blank: "result" },
  { a: 64, op: "÷", b: 8, result: 8, blank: "result" },
  { a: 49, op: "÷", b: 7, result: 7, blank: "result" },
  { a: 54, op: "÷", b: 6, result: 9, blank: "result" },
  { a: 45, op: "÷", b: 9, result: 5, blank: "result" },
  { a: 36, op: "÷", b: 6, result: 6, blank: "result" },
  { a: 42, op: "÷", b: 7, result: 6, blank: "result" },
  { a: 48, op: "÷", b: 6, result: 8, blank: "result" },
  { a: 63, op: "÷", b: 7, result: 9, blank: "b" },
  { a: 56, op: "÷", b: 7, result: 8, blank: "a" },
  { a: 72, op: "÷", b: 9, result: 8, blank: "b" },
  { a: 84, op: "÷", b: 12, result: 7, blank: "a" },
  { a: 96, op: "÷", b: 12, result: 8, blank: "b" },
  { a: 91, op: "÷", b: 13, result: 7, blank: "a" },
  { a: 99, op: "÷", b: 11, result: 9, blank: "b" }
];

// Nettoyage : on retire le calque "920 - 280" qui dépasse 100, et le calcul "33+29" piégé par une erreur d'écriture.
const FILTERED_BANK = BANK.filter(c => {
  if (c.a > 100 || c.b > 100 || c.result > 100) return false;
  return true;
}).map(c => {
  // corrige l'artefact 330%100===0?33:33 -> 33 (déjà correct, mais on s'assure du type number)
  return { a: Number(c.a), op: c.op, b: Number(c.b), result: Number(c.result), blank: c.blank };
});

const opClass = { "+": "op-add", "-": "op-sub", "×": "op-mul", "÷": "op-div" };

let currentExercise = [];

function pickExercise() {
  const indices = [...Array(FILTERED_BANK.length).keys()];
  // mélange Fisher-Yates
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices.slice(0, 10).map(i => FILTERED_BANK[i]);
}

function valueFor(calc, part) {
  return calc[part];
}

function renderExercise() {
  currentExercise = pickExercise();
  const container = document.getElementById("exercise");
  container.innerHTML = "";

  currentExercise.forEach((calc, idx) => {
    const div = document.createElement("div");
    div.className = "calc " + opClass[calc.op];
    div.dataset.index = idx;
    // ordre d'affichage en colonnes : 1-5 colonne gauche, 6-10 colonne droite
    const half = Math.ceil(currentExercise.length / 2);
    const col = idx < half ? 0 : 1;
    const row = idx < half ? idx : idx - half;
    div.style.gridColumn = (col + 1).toString();
    div.style.gridRow = (row + 1).toString();

    const num = document.createElement("span");
    num.className = "num-label";
    num.textContent = (idx + 1) + ".";
    div.appendChild(num);

    const parts = ["a", "op", "b", "eq", "result"];
    parts.forEach(part => {
      if (part === "op") {
        const span = document.createElement("span");
        span.className = "sign operator";
        span.textContent = calc.op;
        div.appendChild(span);
        return;
      }
      if (part === "eq") {
        const span = document.createElement("span");
        span.className = "sign";
        span.textContent = "=";
        div.appendChild(span);
        return;
      }
      const isBlank = calc.blank === part;
      if (isBlank) {
        const input = document.createElement("input");
        input.type = "text";
        input.inputMode = "numeric";
        input.className = "answer";
        input.dataset.part = part;
        input.setAttribute("aria-label", "Réponse calcul " + (idx + 1));
        div.appendChild(input);
      } else {
        const span = document.createElement("span");
        span.className = "num";
        span.textContent = valueFor(calc, part);
        div.appendChild(span);
      }
    });

    container.appendChild(div);
  });

  document.getElementById("scoreBanner").classList.remove("show", "great", "mid", "low");
  document.getElementById("scoreBanner").innerHTML = "";

  // réactive tous les inputs et nettoie les classes
  container.querySelectorAll("input.answer").forEach(input => {
    input.disabled = false;
    input.value = "";
    input.classList.remove("correct", "incorrect");
  });

  document.getElementById("validateBtn").disabled = false;
  document.getElementById("validateBtn").style.opacity = "1";
}

function checkAnswers() {
  const calcDivs = document.querySelectorAll(".calc");
  let score = 0;

  calcDivs.forEach(div => {
    const idx = parseInt(div.dataset.index, 10);
    const calc = currentExercise[idx];
    const input = div.querySelector("input.answer");
    const correctValue = calc[calc.blank];
    const userValue = parseInt((input.value || "").trim(), 10);

    // supprime ancienne correction éventuelle
    const oldCorrection = div.querySelector(".correction");
    if (oldCorrection) oldCorrection.remove();

    if (userValue === correctValue) {
      score++;
      input.classList.add("correct");
      input.classList.remove("incorrect");
    } else {
      input.classList.add("incorrect");
      input.classList.remove("correct");
      const correction = document.createElement("span");
      correction.className = "correction";
      correction.textContent = "→ " + correctValue;
      div.appendChild(correction);
    }
    input.disabled = true;
  });

  const banner = document.getElementById("scoreBanner");
  banner.classList.add("show");
  let cls = "great";
  let message = "Bravo, excellent travail ! 🎉";
  if (score < 10 && score >= 6) {
    cls = "mid";
    message = "Bien joué, continue comme ça ! 💪";
  } else if (score < 6) {
    cls = "low";
    message = "Pas grave, encore un peu d'entraînement ! 🌱";
  }
  banner.classList.add(cls);
  banner.innerHTML = "Score : " + score + " / 10" +
    '<div class="score-sub">' + message + '</div>';

  document.getElementById("validateBtn").disabled = true;
  document.getElementById("validateBtn").style.opacity = "0.6";

  if (window.parent && window.parent.saveResult) {
    const pct = Math.round(score / 10 * 100);
    window.parent.saveResult({
      activity: 'op_4_operations_lacunaires',
      bookTitle: 'Opérations — Calculs lacunaires',
      score: score,
      total: 10,
      pct: pct,
      date: new Date().toLocaleDateString('fr-BE'),
      time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
    });
  }
}

document.getElementById("validateBtn").addEventListener("click", checkAnswers);
document.getElementById("restartBtn").addEventListener("click", renderExercise);

// permet de valider avec la touche Entrée
document.getElementById("exercise").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    checkAnswers();
  }
});

renderExercise();
</script>
</body>
</html>
