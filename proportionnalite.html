<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recettes</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #5B4FCF;
    --purple-light: #EEF0FF;
    --purple-mid: #C7C2F5;
    --green: #1A9E75;
    --green-light: #E2F5EE;
    --red: #D94F3D;
    --red-light: #FDECEA;
    --amber: #C97B1A;
    --amber-light: #FEF3E2;
    --teal: #1A6FA0;
    --teal-dark: #104e73;
    --bg: #FDFBF7;
    --panel: #FFFFFF;
    --ink: #1A1A2E;
    --muted: #6B7080;
    --line: #1A1A2E;
    --shadow: 6px 6px 0px #1A1A2E;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    padding: 16px;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }
  .panel { max-width: 1180px; width: 100%; position: relative; }

  /* ---------- Barre du haut ---------- */
  .topbar {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .round-btn {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: var(--panel);
    border: 3px solid var(--line);
    box-shadow: 4px 4px 0 var(--line);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .round-btn:hover {
    transform: translateY(-2px);
    box-shadow: 6px 6px 0 var(--line);
  }
  .round-btn:active {
    transform: translateY(2px) scale(0.96);
    box-shadow: 2px 2px 0 var(--line);
  }
  .round-btn svg { width: 28px; height: 28px; }
  h1 {
    font-size: 24px; color: var(--ink); margin: 0;
    text-align: center; font-weight: 800; line-height: 1.15;
    font-family: 'Fredoka', sans-serif;
  }
  .lives {
    display: flex; align-items: center; gap: 8px;
  }
  .lives .heart svg { width: 34px; height: 34px; }
  .pip {
    width: 30px; height: 30px; border-radius: 50%;
    border: 3px solid var(--line); background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
  }
  .pip.done { background: var(--green); }
  .pip.current { background: var(--purple-mid); }
  .pip.fail { background: var(--red); }
  .pip svg { width: 16px; height: 16px; }

  /* ---------- Scène ---------- */
  .stage {
    display: flex;
    align-items: stretch;
    justify-content: center;
    gap: 24px;
    position: relative;
  }

  .sheet {
    position: relative;
    background: var(--panel);
    border: 3px solid var(--line);
    border-radius: 20px;
    padding: 46px 26px 40px;
    width: 43%;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: var(--shadow);
  }
  .sheet.left  { transform: rotate(-0.6deg); }
  .sheet.right { transform: rotate(0.6deg); }
  .sheet .curl {
    position: absolute; top: -3px; right: -3px;
    width: 58px; height: 58px; overflow: visible;
  }
  .sheet .curl svg { display: block; width: 100%; height: 100%; overflow: visible; }

  .tape {
    position: absolute; width: 74px; height: 34px;
    border: 3px solid var(--line); z-index: 5; opacity: 0.93;
  }
  .tape.blue { background: var(--teal); }
  .tape.yellow { background: var(--amber); }
  .tape.tl { top: -15px; left: 26px; transform: rotate(-17deg); }
  .tape.tr { top: -15px; right: 56px; transform: rotate(13deg); }
  .tape.single { top: -15px; left: 44px; transform: rotate(-9deg); }

  .people-row {
    display: flex; justify-content: flex-start; gap: 2px;
    flex-wrap: wrap; min-height: 44px; align-items: flex-end;
    width: 100%;
  }
  .people-row svg { width: 38px; height: 38px; }
  .people-label {
    font-size: 18px; color: var(--teal); font-weight: 800;
    align-self: flex-start; margin: 6px 0 0 4px;
    font-family: 'Fredoka', sans-serif;
  }

  .number-area {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-top: auto; width: 100%; flex-wrap: wrap;
  }
  .digit-slots { display: flex; gap: 12px; }
  .digit {
    font-size: 72px; font-weight: 900; line-height: 1;
    color: var(--teal);
    -webkit-text-stroke: 1px var(--line);
    paint-order: stroke fill;
    font-family: 'Nunito', sans-serif;
    width: 52px; text-align: center;
  }
  /* slots de réponse (à remplir) */
  .answer-slot {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .answer-slot input {
    font-size: 72px; font-weight: 900; line-height: 1;
    color: var(--ink);
    -webkit-text-stroke: 1px var(--line);
    paint-order: stroke fill;
    font-family: 'Nunito', sans-serif;
    width: 56px; text-align: center;
    background: transparent; border: none; padding: 0;
    caret-color: var(--teal);
  }
  .answer-slot input:focus { outline: none; }
  .answer-slot input::-webkit-outer-spin-button,
  .answer-slot input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .answer-slot input { -moz-appearance: textfield; appearance: textfield; }
  .answer-slot .mark { width: 34px; height: 7px; border-radius: 3px; background: var(--line); }
  .answer-slot.ok .mark { background: var(--green); }
  .answer-slot.bad .mark { background: var(--red); }

  .item-name {
    font-size: 28px; font-weight: 800; color: var(--ink);
    text-align: left; line-height: 1.04; max-width: 190px;
    font-family: 'Fredoka', sans-serif;
  }

  /* ---------- Colonne centrale ---------- */
  .center-col {
    display: flex; flex-direction: column; align-items: center;
    width: 14%; z-index: 6; padding: 40px 4px 0;
  }
  .btn-valider {
    background: var(--purple); border: 3px solid var(--line); border-radius: 14px;
    padding: 14px 6px; font-size: 26px; font-weight: 800; color: #fff;
    cursor: pointer; box-shadow: var(--shadow);
    transform: rotate(-2deg); width: 100%;
    font-family: 'Fredoka', sans-serif;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-valider:hover:not(:disabled) {
    transform: rotate(-2deg) translateY(-2px);
    box-shadow: 8px 8px 0 var(--line);
  }
  .btn-valider:active:not(:disabled) {
    transform: rotate(-2deg) translateY(2px);
    box-shadow: 4px 4px 0 var(--line);
  }
  .btn-valider:disabled { opacity: 0.4; cursor: default; }
  .center-illustration { width: 150px; height: 150px; margin-top: 70px; }
  .center-illustration svg { width: 100%; height: 100%; }

  .feedback {
    text-align: center; min-height: 30px; font-size: 21px;
    font-weight: 800; margin: 22px 0 4px;
    font-family: 'Fredoka', sans-serif;
  }
  .feedback.correct { color: var(--green); }
  .feedback.wrong { color: var(--red); }

  .controls { display: flex; justify-content: center; gap: 16px; margin-top: 2px; }
  .btn-next {
    background: var(--teal); border: 3px solid var(--line); border-radius: 30px;
    padding: 13px 38px; font-size: 19px; font-weight: 800; color: #fff;
    cursor: pointer; box-shadow: var(--shadow); font-family: 'Fredoka', sans-serif;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-next:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 8px 8px 0 var(--line);
  }
  .btn-next:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 4px 4px 0 var(--line);
  }
  .btn-next:disabled { opacity: 0.35; cursor: default; }

  .end-screen {
    text-align: center; padding: 50px 20px;
    background: var(--panel); border: 3px solid var(--line); border-radius: 20px;
    box-shadow: var(--shadow);
  }
  .end-screen h2 { color: var(--ink); font-size: 30px; margin: 0 0 10px; font-family: 'Fredoka', sans-serif; }
  .end-screen .score-num {
    font-size: 74px; font-weight: 900; color: var(--purple);
    font-family: 'Nunito', sans-serif;
    -webkit-text-stroke: 2px var(--line); paint-order: stroke fill; margin: 10px 0;
  }
  .end-screen p { color: var(--teal); font-size: 19px; font-weight: bold; font-family: 'Fredoka', sans-serif; }
  .btn-restart {
    background: var(--red); border: 3px solid var(--line); border-radius: 30px;
    padding: 15px 32px; font-size: 18px; font-weight: 800; color: #fff;
    cursor: pointer; box-shadow: var(--shadow); font-family: 'Fredoka', sans-serif; margin-top: 12px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-restart:hover {
    transform: translateY(-2px);
    box-shadow: 8px 8px 0 var(--line);
  }
  .btn-restart:active {
    transform: translateY(2px);
    box-shadow: 4px 4px 0 var(--line);
  }

  .credit { text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); opacity: 0.75; }
  .credit a { color: var(--muted); }

  @media (max-width: 820px) {
    .stage { flex-direction: column; align-items: center; gap: 24px; }
    .sheet { width: 100%; max-width: 440px; min-height: auto; transform: none; }
    .sheet.left, .sheet.right { transform: none; }
    .center-col { width: 100%; flex-direction: row; justify-content: center; gap: 26px; padding: 0; align-items: center; }
    .center-illustration { margin-top: 0; }
    .btn-valider { width: auto; }
    .digit, .answer-slot input { font-size: 58px; width: 40px; }
    h1 { font-size: 20px; }
    .topbar { grid-template-columns: 54px 1fr auto; }
  }
</style>
</head>
<body>
<div class="panel">

  <div id="gameScreen">
    <div class="topbar">
      <button class="round-btn" onclick="restartGame()" title="Recommencer">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--line)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 8 8 8"/>
        </svg>
      </button>
      <h1 id="instructionText">Transforme les ingrédients de la recette en gardant les mêmes proportions.</h1>
      <div class="lives" id="lives"></div>
    </div>

    <div class="stage">

      <div class="sheet left">
        <span class="tape blue tl"></span>
        <span class="tape blue tr"></span>
        <div class="people-row" id="leftPeople"></div>
        <div class="people-label" id="leftLabel"></div>
        <div class="number-area">
          <div class="digit-slots" id="leftDigits"></div>
          <span class="item-name" id="leftItemName"></span>
        </div>
      </div>

      <div class="center-col">
        <button class="btn-valider" id="btnValidate" onclick="validate()">valider</button>
        <div class="center-illustration" id="centerIcon"></div>
      </div>

      <div class="sheet right">
        <span class="tape yellow single"></span>
        <span class="curl"><svg viewBox="0 0 58 58"><polygon points="2,2 56,2 56,56" fill="var(--bg)" stroke="var(--line)" stroke-width="3" stroke-linejoin="round"/><line x1="2" y1="2" x2="56" y2="56" stroke="var(--line)" stroke-width="3"/></svg></span>
        <div class="people-row" id="rightPeople"></div>
        <div class="people-label" id="rightLabel"></div>
        <div class="number-area">
          <div class="digit-slots" id="answerDigits"></div>
          <span class="item-name" id="rightItemName"></span>
        </div>
      </div>

    </div>

    <div class="feedback" id="feedback"></div>
    <div class="controls">
      <button class="btn-next" id="btnNext" onclick="nextExercise()" disabled>Suivant</button>
    </div>
  </div>

  <div id="endScreen" class="end-screen" style="display:none;">
    <h2>Exercice terminé !</h2>
    <div class="score-num" id="finalScore"></div>
    <p id="endMessage"></p>
    <button class="btn-restart" onclick="restartGame()">Recommencer avec de nouveaux exercices</button>
  </div>

  <div class="credit">Illustrations : <a href="https://openmoji.org">OpenMoji</a> – licence CC BY-SA 4.0</div>

</div>

let sessionExercises = [];
let currentIndex = 0;
let score = 0;
let answered = false;
let results = [];

function pickSession() {
  const shuffled = [...exerciseBank];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled.slice(0, EXERCISES_PER_SESSION);
}

function renderPeople(container, count) {
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const wrap = document.createElement('div');
    wrap.innerHTML = personSVG;
    container.appendChild(wrap.firstElementChild);
  }
}

function renderLives() {
  const box = document.getElementById('lives');
  box.innerHTML = '<span class="heart">' + heartSVG + '</span>';
  for (let i = 0; i < EXERCISES_PER_SESSION; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (i < currentIndex) {
      if (results[i]) { pip.classList.add('done'); pip.innerHTML = checkSVG; }
      else { pip.classList.add('fail'); }
    } else if (i === currentIndex) {
      pip.classList.add('current');
    }
    box.appendChild(pip);
  }
}

function renderLeftDigits(value) {
  const box = document.getElementById('leftDigits');
  box.innerHTML = '';
  String(value).split('').forEach(d => {
    const span = document.createElement('span');
    span.className = 'digit';
    span.textContent = d;
    box.appendChild(span);
  });
}

function renderAnswerSlots(count) {
  currentSlots = count;
  const box = document.getElementById('answerDigits');
  box.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const slot = document.createElement('div');
    slot.className = 'answer-slot';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.inputMode = 'numeric';
    inp.maxLength = 1;
    inp.dataset.idx = i;
    inp.autocomplete = 'off';
    inp.addEventListener('input', onDigitInput);
    inp.addEventListener('keydown', onDigitKeydown);
    const mark = document.createElement('div');
    mark.className = 'mark';
    slot.appendChild(inp);
    slot.appendChild(mark);
    box.appendChild(slot);
  }
}

function onDigitInput(e) {
  const inp = e.target;
  inp.value = inp.value.replace(/[^0-9]/g, '').slice(0, 1);
  const idx = parseInt(inp.dataset.idx);
  if (inp.value && idx < currentSlots - 1) {
    const inputs = document.querySelectorAll('#answerDigits input');
    inputs[idx + 1].focus();
  }
}

function onDigitKeydown(e) {
  const inp = e.target;
  const idx = parseInt(inp.dataset.idx);
  const inputs = document.querySelectorAll('#answerDigits input');
  if (e.key === 'Backspace' && !inp.value && idx > 0) {
    inputs[idx - 1].focus();
  } else if (e.key === 'ArrowLeft' && idx > 0) {
    inputs[idx - 1].focus();
  } else if (e.key === 'ArrowRight' && idx < currentSlots - 1) {
    inputs[idx + 1].focus();
  } else if (e.key === 'Enter') {
    if (!answered) validate(); else nextExercise();
  }
}

function getAnswerValue() {
  const inputs = document.querySelectorAll('#answerDigits input');
  let s = '';
  inputs.forEach(i => { s += (i.value || ''); });
  if (s === '') return null;
  return parseInt(s, 10);
}

function setSlotsState(state) {
  document.querySelectorAll('#answerDigits .answer-slot').forEach(sl => {
    sl.classList.remove('ok','bad');
    if (state) sl.classList.add(state);
  });
}

function loadExercise() {
  const ex = sessionExercises[currentIndex];
  renderPeople(document.getElementById('leftPeople'), ex.a1);
  renderPeople(document.getElementById('rightPeople'), ex.a2);
  document.getElementById('leftLabel').textContent = `pour ${ex.a1} ${ex.unit}`;
  document.getElementById('rightLabel').textContent = `pour ${ex.a2} ${ex.unit}`;
  document.getElementById('centerIcon').innerHTML = icons[ex.icon];
  renderLeftDigits(ex.v1);
  const correct = ex.v1 * ex.a2 / ex.a1;
  renderAnswerSlots(String(correct).length);
  document.getElementById('leftItemName').textContent = ex.item;
  document.getElementById('rightItemName').textContent = ex.item;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btnValidate').disabled = false;
  document.getElementById('btnNext').disabled = true;
  answered = false;
  renderLives();
  const first = document.querySelector('#answerDigits input');
  if (first) first.focus();
}

function validate() {
  if (answered) return;
  const ex = sessionExercises[currentIndex];
  const correctAnswer = ex.v1 * ex.a2 / ex.a1;
  const userAnswer = getAnswerValue();
  const feedback = document.getElementById('feedback');

  if (userAnswer === null) {
    feedback.textContent = 'Écris ta réponse avant de valider.';
    feedback.className = 'feedback wrong';
    return;
  }

  answered = true;
  document.querySelectorAll('#answerDigits input').forEach(i => i.disabled = true);
  document.getElementById('btnValidate').disabled = true;
  document.getElementById('btnNext').disabled = false;

  if (userAnswer === correctAnswer) {
    feedback.textContent = "Bravo, c'est la bonne réponse !";
    feedback.className = 'feedback correct';
    setSlotsState('ok');
    score++;
    results[currentIndex] = true;
  } else {
    feedback.textContent = `Pas tout à fait... la bonne réponse était ${correctAnswer}.`;
    feedback.className = 'feedback wrong';
    setSlotsState('bad');
    results[currentIndex] = false;
  }
  renderLives();

  if (currentIndex === EXERCISES_PER_SESSION - 1) {
    document.getElementById('btnNext').textContent = 'Voir mon score';
  }
}

function nextExercise() {
  currentIndex++;
  if (currentIndex >= EXERCISES_PER_SESSION) showEndScreen();
  else loadExercise();
}

function showEndScreen() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('endScreen').style.display = 'block';
  document.getElementById('finalScore').textContent = `${score} / ${EXERCISES_PER_SESSION}`;
  let message = '';
  if (score === EXERCISES_PER_SESSION) message = 'Parfait, tu maîtrises la règle de trois !';
  else if (score >= EXERCISES_PER_SESSION - 1) message = 'Très bon travail, continue comme ça !';
  else if (score >= EXERCISES_PER_SESSION / 2) message = "Pas mal, encore un peu d'entraînement !";
  else message = "Courage, recommence pour t'entraîner encore !";
  document.getElementById('endMessage').textContent = message;

  if (window.parent && window.parent.saveResult) {
    const pct = Math.round(score / EXERCISES_PER_SESSION * 100);
    window.parent.saveResult({
      activity: 'grandeur_proportionnalite_exercice',
      bookTitle: 'Grandeurs — Recettes',
      score: score,
      total: EXERCISES_PER_SESSION,
      pct: pct,
      date: new Date().toLocaleDateString('fr-BE'),
      time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
    });
  }
}

function restartGame() {
  sessionExercises = pickSession();
  currentIndex = 0;
  score = 0;
  results = [];
  document.getElementById('gameScreen').style.display = 'block';
  document.getElementById('endScreen').style.display = 'none';
  document.getElementById('btnNext').textContent = 'Suivant';
  loadExercise();
}

restartGame();
</script>
