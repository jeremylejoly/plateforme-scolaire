<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mes calculs — fiche d'entraînement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#d6f6ea; --bg2:#b9ecd8;
    --teal:#12bd8e; --teal-dark:#0c9d76; --teal-deep:#0a7d5e;
    --ink:#0f4d40; --ink-soft:#3f7a6c;
    --card:#ffffff; --field:#eafaf3; --line:#cdeede;
    --coral:#ff885c; --yellow:#ffce4a; --blue:#3aa0e8; --purple:#9a86f0; --green:#2ec27e;
    --red:#ef5b6e;
    --shadow:0 10px 28px rgba(12,120,90,.16);
    --shadow-sm:0 4px 12px rgba(12,120,90,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Nunito",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,.f{font-family:"Fredoka","Nunito",sans-serif;}
  .wrap{max-width:1100px;margin:0 auto;padding:22px 18px 60px;}

  /* ---------- Boutons ---------- */
  .btn{
    font-family:"Fredoka",sans-serif;font-size:1.05rem;font-weight:600;
    border:none;border-radius:18px;padding:14px 22px;cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;
    transition:transform .12s ease, box-shadow .12s ease, background .15s ease;
  }
  .btn:active{transform:translateY(1px) scale(.99)}
  .btn-primary{background:var(--teal);color:#fff;box-shadow:0 6px 0 var(--teal-deep);}
  .btn-primary:hover{background:var(--teal-dark)}
  .btn-primary:active{box-shadow:0 2px 0 var(--teal-deep);transform:translateY(3px)}
  .btn-ghost{background:#ffffff;color:var(--ink);box-shadow:var(--shadow-sm)}
  .btn-ghost:hover{background:#f3fbf7}
  .btn-coral{background:var(--coral);color:#fff;box-shadow:0 6px 0 #d9683f}
  .btn-coral:active{box-shadow:0 2px 0 #d9683f;transform:translateY(3px)}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}

  /* ---------- Écran de départ ---------- */
  #start{
    min-height:calc(100vh - 40px);display:flex;align-items:center;justify-content:center;
  }
  .start-card{
    background:var(--card);border-radius:34px;box-shadow:var(--shadow);
    padding:48px 40px;max-width:560px;width:100%;text-align:center;
  }
  .start-card h1{font-size:2.1rem;margin:18px 0 6px;font-weight:600;}
  .start-card p.lead{color:var(--ink-soft);font-size:1.15rem;margin:0 0 30px;font-weight:600;}
  .choice{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
  .choice .btn{font-size:1.2rem;padding:18px 28px;flex:1;min-width:200px;justify-content:center}
  .hint{margin-top:26px;color:var(--ink-soft);font-size:.95rem}

  /* Chrono illustration */
  .stop{width:120px;height:120px;margin:0 auto;display:block}
  .stop .ring{transform-origin:60px 64px;animation:tick 1.2s ease-in-out infinite}
  @keyframes tick{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
  @media (prefers-reduced-motion:reduce){.stop .ring{animation:none}}

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    margin-bottom:20px;
  }
  .topbar h2{font-size:1.5rem;margin:0;font-weight:600;flex:0 0 auto}
  .spacer{flex:1}
  .chip{
    font-family:"Fredoka",sans-serif;font-weight:600;
    background:#fff;border-radius:16px;padding:10px 16px;box-shadow:var(--shadow-sm);
    display:inline-flex;align-items:center;gap:9px;font-size:1.15rem;
  }
  .chip .dot{width:11px;height:11px;border-radius:50%;background:var(--coral);box-shadow:0 0 0 0 rgba(255,136,92,.6)}
  .chip.running .dot{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,136,92,.55)}70%{box-shadow:0 0 0 9px rgba(255,136,92,0)}100%{box-shadow:0 0 0 0 rgba(255,136,92,0)}}
  .chip .time{font-variant-numeric:tabular-nums;min-width:74px;text-align:center}

  /* ---------- Bandeau score ---------- */
  .banner{
    border-radius:24px;padding:18px 22px;margin-bottom:20px;
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    background:#fff;box-shadow:var(--shadow);animation:pop .35s ease;
  }
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .banner .emoji{font-size:2.4rem;line-height:1}
  .banner .msg{font-family:"Fredoka",sans-serif;font-size:1.35rem;font-weight:600}
  .banner .sub{color:var(--ink-soft);font-weight:700}
  .banner.good{background:linear-gradient(120deg,#e8fbf1,#d6f6ea)}
  .banner.ok{background:linear-gradient(120deg,#fff6e3,#fdeec4)}

  /* ---------- Grille de calculs ---------- */
  .grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  }
  @media (max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:540px){.grid{grid-template-columns:1fr}}
  .calc{
    background:var(--card);border-radius:18px;box-shadow:var(--shadow-sm);
    padding:14px 14px 14px 18px;display:flex;align-items:center;gap:8px;
    border-left:7px solid var(--accent,#ccc);position:relative;
  }
  .calc .num{font-weight:900;font-size:1.55rem;letter-spacing:.5px;white-space:nowrap}
  .calc .eq{font-weight:900;font-size:1.55rem;margin:0 2px}
  .calc input{
    font-family:"Nunito",sans-serif;font-weight:900;font-size:1.45rem;color:var(--ink);
    width:74px;flex:1;min-width:54px;max-width:90px;text-align:center;
    background:var(--field);border:2px solid var(--line);border-radius:12px;
    padding:9px 4px;outline:none;transition:border-color .12s, background .12s;
  }
  .calc input:focus{border-color:var(--teal);background:#fff}
  .calc input.right{border-color:var(--green);background:#e7faf0;color:#16895a}
  .calc input.wrong{border-color:var(--red);background:#fdeaec;color:#c43a4c}
  .calc .badge{position:absolute;right:10px;top:-10px;font-size:1.1rem}
  .calc .idx{position:absolute;left:-2px;top:-9px;background:var(--accent);color:#fff;
    font-family:"Fredoka",sans-serif;font-weight:600;font-size:.72rem;
    border-radius:9px;padding:1px 7px;box-shadow:var(--shadow-sm)}

  /* ---------- Barre d'actions ---------- */
  .actions{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:26px;
  }

  /* ---------- Impression ---------- */
  .print-head{display:none}
  @media print{
    body{background:#fff}
    .topbar,.actions,.chip,.banner,.hint,.btn{display:none !important}
    .calc{box-shadow:none;border:1px solid #bbb;border-left:5px solid #888}
    .calc input{border:1px solid #999;background:#fff}
    .calc .idx{background:#888}
    .print-head{display:block;text-align:center;margin-bottom:18px}
    .print-head h2{font-size:1.4rem;margin:0 0 6px}
    .print-head .lines{display:flex;gap:30px;justify-content:center;color:#444;font-weight:700}
    .grid{gap:10px}
    .wrap{padding:0}
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ÉCRAN DE DÉPART -->
  <section id="start">
    <div class="start-card">
      <svg class="stop" viewBox="0 0 120 130" fill="none" aria-hidden="true">
        <rect x="50" y="4" width="20" height="10" rx="3" fill="#0c9d76"/>
        <rect x="56" y="12" width="8" height="10" fill="#0c9d76"/>
        <g class="ring">
          <circle cx="60" cy="68" r="46" fill="#fff" stroke="#12bd8e" stroke-width="7"/>
          <circle cx="60" cy="68" r="46" fill="none" stroke="#ffce4a" stroke-width="7" stroke-dasharray="60 230" stroke-linecap="round"/>
          <rect x="86" y="30" width="16" height="9" rx="4" transform="rotate(45 94 34)" fill="#ff885c"/>
          <line x1="60" y1="68" x2="60" y2="38" stroke="#0f4d40" stroke-width="5" stroke-linecap="round"/>
          <line x1="60" y1="68" x2="80" y2="76" stroke="#ff885c" stroke-width="5" stroke-linecap="round"/>
          <circle cx="60" cy="68" r="5" fill="#0f4d40"/>
        </g>
      </svg>
      <h1>Mes calculs</h1>
      <p class="lead">Veux-tu un chronomètre&nbsp;?</p>
      <div class="choice">
        <button class="btn btn-coral" onclick="begin(true)">⏱️ Oui, avec chrono</button>
        <button class="btn btn-primary" onclick="begin(false)">Non, tranquille</button>
      </div>
      <p class="hint">20 calculs par fiche · additions, soustractions, multiplications et divisions · tout en dessous de 100.</p>
    </div>
  </section>

  <!-- ÉCRAN EXERCICE -->
  <section id="exercise" style="display:none">
    <div class="print-head">
      <h2>Mes calculs</h2>
      <div class="lines"><span>Prénom : ______________</span><span>Date : ____________</span><span>Temps : ________</span></div>
    </div>

    <div class="topbar">
      <h2>Ma fiche de calculs</h2>
      <div class="spacer"></div>
      <div id="chip" class="chip" style="display:none">
        <span class="dot"></span><span>⏱️</span><span class="time" id="time">0:00.0</span>
      </div>
      <button class="btn btn-ghost" onclick="goStart()">↩︎ Chrono</button>
    </div>

    <div id="banner"></div>
    <div id="grid" class="grid"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="checkAll()">✓ Vérifier mes réponses</button>
      <button class="btn btn-ghost" onclick="reveal()">👁️ Voir les réponses</button>
      <button class="btn btn-coral" onclick="newSheet()">🔄 Nouvelle fiche</button>
      <button class="btn btn-ghost" onclick="window.print()">🖨️ Imprimer</button>
    </div>
  </section>

</div>

<script>
/* ============ Générateurs de calculs (banque immense, < 100) ============ */
const ACCENT = { add:'#2ec27e', sub:'#ff885c', mul:'#3aa0e8', div:'#9a86f0' };
const SIGN   = { add:'+', sub:'−', mul:'×', div:'÷' };

function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* Multiplications : tables 2 à 10, produit < 100 */
function poolMul(){
  const p=[];
  for(let t=2;t<=10;t++) for(let m=2;m<=10;m++){ if(t*m<100) p.push([t,m]); }
  return p;
}
/* Divisions : opérations inverses, dividende < 100 */
function poolDiv(){
  const p=[];
  for(let d=2;d<=10;d++) for(let q=2;q<=10;q++){ if(d*q<100) p.push([d,q]); }
  return p;
}
function takeMul(n){
  return shuffle(poolMul()).slice(0,n).map(([t,m])=>({type:'mul',a:t,b:m,text:`${t} × ${m}`,answer:t*m}));
}
function takeDiv(n){
  return shuffle(poolDiv()).slice(0,n).map(([d,q])=>({type:'div',a:d*q,b:d,text:`${d*q} ÷ ${d}`,answer:q}));
}

/* Addition < 100, avec ou sans passage de la dizaine */
function makeAdd(wantCarry, seen){
  for(let i=0;i<400;i++){
    const a=rnd(2,88), b=rnd(2,88);
    if(a+b>99 || a+b<11) continue;
    const carry = (a%10 + b%10) >= 10;
    if(carry!==wantCarry) continue;
    const key='a'+Math.min(a,b)+'_'+Math.max(a,b);
    if(seen.has(key)) continue;
    seen.add(key);
    return {type:'add',a,b,text:`${a} + ${b}`,answer:a+b};
  }
  const a=rnd(10,40),b=rnd(10,40); return {type:'add',a,b,text:`${a} + ${b}`,answer:a+b};
}
/* Soustraction < 100, avec ou sans passage (emprunt) */
function makeSub(wantBorrow, seen){
  for(let i=0;i<400;i++){
    const a=rnd(13,99), b=rnd(2,a-1);
    if(a-b<1) continue;
    const borrow = (a%10) < (b%10);
    if(borrow!==wantBorrow) continue;
    const key='s'+a+'_'+b;
    if(seen.has(key)) continue;
    seen.add(key);
    return {type:'sub',a,b,text:`${a} − ${b}`,answer:a-b};
  }
  const a=rnd(40,99),b=rnd(2,30); return {type:'sub',a,b,text:`${a} − ${b}`,answer:a-b};
}
function takeAdd(n){
  const seen=new Set(), out=[];
  for(let i=0;i<n;i++) out.push(makeAdd(i%2===0, seen)); // alterne avec/sans passage
  return out;
}
function takeSub(n){
  const seen=new Set(), out=[];
  for(let i=0;i<n;i++) out.push(makeSub(i%2===0, seen));
  return out;
}

/* Une fiche = 5 + 5 + 5 + 5, mélangé */
function buildSheet(){
  const items=[...takeAdd(5),...takeSub(5),...takeMul(5),...takeDiv(5)];
  return shuffle(items);
}

/* ============ État + rendu ============ */
let state = { chrono:false, sheet:[], t0:0, raf:null, frozen:null, started:false };

function begin(withChrono){
  state.chrono = withChrono;
  document.getElementById('start').style.display='none';
  document.getElementById('exercise').style.display='block';
  newSheet();
}
function goStart(){
  stopTimer();
  document.getElementById('exercise').style.display='none';
  document.getElementById('start').style.display='flex';
}

function newSheet(){
  stopTimer();
  state.frozen=null; state.started=false;
  state.sheet = buildSheet();
  document.getElementById('banner').innerHTML='';
  renderGrid();
  const chip=document.getElementById('chip');
  if(state.chrono){
    chip.style.display='inline-flex';
    chip.classList.remove('running');
    document.getElementById('time').textContent='0:00.0';
    // le chrono démarre une demi-seconde après l'affichage
    setTimeout(()=>{ if(!state.frozen) startTimer(); }, 500);
  } else {
    chip.style.display='none';
  }
  // focus sur le premier calcul
  setTimeout(()=>{ const f=document.querySelector('.calc input'); if(f) f.focus(); }, state.chrono?550:60);
}

function renderGrid(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  state.sheet.forEach((it,i)=>{
    const c=document.createElement('div');
    c.className='calc';
    c.style.setProperty('--accent', ACCENT[it.type]);
    c.innerHTML =
      `<span class="idx">${i+1}</span>`+
      `<span class="num">${it.text}</span>`+
      `<span class="eq">=</span>`+
      `<input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="3" aria-label="${it.text} égale" data-i="${i}">`+
      `<span class="badge" data-badge="${i}"></span>`;
    g.appendChild(c);
  });
  // Entrée = case suivante
  const inputs=[...g.querySelectorAll('input')];
  inputs.forEach((inp,k)=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){ e.preventDefault(); (inputs[k+1]||inputs[0]).focus(); }
    });
  });
}

/* ============ Chronomètre ============ */
function fmt(ms){
  const t=Math.floor(ms/100); // dixièmes
  const m=Math.floor(t/600);
  const s=Math.floor((t%600)/10);
  const d=t%10;
  return `${m}:${String(s).padStart(2,'0')}.${d}`;
}
function startTimer(){
  state.started=true;
  state.t0=performance.now();
  document.getElementById('chip').classList.add('running');
  const tick=()=>{
    const el=performance.now()-state.t0;
    document.getElementById('time').textContent=fmt(el);
    state.raf=requestAnimationFrame(tick);
  };
  state.raf=requestAnimationFrame(tick);
}
function stopTimer(){
  if(state.raf){ cancelAnimationFrame(state.raf); state.raf=null; }
  document.getElementById('chip')?.classList.remove('running');
}
function freezeTimer(){
  if(state.chrono && state.started && state.frozen===null){
    state.frozen = performance.now()-state.t0;
    document.getElementById('time').textContent=fmt(state.frozen);
  }
  stopTimer();
}

/* ============ Correction ============ */
function readVal(i){
  const inp=document.querySelector(`input[data-i="${i}"]`);
  return inp.value.trim();
}
function checkAll(){
  freezeTimer();
  let correct=0, filled=0;
  state.sheet.forEach((it,i)=>{
    const inp=document.querySelector(`input[data-i="${i}"]`);
    const badge=document.querySelector(`[data-badge="${i}"]`);
    inp.classList.remove('right','wrong'); badge.textContent='';
    const v=inp.value.trim();
    if(v==='') return;
    filled++;
    if(Number(v)===it.answer){ inp.classList.add('right'); badge.textContent='✓'; correct++; }
    else{ inp.classList.add('wrong'); badge.textContent='✗'; }
  });
  showBanner(correct, filled);
}
function reveal(){
  freezeTimer();
  state.sheet.forEach((it,i)=>{
    const inp=document.querySelector(`input[data-i="${i}"]`);
    inp.value=it.answer; inp.classList.remove('wrong'); inp.classList.add('right');
    document.querySelector(`[data-badge="${i}"]`).textContent='';
  });
  document.getElementById('banner').innerHTML='';
}
function showBanner(correct, filled){
  const total=state.sheet.length;
  const allDone = filled===total;
  let emoji, msg;
  if(correct===total){ emoji='🌟'; msg='Sans faute, bravo&nbsp;!'; }
  else if(correct>=total*0.8){ emoji='😃'; msg='Très bien joué&nbsp;!'; }
  else if(correct>=total*0.5){ emoji='🙂'; msg='Bon travail, continue&nbsp;!'; }
  else { emoji='💪'; msg='Encore un petit effort&nbsp;!'; }
  const cls = correct>=total*0.8 ? 'good' : 'ok';
  const timeTxt = (state.chrono && state.frozen!==null) ? ` · ⏱️ ${fmt(state.frozen)}` : '';
  const note = allDone ? '' : ` (${total-filled} non rempli${total-filled>1?'s':''})`;
  document.getElementById('banner').innerHTML =
    `<div class="banner ${cls}">`+
      `<span class="emoji">${emoji}</span>`+
      `<div><div class="msg">${msg}</div>`+
      `<div class="sub">${correct} / ${total} réussi${correct>1?'s':''}${note}${timeTxt}</div></div>`+
    `</div>`;
}
</script>
</body>
</html>
