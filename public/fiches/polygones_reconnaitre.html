<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Polygones — Reconnaitre</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f5f6fa; padding: 1.5rem; }
.container { max-width: 680px; margin: 0 auto; }
.info-card { background:#ede9fe;border:1px solid #8b5cf6;border-radius:12px;padding:.8rem 1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center; }
.info-card p { font-size:13px;color:#6d28d9;font-weight:700;margin:0; }
.dots { display:flex;gap:6px; }
.dot { width:12px;height:12px;border-radius:50%; }
.question-card { background:white;border-radius:16px;padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e5e7eb; }
.q-label { font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:1rem;text-align:center; }
.poly-zone { display:flex;justify-content:center;margin-bottom:1.5rem; }
.q-texte { font-size:15px;font-weight:700;color:#1e1b4b;margin-bottom:1rem;text-align:center; }
.options { display:flex;flex-direction:column;gap:8px; }
.opt-btn { padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;background:white;font-size:14px;font-weight:700;color:#374151;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:10px; }
.opt-btn:hover:not(:disabled) { border-color:#8b5cf6;background:#ede9fe;color:#6d28d9; }
.opt-btn .opt-letter { width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#6b7280;flex-shrink:0;transition:all .15s; }
.opt-btn:hover:not(:disabled) .opt-letter { background:#8b5cf6;color:white; }
.opt-btn.correct { border-color:#16a34a;background:#f0fdf4;color:#166534; }
.opt-btn.correct .opt-letter { background:#16a34a;color:white; }
.opt-btn.incorrect { border-color:#dc2626;background:#fff5f5;color:#991b1b; }
.opt-btn.incorrect .opt-letter { background:#dc2626;color:white; }
.opt-btn.disabled-neutral { border-color:#e5e7eb;color:#9ca3af; }
.btn { width:100%;padding:12px;background:#8b5cf6;color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .2s;margin-bottom:.75rem; }
.btn:hover { background:#7c3aed; }
.score-final { display:none;text-align:center;padding:2rem;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.1); }
.big-emoji { font-size:64px;margin-bottom:.5rem; }
.big-score { font-size:36px;font-weight:900;margin-bottom:1rem; }
.score-detail { font-size:13px;color:#6b7280;margin-bottom:1.5rem;line-height:2; }
</style>
</head>
<body>
<div class="container">
  <div id="exercice-zone">
    <div class="info-card">
      <p id="info-numero">Forme 1/10</p>
      <div class="dots" id="dots-progress"></div>
    </div>
    <div id="question-zone"></div>
    <button class="btn" id="btn-suivant" style="display:none" onclick="suivant()">➡️ Forme suivante</button>
  </div>
  <div class="score-final" id="score-final">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score"></div>
    <div class="score-detail" id="final-detail"></div>
    <button class="btn" onclick="demarrer()">🔄 Recommencer</button>
  </div>
</div>
<script>
const COL = '#8b5cf6';

// Génère un polygone régulier centré
function regularPoly(n, cx, cy, r, rotation){
  rotation = rotation || 0;
  const pts = [];
  for(let i=0;i<n;i++){
    const a = (2*Math.PI*i/n) - Math.PI/2 + rotation;
    pts.push([cx + r*Math.cos(a), cy + r*Math.sin(a)]);
  }
  return pts;
}

// Génère un polygone irrégulier à partir d'un régulier perturbé
function irregularPoly(n, cx, cy, r, seed){
  const pts = [];
  // Utiliser seed pour perturbation reproductible
  let s = seed || 42;
  function rng(){ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }
  for(let i=0;i<n;i++){
    const baseA = (2*Math.PI*i/n) - Math.PI/2;
    const da = (rng()-0.5)*0.5; // perturbation angulaire
    const dr = r*(0.65 + rng()*0.35); // rayon variable
    pts.push([cx + dr*Math.cos(baseA+da), cy + dr*Math.sin(baseA+da)]);
  }
  return pts;
}

function ptsToSVG(pts, col){
  const d = pts.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ')+'Z';
  return `<path d="${d}" fill="${col}22" stroke="${col}" stroke-width="2.5" stroke-linejoin="round"/>`;
}

function drawPoly(pts){
  return `<svg viewBox="0 0 220 200" width="220" height="200" xmlns="http://www.w3.org/2000/svg">
    ${ptsToSVG(pts, COL)}
  </svg>`;
}

// NOMS et nombre de côtés
const POLYS = [
  { name:'un triangle',    n:3  },
  { name:'un quadrilatère',n:4  },
  { name:'un pentagone',   n:5  },
  { name:'un hexagone',    n:6  },
  { name:'un heptagone',   n:7  },
  { name:'un octogone',    n:8  },
  { name:'un décagone',    n:10 },
  { name:'un dodécagone',  n:12 },
];

// Banque de formes : {polyIdx, regular, rotation, seed}
// polyIdx = index dans POLYS
const FORMES = [
  // Triangles
  { pi:0, reg:true,  rot:0 },
  { pi:0, reg:false, seed:11 },
  { pi:0, reg:true,  rot:0.5 },
  { pi:0, reg:false, seed:77 },
  // Quadrilatères
  { pi:1, reg:true,  rot:Math.PI/4 },  // carré
  { pi:1, reg:false, seed:22 },         // quadrilatère irrégulier
  { pi:1, reg:false, seed:88 },
  // Pentagones
  { pi:2, reg:true,  rot:0 },
  { pi:2, reg:false, seed:33 },
  { pi:2, reg:true,  rot:0.3 },
  // Hexagones
  { pi:3, reg:true,  rot:0 },
  { pi:3, reg:false, seed:44 },
  { pi:3, reg:true,  rot:Math.PI/6 },
  // Heptagones
  { pi:4, reg:true,  rot:0 },
  { pi:4, reg:false, seed:55 },
  { pi:4, reg:true,  rot:0.2 },
  // Octogones
  { pi:5, reg:true,  rot:0 },
  { pi:5, reg:false, seed:66 },
  { pi:5, reg:true,  rot:Math.PI/8 },
  // Décagones
  { pi:6, reg:true,  rot:0 },
  { pi:6, reg:false, seed:99 },
  { pi:6, reg:true,  rot:0.1 },
  // Dodécagones
  { pi:7, reg:true,  rot:0 },
  { pi:7, reg:false, seed:111 },
  { pi:7, reg:true,  rot:Math.PI/12 },
];

function getPolyPts(forme){
  const p = POLYS[forme.pi];
  const cx=110, cy=100, r=80;
  if(forme.reg) return regularPoly(p.n, cx, cy, r, forme.rot||0);
  else return irregularPoly(p.n, cx, cy, r, forme.seed||42);
}

function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

function getOpts(pi){
  const correct = POLYS[pi].name;
  // Choisir 2 distracteurs proches en nombre de côtés
  const others = POLYS.filter((_,i)=>i!==pi);
  const wrong = shuffle(others).slice(0,2).map(p=>p.name);
  const opts = shuffle([correct,...wrong]);
  return { opts, correct: opts.indexOf(correct) };
}

let selection=[], curIdx=0, scores=[];

function demarrer(){
  // Tirer 10 formes en garantissant la variété (au moins une de chaque type si possible)
  const byType = {};
  FORMES.forEach((f,i)=>{
    if(!byType[f.pi]) byType[f.pi]=[];
    byType[f.pi].push(i);
  });
  let picked = [];
  // 1 de chaque type
  Object.values(byType).forEach(arr=>{ picked.push(shuffle([...arr])[0]); });
  // Compléter jusqu'à 10
  const remaining = shuffle(FORMES.map((_,i)=>i).filter(i=>!picked.includes(i)));
  while(picked.length<10) picked.push(remaining.pop());
  picked = shuffle(picked).slice(0,10);
  selection = picked.map(i=>({ forme:FORMES[i], ...getOpts(FORMES[i].pi) }));
  curIdx=0; scores=[];
  document.getElementById('score-final').style.display='none';
  document.getElementById('exercice-zone').style.display='block';
  afficherForme();
}

function afficherForme(){
  const s = selection[curIdx];
  const pts = getPolyPts(s.forme);
  const svg = drawPoly(pts);

  document.getElementById('info-numero').textContent = `Forme ${curIdx+1}/10`;
  document.getElementById('dots-progress').innerHTML =
    selection.map((_,i)=>`<div class="dot" style="background:${i<curIdx?'#16a34a':i===curIdx?'#8b5cf6':'#d1d5db'}"></div>`).join('');

  const L=['A','B','C'];
  const optsHtml = s.opts.map((o,i)=>`
    <button class="opt-btn" id="opt-${i}" onclick="choisir(${i},${s.correct})">
      <span class="opt-letter">${L[i]}</span><span>${o}</span>
    </button>`).join('');

  document.getElementById('question-zone').innerHTML = `
    <div class="question-card">
      <div class="q-label">🔷 Quel est ce polygone ?</div>
      <div class="poly-zone">${svg}</div>
      <div class="q-texte">Ce polygone est...</div>
      <div class="options">${optsHtml}</div>
    </div>`;
  document.getElementById('btn-suivant').style.display='none';
}

function choisir(idx, correct){
  const ok=(idx===correct);
  scores.push(ok);
  for(let i=0;i<3;i++){
    const b=document.getElementById('opt-'+i);
    if(!b) continue; b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===idx&&!ok) b.classList.add('incorrect');
    else b.classList.add('disabled-neutral');
  }
  const isLast=curIdx>=9;
  const btn=document.getElementById('btn-suivant');
  btn.style.display='block';
  btn.textContent=isLast?'🏁 Voir mon score final':'➡️ Forme suivante';
  btn.onclick=isLast?afficherScoreFinal:suivant;
}

function suivant(){ curIdx++; afficherForme(); }

function afficherScoreFinal(){
  document.getElementById('exercice-zone').style.display='none';
  const sf=document.getElementById('score-final'); sf.style.display='block';
  const ok=scores.filter(Boolean).length, total=scores.length;
  const pct=Math.round(ok/total*100);
  document.getElementById('final-emoji').textContent=pct===100?'🎉':pct>=60?'👍':'💪';
  document.getElementById('final-score').textContent=`${ok}/${total} — ${pct}%`;
  document.getElementById('final-score').style.color=pct===100?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
  document.getElementById('final-detail').innerHTML=scores.map((s,i)=>`Q${i+1} : ${s?'✅':'❌'}`).join('  ');
}

demarrer();
</script>
</body>
</html>
