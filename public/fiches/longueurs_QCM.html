<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Longueurs — Conversions QCM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f5f6fa; padding: 1.5rem; }
.container { max-width: 680px; margin: 0 auto; }
.info-card {
  background: #dbeafe; border: 1px solid #3b82f6;
  border-radius: 12px; padding: .8rem 1rem; margin-bottom: 1.5rem;
  display: flex; justify-content: space-between; align-items: center;
}
.info-card p { font-size: 13px; color: #1d4ed8; font-weight: 700; margin: 0; }
.dots { display: flex; gap: 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.question-card {
  background: white; border-radius: 16px; padding: 1.75rem 1.5rem;
  margin-bottom: 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.08);
  border: 2px solid #e5e7eb; transition: all .2s;
}
.q-label {
  font-size: 12px; font-weight: 800; text-transform: uppercase;
  letter-spacing: .05em; color: #9ca3af; margin-bottom: .6rem; text-align: center;
}
.q-nombre { font-size: 32px; font-weight: 900; color: #1e1b4b; text-align: center; margin-bottom: .5rem; }
.q-texte { font-size: 15px; color: #6b7280; text-align: center; margin-bottom: 1.5rem; font-weight: 600; }
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  padding: 12px 18px; border-radius: 12px; border: 2px solid #e5e7eb;
  background: white; font-size: 16px; font-weight: 800; color: #374151;
  cursor: pointer; text-align: left; font-family: 'Nunito', sans-serif;
  transition: all .15s; display: flex; align-items: center; gap: 12px;
}
.opt-btn:hover:not(:disabled) { border-color: #3b82f6; background: #dbeafe; color: #1d4ed8; }
.opt-btn .opt-letter {
  width: 28px; height: 28px; border-radius: 50%; background: #f3f4f6;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #6b7280; flex-shrink: 0; transition: all .15s;
}
.opt-btn:hover:not(:disabled) .opt-letter { background: #3b82f6; color: white; }
.opt-btn.correct { border-color: #16a34a; background: #f0fdf4; color: #166534; }
.opt-btn.correct .opt-letter { background: #16a34a; color: white; }
.opt-btn.incorrect { border-color: #dc2626; background: #fff5f5; color: #991b1b; }
.opt-btn.incorrect .opt-letter { background: #dc2626; color: white; }
.opt-btn.disabled-neutral { border-color: #e5e7eb; color: #9ca3af; background: white; }
.btn {
  width: 100%; padding: 12px; background: #3b82f6; color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 800;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  transition: background .2s; margin-bottom: .75rem;
}
.btn:hover { background: #2563eb; }
.score-final {
  display: none; text-align: center; padding: 2rem; background: white;
  border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.1);
}
.big-emoji { font-size: 64px; margin-bottom: .5rem; }
.big-score { font-size: 36px; font-weight: 900; margin-bottom: 1rem; }
.score-detail { font-size: 13px; color: #6b7280; margin-bottom: 1.5rem; line-height: 2; }
</style>
</head>
<body>
<div class="container">
  <div id="exercice-zone">
    <div class="info-card">
      <p id="info-numero">Question 1/10</p>
      <div class="dots" id="dots-progress"></div>
    </div>
    <div id="question-zone"></div>
    <button class="btn" id="btn-suivant" style="display:none" onclick="suivant()">➡️ Question suivante</button>
  </div>
  <div class="score-final" id="score-final">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score"></div>
    <div class="score-detail" id="final-detail"></div>
    <button class="btn" onclick="demarrer()">🔄 Recommencer</button>
  </div>
</div>
<script>
const QUESTIONS = [
  { nombre:"3 m",       opts:["30 cm","300 cm","3 dam"],            correct:1 },
  { nombre:"500 mm",    opts:["5 m","50 m","0,5 m"],                correct:2 },
  { nombre:"2,5 km",    opts:["250 m","2500 m","25 m"],             correct:1 },
  { nombre:"¼ m",       opts:["25 mm","25 cm","250 cm"],            correct:1 },
  { nombre:"½ km",      opts:["50 m","5000 m","500 m"],             correct:2 },
  { nombre:"4000 m",    opts:["40 km","400 km","4 km"],             correct:2 },
  { nombre:"750 m",     opts:["¼ km","½ km","¾ km"],                correct:2 },
  { nombre:"3,5 m",     opts:["35 mm","350 mm","3500 mm"],          correct:2 },
  { nombre:"1 km",      opts:["100 m","1000 m","10000 m"],          correct:1 },
  { nombre:"2500 m",    opts:["25 km","2,5 km","250 km"],           correct:1 },
  { nombre:"½ m",       opts:["5 cm","50 cm","500 cm"],             correct:1 },
  { nombre:"1 dam",     opts:["1 m","100 m","10 m"],                correct:2 },
  { nombre:"50 hm",     opts:["500 m","5000 m","50000 m"],          correct:1 },
  { nombre:"¼ km",      opts:["25 m","2500 m","250 m"],             correct:2 },
  { nombre:"0,1 m",     opts:["1 cm","10 cm","100 cm"],             correct:1 },
  { nombre:"1 cm",      opts:["1 mm","10 mm","100 mm"],             correct:1 },
  { nombre:"500 cm",    opts:["50 m","5 m","0,5 m"],                correct:1 },
  { nombre:"250 mm",    opts:["0,25 m","2,5 m","25 m"],             correct:0 },
  { nombre:"0,1 cm",    opts:["1 mm","10 mm","100 mm"],             correct:0 },
  { nombre:"1 dm",      opts:["1 cm","10 cm","100 cm"],             correct:1 },
  { nombre:"1 hm",      opts:["10 m","100 m","1000 m"],             correct:1 },
  { nombre:"5 hm",      opts:["50 m","500 m","5000 m"],             correct:1 },
  { nombre:"734 m",     opts:["0,734 km","7,34 km","73,4 dam"],     correct:0 },
  { nombre:"½ hm",      opts:["5 m","500 m","50 m"],                correct:2 },
  { nombre:"¼ hm",      opts:["250 m","2,5 m","25 m"],              correct:2 },
  { nombre:"10 hm",     opts:["100 m","10000 m","1 km"],            correct:2 },
  { nombre:"2,5 hm",    opts:["25 m","2500 m","250 m"],             correct:2 },
  { nombre:"3500 mm",   opts:["35 m","3,5 m","350 dm"],             correct:1 },
  { nombre:"0,25 m",    opts:["250 mm","25 mm","2500 mm"],          correct:0 },
  { nombre:"1,5 km",    opts:["150 m","15000 m","1500 m"],          correct:2 },
  { nombre:"6 m",       opts:["60 mm","600 cm","6000 cm"],          correct:1 },
  { nombre:"200 dam",   opts:["20 m","20000 m","2000 m"],           correct:2 },
  { nombre:"¾ m",       opts:["75 cm","750 dm","7,5 dm"],           correct:0 },
  { nombre:"4,5 km",    opts:["450 m","45000 m","4500 m"],          correct:2 },
  { nombre:"125 mm",    opts:["¼ m","½ m","⅛ m"],                   correct:2 },
  { nombre:"5 cm",      opts:["5 mm","500 mm","50 mm"],             correct:2 },
  { nombre:"0,5 km",    opts:["50 m","5000 m","500 m"],             correct:2 },
  { nombre:"300 dm",    opts:["3 m","300 m","30 m"],                correct:2 },
  { nombre:"2 dam",     opts:["2 m","200 m","20 m"],                correct:2 },
  { nombre:"¼ dm",      opts:["2,5 mm","25 mm","250 mm"],           correct:1 },
  { nombre:"0,001 km",  opts:["10 m","100 m","1 m"],                correct:2 },
  { nombre:"7500 mm",   opts:["75 m","7,5 m","750 dm"],             correct:1 },
  { nombre:"0,75 m",    opts:["75 cm","750 cm","7,5 cm"],           correct:0 },
  { nombre:"1250 mm",   opts:["1,25 m","12,5 m","125 dm"],          correct:0 },
  { nombre:"3 km",      opts:["300 m","30000 m","3000 m"],          correct:2 },
  { nombre:"5 dam",     opts:["5 m","500 m","50 m"],                correct:2 },
  { nombre:"600 m",     opts:["60 hm","6 hm","0,6 hm"],             correct:1 },
  { nombre:"2 cm",      opts:["2 mm","200 mm","20 mm"],             correct:2 },
  { nombre:"0,3 m",     opts:["3 mm","3000 mm","300 mm"],           correct:2 },
  { nombre:"¾ km",      opts:["7,5 m","75 m","750 m"],              correct:2 },
];

const LETTRES = ['A','B','C'];
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

let selection=[], curIdx=0, scores=[];

function demarrer(){
  selection = shuffle(QUESTIONS).slice(0,10);
  curIdx=0; scores=[];
  document.getElementById('score-final').style.display='none';
  document.getElementById('exercice-zone').style.display='block';
  afficherQuestion();
}

function afficherQuestion(){
  const q = selection[curIdx];
  document.getElementById('info-numero').textContent = `Question ${curIdx+1}/10`;
  document.getElementById('dots-progress').innerHTML =
    selection.map((_,i) => `<div class="dot" style="background:${i<curIdx?'#16a34a':i===curIdx?'#3b82f6':'#d1d5db'}"></div>`).join('');

  document.getElementById('question-zone').innerHTML = `
    <div class="question-card" id="qcard">
      <div class="q-label">📏 Conversion de longueurs</div>
      <div class="q-nombre">${q.nombre}</div>
      <div class="q-texte">c'est la même chose que</div>
      <div class="options">${q.opts.map((o,i)=>`
        <button class="opt-btn" id="opt-${i}" onclick="choisir(${i})">
          <span class="opt-letter">${LETTRES[i]}</span>
          <span>${o}</span>
        </button>`).join('')}
      </div>
    </div>`;

  document.getElementById('btn-suivant').style.display='none';
}

function choisir(idx){
  const q = selection[curIdx];
  const ok = (idx === q.correct);
  scores.push(ok);
  q.opts.forEach((_,i) => {
    const btn = document.getElementById('opt-'+i);
    btn.disabled = true;
    if(i === q.correct) btn.classList.add('correct');
    else if(i === idx && !ok) btn.classList.add('incorrect');
    else btn.classList.add('disabled-neutral');
  });
  const isLast = (curIdx >= 9);
  const btn = document.getElementById('btn-suivant');
  btn.style.display = 'block';
  btn.textContent = isLast ? '🏁 Voir mon score final' : '➡️ Question suivante';
  btn.onclick = isLast ? afficherScoreFinal : suivant;
}

function suivant(){ curIdx++; afficherQuestion(); }

function afficherScoreFinal(){
  document.getElementById('exercice-zone').style.display='none';
  const sf = document.getElementById('score-final'); sf.style.display='block';
  const ok = scores.filter(Boolean).length, total = scores.length;
  const pct = Math.round(ok/total*100);
  document.getElementById('final-emoji').textContent = pct===100?'🎉':pct>=60?'👍':'💪';
  document.getElementById('final-score').textContent = `${ok}/${total} — ${pct}%`;
  document.getElementById('final-score').style.color = pct===100?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
  document.getElementById('final-detail').innerHTML =
    scores.map((s,i) => `Q${i+1} : ${s?'✅':'❌'}`).join('  ');
}

demarrer();
</script>
</body>
</html>
