<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plus grand, plus petit ou égal ?</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
  <style>
  :root{
    --purple: #5B4FCF;
    --purple-light: #EEF0FF;
    --purple-mid: #C7C2F5;
    --green: #1A9E75;
    --green-light: #E2F5EE;
    --red: #D94F3D;
    --red-light: #FDECEA;
    --amber: #C97B1A;
    --amber-light: #FEF3E2;
    --teal: #1A6FA0;
    --teal-dark: #104e73;
    --coral: #D94F3D;
    --gold: #C97B1A;
    --bg: #FDFBF7;
    --panel: #FFFFFF;
    --ink: #1A1A2E;
    --muted: #6B7080;
    --line: #1A1A2E;
    --shadow: 6px 6px 0px #1A1A2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:36px 16px;
    color:var(--ink);
  }
  .card{
    width:100%;
    max-width:720px;
    background:var(--panel);
    border: 3px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:28px 30px 32px;
    position:relative;
  }

  .top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    margin-bottom:22px;
  }
  .title-block .eyebrow{
    font-size:12px;
    font-weight:800;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 4px;
    font-family: 'Fredoka', sans-serif;
  }
  .title-block h1{
    font-size:22px;
    margin:0;
    font-weight:800;
    font-family: 'Fredoka', sans-serif;
  }
  .pill{
    background:var(--bg);
    border:2px solid var(--line);
    border-radius:999px;
    padding:8px 16px;
    font-weight:800;
    font-size:14px;
    color:var(--ink);
    white-space:nowrap;
    font-family: 'Fredoka', sans-serif;
  }
  .pill .num{ color:var(--teal); }

  .track{
    height:10px;
    border-radius:999px;
    background:var(--bg);
    border:2px solid var(--line);
    overflow:hidden;
    margin-bottom:28px;
  }
  .fill{
    height:100%;
    background:linear-gradient(90deg,var(--teal),var(--gold));
    width:10%;
    transition:width .4s ease;
    border-radius:999px;
  }

  .intro{
    font-size:14px;
    color:var(--muted);
    line-height:1.5;
    margin:0 0 22px;
    text-align:center;
  }

  .qnum{
    text-align:center;
    font-size:12px;
    font-weight:800;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:14px;
    font-family: 'Fredoka', sans-serif;
  }

  .compare-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:8px;
  }
  .num-box{
    flex:1 1 200px;
    max-width:250px;
    background:var(--bg);
    border:2px solid var(--line);
    border-radius:16px;
    padding:22px 18px;
    text-align:center;
    font-size:25px;
    font-weight:850;
    font-family: 'Nunito', sans-serif;
    line-height:1.35;
    min-height:96px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .num-box .small{
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    font-family: 'Inter', sans-serif;
  }

  .sign-slot{
    flex:0 0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .sign-display{
    width:64px;
    height:64px;
    border-radius:18px;
    border:3px solid var(--line);
    background:var(--teal);
    color:#fff;
    font-size:32px;
    font-weight:800;
    font-family: 'Nunito', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:4px 4px 0px var(--line);
  }
  .sign-display.empty{
    background:var(--bg);
    border:3px dashed var(--line);
    color:var(--muted);
    box-shadow:none;
    font-size:26px;
  }
  .sign-display.correct{
    background:var(--green) !important;
    box-shadow:4px 4px 0px var(--line);
  }
  .sign-display.wrong{
    background:var(--red) !important;
    box-shadow:4px 4px 0px var(--line);
  }

  .sign-choices{
    display:flex;
    gap:8px;
  }
  .sign-choice{
    width:40px;
    height:40px;
    flex:0 0 40px;
    border-radius:10px;
    border:2px solid var(--line);
    background:#fff;
    font-size:18px;
    font-weight:800;
    color:var(--ink);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:2px 2px 0px var(--line);
    transition:all .2s ease;
  }
  .sign-choice:hover{
    border-color:var(--teal);
    transform:translate(-1px, -1px);
    box-shadow:3px 3px 0px var(--line);
  }
  .sign-choice.selected{
    background:var(--teal);
    border-color:var(--line);
    color:#fff;
    transform:translate(1px, 1px);
    box-shadow:1px 1px 0px var(--line);
  }
  .sign-choice:disabled{
    cursor:default;
    opacity:.55;
    box-shadow:none;
    transform:none;
  }
  .sign-choice:disabled:hover{
    transform:none;
    border-color:var(--line);
  }

  .feedback-box{
    margin-top:18px;
    border-radius:16px;
    border:3px solid var(--line);
    padding:16px 18px;
    font-size:14.5px;
    line-height:1.55;
    display:none;
    box-shadow:4px 4px 0px var(--line);
  }
  .feedback-box.show{ display:block; }
  .feedback-box.ok{
    background:var(--green-light);
    color:var(--ink);
  }
  .feedback-box.ko{
    background:var(--red-light);
    color:var(--ink);
  }
  .feedback-box strong{ font-weight:800; }
  .feedback-box .explain{
    margin-top:8px;
    color:var(--ink);
    font-weight:600;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:24px;
  }
  button.action{
    padding:10px 20px;
    border:3px solid var(--line);
    border-radius:999px;
    font-family:'Fredoka', sans-serif;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    color:#fff;
    transition:all .2s ease;
    box-shadow:3px 3px 0px var(--line);
  }
  button.action:active{ transform:translate(1px, 1px); box-shadow:1px 1px 0px var(--line); }
  button.action:not(:disabled):hover{ transform:translate(-1px, -1px); box-shadow:4px 4px 0px var(--line); }
  .btn-validate{ background:var(--gold); color:#fff; }
  .btn-validate:disabled{ background:#e3ddcc; color:#a9a193; cursor:not-allowed; box-shadow:none; border-color:#a9a193; transform:none; }
  .btn-next{ background:var(--teal); }

  /* End screen */
  .end{
    text-align:center;
    padding:14px 0 4px;
  }
  .end .big-score{
    font-size:56px;
    font-weight:800;
    color:var(--teal);
    margin:6px 0 2px;
    font-family: 'Fredoka', sans-serif;
  }
  .end .msg{
    font-size:15px;
    color:var(--muted);
    margin-bottom:24px;
  }
  .btn-restart{ background:var(--coral); }

  .hidden{ display:none !important; }

  @media (max-width:540px){
    .card{ padding:22px 18px 26px; }
    .num-box{ font-size:19px; padding:18px 12px; min-height:80px; flex-basis:140px; }
    .num-box .small{ font-size:13px; }
    h1{ font-size:19px; }
    .compare-row{ gap:8px; }
    .sign-display{ width:48px; height:48px; font-size:22px; border-radius:14px; }
    .sign-choice{ width:32px; height:32px; flex:0 0 32px; font-size:15px; }
    .sign-choices{ gap:6px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="top">
    <div class="title-block">
      <p class="eyebrow">Maths &middot; Nombres</p>
      <h1>Plus grand, plus petit ou égal ?</h1>
    </div>
    <div class="pill">Score <span class="num" id="scoreVal">0</span>/10</div>
  </div>

  <div class="track"><div class="fill" id="fill"></div></div>

  <p class="intro">Choisis le signe qui convient (<strong>&lt;</strong>, <strong>&gt;</strong> ou <strong>=</strong>), puis clique sur <strong>Vérifier</strong>. Aide-toi de ton abaque pour comparer les deux écritures !</p>

  <div id="quizArea">
    <div class="qnum" id="qLabel">Question 1 / 10</div>

    <div class="compare-row">
      <div class="num-box" id="leftBox"></div>

      <div class="sign-slot">
        <div class="sign-display empty" id="signDisplay">?</div>
        <div class="sign-choices">
          <button class="sign-choice">&lt;</button>
          <button class="sign-choice">=</button>
          <button class="sign-choice">&gt;</button>
        </div>
      </div>

      <div class="num-box" id="rightBox"></div>
    </div>

    <div class="feedback-box" id="feedbackBox">
      <div id="feedbackTitle"></div>
      <div class="explain" id="feedbackExplain"></div>
    </div>

    <div class="controls">
      <button class="action btn-validate" id="validateBtn" disabled>Vérifier</button>
      <button class="action btn-next hidden" id="nextBtn">Question suivante</button>
    </div>
  </div>

  <div id="endArea" class="end hidden">
    <p class="qnum">Exercice terminé</p>
    <div class="big-score"><span id="finalScore">0</span> / 10</div>
    <p class="msg" id="finalMsg"></p>
    <div class="controls">
      <button class="action btn-restart" id="restartBtn">Recommencer avec 10 nouvelles questions</button>
    </div>
  </div>
</div>

<script>

let order = [];
let current = 0;
let score = 0;
let chosenSign = null;
let answered = false;

const leftBox = document.getElementById('leftBox');
const rightBox = document.getElementById('rightBox');

const signChoices = document.querySelectorAll('.sign-choice');
const validateBtn = document.getElementById('validateBtn');
const nextBtn = document.getElementById('nextBtn');
const feedbackBox = document.getElementById('feedbackBox');
const feedbackTitle = document.getElementById('feedbackTitle');
const feedbackExplain = document.getElementById('feedbackExplain');

const fill = document.getElementById('fill');
const scoreVal = document.getElementById('scoreVal');
const quizArea = document.getElementById('quizArea');
const endArea = document.getElementById('endArea');
const finalScore = document.getElementById('finalScore');
const finalMsg = document.getElementById('finalMsg');
const restartBtn = document.getElementById('restartBtn');

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pickTen(){
  const idx = shuffle([...Array(BANK.length).keys()]);
  return idx.slice(0,10);
}

function correctSign(item){
  if(item.left.value < item.right.value) return '<';
  if(item.left.value > item.right.value) return '>';
  return '=';
}

// Formate un nombre avec espace pour les milliers et virgule pour les décimales (notation FWB)
function formatNumber(value){
  const isNeg = value < 0;
  const abs = Math.abs(value);
  const str = abs.toString();
  let [intPart, decPart] = str.split('.');
  // groupes de 3 chiffres pour la partie entière
  let grouped = '';
  for(let i=0;i<intPart.length;i++){
    if(i>0 && (intPart.length - i) % 3 === 0) grouped += ' ';
    grouped += intPart[i];
  }
  let result = grouped;
  if(decPart){
    result += ',' + decPart;
  }
  return (isNeg ? '-' : '') + result;
}

function buildExplanation(item, correct){
  const lv = formatNumber(item.left.value);
  const rv = formatNumber(item.right.value);
  if(correct === '='){
    return `Les deux écritures représentent le même nombre : <strong>${lv}</strong>. C'est pour ça que le signe est <strong>=</strong>.`;
  }
  const word = correct === '<' ? 'plus petit que' : 'plus grand que';
  return `À gauche, on a <strong>${lv}</strong> et à droite, <strong>${rv}</strong>. ${lv} est ${word} ${rv}, donc le signe est <strong>${correct}</strong>.`;
}

function startQuiz(){
  order = pickTen();
  current = 0;
  score = 0;
  scoreVal.textContent = '0';
  endArea.classList.add('hidden');
  quizArea.classList.remove('hidden');
  loadQuestion();
}

function loadQuestion(){
  answered = false;
  chosenSign = null;

  const item = BANK[order[current]];
  qLabel.textContent = `Question ${current+1} / 10`;
  leftBox.innerHTML = item.left.html;
  rightBox.innerHTML = item.right.html;

  fill.style.width = ((current)/10*100 + 10) + '%';

  signDisplay.textContent = '?';
  signDisplay.className = 'sign-display empty';

  signChoices.forEach(btn => {
    btn.classList.remove('selected');
    btn.disabled = false;
  });

  feedbackBox.classList.remove('show','ok','ko');
  feedbackTitle.textContent = '';
  feedbackExplain.textContent = '';

  validateBtn.disabled = true;
  validateBtn.classList.remove('hidden');
  nextBtn.classList.add('hidden');
}

signChoices.forEach(btn => {
  btn.addEventListener('click', () => {
    if(answered) return;
    signChoices.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    chosenSign = btn.textContent.trim();
    signDisplay.textContent = chosenSign;
    signDisplay.className = 'sign-display';
    validateBtn.disabled = false;
  });
});

validateBtn.addEventListener('click', () => {
  if(answered || chosenSign === null) return;
  answered = true;

  const item = BANK[order[current]];
  const correct = correctSign(item);
  const isCorrect = chosenSign === correct;

  signChoices.forEach(b => b.disabled = true);
  validateBtn.classList.add('hidden');
  nextBtn.classList.remove('hidden');

  feedbackBox.classList.add('show');

  if(isCorrect){
    score++;
    scoreVal.textContent = score;
    signDisplay.classList.add('correct');
    feedbackBox.classList.add('ok');
    feedbackTitle.innerHTML = '<strong>Bravo, c\'est le bon signe !</strong>';
    feedbackExplain.innerHTML = buildExplanation(item, correct);
  } else {
    signDisplay.classList.add('wrong');
    feedbackBox.classList.add('ko');
    feedbackTitle.innerHTML = `Pas tout à fait... la bonne réponse était <strong>${correct}</strong>.`;
    feedbackExplain.innerHTML = buildExplanation(item, correct);
    // affiche aussi le bon signe dans le rond, à côté du choix
    setTimeout(() => {
      signDisplay.textContent = correct;
    }, 50);
  }
});

nextBtn.addEventListener('click', () => {
  current++;
  if(current >= 10){
    showEnd();
  } else {
    loadQuestion();
  }
});

function showEnd(){
  fill.style.width = '100%';
  quizArea.classList.add('hidden');
  endArea.classList.remove('hidden');
  finalScore.textContent = score;
  let msg;
  if(score === 10) msg = "Score parfait ! Tu maîtrises parfaitement la décomposition des nombres.";
  else if(score >= 8) msg = "Très bon résultat, continue ainsi !";
  else if(score >= 5) msg = "Pas mal, mais entraîne-toi encore un peu sur l'abaque.";
  else msg = "Reprends ton abaque et recommence pour t'entraîner davantage.";
  finalMsg.textContent = msg;

  if (window.parent && window.parent.saveResult) {
    const pct = Math.round(score / 10 * 100);
    window.parent.saveResult({
      activity: 'num_entiers_decimaux_comparaison',
      bookTitle: 'Numération — Comparaison de nombres',
      score: score,
      total: 10,
      pct: pct,
      date: new Date().toLocaleDateString('fr-BE'),
      time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
    });
  }
}

restartBtn.addEventListener('click', startQuiz);

startQuiz();
</script>

</html>
