<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conjugaison — Présent QCM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f5f6fa; padding: 1.5rem; }
.container { max-width: 680px; margin: 0 auto; }
.info-card { background:#fce7f3;border:1px solid #ec4899;border-radius:12px;padding:.8rem 1rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center; }
.info-card p { font-size:13px;color:#9d174d;font-weight:700;margin:0; }
.dots { display:flex;gap:6px; }
.dot { width:12px;height:12px;border-radius:50%; }
.question-card { background:white;border-radius:16px;padding:1.75rem 1.5rem;margin-bottom:1.25rem;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid #e5e7eb; }
.q-label { font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:.75rem;text-align:center; }
.q-phrase { font-size:17px;font-weight:800;color:#1e1b4b;margin-bottom:1.5rem;text-align:center;line-height:1.6; }
.q-phrase em { font-style:normal;color:#ec4899;font-size:20px; }
.options { display:flex;flex-direction:column;gap:8px; }
.opt-btn { padding:12px 16px;border-radius:12px;border:2px solid #e5e7eb;background:white;font-size:15px;font-weight:800;color:#374151;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:all .15s;display:flex;align-items:center;gap:10px; }
.opt-btn:hover:not(:disabled) { border-color:#ec4899;background:#fce7f3;color:#9d174d; }
.opt-btn .opt-letter { width:28px;height:28px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#6b7280;flex-shrink:0;transition:all .15s; }
.opt-btn:hover:not(:disabled) .opt-letter { background:#ec4899;color:white; }
.opt-btn.correct { border-color:#16a34a;background:#f0fdf4;color:#166534; }
.opt-btn.correct .opt-letter { background:#16a34a;color:white; }
.opt-btn.incorrect { border-color:#dc2626;background:#fff5f5;color:#991b1b; }
.opt-btn.incorrect .opt-letter { background:#dc2626;color:white; }
.opt-btn.disabled-neutral { border-color:#e5e7eb;color:#9ca3af; }
.btn { width:100%;padding:12px;background:#ec4899;color:white;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;transition:background .2s;margin-bottom:.75rem; }
.btn:hover { background:#db2777; }
.score-final { display:none;text-align:center;padding:2rem;background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.1); }
.big-emoji { font-size:64px;margin-bottom:.5rem; }
.big-score { font-size:36px;font-weight:900;margin-bottom:1rem; }
.score-detail { font-size:13px;color:#6b7280;margin-bottom:1.5rem;line-height:2; }
</style>
</head>
<body>
<div class="container">
  <div id="exercice-zone">
    <div class="info-card">
      <p id="info-numero">Question 1/10</p>
      <div class="dots" id="dots-progress"></div>
    </div>
    <div id="question-zone"></div>
    <button class="btn" id="btn-suivant" style="display:none" onclick="suivant()">➡️ Question suivante</button>
  </div>
  <div class="score-final" id="score-final">
    <div class="big-emoji" id="final-emoji">🎉</div>
    <div class="big-score" id="final-score"></div>
    <div class="score-detail" id="final-detail"></div>
    <button class="btn" onclick="demarrer()">🔄 Recommencer</button>
  </div>
</div>
<script>
const QUESTIONS = [
  // Verbes en -YER
  { p:"Mon cousin <em>...</em> la vaisselle.",      opts:["essuie","essuye","essuyie"],       correct:0 },
  { p:"Tu <em>...</em> tes achats en ligne.",       opts:["paies","payes","payies"],           correct:0 },
  { p:"Il <em>...</em> une lettre à ses parents.",  opts:["envoie","envoye","envoyie"],        correct:0 },
  { p:"Ils <em>...</em> le carrelage après le repas.", opts:["nettoient","nettoyent","nettoyient"], correct:0 },
  { p:"Nous <em>...</em> l'addition au restaurant.", opts:["payons","paions","paieons"],       correct:0 },
  { p:"Tu <em>...</em> fort sur le bouton rouge.", opts:["appuies","appuyes","appuyies"],      correct:0 },
  { p:"Elle <em>...</em> le couloir chaque matin.", opts:["balaie","balaye","balayie"],        correct:0 },
  { p:"Vous <em>...</em> vos chaussures avant d'entrer.", opts:["nettoyez","nettoiez","nettoyiez"], correct:0 },
  // Verbes en -CER
  { p:"Nous <em>...</em> la leçon depuis le début.", opts:["recommençons","recommenceons","recomençons"], correct:0 },
  { p:"Nous <em>...</em> le ballon vers le but.",  opts:["lançons","lanceons","lançeons"],     correct:0 },
  { p:"Nous <em>...</em> les assiettes sur la table.", opts:["plaçons","placeons","plaçeons"], correct:0 },
  // Verbes en -GER
  { p:"Nous <em>...</em> des pâtes ce soir.",      opts:["mangeons","mangons","manjons"],      correct:0 },
  { p:"Nous <em>...</em> les tables avant le repas.", opts:["rangeons","rangons","ranjons"],   correct:0 },
  { p:"Nous <em>...</em> dans la mer en été.",     opts:["nageons","nagons","nageon"],         correct:0 },
  // Verbes en -ELER/-ETER
  { p:"Elle <em>...</em> ses amis pour son anniversaire.", opts:["appelle","appèle","appele"], correct:0 },
  { p:"Je <em>...</em> la balle trop loin.",       opts:["jette","jète","jete"],               correct:0 },
  { p:"Tu <em>...</em> doucement ton ami.",        opts:["rappelles","rapèles","rappèles"],    correct:0 },
  { p:"Il <em>...</em> ses clés par la fenêtre.",  opts:["rejette","rejète","rejete"],         correct:0 },
  // Verbes E+consonne+ER
  { p:"J'<em>...</em> mes parents à la gare.",     opts:["amène","amene","ammène"],            correct:0 },
  { p:"Elle <em>...</em> les yeux vers le ciel.",  opts:["lève","leve","lèvet"],               correct:0 },
  { p:"Il <em>...</em> un kilo de pommes.",        opts:["achète","achette","achètte"],        correct:0 },
  { p:"L'eau <em>...</em> sur les rochers.",       opts:["ruissèle","ruisselle","ruissèlle"],  correct:0 },
  { p:"Tu <em>...</em> ton chien dans le parc.",   opts:["promènes","promenes","prommènes"],   correct:0 },
  { p:"Je <em>...</em> doucement la boîte.",       opts:["soulève","souleve","soullève"],      correct:0 },
  // Être et avoir
  { p:"Nous <em>...</em> contents de te voir.",    opts:["sommes","somme","sommons"],          correct:0 },
  { p:"Il <em>...</em> un grand frère très gentil.", opts:["a","as","ont"],                   correct:0 },
  { p:"Vous <em>...</em> en retard aujourd'hui.",  opts:["êtes","êtez","ètes"],               correct:0 },
  { p:"Elles <em>...</em> beaucoup de courage.",   opts:["ont","sont","avent"],               correct:0 },
  // Verbes en -IR irréguliers
  { p:"Nous <em>...</em> en voiture ce matin.",    opts:["venons","viendons","venions"],       correct:0 },
  { p:"Tu <em>...</em> très vite !",               opts:["cours","coures","courres"],          correct:0 },
  { p:"Ils <em>...</em> à minuit.",                opts:["partent","partes","partirent"],      correct:0 },
  { p:"Elle <em>...</em> la porte doucement.",     opts:["ouvre","ouvrit","ouvres"],           correct:0 },
  { p:"Vous <em>...</em> bien cette nuit.",        opts:["dormez","dormissez","dormiez"],      correct:0 },
  { p:"Il <em>...</em> un cadeau à sa maman.",     opts:["offre","offrit","offres"],           correct:0 },
  { p:"Nous <em>...</em> à nos promesses.",        opts:["tenons","teneons","tiendons"],       correct:0 },
  // Verbes en -RE
  { p:"Vous ne <em>...</em> pas la vérité.",       opts:["dites","disez","ditez"],             correct:0 },
  { p:"Nous <em>...</em> nos devoirs.",            opts:["faisons","faiseons","fesons"],       correct:0 },
  { p:"Il <em>...</em> un livre passionnant.",     opts:["lit","lite","lise"],                 correct:0 },
  { p:"Tu <em>...</em> une lettre à ta mamie.",    opts:["écris","écrits","écrit"],            correct:0 },
  { p:"Ils <em>...</em> le problème ensemble.",    opts:["prennent","prenent","prendent"],     correct:0 },
  { p:"Elle <em>...</em> ses affaires dans sa chambre.", opts:["met","mets","mette"],          correct:0 },
  { p:"Nous <em>...</em> en France.",              opts:["vivons","viveons","vivez"],          correct:0 },
  // Verbes en -OIR
  { p:"Je <em>...</em> un beau film ce soir.",     opts:["vois","voit","voie"],                correct:0 },
  { p:"Ils <em>...</em> partir tôt demain.",       opts:["doivent","doivont","devoient"],      correct:0 },
  { p:"Tu <em>...</em> la réponse !",              opts:["sais","saies","sait"],               correct:0 },
  { p:"Nous <em>...</em> finir ce travail.",       opts:["pouvons","pouveons","pouvez"],       correct:0 },
  { p:"Elle <em>...</em> un colis ce matin.",      opts:["reçoit","recoit","reçoie"],          correct:0 },
  { p:"Vous <em>...</em> aller au cinéma.",        opts:["voulez","voulissez","vouliez"],      correct:0 },
  { p:"Il <em>...</em> son chemin dans la forêt.", opts:["voit","voie","voits"],               correct:0 },
  { p:"Nous <em>...</em> nos leçons chaque soir.", opts:["savons","saveons","savez"],          correct:0 },
  { p:"Vous ne <em>...</em> jamais ce qu'il raconte.", opts:["croyez","croivez","croiez"],     correct:0 },
  { p:"Nous <em>...</em> très bien avec nos nouvelles lunettes.", opts:["voyons","voirions","voyions"], correct:0 },
];

const LETTRES = ['A','B','C'];
function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }

function shuffleQ(q){
  const pairs = q.opts.map((o,i)=>({o, isCorrect:i===q.correct}));
  const s = shuffle(pairs);
  return { p:q.p, opts:s.map(p=>p.o), correct:s.findIndex(p=>p.isCorrect) };
}

let selection=[], curIdx=0, scores=[];

function demarrer(){
  selection = shuffle([...QUESTIONS]).slice(0,10).map(shuffleQ);
  curIdx=0; scores=[];
  document.getElementById('score-final').style.display='none';
  document.getElementById('exercice-zone').style.display='block';
  afficherQuestion();
}

function afficherQuestion(){
  const q = selection[curIdx];
  document.getElementById('info-numero').textContent = `Question ${curIdx+1}/10`;
  document.getElementById('dots-progress').innerHTML =
    selection.map((_,i)=>`<div class="dot" style="background:${i<curIdx?'#16a34a':i===curIdx?'#ec4899':'#d1d5db'}"></div>`).join('');

  const optsHtml = q.opts.map((o,i)=>`
    <button class="opt-btn" id="opt-${i}" onclick="choisir(${i},${q.correct})">
      <span class="opt-letter">${LETTRES[i]}</span><span>${o}</span>
    </button>`).join('');

  document.getElementById('question-zone').innerHTML = `
    <div class="question-card">
      <div class="q-label">✏️ Indicatif présent — Choisis la bonne forme</div>
      <div class="q-phrase">${q.p}</div>
      <div class="options">${optsHtml}</div>
    </div>`;
  document.getElementById('btn-suivant').style.display='none';
}

function choisir(idx, correct){
  const ok=(idx===correct);
  scores.push(ok);
  for(let i=0;i<3;i++){
    const b=document.getElementById('opt-'+i);
    if(!b) continue; b.disabled=true;
    if(i===correct) b.classList.add('correct');
    else if(i===idx&&!ok) b.classList.add('incorrect');
    else b.classList.add('disabled-neutral');
  }
  const isLast=curIdx>=9;
  const btn=document.getElementById('btn-suivant');
  btn.style.display='block';
  btn.textContent=isLast?'🏁 Voir mon score final':'➡️ Question suivante';
  btn.onclick=isLast?afficherScoreFinal:suivant;
}

function suivant(){ curIdx++; afficherQuestion(); }

function afficherScoreFinal(){
  document.getElementById('exercice-zone').style.display='none';
  const sf=document.getElementById('score-final'); sf.style.display='block';
  const ok=scores.filter(Boolean).length, total=scores.length;
  const pct=Math.round(ok/total*100);
  document.getElementById('final-emoji').textContent=pct===100?'🎉':pct>=60?'👍':'💪';
  document.getElementById('final-score').textContent=`${ok}/${total} — ${pct}%`;
  document.getElementById('final-score').style.color=pct===100?'#16a34a':pct>=60?'#f59e0b':'#dc2626';
  document.getElementById('final-detail').innerHTML=scores.map((s,i)=>`Q${i+1} : ${s?'✅':'❌'}`).join('  ');
}

demarrer();
</script>
</body>
</html>
