<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le compte est bon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --rouge:#ef3b3b;
    --vert:#2ecc5b;
    --bleu:#2b6fe8;
    --jaune:#ffb300;
    --bleu-fond:#2f6cff;
    --noir:#141414;
    --violet:#8a4dde;
    --rose:#ff5fa2;
    --trait:5px solid var(--noir);
    --ombre:6px 6px 0 var(--noir);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Fredoka',system-ui,sans-serif;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,.10) 0 2px, transparent 3px) 0 0/22px 22px,
      linear-gradient(135deg,#1d49b0,#3f86ff);
    color:var(--noir);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
  }

  .jeu{
    width:100%;
    max-width:1080px;
    background:var(--bleu-fond);
    border:var(--trait);
    border-radius:20px;
    box-shadow:var(--ombre);
    overflow:hidden;
  }

  /* ---- Bandeaux du haut ---- */
  .bandeaux{display:flex;flex-wrap:wrap;border-bottom:var(--trait);}
  .bandeau-titre{
    flex:1 1 320px;
    background:
      radial-gradient(circle at 6px 6px, rgba(0,0,0,.12) 0 2px, transparent 3px) 0 0/16px 16px,
      var(--rouge);
    border-right:var(--trait);
    padding:18px 22px;
    display:flex;align-items:center;
  }
  .bandeau-titre h1{
    font-family:'Bangers',cursive;
    color:#fff;
    margin:0;
    font-size:clamp(30px,5.4vw,56px);
    line-height:.92;
    letter-spacing:1.5px;
    text-shadow:3px 3px 0 var(--noir), -1px -1px 0 var(--noir), 1px -1px 0 var(--noir), -1px 1px 0 var(--noir);
    transform:rotate(-2deg);
  }
  .bandeau-titre h1 em{font-style:normal;color:var(--jaune);}

  .bandeau-cible{
    flex:1 1 260px;
    background:
      radial-gradient(circle at 6px 6px, rgba(0,0,0,.12) 0 2px, transparent 3px) 0 0/16px 16px,
      var(--vert);
    padding:14px 22px;
    display:flex;align-items:center;justify-content:space-between;gap:14px;
  }
  .cible-label{
    font-family:'Bangers',cursive;
    color:#fff;font-size:clamp(18px,2.6vw,26px);
    line-height:1;letter-spacing:1px;
    text-shadow:2px 2px 0 var(--noir);
  }
  .cible-nombre{
    font-family:'Bangers',cursive;
    color:#fff;
    font-size:clamp(52px,8vw,84px);
    line-height:.9;
    text-shadow:4px 4px 0 var(--noir), -2px -2px 0 var(--noir), 2px -2px 0 var(--noir), -2px 2px 0 var(--noir);
    transform:rotate(-3deg);
  }

  /* ---- Corps ---- */
  .corps{display:flex;flex-wrap:wrap;}

  /* Colonne de gauche : commandes */
  .commandes{
    flex:0 0 168px;
    background:
      radial-gradient(circle at 6px 6px, rgba(0,0,0,.10) 0 2px, transparent 3px) 0 0/16px 16px,
      var(--jaune);
    border-right:var(--trait);
    padding:16px 12px;
    display:flex;flex-direction:column;gap:12px;
  }
  .btn-cmd{
    font-family:'Fredoka';font-weight:700;
    background:#fff;border:var(--trait);border-radius:14px;
    padding:10px 8px;cursor:pointer;color:var(--noir);
    font-size:15px;display:flex;flex-direction:column;align-items:center;gap:4px;
    box-shadow:3px 3px 0 var(--noir);transition:transform .05s, box-shadow .05s;
  }
  .btn-cmd .ic{font-size:22px;line-height:1;}
  .btn-cmd:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--noir);}
  .btn-cmd:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--noir);}

  .niveaux{margin-top:auto;display:flex;flex-direction:column;gap:6px;}
  .niveaux .lab{font-weight:700;font-size:13px;text-align:center;opacity:.85;}
  .niv-row{display:flex;gap:6px;}
  .btn-niv{
    flex:1;font-family:'Fredoka';font-weight:700;font-size:12px;
    border:3px solid var(--noir);border-radius:10px;background:#fff;
    padding:6px 2px;cursor:pointer;box-shadow:2px 2px 0 var(--noir);
  }
  .btn-niv.actif{background:var(--noir);color:#fff;}

  /* Zone centrale : nombres + historique */
  .plateau{flex:1 1 360px;padding:22px;min-width:300px;}

  .consigne{
    color:#fff;font-weight:600;font-size:15px;margin:0 0 14px;
    background:rgba(0,0,0,.18);border-radius:10px;padding:8px 12px;
    display:inline-block;
  }

  .tuiles{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:8px;min-height:64px;}
  .tuile{
    position:relative;
    font-family:'Bangers',cursive;font-size:34px;color:#fff;letter-spacing:1px;
    min-width:78px;padding:6px 16px;text-align:center;
    border:var(--trait);border-radius:12px;cursor:pointer;
    box-shadow:4px 4px 0 var(--noir);
    text-shadow:2px 2px 0 var(--noir);
    transition:transform .07s;user-select:none;
  }
  .tuile:hover{transform:translateY(-3px) rotate(-1deg);}
  .tuile:active{transform:translateY(1px);}
  .tuile.choisie{outline:4px dashed #fff;outline-offset:3px;transform:translateY(-4px) rotate(-2deg);}
  .tuile.utilisee{opacity:.28;pointer-events:none;filter:grayscale(.6);transform:none;box-shadow:2px 2px 0 var(--noir);}
  .tuile .badge{
    position:absolute;top:-9px;right:-9px;background:#fff;color:var(--noir);
    font-family:'Fredoka';font-weight:700;font-size:10px;border:2px solid var(--noir);
    border-radius:8px;padding:1px 5px;text-shadow:none;letter-spacing:0;
  }

  /* Ligne de calcul en cours */
  .calcul-cours{
    margin:18px 0 6px;min-height:50px;display:flex;align-items:center;gap:12px;
    font-family:'Bangers',cursive;font-size:34px;color:#fff;
    text-shadow:2px 2px 0 var(--noir);
  }
  .calcul-cours .vide{font-family:'Fredoka';font-size:15px;font-weight:600;color:rgba(255,255,255,.75);text-shadow:none;}
  .slot{min-width:54px;text-align:center;border-bottom:4px solid rgba(255,255,255,.5);padding:0 6px;}
  .slot.rempli{border-bottom-color:#fff;}

  /* Historique */
  .historique{margin-top:6px;display:flex;flex-direction:column;gap:8px;}
  .histo-titre{color:#fff;font-weight:700;font-size:13px;opacity:.85;margin-bottom:2px;}
  .histo-ligne{
    background:#fff;border:4px solid var(--noir);border-radius:10px;
    padding:6px 12px;font-family:'Bangers',cursive;font-size:22px;letter-spacing:1px;
    display:flex;align-items:center;gap:10px;width:fit-content;box-shadow:3px 3px 0 var(--noir);
  }
  .histo-ligne .num{color:#9aa0a6;font-family:'Fredoka';font-size:13px;font-weight:700;}

  /* Colonne opérateurs */
  .operateurs{
    flex:0 0 110px;
    background:
      radial-gradient(circle at 6px 6px, rgba(0,0,0,.10) 0 2px, transparent 3px) 0 0/16px 16px,
      var(--jaune);
    border-left:var(--trait);
    padding:18px 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  }
  .op{
    width:66px;height:66px;border:var(--trait);border-radius:16px;background:#fff;
    font-family:'Bangers',cursive;font-size:40px;color:var(--noir);cursor:pointer;
    box-shadow:4px 4px 0 var(--noir);display:flex;align-items:center;justify-content:center;
    transition:transform .06s;
  }
  .op:hover{transform:translate(-1px,-1px);}
  .op:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--noir);}
  .op.choisi{background:var(--noir);color:#fff;}

  /* Joker */
  .pied{display:flex;justify-content:flex-end;padding:12px 22px 18px;background:transparent;}
  .joker{
    font-family:'Fredoka';font-weight:700;background:#fff;border:var(--trait);border-radius:12px;
    padding:8px 16px;cursor:pointer;box-shadow:3px 3px 0 var(--noir);display:flex;align-items:center;gap:8px;
  }
  .joker .tag{font-family:'Bangers',cursive;color:var(--rouge);letter-spacing:1px;}
  .joker:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--noir);}

  /* Message flash */
  .flash{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(40px);
    background:var(--noir);color:#fff;padding:12px 22px;border-radius:14px;font-weight:600;
    box-shadow:var(--ombre);opacity:0;transition:opacity .25s, transform .25s;z-index:60;
    border:3px solid #fff;text-align:center;max-width:90vw;
  }
  .flash.on{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Victoire */
  .victoire{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.45);z-index:80;padding:20px;
  }
  .victoire.on{display:flex;}
  .carte-victoire{
    background:
      radial-gradient(circle at 8px 8px, rgba(0,0,0,.12) 0 3px, transparent 4px) 0 0/20px 20px,
      var(--rouge);
    border:var(--trait);border-radius:20px;box-shadow:var(--ombre);
    padding:34px 40px;text-align:center;max-width:440px;transform:rotate(-2deg);
  }
  .carte-victoire h2{
    font-family:'Bangers',cursive;color:#fff;font-size:54px;margin:0 0 6px;
    text-shadow:3px 3px 0 var(--noir),-2px -2px 0 var(--noir),2px -2px 0 var(--noir),-2px 2px 0 var(--noir);
  }
  .carte-victoire p{color:#fff;font-weight:600;font-size:18px;margin:0 0 20px;text-shadow:1px 1px 0 var(--noir);}
  .carte-victoire .btn-rejouer{
    font-family:'Fredoka';font-weight:700;font-size:18px;background:var(--jaune);
    border:var(--trait);border-radius:14px;padding:12px 26px;cursor:pointer;box-shadow:4px 4px 0 var(--noir);
  }
  .carte-victoire .btn-rejouer:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--noir);}

  .confetti{position:fixed;top:-12px;width:12px;height:18px;z-index:79;border-radius:2px;}

  @media (max-width:760px){
    .operateurs{flex:1 1 100%;flex-direction:row;border-left:none;border-top:var(--trait);padding:14px;}
    .commandes{flex:1 1 100%;border-right:none;border-bottom:var(--trait);}
    .niveaux{margin-top:0;}
  }
</style>
</head>
<body>
  <div class="jeu">
    <div class="bandeaux">
      <div class="bandeau-titre">
        <h1>Le compte<br>est <em>bon&nbsp;!</em></h1>
      </div>
      <div class="bandeau-cible">
        <div class="cible-label">Nombre<br>à atteindre</div>
        <div class="cible-nombre" id="cible">000</div>
      </div>
    </div>

    <div class="corps">
      <div class="commandes">
        <button class="btn-cmd" id="btn-nouveau"><span class="ic">🎲</span>Nouveau jeu</button>
        <button class="btn-cmd" id="btn-recommencer"><span class="ic">↺</span>Recommencer</button>
        <button class="btn-cmd" id="btn-annuler"><span class="ic">⌫</span>Annuler</button>
        <div class="niveaux">
          <div class="lab">Niveau</div>
          <div class="niv-row">
            <button class="btn-niv" data-niv="facile">Facile</button>
            <button class="btn-niv actif" data-niv="moyen">Moyen</button>
          </div>
          <div class="niv-row">
            <button class="btn-niv" data-niv="difficile" style="flex:1">Difficile</button>
          </div>
        </div>
      </div>

      <div class="plateau">
        <p class="consigne">Choisis un nombre, une opération, puis un second nombre.</p>
        <div class="tuiles" id="tuiles"></div>

        <div class="calcul-cours" id="calcul">
          <span class="vide">À toi de jouer&nbsp;!</span>
        </div>

        <div class="historique" id="historique"></div>
      </div>

      <div class="operateurs">
        <button class="op" data-op="+">+</button>
        <button class="op" data-op="-">−</button>
        <button class="op" data-op="*">×</button>
        <button class="op" data-op="/">÷</button>
      </div>
    </div>

    <div class="pied">
      <button class="joker" id="btn-joker"><span class="tag">JOKER</span> Trop difficile&nbsp;?</button>
    </div>
  </div>

  <div class="flash" id="flash"></div>

  <div class="victoire" id="victoire">
    <div class="carte-victoire">
      <h2>Ton compte est bon&nbsp;!</h2>
      <p id="victoire-txt"></p>
      <button class="btn-rejouer" id="btn-rejouer">Nouveau défi</button>
    </div>
  </div>

<script>
(function(){
  "use strict";

  // ----- Réglages par niveau -----
  const CFG = {
    facile:    { targetMin:30,  targetMax:150, minUse:2, maxUse:4, smalls:3, smallMax:9,  bigs:[10,15,20,25], nbBig:1, total:4 },
    moyen:     { targetMin:80,  targetMax:500, minUse:2, maxUse:5, smalls:4, smallMax:10, bigs:[25,50,75,100], nbBig:1, total:5 },
    difficile: { targetMin:200, targetMax:999, minUse:3, maxUse:6, smalls:4, smallMax:10, bigs:[25,50,75,100], nbBig:2, total:6 }
  };
  const COULEURS = ['#ef3b3b','#2b6fe8','#2ecc5b','#ff8c1a','#8a4dde','#ff5fa2','#13b5b1'];
  const SYM = { '+':'+', '-':'−', '*':'×', '/':'÷' };

  // ----- État du jeu -----
  let niveau = 'moyen';
  let cible = 0;
  let nombresInitiaux = [];
  let tuiles = [];          // {id, valeur, utilisee, estResultat, couleur}
  let historique = [];      // {aId, bId, op, valeur, resId, texte}
  let prochainId = 0;
  let selectionId = null;
  let opChoisie = null;
  let gagne = false;
  let meilleurEcart = Infinity;

  // ----- Outils -----
  const rnd = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
  const choix = arr => arr[rnd(0,arr.length-1)];
  function melange(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

  function tirerNombres(){
    const c = CFG[niveau];
    let n = [];
    for(let i=0;i<c.smalls;i++) n.push(rnd(2,c.smallMax));
    for(let i=0;i<c.nbBig;i++) n.push(choix(c.bigs));
    return melange(n);
  }

  // Combine tous les nombres d'un sous-ensemble en une valeur (toujours résoluble)
  function combinerTout(arr){
    let pool = melange(arr);
    while(pool.length > 1){
      const a = pool.pop(), b = pool.pop();
      const grand = Math.max(a,b), petit = Math.min(a,b);
      const ops = [a+b, a*b];
      if(grand-petit > 0) ops.push(grand-petit);
      if(petit > 0 && grand % petit === 0) ops.push(grand/petit);
      pool.push(choix(ops));
    }
    return pool[0];
  }

  function genererPartie(){
    const c = CFG[niveau];
    for(let t=0;t<4000;t++){
      const valeurs = tirerNombres();
      const k = rnd(c.minUse, Math.min(c.maxUse, valeurs.length));
      const sousEns = melange(valeurs).slice(0,k);
      const but = combinerTout(sousEns);
      if(but >= c.targetMin && but <= c.targetMax && !valeurs.includes(but)){
        return { valeurs, cible:but };
      }
    }
    return { valeurs:[2,3,4,5,6], cible:120 }; // secours
  }

  // Solveur (pour le joker) -> renvoie la liste des étapes ou null
  function resoudre(valeurs, but){
    function rec(items){
      for(const it of items) if(it.v === but) return it.steps;
      if(items.length < 2) return null;
      for(let i=0;i<items.length;i++){
        for(let j=i+1;j<items.length;j++){
          const a = items[i], b = items[j];
          const reste = items.filter((_,k)=>k!==i && k!==j);
          const grand = Math.max(a.v,b.v), petit = Math.min(a.v,b.v);
          const cands = [];
          cands.push([a.v+b.v, `${a.v} + ${b.v} = ${a.v+b.v}`]);
          if(grand-petit > 0) cands.push([grand-petit, `${grand} − ${petit} = ${grand-petit}`]);
          cands.push([a.v*b.v, `${a.v} × ${b.v} = ${a.v*b.v}`]);
          if(petit > 0 && grand % petit === 0) cands.push([grand/petit, `${grand} ÷ ${petit} = ${grand/petit}`]);
          for(const [v,s] of cands){
            const r = rec([...reste, {v, steps:[...a.steps, ...b.steps, s]}]);
            if(r) return r;
          }
        }
      }
      return null;
    }
    return rec(valeurs.map(v=>({v, steps:[]})));
  }

  // ----- Mise en place -----
  function nouvellePartie(){
    const p = genererPartie();
    cible = p.cible;
    nombresInitiaux = p.valeurs.slice();
    construireTuiles();
    document.getElementById('cible').textContent = cible;
  }

  function construireTuiles(){
    tuiles = [];
    prochainId = 0;
    historique = [];
    selectionId = null;
    opChoisie = null;
    gagne = false;
    meilleurEcart = Infinity;
    nombresInitiaux.forEach((v,i)=>{
      tuiles.push({ id:prochainId++, valeur:v, utilisee:false, estResultat:false, couleur:COULEURS[i % COULEURS.length] });
    });
    rendre();
  }

  // ----- Affichage -----
  function rendre(){
    // tuiles
    const cont = document.getElementById('tuiles');
    cont.innerHTML = '';
    tuiles.forEach(t=>{
      const el = document.createElement('div');
      el.className = 'tuile' + (t.utilisee?' utilisee':'') + (t.id===selectionId?' choisie':'');
      el.style.background = t.couleur;
      el.textContent = t.valeur;
      if(t.estResultat){
        const b = document.createElement('span');
        b.className = 'badge'; b.textContent = 'résultat';
        el.appendChild(b);
      }
      el.addEventListener('click', ()=>cliquerTuile(t.id));
      cont.appendChild(el);
    });

    // opérateurs
    document.querySelectorAll('.op').forEach(o=>{
      o.classList.toggle('choisi', o.dataset.op === opChoisie);
    });

    // calcul en cours
    const calc = document.getElementById('calcul');
    const sel = tuiles.find(t=>t.id===selectionId);
    if(!sel && !opChoisie){
      calc.innerHTML = '<span class="vide">À toi de jouer&nbsp;!</span>';
    } else {
      const a = sel ? sel.valeur : '?';
      const o = opChoisie ? SYM[opChoisie] : '?';
      calc.innerHTML =
        `<span class="slot ${sel?'rempli':''}">${a}</span>` +
        `<span class="slot ${opChoisie?'rempli':''}">${o}</span>` +
        `<span class="slot">?</span>` +
        `<span class="slot">=</span>` +
        `<span class="slot">?</span>`;
    }

    // historique
    const histo = document.getElementById('historique');
    if(historique.length === 0){
      histo.innerHTML = '';
    } else {
      histo.innerHTML = '<div class="histo-titre">Tes opérations</div>';
      historique.forEach((h,i)=>{
        const l = document.createElement('div');
        l.className = 'histo-ligne';
        l.innerHTML = `<span class="num">${i+1}</span> ${h.texte}`;
        histo.appendChild(l);
      });
    }

    document.getElementById('btn-annuler').style.opacity = historique.length ? '1' : '.45';
  }

  // ----- Interactions -----
  function cliquerTuile(id){
    if(gagne) return;
    const t = tuiles.find(x=>x.id===id);
    if(!t || t.utilisee) return;

    if(selectionId === null){
      selectionId = id; rendre(); return;
    }
    if(selectionId === id){ // déselection
      selectionId = null; rendre(); return;
    }
    if(opChoisie === null){ // pas encore d'opérateur -> on change de 1er nombre
      selectionId = id; rendre(); return;
    }
    // on a 1er nombre + opérateur + ce 2e nombre -> on calcule
    calculer(selectionId, id, opChoisie);
  }

  function cliquerOp(op){
    if(gagne) return;
    if(selectionId === null){ flash("Choisis d'abord un nombre."); return; }
    opChoisie = (opChoisie === op) ? null : op;
    rendre();
  }

  function calculer(aId, bId, op){
    const a = tuiles.find(t=>t.id===aId);
    const b = tuiles.find(t=>t.id===bId);
    const grand = Math.max(a.valeur, b.valeur);
    const petit = Math.min(a.valeur, b.valeur);
    let valeur, texte;

    if(op === '+'){
      valeur = a.valeur + b.valeur;
      texte = `${a.valeur} + ${b.valeur} = ${valeur}`;
    } else if(op === '-'){
      valeur = grand - petit;
      if(valeur === 0){ flash("Le résultat serait 0, choisis autre chose."); return; }
      texte = `${grand} − ${petit} = ${valeur}`;
    } else if(op === '*'){
      valeur = a.valeur * b.valeur;
      texte = `${a.valeur} × ${b.valeur} = ${valeur}`;
    } else if(op === '/'){
      if(petit === 0 || grand % petit !== 0){ flash("La division ne tombe pas juste."); return; }
      valeur = grand / petit;
      texte = `${grand} ÷ ${petit} = ${valeur}`;
    }

    a.utilisee = true;
    b.utilisee = true;
    const resId = prochainId++;
    tuiles.push({ id:resId, valeur, utilisee:false, estResultat:true, couleur:COULEURS[rnd(0,COULEURS.length-1)] });
    historique.push({ aId, bId, op, valeur, resId, texte });

    meilleurEcart = Math.min(meilleurEcart, Math.abs(valeur - cible));
    selectionId = null;
    opChoisie = null;
    rendre();

    if(valeur === cible){ victoire(); }
    else { verifierBlocage(); }
  }

  function annuler(){
    if(gagne || historique.length === 0) return;
    const h = historique.pop();
    // retirer la tuile résultat
    tuiles = tuiles.filter(t => t.id !== h.resId);
    // réactiver les opérandes
    const a = tuiles.find(t=>t.id===h.aId);
    const b = tuiles.find(t=>t.id===h.bId);
    if(a) a.utilisee = false;
    if(b) b.utilisee = false;
    selectionId = null;
    opChoisie = null;
    rendre();
  }

  function verifierBlocage(){
    const dispo = tuiles.filter(t=>!t.utilisee);
    if(dispo.length < 2){
      const ecart = meilleurEcart;
      if(ecart <= 5) flash(`Presque&nbsp;! Tu étais à ${ecart} d'écart. Annule un coup ou recommence.`);
      else flash(`Plus de combinaison possible. Recommence ou prends le joker.`);
    }
  }

  // ----- Joker -----
  function joker(){
    if(gagne) return;
    const sol = resoudre(nombresInitiaux, cible);
    const histo = document.getElementById('historique');
    if(!sol){
      flash("Pas de solution exacte trouvée pour cette grille.");
      return;
    }
    let html = '<div class="histo-titre">💡 Une solution possible</div>';
    sol.forEach((s,i)=>{ html += `<div class="histo-ligne"><span class="num">${i+1}</span> ${s.replace(/ - /g,' − ').replace(/\*/g,'×').replace(/\//g,'÷')}</div>`; });
    histo.innerHTML = html;
    flash("Voici une façon d'y arriver 👇");
  }

  // ----- Victoire -----
  function victoire(){
    gagne = true;
    const nb = historique.length;
    document.getElementById('victoire-txt').textContent =
      `Tu as atteint ${cible} en ${nb} opération${nb>1?'s':''}. Bravo !`;
    document.getElementById('victoire').classList.add('on');
    lancerConfettis();
  }

  function lancerConfettis(){
    for(let i=0;i<90;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = choix(COULEURS);
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      const dur = 2 + Math.random()*2;
      c.style.animation = `chute ${dur}s linear forwards`;
      c.style.animationDelay = (Math.random()*0.6)+'s';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), (dur+1)*1000);
    }
  }

  // ----- Flash -----
  let flashTimer = null;
  function flash(msg){
    const f = document.getElementById('flash');
    f.innerHTML = msg;
    f.classList.add('on');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(()=>f.classList.remove('on'), 2600);
  }

  // ----- Branchements -----
  document.querySelectorAll('.op').forEach(o=>{
    o.addEventListener('click', ()=>cliquerOp(o.dataset.op));
  });
  document.getElementById('btn-nouveau').addEventListener('click', ()=>{
    document.getElementById('victoire').classList.remove('on');
    nouvellePartie();
  });
  document.getElementById('btn-recommencer').addEventListener('click', ()=>{
    document.getElementById('victoire').classList.remove('on');
    construireTuiles();
  });
  document.getElementById('btn-annuler').addEventListener('click', annuler);
  document.getElementById('btn-joker').addEventListener('click', joker);
  document.getElementById('btn-rejouer').addEventListener('click', ()=>{
    document.getElementById('victoire').classList.remove('on');
    nouvellePartie();
  });
  document.querySelectorAll('.btn-niv').forEach(b=>{
    b.addEventListener('click', ()=>{
      niveau = b.dataset.niv;
      document.querySelectorAll('.btn-niv').forEach(x=>x.classList.remove('actif'));
      b.classList.add('actif');
      document.getElementById('victoire').classList.remove('on');
      nouvellePartie();
    });
  });

  // animation confettis (injectée)
  const styleConfetti = document.createElement('style');
  styleConfetti.textContent = '@keyframes chute{to{transform:translateY(105vh) rotate(720deg);}}';
  document.head.appendChild(styleConfetti);

  // démarrage
  nouvellePartie();
})();
</script>
</body>
</html>
