<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="100%" height="100%">

  <style>
    .canal { fill: none; stroke: #2563eb; stroke-width: 2.8; stroke-linecap: round; stroke-dasharray: 6 4; }
    .city-mark { fill: #000000; stroke: #ffffff; stroke-width: 1.5; }
    .capital-mark { fill: #ef4444; stroke: #ffffff; stroke-width: 1.5; }
    .text-city { font-family: 'Fredoka', 'Nunito', 'Inter', sans-serif; font-size: 14.5px; font-weight: 800; fill: #1e293b; paint-order: stroke; stroke: #ffffff; stroke-width: 4px; stroke-linejoin: round; }
    .text-capital { font-family: 'Fredoka', 'Nunito', 'Inter', sans-serif; font-size: 15.5px; font-weight: 900; fill: #b91c1c; paint-order: stroke; stroke: #ffffff; stroke-width: 4.5px; stroke-linejoin: round; }
    .text-river { font-family: 'Nunito', 'Inter', sans-serif; font-size: 12px; font-weight: 700; font-style: italic; fill: #1d4ed8; paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px; stroke-linejoin: round; }
    .text-fleuve { font-family: 'Nunito', 'Inter', sans-serif; font-size: 13.5px; font-weight: 900; font-style: italic; fill: #1e40af; paint-order: stroke; stroke: #ffffff; stroke-width: 4px; stroke-linejoin: round; }
    .text-canal { font-family: 'Nunito', 'Inter', sans-serif; font-size: 11px; font-weight: 800; fill: #2563eb; paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round; }
    .text-neighbor { font-family: 'Fredoka', 'Nunito', 'Inter', sans-serif; font-size: 17px; font-weight: 800; fill: #78716c; letter-spacing: 2px; }
    .legend-title { font-family: 'Fredoka', sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
    .legend-text { font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 700; fill: #334155; }
  </style>
  
  <defs>
    <!-- Legend elevation gradient -->
    <linearGradient id="leg-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#bbf7d0" />
      <stop offset="25%" stop-color="#d9f99d" />
      <stop offset="60%" stop-color="#fef08a" />
      <stop offset="85%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Fond de carte Orohydrographique -->
  <image href="carte_relief_hydrographie_belgique.png" x="0" y="0" width="1000" height="1000" />
  <!-- Canaux Principaux -->
  <path class="canal" d="M 770,460 Q 730,390 690,355 Q 585,300 480,250" id="canal-Canal Albert" />
  <path class="canal" d="M 485,560 C 475,510 470,450 465,395" id="canal-Canal Bruxelles-Charleroi" />
  <path class="canal" d="M 215,375 C 180,365 140,355 105,345" id="canal-Canal de la Lys à l'Yser" />
  <path class="canal" d="M 300,345 L 300,220" id="canal-Canal Gand-Terneuzen" />
  <!-- Noms des Pays Voisins -->
  <text class="text-neighbor" x="220" y="870" text-anchor="middle">FRANCE</text>
  <text class="text-neighbor" x="620" y="100" text-anchor="middle">PAYS-BAS</text>
  <text class="text-neighbor" x="920" y="380" text-anchor="middle">ALLEMAGNE</text>
  <text class="text-neighbor" x="920" y="690" text-anchor="middle">LUXEMBOURG</text>
  <text class="text-neighbor" x="120" y="210" text-anchor="middle">Mer du Nord</text>
  <!-- Noms des cours d'eau et canaux -->
  <text class="text-fleuve" x="95" y="315" text-anchor="middle">Yser</text>
  <text class="text-fleuve" x="260" y="480" text-anchor="middle">Escaut</text>
  <text class="text-fleuve" x="680" y="525" text-anchor="middle">Meuse</text>
  <text class="text-river" x="150" y="385" text-anchor="middle" transform="rotate(-20 150 385)">Lys</text>
  <text class="text-river" x="360" y="420" text-anchor="middle" transform="rotate(-75 360 420)">Dendre</text>
  <text class="text-river" x="440" y="445" text-anchor="middle" transform="rotate(-60 440 445)">Senne</text>
  <text class="text-river" x="525" y="415" text-anchor="middle" transform="rotate(-70 525 415)">Dyle</text>
  <text class="text-river" x="620" y="350" text-anchor="middle" transform="rotate(5 620 350)">Demer</text>
  <text class="text-river" x="475" y="310" text-anchor="middle" transform="rotate(-45 475 310)">Rupel</text>
  <text class="text-river" x="490" y="575" text-anchor="middle" transform="rotate(-15 490 575)">Sambre</text>
  <text class="text-river" x="780" y="550" text-anchor="middle" transform="rotate(75 780 550)">Ourthe</text>
  <text class="text-river" x="830" y="475" text-anchor="middle" transform="rotate(-10 830 475)">Vesdre</text>
  <text class="text-river" x="850" y="540" text-anchor="middle" transform="rotate(2 850 540)">Amblève</text>
  <text class="text-river" x="660" y="670" text-anchor="middle" transform="rotate(35 660 670)">Lesse</text>
  <text class="text-river" x="700" y="780" text-anchor="middle" transform="rotate(10 700 780)">Semois</text>
  <text class="text-canal" x="625" y="305" text-anchor="middle" transform="rotate(-25 625 305)">Canal Albert</text>
  <text class="text-canal" x="482" y="480" text-anchor="middle" transform="rotate(80 482 480)">Canal Bruxelles-Charleroi</text>
  <text class="text-canal" x="160" y="365" text-anchor="middle" transform="rotate(15 160 365)">Canal de la Lys à l'Yser</text>
  <text class="text-canal" x="288" y="270" text-anchor="middle" transform="rotate(90 288 270)">Canal Gand-Terneuzen</text>
  <!-- Villes Repères -->
  <rect class="capital-mark" x="460" y="390" width="10" height="10" transform="rotate(45 465 395)" />
  <text class="text-capital" x="473" y="399" text-anchor="start">Bruxelles</text>
  <rect class="city-mark" x="476.5" y="246.5" width="7" height="7" />
  <text class="text-city" x="488" y="254" text-anchor="start">Anvers</text>
  <rect class="city-mark" x="296.5" y="341.5" width="7" height="7" />
  <text class="text-city" x="292" y="349" text-anchor="end">Gand</text>
  <rect class="city-mark" x="176.5" y="286.5" width="7" height="7" />
  <text class="text-city" x="172" y="294" text-anchor="end">Bruges</text>
  <rect class="city-mark" x="101.5" y="271.5" width="7" height="7" />
  <text class="text-city" x="105" y="267" text-anchor="middle">Ostende</text>
  <rect class="city-mark" x="76.5" y="316.5" width="7" height="7" />
  <text class="text-city" x="72" y="324" text-anchor="end">Nieuwpoort</text>
  <rect class="city-mark" x="211.5" y="371.5" width="7" height="7" />
  <text class="text-city" x="215" y="390" text-anchor="middle">Courtrai</text>
  <rect class="city-mark" x="236.5" y="511.5" width="7" height="7" />
  <text class="text-city" x="232" y="519" text-anchor="end">Tournai</text>
  <rect class="city-mark" x="376.5" y="561.5" width="7" height="7" />
  <text class="text-city" x="380" y="580" text-anchor="middle">Mons</text>
  <rect class="city-mark" x="481.5" y="556.5" width="7" height="7" />
  <text class="text-city" x="485" y="575" text-anchor="middle">Charleroi</text>
  <rect class="city-mark" x="576.5" y="546.5" width="7" height="7" />
  <text class="text-city" x="588" y="554" text-anchor="start">Namur</text>
  <rect class="city-mark" x="576.5" y="611.5" width="7" height="7" />
  <text class="text-city" x="588" y="619" text-anchor="start">Dinant</text>
  <rect class="city-mark" x="686.5" y="351.5" width="7" height="7" />
  <text class="text-city" x="698" y="359" text-anchor="start">Hasselt</text>
  <rect class="city-mark" x="766.5" y="456.5" width="7" height="7" />
  <text class="text-city" x="778" y="464" text-anchor="start">Liège</text>
  <rect class="city-mark" x="801.5" y="791.5" width="7" height="7" />
  <text class="text-city" x="797" y="799" text-anchor="end">Arlon</text>

  <!-- Légende de la Carte -->
  <g transform="translate(40, 730)" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.05))">
    <!-- Box background -->
    <rect width="200" height="230" fill="#ffffff" stroke="#1e293b" stroke-width="2" rx="12" />
    
    <!-- Title -->
    <text class="legend-title" x="15" y="25">Légende</text>
    
    <!-- Orographie (Altitudes) -->
    <text class="legend-title" x="15" y="52" font-size="11.5px">Altitude (Relief)</text>
    <rect x="20" y="62" width="15" height="70" fill="url(#leg-grad)" stroke="#64748b" stroke-width="1" />
    
    <text class="legend-text" x="42" y="72">500m + (Haute Belgique)</text>
    <text class="legend-text" x="42" y="97">150m (Moyenne Belgique)</text>
    <text class="legend-text" x="42" y="127">0m (Basse Belgique)</text>
    
    <!-- Cours d'eau -->
    <line x1="20" y1="152" x2="45" y2="152" stroke="#1d4ed8" stroke-width="4.5" stroke-linecap="round" />
    <text class="legend-text" x="55" y="156">Fleuve principal (Épais)</text>
    
    <line x1="20" y1="172" x2="45" y2="172" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" />
    <text class="legend-text" x="55" y="176">Rivière / Affluent (Fin)</text>
    
    <line x1="20" y1="192" x2="45" y2="192" stroke="#2563eb" stroke-width="2.2" stroke-dasharray="4,3" stroke-linecap="round" />
    <text class="legend-text" x="55" y="196">Canal (Pointillés)</text>
    
    <!-- Capital and city marks -->
    <rect x="20" y="210" width="8" height="8" fill="#ef4444" stroke="#fff" stroke-width="1" transform="rotate(45 24 214)" />
    <text class="legend-text" x="55" y="218">Capitale nationale</text>
  </g>

</svg>