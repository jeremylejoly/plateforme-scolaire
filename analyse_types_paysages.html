<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Types de Paysages — Géographie</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Palette HSL - Thème éducation géographie (Vert forêt et terre) */
      --encre: #1e293b;        /* Bleu ardoise foncé */
      --primaire: #0f766e;     /* Sarcelle foncée / Vert forêt */
      --primaire-clair: #f0fdfa; /* Fond vert d'eau très clair */
      --courant: #0d9488;      /* Accent principal sarcelle */
      --accent: #b45309;       /* Ocre orangé / terre */
      --ardoise: #475569;      /* Gris ardoise secondaire */
      --papier: #fafaf9;       /* Fond de page sable très doux */
      --papier-2: #ffffff;     /* Blanc pur pour les cartes */
      --ligne: #e7e5e4;        /* Bordures fines beige/gris */
      
      --vert: #16a34a;         /* Succès */
      --vert-clair: #f0fdf4;
      --rouge: #dc2626;        /* Erreur */
      --rouge-clair: #fef2f2;
      --bleu: #2563eb;         /* Info */
      --bleu-clair: #eff6ff;
      
      --ombre: 0 4px 12px rgba(30, 41, 59, 0.05);
      --ombre-forte: 0 10px 30px rgba(30, 41, 59, 0.08);
      --radius: 16px;
      --border-style: 3px solid #1e293b;
      --shadow-flat: 4px 4px 0px #1e293b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', system-ui, -apple-system, sans-serif;
      background-color: var(--papier);
      background-image: radial-gradient(circle at 1px 1px, rgba(30, 41, 59, 0.03) 1px, transparent 0);
      background-size: 24px 24px;
      color: var(--encre);
      line-height: 1.6;
      padding: 1.5rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    /* HEADER */
    header {
      background: var(--papier-2);
      border: var(--border-style);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-flat);
      text-align: center;
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primaire);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--ardoise);
      font-weight: 600;
      max-width: 800px;
      margin: 0 auto;
    }

    /* GAME INTERFACE */
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 850px) {
      .game-grid {
        grid-template-columns: 1fr;
      }
    }

    /* LEFT: IMAGE COLUMN */
    .photo-column {
      background: var(--papier-2);
      border: var(--border-style);
      border-radius: var(--radius);
      padding: 1rem;
      box-shadow: var(--shadow-flat);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .image-box {
      width: 100%;
      border: 3px solid #1e293b;
      border-radius: 10px;
      overflow: hidden;
      cursor: zoom-in;
      position: relative;
    }

    .landscape-img {
      width: 100%;
      display: block;
      height: auto;
      transition: transform 0.2s ease;
    }

    .image-box:hover .landscape-img {
      transform: scale(1.01);
    }

    .caption {
      font-size: 0.85rem;
      color: var(--ardoise);
      font-weight: 700;
      text-align: center;
      background: var(--papier);
      padding: 0.5rem;
      border-radius: 8px;
      border: 2px solid var(--ligne);
    }

    /* RIGHT: QUESTIONS COLUMN */
    .question-column {
      background: var(--papier-2);
      border: var(--border-style);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-flat);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .q-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--ligne);
      padding-bottom: 0.5rem;
    }

    .q-step {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      color: var(--accent);
      font-weight: 700;
    }

    .q-text {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primaire);
    }

    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .opt-btn {
      width: 100%;
      padding: 0.45rem 1rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      text-align: left;
      background: var(--papier);
      border: 3px solid #cbd5e1;
      border-radius: 12px;
      color: var(--ardoise);
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .opt-btn:hover {
      border-color: #94a3b8;
      color: var(--encre);
      background: #f1f5f9;
    }

    .opt-btn.selected {
      background: var(--primaire-clair);
      border-color: var(--primaire);
      color: var(--primaire);
    }

    .btn-next {
      width: 100%;
      padding: 1rem;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--papier-2);
      background: var(--courant);
      border: var(--border-style);
      border-radius: var(--radius);
      box-shadow: var(--shadow-flat);
      cursor: pointer;
      transition: all 0.1s ease;
      text-align: center;
      margin-top: 0.5rem;
    }

    .btn-next:hover {
      background: #0f766e;
    }

    .btn-next:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #1e293b;
    }

    .btn-next:disabled {
      background: #94a3b8;
      border-color: #64748b;
      box-shadow: 2px 2px 0px #64748b;
      cursor: not-allowed;
      transform: none;
    }

    /* RESULT AREA */
    .result-card {
      background: var(--papier-2);
      border: var(--border-style);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow-flat);
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .score-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--encre);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--primaire-clair);
      box-shadow: 4px 4px 0px #1e293b;
    }

    .score-val {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--primaire);
    }

    .score-label {
      font-size: 0.8rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--ardoise);
    }

    .feedback-msg {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--encre);
      margin-bottom: 0.5rem;
    }

    /* REVIEW CARDS */
    .review-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-top: 1.5rem;
      text-align: left;
    }

    .review-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.3rem;
      color: var(--primaire);
      border-bottom: 3px solid #1e293b;
      padding-bottom: 0.25rem;
    }

    .rev-card {
      display: grid;
      grid-template-columns: 180px 1fr;
      border: var(--border-style);
      border-radius: var(--radius);
      background: var(--papier-2);
      box-shadow: var(--shadow-flat);
      overflow: hidden;
      gap: 1.25rem;
    }

    @media (max-width: 650px) {
      .rev-card {
        grid-template-columns: 1fr;
      }
    }

    .rev-img-box {
      width: 100%;
      height: 100%;
      min-height: 120px;
      border-right: 3px solid #1e293b;
      overflow: hidden;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 650px) {
      .rev-img-box {
        border-right: none;
        border-bottom: 3px solid #1e293b;
        max-height: 180px;
      }
    }

    .rev-img {
      width: 100%;
      height: 100%;
      object-cover: cover;
      object-fit: cover;
    }

    .rev-content {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      justify-content: center;
    }

    .rev-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }

    .rev-item-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--encre);
    }

    .badge-status {
      font-family: 'Fredoka', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      border: 2px solid transparent;
    }

    .badge-success {
      background-color: var(--vert-clair);
      color: var(--vert);
      border-color: var(--vert);
    }

    .badge-error {
      background-color: var(--rouge-clair);
      color: var(--rouge);
      border-color: var(--rouge);
    }

    .rev-answers-info {
      font-size: 0.85rem;
      color: var(--ardoise);
      font-weight: 700;
    }

    .rev-desc {
      font-size: 0.85rem;
      color: var(--encre);
      background: var(--papier);
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--ligne);
    }

    /* MODAL ZOOM */
    .modal {
      display: none;
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(15, 23, 42, 0.9);
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
      padding: 1rem;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
      border: 4px solid #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- HEADER -->
  <header>
    <h1>Découvrir les types de paysages</h1>
    <div class="subtitle">Observe l'image affichée et classe-la dans la bonne catégorie de paysage. Es-tu prêt à relever le défi ?</div>
  </header>

  <!-- MAIN GAME AREA -->
  <div class="game-grid" id="main-game">
    
    <!-- LEFT: PHOTO DISPLAY -->
    <div class="photo-column">
      <div class="image-box" onclick="openZoom()">
        <img class="landscape-img" id="current-img" src="" alt="Paysage mystère">
      </div>
      <div class="caption">
        Clique sur l'image pour l'observer en grand format.
      </div>
    </div>

    <!-- RIGHT: MULTIPLE CHOICE BOX -->
    <div class="question-column">
      <div class="q-progress">
        <span class="q-step" id="question-index">Question 1 / 5</span>
      </div>
      <div class="q-text">De quel type de paysage s'agit-il ?</div>
      
      <div class="options-grid">
        <button class="opt-btn" onclick="selectType('urbain')">
          <span>🏢 Paysage urbain</span>
        </button>
        <button class="opt-btn" onclick="selectType('periurbain')">
          <span>🏡 Paysage périurbain</span>
        </button>
        <button class="opt-btn" onclick="selectType('rural')">
          <span>🚜 Paysage rural</span>
        </button>
        <button class="opt-btn" onclick="selectType('industriel')">
          <span>🏭 Paysage industriel</span>
        </button>
        <button class="opt-btn" onclick="selectType('littoral')">
          <span>🏖️ Paysage littoral</span>
        </button>
        <button class="opt-btn" onclick="selectType('montagne')">
          <span>🏔️ Paysage montagnard</span>
        </button>
        <button class="opt-btn" onclick="selectType('desert')">
          <span>🐪 Paysage désertique</span>
        </button>
      </div>

      <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>Valider ma réponse</button>
    </div>

  </div>

  <!-- RESULT CARD (HIDDEN AT START) -->
  <div class="result-card" id="result-screen">
    <div class="feedback-msg" id="feedback-title">Bravo !</div>
    
    <div class="score-circle">
      <span class="score-val" id="score-val">0/5</span>
      <span class="score-label">Score</span>
    </div>

    <div class="review-section">
      <h2 class="review-title">Correction de ton exercice</h2>
      <div id="review-cards-container">
        <!-- Review cards will be generated dynamically -->
      </div>
    </div>

    <button class="btn-main" onclick="restartGame()" style="margin-top: 1rem; max-width: 400px;">Recommencer avec d'autres images</button>
  </div>

</div>

<!-- LIGHTBOX ZOOM MODAL -->
<div class="modal" id="zoomModal" onclick="closeZoom()">
  <img class="modal-content" id="zoom-img" src="" alt="Agrandissement du paysage">
</div>

<script>
  // Banque d'images complète (12 images)
  const imageBank = [
    {
      src: 'photos/paysage_types_rural1.png',
      type: 'rural',
      title: 'Les grands champs cultivés',
      typeLabel: 'rural',
      desc: "C'est un paysage <strong>rural</strong> agricole. On y voit de vastes étendues cultivées (champs de blé) et une moissonneuse au travail. L'espace est exploité par l'Homme pour produire de la nourriture (activité agricole)."
    },
    {
      src: 'photos/paysage_types_rural2.png',
      type: 'rural',
      title: 'Les prairies et l\'élevage',
      typeLabel: 'rural',
      desc: "C'est un paysage <strong>rural</strong> d'élevage. On y distingue des prairies fermées par des haies de bocage, des vaches qui paissent et des bâtiments de ferme typiques de nos campagnes."
    },
    {
      src: 'photos/paysage_types_urbain1.png',
      type: 'urbain',
      title: 'La rue commerçante',
      typeLabel: 'urbain',
      desc: "C'est un paysage <strong>urbain</strong> (centre-ville). Les bâtiments de brique sont hauts et collés, avec de nombreuses vitrines de magasins au rez-de-chaussée et une foule de piétons."
    },
    {
      src: 'photos/paysage_types_urbain2.png',
      type: 'urbain',
      title: 'Les toits de la ville historique',
      typeLabel: 'urbain',
      desc: "C'est un paysage <strong>urbain</strong> historique. On y observe une très forte densité de toits en ardoise ou en tuile, des rues pavées étroites et un clocher d'église dominant l'horizon."
    },
    {
      src: 'photos/paysage_types_periurbain1.png',
      type: 'periurbain',
      title: 'La banlieue résidentielle',
      typeLabel: 'périurbain',
      desc: "C'est un paysage <strong>périurbain</strong> résidentiel. Il se compose de maisons familiales similaires avec jardins et garages, typique des extensions autour des grandes villes."
    },
    {
      src: 'photos/paysage_types_periurbain2.png',
      type: 'periurbain',
      title: 'La zone commerciale',
      typeLabel: 'périurbain',
      desc: "C'est un paysage <strong>périurbain</strong> commercial. On y voit de grands magasins de plain-pied, de vastes parkings de supermarchés et des ronds-points pour réguler la circulation automobile."
    },
    {
      src: 'photos/paysage_types_industriel1.png',
      type: 'industriel',
      title: 'Le complexe d\'usines',
      typeLabel: 'industriel',
      desc: "C'est un paysage <strong>industriel</strong> lourd. Il est caractérisé par d'immenses hangars de production en métal, des tuyauteries enchevêtrées et de hautes cheminées dégageant de la vapeur."
    },
    {
      src: 'photos/paysage_types_industriel2.png',
      type: 'industriel',
      title: 'Le port fluvial de marchandises',
      typeLabel: 'industriel',
      desc: "C'est un paysage <strong>industriel</strong> de transport. On y trouve des grues de chargement géantes, des rangées de conteneurs multicolores et une péniche de fret amarrée à un canal."
    },
    {
      src: 'photos/paysage_types_montagne.png',
      type: 'montagne',
      title: 'Les sommets alpins',
      typeLabel: 'montagnard',
      desc: "C'est un paysage <strong>montagnard</strong>. On y reconnaît des sommets rocheux abrupts recouverts de neige, des forêts de sapins d'altitude et un chalet traditionnel en bois."
    },
    {
      src: 'photos/paysage_littoral.png',
      type: 'littoral',
      title: 'Le littoral de la Côte belge',
      typeLabel: 'littoral',
      desc: "C'est un paysage <strong>littoral</strong>. Il associe la mer du Nord, une plage de sable fin avec un brise-lames en pierre et la digue piétonne bordée par les immeubles."
    },
    {
      src: 'photos/paysage_types_desert_sable.png',
      type: 'desert',
      title: 'Le désert de sable',
      typeLabel: 'désertique',
      desc: "C'est un paysage <strong>désertique</strong> chaud. Les dunes de sable s'étendent à perte de vue. L'absence d'eau et de végétation en fait un milieu impropre à l'installation humaine (forte contrainte naturelle)."
    },
    {
      src: 'photos/paysage_types_desert_glace.png',
      type: 'desert',
      title: 'Le désert de glace (Antarctique)',
      typeLabel: 'désertique',
      desc: "C'est un paysage <strong>désertique</strong> froid polaire (l'Antarctique). C'est un désert d'eau gelée (glacier), sans arbres ni herbes, où les conditions climatiques extrêmes empêchent l'Homme de vivre."
    }
  ];

  const categoriesLabels = {
    urbain: 'Paysage urbain',
    periurbain: 'Paysage périurbain',
    rural: 'Paysage rural',
    industriel: 'Paysage industriel',
    littoral: 'Paysage littoral',
    montagne: 'Paysage montagnard',
    desert: 'Paysage désertique'
  };

  // Variables d'état
  let currentSelection = []; // Contient les 5 images sélectionnées au hasard pour la partie
  let currentIndex = 0;      // Question courante (0 à 4)
  let answers = [];          // Réponses de l'élève (tableau de 5 chaînes)

  // Tire au sort 5 images uniques de la banque d'images
  function initGame() {
    currentIndex = 0;
    answers = [];
    currentSelection = [];
    
    // Mélange et tirage au sort de 5 éléments uniques
    const tempBank = [...imageBank];
    for (let i = 0; i < 5; i++) {
      const randomIndex = Math.floor(Math.random() * tempBank.length);
      currentSelection.push(tempBank[randomIndex]);
      tempBank.splice(randomIndex, 1);
    }

    document.getElementById('main-game').style.display = 'grid';
    document.getElementById('result-screen').style.display = 'none';

    showCurrentQuestion();
  }

  // Affiche la question courante
  function showCurrentQuestion() {
    const item = currentSelection[currentIndex];
    
    // Image
    document.getElementById('current-img').src = item.src;
    document.getElementById('zoom-img').src = item.src;

    // Progression
    document.getElementById('question-index').innerText = `Question ${currentIndex + 1} / 5`;

    // Reset des boutons d'options
    const buttons = document.querySelectorAll('.opt-btn');
    buttons.forEach(btn => btn.classList.remove('selected'));

    // Désactive le bouton suivant
    document.getElementById('btn-next').setAttribute('disabled', 'true');
    document.getElementById('btn-next').innerText = currentIndex === 4 ? "Valider mon exercice" : "Continuer";
  }

  // Gère la sélection d'un type de paysage
  let tempSelectedValue = null;
  function selectType(type) {
    tempSelectedValue = type;

    // Highlight le bouton
    const buttons = document.querySelectorAll('.opt-btn');
    buttons.forEach(btn => {
      btn.classList.remove('selected');
      // Identifie le bon bouton en comparant le type passé en onclick
      const onclickAttr = btn.getAttribute('onclick');
      if (onclickAttr && onclickAttr.includes(`'${type}'`)) {
        btn.classList.add('selected');
      }
    });

    // Active le bouton continuer
    document.getElementById('btn-next').removeAttribute('disabled');
  }

  // Passe à la question suivante ou valide
  function nextQuestion() {
    answers.push(tempSelectedValue);
    tempSelectedValue = null;

    if (currentIndex < 4) {
      currentIndex++;
      showCurrentQuestion();
    } else {
      showResults();
    }
  }

  // Calcule le score final et affiche l'écran de correction
  function showResults() {
    let score = 0;
    const container = document.getElementById('review-cards-container');
    container.innerHTML = '';

    currentSelection.forEach((item, idx) => {
      const userAns = answers[idx];
      const correctAns = item.type;
      const isCorrect = (userAns === correctAns);

      if (isCorrect) score++;

      // Génère la carte de révision
      const revCard = document.createElement('div');
      revCard.className = 'rev-card';
      
      const badgeClass = isCorrect ? 'badge-success' : 'badge-error';
      const badgeText = isCorrect ? 'Correct' : 'Faux';

      const userAnsLabel = categoriesLabels[userAns];
      const correctAnsLabel = categoriesLabels[correctAns];

      revCard.innerHTML = `
        <div class="rev-img-box">
          <img class="rev-img" src="${item.src}" alt="${item.title}">
        </div>
        <div class="rev-content">
          <div class="rev-header">
            <span class="rev-item-title">${item.title}</span>
            <span class="badge-status ${badgeClass}">${badgeText}</span>
          </div>
          <div class="rev-answers-info">
            Ta réponse : <strong>${userAnsLabel}</strong> 
            ${!isCorrect ? `| Réponse correcte : <strong>${correctAnsLabel}</strong>` : ''}
          </div>
          <div class="rev-desc">${item.desc}</div>
        </div>
      `;

      container.appendChild(revCard);
    });

    // Affiche le score
    document.getElementById('score-val').innerText = `${score}/5`;

    // Messages de félicitations
    let feedback = "";
    if (score === 5) feedback = "Excellent ! 5/5, tu es un vrai géographe ! 🎉";
    else if (score >= 3) feedback = "Bien joué ! Beau score ! 👍";
    else feedback = "Entraîne-toi encore pour repérer tous les paysages ! 💪";

    document.getElementById('feedback-title').innerText = feedback;

    // Bascule les écrans
    document.getElementById('main-game').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
  }

  // Recommence le jeu
  function restartGame() {
    initGame();
  }

  function openZoom() {
    document.getElementById('zoomModal').style.display = 'flex';
  }

  function closeZoom() {
    document.getElementById('zoomModal').style.display = 'none';
  }

  // Démarrage initial
  window.onload = () => {
    initGame();
  };
</script>

</body>
</html>
