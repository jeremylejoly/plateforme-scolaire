<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le trajet de la nourriture — dans l'ordre</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:wght@300..800&family=Nunito:wght@300..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple: #5B4FCF;
      --purple-light: #EEF0FF;
      --purple-mid: #C7C2F5;
      --green: #1A9E75;
      --green-light: #E2F5EE;
      --red: #D94F3D;
      --red-light: #FDECEA;
      --amber: #C97B1A;
      --amber-light: #FEF3E2;
      --bg: #FDFBF7;
      --surface: #FFFFFF;
      --text: #1A1A2E;
      --muted: #6B7080;
      --border: #1A1A2E;
      --r: 14px;
      --rsm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1.5rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 3px solid var(--border);
      box-shadow: 6px 6px 0px var(--border);
      border-radius: var(--r);
      padding: 2rem;
      max-width: 680px;
      width: 100%;
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .instr {
      border: 2px solid var(--purple-mid);
      background: var(--purple-light);
      border-radius: var(--rsm);
      padding: 0.8rem 1.2rem;
      color: var(--purple);
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .step-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 6px 0;
    }

    .step-num {
      min-width: 32px;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--purple);
      font-family: 'Fredoka', sans-serif;
      text-align: right;
      flex-shrink: 0;
    }

    .given-card {
      flex: 1;
      background: var(--green-light);
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0px var(--border);
      border-radius: var(--rsm);
      padding: 0.75rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: #166534;
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Nunito', sans-serif;
    }

    .given-badge {
      background: var(--green);
      color: white;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 800;
      font-size: 0.8rem;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .drag-card {
      flex: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0px var(--border);
      border-radius: var(--rsm);
      padding: 0.75rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      cursor: grab;
      display: flex;
      align-items: center;
      gap: 12px;
      user-select: none;
      transition: opacity 0.15s, border-color 0.15s, background-color 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .drag-card:active { cursor: grabbing; }
    .drag-card.dragging { opacity: 0.3; transform: scale(0.98); }
    
    .drag-card.card-correct {
      border-color: var(--green);
      background: var(--green-light);
      color: #166534;
      box-shadow: 2px 2px 0px var(--green);
    }
    .drag-card.card-wrong {
      border-color: var(--red);
      background: var(--red-light);
      color: #991b1b;
      box-shadow: 2px 2px 0px var(--red);
    }

    .drag-handle {
      color: var(--muted);
      font-size: 1.2rem;
      flex-shrink: 0;
      font-weight: bold;
    }

    .insert-line {
      height: 4px;
      border-radius: 2px;
      background: var(--purple);
      margin-left: 44px;
      display: none;
      transition: all 0.1s ease;
    }
    .insert-line.visible { display: block; margin-top: 4px; margin-bottom: 4px; }

    .btn-verify {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      border-radius: var(--r);
      border: 3px solid var(--border);
      background: var(--purple);
      color: white;
      cursor: pointer;
      box-shadow: 4px 4px 0px var(--border);
      transition: all 0.15s ease;
    }
    .btn-verify:hover {
      background: #4a3fb8;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0px var(--border);
    }
    .btn-verify:active {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0px var(--border);
    }

    .btn-reset {
      width: 100%;
      margin-top: 12px;
      padding: 0.6rem;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Fredoka', sans-serif;
      border-radius: var(--r);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--border);
      transition: all 0.15s ease;
    }
    .btn-reset:hover {
      background: var(--bg);
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0px var(--border);
    }
    .btn-reset:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0px var(--border);
    }

    .result-msg {
      margin-top: 1.5rem;
      padding: 22px;
      border-radius: var(--r);
      border: 3px solid var(--border);
      box-shadow: 6px 6px 0px var(--border);
      font-family: 'Fredoka', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      text-align: center;
      display: none;
    }
    .result-msg.success {
      display: block;
      background: var(--green-light);
      border-color: var(--green);
      box-shadow: 6px 6px 0px var(--green);
      color: #166534;
    }
    .result-msg.partial {
      display: block;
      background: var(--amber-light);
      border-color: var(--amber);
      box-shadow: 6px 6px 0px var(--amber);
      color: #7a5000;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🥙 Le trajet de la nourriture — dans l'ordre</h1>
  <div class="instr">Remets les étapes de la digestion dans le bon ordre en les faisant glisser.</div>

  <div class="step-row">
    <div class="step-num">1.</div>
    <div class="given-card">
      <div class="given-badge">1</div>
      Les aliments entrent dans la bouche et sont mâchés (mastication)
    </div>
  </div>

  <div id="list-container"></div>

  <button class="btn-verify" onclick="verify()">✅ Vérifier l'ordre</button>
  <button class="btn-reset" onclick="init()">↺ Mélanger à nouveau</button>
  <div class="result-msg" id="result"></div>
</div>

<script>
  const STEPS = [
    "La salive des glandes salivaires ramollit les aliments",
    "Les aliments descendent dans l'œsophage (déglutition)",
    "Les aliments arrivent dans l'estomac et sont brassés avec les sucs gastriques",
    "La bouillie passe dans l'intestin grêle",
    "Le foie et le pancréas déversent leurs sucs dans l'intestin grêle",
    "Les nutriments sont absorbés et passent dans le sang",
    "Les déchets passent dans le gros intestin (côlon) où l'eau est absorbée",
    "Les selles sont stockées dans le rectum",
    "Les selles sont évacuées par l'anus"
  ];

  let order = [];
  let dragSrcIdx = null;
  let insertIdx = null;
  let highlights = null;

  // Touch state
  let touchStartIdx = null;
  let touchActiveEl = null;
  let touchClone = null;
  let touchInsertIdx = null;

  function shuffle(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    if (a.every((v, i) => v === arr[i])) return shuffle(arr);
    return a;
  }

  function init() {
    order = shuffle(STEPS);
    highlights = null;
    render();
    document.getElementById('result').style.display = 'none';
  }

  function render() {
    const container = document.getElementById('list-container');
    container.innerHTML = '';

    order.forEach((text, i) => {
      const line = document.createElement('div');
      line.className = 'insert-line';
      line.dataset.insertBefore = i;
      container.appendChild(line);

      const row = document.createElement('div');
      row.className = 'step-row';
      row.dataset.idx = i;

      const num = document.createElement('div');
      num.className = 'step-num';
      num.textContent = (i + 2) + '.';

      const card = document.createElement('div');
      card.className = 'drag-card';
      if (highlights) card.classList.add(highlights[i] ? 'card-correct' : 'card-wrong');
      card.draggable = true;
      card.dataset.idx = i;
      card.innerHTML = `<span class="drag-handle">☰</span><span>${text}</span>`;

      // Mouse drag-and-drop events (Original robust centralized logic)
      card.addEventListener('dragstart', e => {
        dragSrcIdx = i;
        insertIdx = null;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(i));
        setTimeout(() => card.classList.add('dragging'), 0);
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        clearInsertLines();
        dragSrcIdx = null;
        insertIdx = null;
      });

      // Touch events (iPads and tablets support)
      card.addEventListener('touchstart', handleTouchStart, { passive: false });
      card.addEventListener('touchmove', handleTouchMove, { passive: false });
      card.addEventListener('touchend', handleTouchEnd);

      row.appendChild(num);
      row.appendChild(card);
      container.appendChild(row);
    });

    const lastLine = document.createElement('div');
    lastLine.className = 'insert-line';
    lastLine.dataset.insertBefore = order.length;
    container.appendChild(lastLine);

    // Centralised dragover: compute insert position from all rows (Original robust logic)
    container.addEventListener('dragover', e => {
      e.preventDefault();
      if (dragSrcIdx === null) return;
      e.dataTransfer.dropEffect = 'move';
      const rows = [...container.querySelectorAll('.step-row')];
      let newInsert = order.length;
      for (let j = 0; j < rows.length; j++) {
        const rect = rows[j].getBoundingClientRect();
        if (e.clientY < rect.top + rect.height / 2) { newInsert = j; break; }
      }
      if (newInsert !== insertIdx) {
        insertIdx = newInsert;
        showInsertLine(insertIdx);
      }
    });

    // Reorder on drop (Original robust logic)
    container.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || insertIdx === null) return;
      if (insertIdx !== dragSrcIdx && insertIdx !== dragSrcIdx + 1) {
        const item = order.splice(dragSrcIdx, 1)[0];
        let target = insertIdx;
        if (insertIdx > dragSrcIdx) target--;
        order.splice(target, 0, item);
        highlights = null;
        document.getElementById('result').style.display = 'none';
      }
      clearInsertLines();
      dragSrcIdx = null;
      insertIdx = null;
      render();
    });

    container.addEventListener('dragleave', e => {
      if (!container.contains(e.relatedTarget)) {
        clearInsertLines();
        insertIdx = null;
      }
    });
  }

  // Touch Handlers
  function handleTouchStart(e) {
    const card = e.currentTarget;
    const idx = parseInt(card.dataset.idx);
    touchStartIdx = idx;
    touchActiveEl = card;
    
    touchClone = card.cloneNode(true);
    touchClone.style.position = 'fixed';
    touchClone.style.zIndex = '9999';
    touchClone.style.width = card.offsetWidth + 'px';
    touchClone.style.opacity = '0.9';
    touchClone.style.pointerEvents = 'none';
    touchClone.style.boxShadow = '6px 6px 0px var(--border)';
    
    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - card.offsetWidth / 2) + 'px';
    touchClone.style.top = (touch.clientY - 20) + 'px';
    
    document.body.appendChild(touchClone);
    card.classList.add('dragging');
  }

  function handleTouchMove(e) {
    if (!touchClone) return;
    e.preventDefault();
    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - touchClone.offsetWidth / 2) + 'px';
    touchClone.style.top = (touch.clientY - 20) + 'px';
    
    const container = document.getElementById('list-container');
    const rows = [...container.querySelectorAll('.step-row')];
    let newInsert = order.length;
    for (let j = 0; j < rows.length; j++) {
      const rect = rows[j].getBoundingClientRect();
      if (touch.clientY < rect.top + rect.height / 2) { newInsert = j; break; }
    }
    
    if (newInsert !== touchInsertIdx) {
      touchInsertIdx = newInsert;
      showInsertLine(touchInsertIdx);
    }
  }

  function handleTouchEnd(e) {
    if (!touchClone) return;
    touchClone.remove();
    touchClone = null;
    
    if (touchActiveEl) touchActiveEl.classList.remove('dragging');
    clearInsertLines();
    
    if (touchInsertIdx !== null && touchInsertIdx !== touchStartIdx && touchInsertIdx !== touchStartIdx + 1) {
      const item = order.splice(touchStartIdx, 1)[0];
      let target = touchInsertIdx;
      if (touchInsertIdx > touchStartIdx) target--;
      order.splice(target, 0, item);
      highlights = null;
      document.getElementById('result').style.display = 'none';
      render();
    }
    
    touchStartIdx = null;
    touchActiveEl = null;
    touchInsertIdx = null;
  }

  function showInsertLine(idx) {
    document.querySelectorAll('.insert-line').forEach(l => l.classList.remove('visible'));
    const lines = document.querySelectorAll('.insert-line');
    if (lines[idx]) lines[idx].classList.add('visible');
  }

  // Clear lines helper
  function clearInsertLines() {
    document.querySelectorAll('.insert-line').forEach(l => l.classList.remove('visible'));
  }

  function verify() {
    highlights = order.map((text, i) => text === STEPS[i]);
    render();
    const correct = highlights.filter(Boolean).length;
    const msg = document.getElementById('result');
    if (correct === 9) {
      msg.className = 'result-msg success';
      msg.innerHTML = '🎉 Bravo ! Toutes les étapes sont dans le bon ordre !';
    } else {
      msg.className = 'result-msg partial';
      msg.innerHTML = `${correct}/9 étapes correctes. Les cases en rouge sont à corriger !`;
    }

    // Save score to parent dashboard
    if (window.parent && window.parent.saveResult) {
      const pct = Math.round(correct / 9 * 100);
      window.parent.saveResult({
        activity: 'sci_dig_ordre',
        bookTitle: "Digestif — Remettre dans l'ordre",
        score: correct,
        total: 9,
        pct: pct,
        date: new Date().toLocaleDateString('fr-BE'),
        time: new Date().toLocaleTimeString('fr-BE', { hour: '2-digit', minute: '2-digit' })
      });
    }
  }

  init();
</script>
</body>
</html>
